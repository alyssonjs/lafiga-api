alignment_descs:
  chaotic-evil: |-
    Criaturas caóticas e malignas (CM) agem com violência arbitrária, movidas por ganância, ódio ou sede de sangue. Demônios, dragões vermelhos e orcos costumam ser caóticos e malignos.
  chaotic-good: |-
    Criaturas caóticas e boas (CB) seguem a consciência, pouco importando o que outros esperam. Dragões de cobre, muitos elfos e unicórnios costumam ser caóticos e bons.
  chaotic-neutral: |-
    Criaturas caóticas e neutras (CN) seguem seus caprichos e valorizam a liberdade pessoal acima de tudo. Muitos bárbaros e ladinos, e alguns bardos, são caóticos e neutros.
  lawful-evil: |-
    Criaturas leais e malignas (LM) tomam o que desejam de forma metódica, dentro dos limites de um código de tradição, lealdade ou ordem. Diabos, dragões azuis e hobgoblins costumam ser leais e malignos.
  lawful-good: |-
    Criaturas leais e boas (LB) podem ser contadas para fazer o certo conforme a sociedade espera. Dragões dourados, paladinos e a maioria dos anões costumam ser leais e bons.
  lawful-neutral: |-
    Indivíduos leais e neutros (LN) agem de acordo com a lei, tradição ou códigos pessoais. Muitos monges e alguns magos são leais e neutros.
  neutral: |-
    Neutro (N) é o alinhamento de quem prefere evitar questões morais e não tomar partido, fazendo o que parece melhor na hora. Homens-lagarto, a maioria dos druidas e muitos humanos são neutros.
  neutral-evil: |-
    Neutro e maligno (NM) é o alinhamento de quem faz o que pode sem compaixão ou escrúpulos. Muitos drow, alguns gigantes das nuvens e goblins costumam ser neutros e malignos.
  neutral-good: |-
    Pessoas neutras e boas (NB) fazem o melhor que podem para ajudar os outros conforme suas necessidades. Muitos celestiais, alguns gigantes das nuvens e a maioria dos gnomos são neutros e bons.

