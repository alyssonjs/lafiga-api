# Traduções PT-BR para chaves usadas por dnd_import:import (tr_pt) — alinhamentos, antecedentes,
# traços raciais, descrições curtas de features (lote inicial).
# Títulos e textos longos de classe: dnd_translations.pt_*_by_md5.json + scripts/build_dnd_features_pt.rb → merge_features_pt.
# Revisão alinhada ao livro: dnd_translations.features.book.yml + rake dnd_translations:apply_livro_book_patches + merge_features_book (por último).
# Mesclar prioridade: bundle exec rake dnd_translations:merge_priority

feature_descs:
  bardic-inspiration-d6: |-
    Você pode inspirar outros com palavras ou música envolventes. Com uma ação bônus no seu turno, escolha uma criatura além de você em até 18 metros que possa ouvi-lo. Essa criatura ganha um dado de Inspiração Bárdica (um d6). Uma vez nos próximos 10 minutos, a criatura pode rolar o dado e somar o resultado a um teste de habilidade, jogada de ataque ou teste de resistência. Ela pode esperar até rolar o d20 antes de usar o dado, mas deve decidir antes do Mestre dizer se o resultado foi sucesso ou falha. Depois de rolar, o dado se perde. Uma criatura só pode ter um dado de Inspiração Bárdica por vez.

    Você pode usar esse recurso um número de vezes igual ao seu modificador de Carisma (mínimo uma). Recupera os usos ao terminar um descanso longo.

    O dado de Inspiração Bárdica muda conforme seu nível nesta classe: torna-se um d8 no 5º nível, d10 no 10º e d12 no 15º.
  bardic-inspiration-d8: |-
    Você pode inspirar outros com palavras ou música envolventes. Com uma ação bônus no seu turno, escolha uma criatura além de você em até 18 metros que possa ouvi-lo. Essa criatura ganha um dado de Inspiração Bárdica. Uma vez nos próximos 10 minutos, a criatura pode rolar o dado e somar o resultado a um teste de habilidade, jogada de ataque ou teste de resistência. Ela pode esperar até rolar o d20 antes de usar o dado, mas deve decidir antes do Mestre dizer se o resultado foi sucesso ou falha. Depois de rolar, o dado se perde. Uma criatura só pode ter um dado de Inspiração Bárdica por vez.

    Você pode usar esse recurso um número de vezes igual ao seu modificador de Carisma (mínimo uma). Recupera os usos ao terminar um descanso longo.

    O dado de Inspiração Bárdica é um d8 no 5º nível, d10 no 10º e d12 no 15º.
  bardic-inspiration-d10: |-
    Você pode inspirar outros com palavras ou música envolventes. Com uma ação bônus no seu turno, escolha uma criatura além de você em até 18 metros que possa ouvi-lo. Essa criatura ganha um dado de Inspiração Bárdica. Uma vez nos próximos 10 minutos, a criatura pode rolar o dado e somar o resultado a um teste de habilidade, jogada de ataque ou teste de resistência. Ela pode esperar até rolar o d20 antes de usar o dado, mas deve decidir antes do Mestre dizer se o resultado foi sucesso ou falha. Depois de rolar, o dado se perde. Uma criatura só pode ter um dado de Inspiração Bárdica por vez.

    Você pode usar esse recurso um número de vezes igual ao seu modificador de Carisma (mínimo uma). Recupera os usos ao terminar um descanso longo.

    O dado de Inspiração Bárdica é um d10 no 10º nível e d12 no 15º.
  bardic-inspiration-d12: |-
    Você pode inspirar outros com palavras ou música envolventes. Com uma ação bônus no seu turno, escolha uma criatura além de você em até 18 metros que possa ouvi-lo. Essa criatura ganha um dado de Inspiração Bárdica (d12). Uma vez nos próximos 10 minutos, a criatura pode rolar o dado e somar o resultado a um teste de habilidade, jogada de ataque ou teste de resistência. Ela pode esperar até rolar o d20 antes de usar o dado, mas deve decidir antes do Mestre dizer se o resultado foi sucesso ou falha. Depois de rolar, o dado se perde. Uma criatura só pode ter um dado de Inspiração Bárdica por vez.

    Você pode usar esse recurso um número de vezes igual ao seu modificador de Carisma (mínimo uma). Recupera os usos ao terminar um descanso longo.

    No 15º nível, o dado de Inspiração Bárdica é um d12.
  jack-of-all-trades: |-
    A partir do 2º nível, você pode somar metade do seu bônus de proficiência (arredondado para baixo) a qualquer teste de habilidade que faça e que ainda não inclua seu bônus de proficiência.
  song-of-rest-d6: |-
    A partir do 2º nível, você pode usar música ou palavras reconfortantes para ajudar aliados feridos durante um descanso curto. Se você ou criaturas amigas que ouçam sua performance recuperarem pontos de vida ao fim do descanso curto gastando um ou mais Dados de Vida, cada uma recupera 1d6 pontos de vida a mais.

    Os PV extras aumentam em certos níveis nesta classe: 1d8 no 9º nível, 1d10 no 13º e 1d12 no 17º.
  song-of-rest-d8: |-
    A partir do 2º nível, você pode usar música ou palavras reconfortantes para ajudar aliados feridos durante um descanso curto. Se você ou criaturas amigas que ouçam sua performance recuperarem pontos de vida ao fim do descanso curto gastando um ou mais Dados de Vida, cada uma recupera PV a mais conforme seu nível de bardo (1d8 a partir do 9º nível; 1d10 no 13º; 1d12 no 17º).
  song-of-rest-d10: |-
    A partir do 2º nível, você pode usar música ou palavras reconfortantes para ajudar aliados feridos durante um descanso curto. Se você ou criaturas amigas que ouçam sua performance recuperarem pontos de vida ao fim do descanso curto gastando um ou mais Dados de Vida, cada uma recupera PV a mais conforme seu nível de bardo (1d10 a partir do 13º nível; 1d12 no 17º).
  song-of-rest-d12: |-
    A partir do 2º nível, você pode usar música ou palavras reconfortantes para ajudar aliados feridos durante um descanso curto. Se você ou criaturas amigas que ouçam sua performance recuperarem pontos de vida ao fim do descanso curto gastando um ou mais Dados de Vida, cada uma recupera 1d12 pontos de vida a mais (no 17º nível).
  countercharm: |-
    No 6º nível, você ganha a habilidade de usar notas ou palavras de poder para atrapalhar efeitos que influenciam a mente. Com uma ação, você pode iniciar uma performance que dura até o fim do seu próximo turno. Durante esse tempo, você e criaturas amigas em até 9 metros têm vantagem em testes de resistência contra ficar amedrontadas ou enfeitiçadas. A criatura precisa poder ouvi-lo para ganhar o benefício. A performance termina antes se você ficar incapacitado, silenciado ou a encerrar voluntariamente (sem ação).
  font-of-inspiration: |-
    A partir do 5º nível, recupera todos os usos gastos de Inspiração Bárdica ao terminar um descanso curto ou longo.
  expertise: |-
    No 3º nível, escolha duas perícias nas quais você é proficiente. Seu bônus de proficiência é dobrado em qualquer teste de habilidade que use uma dessas perícias. No 10º nível, escolha mais duas perícias proficientes para ganhar esse benefício.
  fighting-style-defense: |-
    Enquanto usar armadura, você recebe +1 na sua Classe de Armadura.
  fighting-style-archery: |-
    Você recebe +2 em jogadas de ataque que fizer com armas à distância.
  fighting-style-dueling: |-
    Quando estiver empunhando uma arma corpo a corpo em uma mão e nenhuma outra arma, você recebe +2 de dano com essa arma.
  fighting-style-two-weapon-fighting: |-
    Quando estiver lutando com duas armas, você pode somar seu modificador de atributo de ataque ao dano do segundo ataque.
  second-wind: |-
    Você dispõe de um estoque limitado de vigor. No seu turno, pode usar uma ação bônus para recuperar pontos de vida iguais a 1d10 + seu nível de guerreiro. Depois de usar esse recurso, precisa terminar um descanso curto ou longo antes de usá-lo de novo.
  action-surge-1-use: |-
    A partir do 2º nível, você pode se esforçar além do normal por um instante. No seu turno, pode realizar uma ação adicional além da sua ação normal e possível ação bônus.

    Depois de usar esse recurso, precisa terminar um descanso curto ou longo antes de usá-lo de novo. A partir do 17º nível, pode usá-lo duas vezes antes de descansar, mas só uma vez no mesmo turno.
  extra-attack: |-
    A partir do 5º nível, você pode atacar duas vezes, em vez de uma, sempre que realizar a ação Ataque no seu turno.

backgrounds:
  acolyte: Acólito

background_descs:
  acolyte: |-
    Como acólito, você inspira respeito entre os que compartilham sua fé e pode realizar as cerimônias religiosas de sua divindade. Você e seus companheiros podem receber cura e cuidados gratuitos em um templo ou santuário da sua fé, embora vocês precisem fornecer componentes materiais necessários para magias. Fiéis da mesma religião o apoiam (somente você) com um estilo de vida modesto.

    Você pode ter laços com um templo específico dedicado à sua divindade ou panteão, e uma morada lá — seja onde serviu antes, se ainda for bem-visto, ou um novo lar. Perto do templo, pode pedir ajuda aos sacerdotes, desde que o pedido não seja perigoso e você permaneça em boa conduta com o templo.

