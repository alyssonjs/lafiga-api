# YAML para magias de subclasses (sempre preparadas)
# Estrutura:
# <classe_api_index>:
#   <subclasse_api_index>:
#     always_prepared:
#       - { name: "Bênção", min_level: 1 }
#       - { name: "Escudo da Fé", min_level: 1 }
#
# Observações:
# - Os nomes das magias devem existir na tabela Spell (em PT no seu banco)
# - min_level é opcional; se omitido, a magia fica sempre preparada a partir do nível 1 da classe
# - Use `rake subclasses:import_spells` para importar os vínculos

# Exemplo para um Domínio do Clérigo personalizado:
# cleric:
#   dominio-agua:
#     always_prepared:
#       - { name: "Criar ou Destruir Água", min_level: 1 }
#       - { name: "Neblina", min_level: 1 }

cleric:
  dominio-agua:
    always_prepared:
      - { name: "Criar ou Destruir Água", min_level: 1 }
      - { name: "Névoa Obscurecente", min_level: 1 }
      - { name: "Respirar na Água", min_level: 3 }
