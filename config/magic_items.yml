- name: Saco de Contenção (Bag of Holding)
  rarity: uncommon
  category: wondrous item
  requires_attunement: false
  properties:
    capacity_kg: 227
    volume_l: 120
  description: |
    Este saco tem uma abertura de 2 pés de diâmetro e 4 pés de profundidade. O saco pode conter até 500 lb (≈227 kg), não excedendo um volume de 64 pés cúbicos (≈120 L). O peso do saco é sempre 15 lb (≈6,8 kg), independentemente do conteúdo. Recuperar um item do saco requer uma ação.
  source: DMG
  weight: "6.8 kg"
  value_gp: 4000
  tags: ["storage"]

- name: Espada das Brasas
  rarity: rare
  category: weapon
  sub_category: longsword
  requires_attunement: true
  effects:
    - kind: attack_bonus
      value: 1
      type: magico
    - kind: damage_bonus_dice
      dice: 1d6
      damage_type: fogo
    - kind: weapon_is_magical
      value: true
  description: |
    Esta espada irradia calor e chamas tênues. Enquanto sintonizado e empunhando a arma,
    você recebe +1 em jogadas de ataque. Ao acertar, a espada causa +1d6 de dano de fogo
    adicional. Ataques com esta arma contam como mágicos para efeitos de resistência e
    imunidade a dano não-mágico.
  source: Homebrew
  weight: "3 lb"
  value_gp: 3000
  tags: ["martial", "melee", "fire"]
