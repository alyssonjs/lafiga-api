gnome:
  id: gnome
  name: "Gnomo"
  description: "Curiosos e engenhosos; mente rápida e humor leve."
  # PHB pg 32: "Tamanho. Gnomos têm cerca de 90 cm e pesam aproximadamente
  # 18 kg. Seu tamanho é Pequeno." Estava como "Médio" (audit 2026-05-08).
  size: "Pequeno"
  speed: 25
  ability:
    type: fixed
    increases: [{ ability: INT, amount: 2 }]
  darkvision: { range: 60 }
  languages:
    always: [Comum, Gnômico]
    choiceCount: 0
  traits:
    - { key: gnome_cunning }
    - { key: darkvision, range: 60 }
  subraces:
    forest:
      id: forest
      name: "Gnomo da Floresta"
      description: "Ilusionistas natos; falam com pequenas criaturas."
      ability:
        type: fixed
        increases: [{ ability: DEX, amount: 1 }]
      traits:
        - key: minor_illusion_cantrip
          grants:
            spells:
              - spell: minor-illusion
                level: 0
                ability: INT
                usage: at_will
        - { key: speak_with_small_beasts }
    rock:
      id: rock
      name: "Gnomo das Rochas"
      description: "Historiadores de engenhocas; pequenos inventores."
      ability:
        type: fixed
        increases: [{ ability: CON, amount: 1 }]
      traits:
        - { key: artificers_lore }
        - { key: tinker }

