    grants:
      spells:
        - spell: minor-illusion
          level: 0
          ability: INT
          usage: at_will

  skill_versatility:
    name: "Versatilidade de Perícias"
    description: "Proficiência em duas perícias à escolha."
    sheet_impact: "Selecionar +2 perícias e marcar proficiência."

  relentless_endurance:
    name: "Perseverança Implacável"
    description: "Quando cair a 0 PV e não morrer, fica em 1 PV 1x por Descanso Longo."
    sheet_impact: "Adicionar reação/uso 1x/LDesc que define PV para 1 (logar uso)."
    grants:
      uses: { value: 1, per: "descanso longo" }

  savage_attacks:
    name: "Golpes Selvagens"
    description: "Ao obter crítico com ataque corpo a corpo, rola 1 dado de dano adicional da arma e soma ao dano total."
    sheet_impact: "Adicionar dado extra em críticos corpo a corpo."

  hellish_resistance:
    name: "Resistência Infernal"
    description: "Resistência a dano de fogo."
    sheet_impact: "Marcar `resistência: fogo`."

  infernal_legacy:
    name: "Legado Infernal"
    description: "Truque: Taumaturgia; 3º: Repreensão Infernal (2º) 1/LDesc; 5º: Escuridão 1/LDesc (conjur. por CAR)."
    sheet_impact: "Adicionar magias inatas e recargas por descanso longo."
    grants:
      spells:
        - spell: thaumaturgy
          level: 0
          ability: CHA
          usage: at_will
          minimum_level: 1
        - spell: hellish-rebuke
          level: 2
          ability: CHA
          usage: per_long_rest
          minimum_level: 3
        - spell: darkness
          level: 2
          ability: CHA
          usage: per_long_rest
          minimum_level: 5

  draconic_ancestry:
    name: "Ancestralidade Dracônica"
    description: "Escolhe cor/tipo do dragão; define tipo de dano do sopro e da resistência."
    sheet_impact: "Gravar `ancestralidade`: tipo de dano (ex.: fogo/ácido/gel/raio/trovão)."
    options:
      choose: 1
      list:
        - { id: black, name: "Preto (Ácido)", damage: "Ácido", breath: "Linha 1,5 m x 9 m" }
        - { id: blue, name: "Azul (Relâmpago)", damage: "Relâmpago", breath: "Linha 1,5 m x 9 m" }
        - { id: brass, name: "Latão (Fogo)", damage: "Fogo", breath: "Linha 1,5 m x 9 m" }
        - { id: bronze, name: "Bronze (Relâmpago)", damage: "Relâmpago", breath: "Linha 1,5 m x 9 m" }
        - { id: copper, name: "Cobre (Ácido)", damage: "Ácido", breath: "Linha 1,5 m x 9 m" }
        - { id: gold, name: "Ouro (Fogo)", damage: "Fogo", breath: "Cone 4,5 m" }
        - { id: green, name: "Verde (Veneno)", damage: "Veneno", breath: "Cone 4,5 m" }
        - { id: red, name: "Vermelho (Fogo)", damage: "Fogo", breath: "Cone 4,5 m" }
        - { id: silver, name: "Prata (Frio)", damage: "Frio", breath: "Cone 4,5 m" }
        - { id: white, name: "Branco (Frio)", damage: "Frio", breath: "Cone 4,5 m" }

  breath_weapon:
    name: "Arma de Sopro"
    description: "Ação: sopro de <dano> em <area>, conforme a ancestralidade; CD = 8 + Prof + CON; dano escala com nível; usos por Descanso Curto/Longo (PHB)."
    sheet_impact: "Adicionar ação ‘Sopro’ (<dano>, <area>): `CD = 8 + Prof + CON`, dano conforme nível."
    grants:
      # R4 — recurso racial: usado 1×, recarrega em Descanso Curto ou Longo.
      # CD do teste de resistência do alvo = 8 + Prof + mod. CON (materializado
      # por CharacterSheetSummaryService#merge_race_resources!).
      uses: { value: 1, per: "descanso curto ou longo" }
      dc: { base: 8, prof: true, ability: CON }

  damage_resistance_from_ancestry:
    name: "Resistência Elemental (Ancestralidade)"
    description: "Resistência a dano de <dano>, conforme a ancestralidade."
    sheet_impact: "Marcar `resistência: <dano>`."
    grants:
      defenses:
        # "<damage>" é interpolado pelo RaceProducer a partir do campo `damage`
        # do trait ref na sub-raça (ex.: { key: damage_resistance_from_ancestry,
        # damage: "Veneno" }). Permite um único trait_def servir as 10 cores.
        resistance: ["<damage>"]

  thaumaturgy_cantrip:
    name: "Presença Sobrenatural"
    description: "Você conhece o truque Taumaturgia; CAR é seu atributo de conjuração para esse truque."
