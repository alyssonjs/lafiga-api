          level: 1
          ability: CHA
          usage: per_long_rest
          minimum_level: 3
        - spell: ray-of-enfeeblement
          level: 2
          ability: CHA
          usage: per_long_rest
          minimum_level: 5

  infernal_legacy_variant:
    name: "Legado Infernal"
    description: "3º: Repreensão Infernal 1/LDesc; 5º: Escuridão 1/LDesc (CAR)."
    sheet_impact: "Adicionar magias inatas: 'Repreensão Infernal' (3º), 'Escuridão' (5º), 1/LDesc, CAR."
    grants:
      spells:
        - spell: hellish-rebuke
          level: 2
          ability: CHA
          usage: per_long_rest
          minimum_level: 3
        - spell: darkness
          level: 2
          ability: CHA
          usage: per_long_rest
          minimum_level: 5
