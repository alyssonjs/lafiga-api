    infernal:
      id: infernal
      name: "Infernal"
      description: "Linhagem diabólica clássica; enxofre e ouro nos olhos."
      traits:
        - { key: legacy_resistance_fire }     # Resistência a fogo
        - { key: infernal_legacy_variant }    # 3º: Repreensão Infernal; 5º: Escuridão (CAR), 1/LDesc

minotaur:
  id: minotaur
  name: "Minotauro"
  description: "Bestiais e imponentes; chifres afiados, natureza predatória e uma sede por batalha."
  size: "Médio"
  speed: 30            # 9 m ≈ 30 ft
  ability:
    type: fixed
    increases: [{ ability: STR, amount: 2 }, { ability: CON, amount: 1 }]
  languages:
    always: [Comum, Minotauro]
    choiceCount: 0
  proficiencies:
    skills:
      fixed: [Intimidação]            # PDF Lafiga "Atualização das Raças" p. 2: "Ameaçador: Você é proficiente na perícia Intimidação"
  traits:
    - { key: minotaur_horns_1d6 }
    - { key: goring_rush }
    - { key: hammering_horns }
    - { key: hybrid_nature_hum_monstr }

# ——————————————————————————————————————————————————————————
# CATÁLOGO DE TRAITS (descrição + impacto na ficha)
# ——————————————————————————————————————————————————————————
trait_definitions:
  centaur_charge:
    name: "Carga"
    description: "Se mover ≥ 6 m em linha reta até um alvo e acertar ataque corpo-a-corpo no mesmo turno: role o dano da arma duas vezes e some. Recarga após um Descanso Curto ou Longo."
    sheet_impact: "Criar ação especial (1x/SR ou LR): ‘Carga’ — dobra dados de dano da arma no acerto após corrida de 6 m."
    grants:
      uses: { value: 1, per: "descanso curto ou longo" }
  hooves_1d6_strike:
    name: "Cascos"
    description: "Ataques naturais (contundente) 1d6 + STR; você é proficiente com seus cascos."
    sheet_impact: "Adicionar ataque natural: ‘Cascos’ (1d6 contundente, atq: STR, prof.)."
    grants:
      natural_weapon: { name: "Cascos", dice: "1d6", damage_type: "contundente", ability: STR }
  equine_build:
    name: "Corpo Equino"
    description: "Conta como uma categoria maior para carga/empurrar/puxar; vantagem em STR (Atletismo) para puxar/empurrar. Escalar com mãos é difícil: cada 1,5 m de escalada custa +6 m (em vez de +1,5 m). Uma criatura Média ou menor pode montá-lo se você permitir (você age independentemente)."
    sheet_impact: "Ajustar capacidade de carga/empurrar/puxar; aplicar custo extra de movimento ao escalar; nota de montaria opcional."
  hybrid_nature_hum_monstr:
    name: "Natureza Híbrida"
    description: "Você é considerado Humanoide e Monstruosidade para efeitos de jogo."
    sheet_impact: "Registrar tipos: ‘Humanoide, Monstruosidade’ (para interações de magias/efeitos)."
  survivor_proficiency:
    name: "Sobrevivente"
    description: "Proficiência em Sobrevivência."
    sheet_impact: "Adicionar Perícia: Sobrevivência (prof.)."

  minotaur_horns_1d6:
    name: "Chifres"
    description: "Ataques naturais (perfurante) 1d6 + STR; você é proficiente com seus chifres."
    sheet_impact: "Adicionar ataque natural: ‘Chifres’ (1d6 perfurante, atq: STR, prof.)."
    grants:
      natural_weapon: { name: "Chifres", dice: "1d6", damage_type: "perfurante", ability: STR }

  goring_rush:
    name: "Arremetida Escornada"
    description: "Após usar Disparada e mover seu deslocamento total, pode fazer 1 ataque com chifres como Ação Bônus."
    sheet_impact: "Adicionar BA condicional: ‘Arremetida Escornada’ (requer Disparada)."

  hammering_horns:
    name: "Batedura de Chifres"
    description: "Após acertar um ataque corpo-a-corpo na sua ação Atacar, como reação tenta empurrar 1,5 m: STR ST CD = 8 + Prof + STR; falha: empurrado; sucesso: permanece."
    sheet_impact: "Adicionar Reação: ‘Batedura de Chifres’ com CD auto (8+Prof+STR)."

  menacing:
    name: "Ameaçador"
    description: "Proficiência em Intimidação."
    sheet_impact: "Adicionar Perícia: Intimidação (prof.)."

  # — Aarakocra
  flight_15m_no_med_heavy:
    name: "Voo (15 m)"
    description: "Deslocamento de voo 15 m; não funciona usando armadura média ou pesada."
    sheet_impact: "Adicionar deslocamento ‘voo 15 m’; regra de restrição por armadura."
    grants:
      movement:
        fly_ft: 50   # 15 m ≈ 50 ft

  flight_medium_ok:
    name: "Voo com Armadura Média"
    description: "Você pode usar seu deslocamento de voo mesmo vestindo armadura média."
    sheet_impact: "Remover restrição de armadura média do voo."

  claws_1d4_slashing:
    name: "Garras"
    description: "Ataques desarmados com garras: 1d4 cortante; proficiente."
    sheet_impact: "Adicionar ataque ‘Garras’ (1d4 cortante, atq: DEX ou STR, prof.)."
    grants:
      natural_weapon: { name: "Garras", dice: "1d4", damage_type: "cortante", ability: DEX }

  natural_singers:
    name: "Cantores Natos"
    description: "Proficiência em Atuação e com a ‘Voz’ como instrumento."
    sheet_impact: "Adicionar Perícia: Atuação (prof.) e Ferramenta: Voz (prof.)."

  darkvision:
    name: "Visão no Escuro"
    description: "Enxerga na penumbra como luz plena e no escuro como penumbra, até o alcance indicado; não discerne cores no escuro."
    sheet_impact: "Adicionar sentido `darkvision: <alcance>` na ficha."

  superior_darkvision:
    name: "Visão no Escuro Superior"
    description: "Versão ampliada (ex.: drow) — alcance 36 m/120 ft."
    sheet_impact: "Registrar `darkvision: 120`."

  dwarven_resilience:
    name: "Resiliência Anã"
    description: "Vantagem em testes de resistência contra veneno e resistência a dano de veneno."
    sheet_impact: "Marcar vantagem (CON/veneno) e `resistência: veneno`."
    grants:
      defenses:
        resistance: [veneno]
      advantages:
        saves: [Veneno]

  stonecunning:
    name: "Conhecimento da Pedra"
    description: "Em testes de INT (História) para origem de trabalhos em pedra, conta como proficiente e dobra o bônus de proficiência."
    sheet_impact: "Criar nota: ‘História (pedra): proficiência + proficiência dobrada (expertise)’."

  speed_not_reduced_by_heavy_armor:
    name: "Passo Firme"
    description: "Velocidade não é reduzida ao usar armadura pesada."
    sheet_impact: "Não aplicar penalidade de deslocamento por armadura pesada ao anão."

  dwarven_toughness:
    name: "Robustez Anã"
    description: "+1 PV por nível."
    sheet_impact: "Aumentar PV máximo em +1 por nível (aplicar em cada up)."
    grants:
      hp_per_level: 1

  keen_senses:
    name: "Sentidos Aguçados"
    description: "Proficiência em Percepção."
    sheet_impact: "Adicionar Perícia: Percepção (prof.)."

  fey_ancestry:
    name: "Ancestralidade Feérica"
    description: "Vantagem em testes de resistência contra Enfeitiçado; magia não pode induzir sono."
    sheet_impact: "Marcar vantagem (WIS/CHA/CON conforme origem do efeito) vs ‘charm’; imunidade a sono mágico."
    grants:
      advantages:
        saves: [Enfeitiçado]
      defenses:
        conditions_immunity: ["Sono mágico"]

  trance:
    name: "Transe"
    description: "Medita 4h/dia e obtém os benefícios de 8h de sono."
    sheet_impact: "Anotar descanso: 4h (Longo) para elfos."

  fleet_of_foot:
    name: "Pés Ligeiros"
    description: "Deslocamento base 35 ft/10,5 m."
    sheet_impact: "Setar velocidade base para 35 (se maior, manter maior)."

  mask_of_the_wild:
    name: "Máscara da Natureza"
    description: "Pode tentar se esconder mesmo levemente obscurecido por folhagem, neblina, chuva etc."
    sheet_impact: "Adicionar nota de ação: ‘Esconder (leve obscurecimento natural permitido)’."

  sunlight_sensitivity:
    name: "Sensibilidade à Luz Solar"
    description: "Desvantagem em jogadas de ataque e testes de Percepção (visão) sob luz solar direta."
    sheet_impact: "Lembrar desvantagem situacional em combate/exploração ao sol."

  drow_magic:
    name: "Magia Drow"
    description: "Truque: Luzes Dançantes; 3º: Fogo das Fadas 1/LDesc; 5º: Escuridão 1/LDesc (CD/ataque usam CAR)."
    sheet_impact: "Adicionar magias inatas (uso por descanso longo) com habilidade de conjuração: CAR."
    grants:
      spells:
        - spell: dancing-lights
          level: 0
          ability: CHA
          usage: at_will
        - spell: faerie-fire
          level: 1
          ability: CHA
          usage: per_long_rest
          minimum_level: 3
        - spell: darkness
          level: 2
          ability: CHA
          usage: per_long_rest
          minimum_level: 5

  high_elf_cantrip:
    name: "Truque de Alto Elfo"
    description: "Aprende 1 truque da lista do Mago (habilidade de conjuração: INT)."
    sheet_impact: "Adicionar 1 truque (Mago) e usar INT para CD/ataque mágico de truque."
    options:
      choose: 1
      ability: INT
      spell_list: wizard
      filters:
        level: 0

  lucky:
    name: "Sorte (Halfling)"
    description: "Ao tirar 1 natural em ataque, teste ou resistência, rerrola e usa o novo resultado."
    sheet_impact: "Ativar regra especial de rerrolagem on-1 (uma vez por ocorrência)."

  brave:
    name: "Bravura"
    description: "Vantagem em testes de resistência contra Amedrontado."
    sheet_impact: "Marcar vantagem vs ‘frightened’."
    grants:
      advantages:
        saves: [Amedrontado]

  halfling_nimbleness:
    name: "Agilidade Halfling"
    description: "Pode mover-se através do espaço de criaturas de tamanho maior."
    sheet_impact: "Lembrar movimento permitido por espaços hostis maiores."

  naturally_stealthy:
    name: "Furtividade Natural"
    description: "Pode tentar se esconder tendo como cobertura apenas uma criatura maior."
    sheet_impact: "Adicionar nota de Esconder: cobertura por aliados maiores."

  stout_resilience:
    name: "Resiliência dos Robustos"
    description: "Vantagem em testes vs veneno e resistência a dano de veneno."
    sheet_impact: "Igual a Resiliência Anã (aplicar à linhagem Halfling Robusto)."
    grants:
      defenses:
        resistance: [veneno]
      advantages:
        saves: [Veneno]

  feline_agility:
    name: "Agilidade Felina"
    description: "Quando se move no seu turno em combate, pode dobrar seu deslocamento até o fim do turno. Depois de usar, só pode usar novamente após passar um turno movendo 0 m."
    sheet_impact: "Adicionar recurso situacional: dobrar deslocamento por 1 turno; recarga ao passar um turno movendo 0 m."

  cat_claws_1d4_slashing:
    name: "Garras de Gato"
    description: "Você tem deslocamento de escalada de 6 m. Suas garras são armas naturais: ataques desarmados causam 1d4 + modificador de FOR de dano cortante."
    sheet_impact: "Adicionar deslocamento de escalada 6 m e ataque natural ‘Garras’ (1d4 cortante + FOR, prof.)."
    grants:
      movement:
        climb_ft: 20   # 6 m ≈ 20 ft
      natural_weapon: { name: "Garras de Gato", dice: "1d4", damage_type: "cortante", ability: STR }

  cats_talent:
    name: "Talento Felino"
    description: "Proficiência em Percepção e Furtividade."
    sheet_impact: "Adicionar Perícias: Percepção e Furtividade (prof.)."

  gnome_cunning:
    name: "Astúcia Gnômica"
    description: "Vantagem em todos os testes de resistência de INT, SAB e CAR contra magia."
    sheet_impact: "Marcar vantagem global (INT/SAB/CAR saves vs magia)."
    grants:
      advantages:
        saves: ["Magia (INT, SAB, CAR)"]

  speak_with_small_beasts:
    name: "Falar com Pequenas Criaturas"
    description: "Comunica ideias simples com bestas Pequenas ou menores."
    sheet_impact: "Adicionar nota de exploração/comunicação."

  artificers_lore:
    name: "Erudição do Artífice"
    description: "Dobra o bônus de proficiência em INT (História) para itens mágicos, alquímicos ou dispositivos tecnológicos."
    sheet_impact: "História (itens/artefatos): proficiência dobrada."

  tinker:
    name: "Engenho (Tinker)"
    description: "Constrói pequenos dispositivos mecânicos (regras de custo/tempo/efeitos conforme PHB)."
    sheet_impact: "Adicionar bloco de inventos (opcional, com cargas/uso)."

  minor_illusion_cantrip:
    name: "Truque: Ilusão Menor"
    description: "Aprende Ilusão Menor; habilidade de conjuração conforme indicado (gnomo da floresta usa INT)."
