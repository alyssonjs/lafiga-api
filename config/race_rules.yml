tiefling:
  id: tiefling
  name: "Tiefling"
  description: "Marcados por poderes infernais; linhagens de demônios, diabos ou yugoloths."
  size: "Médio"
  speed: 30            # 9 m ≈ 30 ft
  ability:
    type: fixed
    increases: [{ ability: CHA, amount: 2 }, { ability: INT, amount: 1 }]
  darkvision: { range: 60 }
  languages:
    always: [Comum, Infernal]
    choiceCount: 0
  traits:
    - { key: darkvision, range: 60 }
    - key: thaumaturgy_cantrip
      grants:
        spells:
          - spell: thaumaturgy
            level: 0
            ability: CHA
            usage: at_will
  subraces:
    abissal:
      id: abissal
      name: "Abissal"
      description: "Sangue dos demônios do Abismo; corpos marcados e odores estranhos."
      traits:
        - { key: legacy_resistance_poison }   # Resistência a veneno
        - { key: abyssal_legacy }             # 3º: Raio Adoecente; 5º: Cativar (CAR), 1/LDesc cada
    ctonico:
      id: ctonico
      name: "Ctônico"
      description: "Sangue entre demônios e yugoloths; toque do submundo."
      traits:
        - { key: legacy_resistance_necrotic } # Resistência a necrótico
