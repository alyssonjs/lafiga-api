# ——————————————————————————————————————————————————————————
# REGRAS DE RAÇAS — D&D 5e (Base PHB, PT-BR)
# Estrutura:
# - Cada raça possui blocos de atributos, idiomas, proficiências e traits.
# - Traits apontam para chaves padronizadas em trait_definitions (abaixo).
# - Campos `description` das raças/sub-raças são resumos de fantasia.
# ——————————————————————————————————————————————————————————

aarakocra:
  id: aarakocra
  name: "Aarakocra"
  description: "Povo-pássaro; domínio dos céus, garras afiadas e dialetos auranos."
  size: "Médio"
  speed: 25            # 7,5 m ≈ 25 ft (caminhada)
  ability:
    type: fixed
    increases: [{ ability: DEX, amount: 2 }]
  languages:
    always: [Comum, Aarakocra, Auran]
    choiceCount: 0
  traits:
    - { key: flight_15m_no_med_heavy } # Voo 15 m; não funciona com armadura média/pesada
    - { key: claws_1d4_slashing }      # Garras 1d4 (cortante), proficiente
  subraces:
    falconicos:
      id: falconicos
      name: "Falcônicos"
      description: "Mais altos e fortes; falcões, águias, gaviões e afins."
      ability:
        type: fixed
        increases: [{ ability: STR, amount: 1 }]
      traits:
        - { key: flight_medium_ok }    # Únicos que podem voar com armadura média
    nocturnos:
      id: nocturnos
      name: "Nocturnos"
      description: "Semelhantes a corujas; hábitos noturnos e visão aguçada."
      ability:
        type: fixed
        increases: [{ ability: WIS, amount: 1 }]
      traits:
        - { key: darkvision, range: 60 }
    cypselanos:
      id: cypselanos
      name: "Cypselanos"
      description: "Menores e coloridos; cantores natos de belos timbres."
      ability:
        type: fixed
        increases: [{ ability: CHA, amount: 1 }]
      proficiencies:
        skills:
          fixed: [Atuação]             # Performance
        tools:
          fixed: ["Voz (instrumento)"] # Trate "Voz" como instrumento
      traits:
        - { key: natural_singers }


centaur:
  id: centaur
  name: "Centauro"
  description: "Metade humanoide, metade equino; velozes, fortes e adaptados a terreno aberto."
  size: "Médio"        # Nota: altura ~2,50 m; continua mecânica de tamanho Médio
  speed: 40            # 12 m ≈ 40 ft
  ability:
    type: fixed
    increases: [{ ability: STR, amount: 2 }, { ability: WIS, amount: 1 }]
  languages:
    always: [Comum, Silvestre]
    choiceCount: 0
  proficiencies:
    skills:
      fixed: [Sobrevivência]
  traits:
    - { key: centaur_charge }          # “Carga” 1/SR ou LR
    - { key: hooves_1d6_strike }       # Cascos 1d6 + STR (contundente), proficiente
    - { key: equine_build }            # Corpo Equino: carga/empurrar/puxar melhores; escalada difícil; vantagem STR(Atletismo) p/ empurrar/puxar; montaria opcional
    - { key: hybrid_nature_hum_monstr }

dwarf:
  id: dwarf
  name: "Anão"
  description: "Robustos e obstinados; mestres da pedra e do metal, com tradições antigas."
  size: "Médio"
  speed: 25
  ability:
    type: fixed
    increases: [{ ability: CON, amount: 2 }]
  darkvision: { range: 60 }
  languages:
    always: [Comum, Anão]
    choiceCount: 0
  proficiencies:
    weapons: [machado de batalha, machadinha, martelo leve, martelo de guerra]
    tools:
      choiceCount: 1
      choices: [Ferramentas de ferreiro, Suprimentos de cervejeiro, Ferramentas de pedreiro]
  traits:
    - { key: dwarven_resilience }
    - { key: stonecunning }
    - { key: speed_not_reduced_by_heavy_armor }
    - { key: darkvision, range: 60 }
  subraces:
    hill:
      id: hill
      name: "Anão da Colina"
      description: "Sábios e resistentes; vigor inabalável."
      ability:
        type: fixed
        increases: [{ ability: WIS, amount: 1 }]
      traits:
        - { key: dwarven_toughness }
    mountain:
      id: mountain
      name: "Anão da Montanha"
      description: "Forjados em fortalezas alpinas; treinados para a guerra."
      ability:
        type: fixed
        increases: [{ ability: STR, amount: 2 }]
      proficiencies:
        armor: [leve, média]
  requires: [dwarfTool]

elf:
  id: elf
  name: "Elfo"
  description: "Graciosos, longevos e atentos; filhos das florestas e da magia."
  size: "Médio"
  speed: 30
  ability:
    type: fixed
    increases: [{ ability: DEX, amount: 2 }]
  darkvision: { range: 60 }
  languages:
    always: [Comum, Élfico]
    choiceCount: 0
  proficiencies:
    skills:
      fixed: [Percepção]
  traits:
    - { key: fey_ancestry }
    - { key: trance }
    - { key: keen_senses }
    - { key: darkvision, range: 60 }
  subraces:
    high:
      id: high
      name: "Alto Elfo"
      description: "Arcana refinada; mente analítica e disciplina arcana."
      ability:
        type: fixed
        increases: [{ ability: INT, amount: 1 }]
      proficiencies:
        weapons: [espada longa, espada curta, arco curto, arco longo]
      languages:
        choiceCount: 1
        choiceList: [Anão, Halfling, Dracônico, Gnômico, Orc, Infernal]
      traits:
        - key: high_elf_cantrip
          options:
            choose: 1
            ability: INT
            spell_list: wizard
            filters:
              level: 0
    wood:
      id: wood
      name: "Elfo da Floresta"
      description: "Pisada leve, olhos atentos; caçadores e batedores natos."
      ability:
        type: fixed
        increases: [{ ability: WIS, amount: 1 }]
      speed: 35
      proficiencies:
        weapons: [espada longa, espada curta, arco curto, arco longo]
      traits:
        - { key: fleet_of_foot }
        - { key: mask_of_the_wild }
    drow:
      id: drow
      name: "Elfo Negro (Drow)"
      description: "Criados no Subterrâneo; dominam sombras e magia drow."
      ability:
        type: fixed
        increases: [{ ability: CHA, amount: 1 }]
      darkvision: { range: 120 }   # Visão no Escuro Superior (PHB Drow): 120 ft, sobrescreve os 60 ft do elfo base via deep_merge.
      proficiencies:
        weapons: [rapieira, espada curta, besta de mão]
      traits:
        - { key: superior_darkvision, range: 120 }
        - { key: sunlight_sensitivity }
        - { key: drow_magic }

human:
  id: human
  name: "Humano"
  description: "Versáteis e ambiciosos; adaptam-se a qualquer papel."
  size: "Médio"
  speed: 30
  ability:
    type: fixed
    increases:
      - { ability: STR, amount: 1 }
      - { ability: DEX, amount: 1 }
      - { ability: CON, amount: 1 }
      - { ability: INT, amount: 1 }
      - { ability: WIS, amount: 1 }
      - { ability: CHA, amount: 1 }
  languages:
    always: [Comum]
    choiceCount: 1
    choiceList: [Anão, Élfico, Halfling, Dracônico, Gnômico, Orc, Infernal]
  traits: []
  subraces:
    standard:
      id: standard
      name: "Humano Padrão"
      description: "Recebe +1 em todos os seis atributos."
      traits: []
    variant:
      id: variant
      name: "Humano Variante"
      description: "Talentos diversos; aprendem rapidamente."
      ability:
        type: variantHuman
        chooseAbilities: { count: 2, amount: 1 }
        skillChoices: 1
        feat: true

