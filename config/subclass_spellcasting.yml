rogue:
  trapaceiro-arcano:
    ability: INT
    # Usa a lista de magias do Mago para aprender/escolher
    list_source_klass_api: wizard
    # Cantrip obrigatório do arquétipo
    fixed_cantrips: ["mãos mágicas"]
    # Restrições de escola ao aprender magias (PHB):
    school_restrictions:
      primary: ["ilusão","encantamento"]
      exceptions_any_school_at_levels: [8, 14, 20]
    # Tabela por nível da classe Ladino: a linha válida é a de nível igual ou imediatamente inferior
