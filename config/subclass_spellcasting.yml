    # Subclasses deste caminho usam a lista do Feiticeiro para aprender/escolher
    list_source_klass_api: sorcerer
    # Tabela por nível da classe Bárbaro: nearest lower-or-equal row applies
    table:
      '3':  { cantrips: 2, spells: 1, slots: { '1': 2 } }
      '4':  { cantrips: 2, spells: 2, slots: { '1': 3 } }
