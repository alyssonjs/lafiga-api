monk:
  # Caminho do Punho Sagrado (houserule): único arquétipo de Monge com conjuração.
  # Conjurador parcial (1/3) com lista do Clérigo e habilidade Sabedoria.
  # CD = 8 + PB + mod. SAB; ataque de magia = PB + mod. SAB.
  # Números copiados da tabela "Conjuração de Punho Sagrado"
  # (config/subclass_overrides.yml › monk › caminho_punho_sagrado › rules.spellcasting.table).
  # A chave casa com o `api_index` da SubKlass no banco (underscore).
  caminho_punho_sagrado:
    ability: WIS
    # Usa a lista de magias do Clérigo para aprender/escolher
    list_source_klass_api: cleric
    # Truque obrigatório do arquétipo (além de truques de clérigo à escolha)
    fixed_cantrips: ["chamas sagradas"]
    # Tabela por nível da classe Monge: a linha válida é a de nível igual ou imediatamente inferior
    table:
      '3':  { cantrips: 1, spells: 3,  slots: { '1': 2 } }
      '4':  { cantrips: 1, spells: 4,  slots: { '1': 3 } }
      '5':  { cantrips: 1, spells: 4,  slots: { '1': 3 } }
      '6':  { cantrips: 1, spells: 4,  slots: { '1': 3 } }
      '7':  { cantrips: 1, spells: 5,  slots: { '1': 4, '2': 2 } }
