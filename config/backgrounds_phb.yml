  acolyte:
    name: Acólito
    starting_proficiencies:
      skills:
      - Intuição
      - Religião
      languages: 2
    starting_equipment:
    - Um símbolo sagrado
    - Um livro de orações
    - Um incensário com incenso
    - Vestes comuns
    - Uma algibeira contendo 15 po
    starting_equipment_options: []
    feature:
      name: ABRIGO DOS FIÉIS
      desc:
      - |-
        Como um acólito, você detém o respeito daqueles que compartilham de sua fé, 
        e você pode realizar cerimônias de sua divindade. Você e seus companheiros 
        de aventura podem até receber cura e caridade de um templo, santuário ou 
        outro posto de sua fé, embora devam fornecer quaisquer componentes materiais 
        necessários para as magias. Aqueles que compartilham de sua religião vão 
        garantir a você (mas apenas você), custeando um estilo de vida modesto.
        
        Você também pode possuir laços com um templo específico devotado à sua 
        divindade ou panteão, e fixar residência nele. Pode ser o templo que você 
        está acostumado a servir, se ainda tiver boas relações com ele, ou um templo 
        no qual você encontrou um novo lar. Enquanto frequentar as redondezas desse 
        templo, você pode solicitar os sacerdotes para assisti-lo, desde que essa 
        assistência não seja de alguma forma perigosa e que você sempre esteja em 
        uma boa relação com seu templo.
    personality_traits:
      choose: 2
      options:
      - Eu idolatro um herói particular do meu panteão e sempre me refiro aos feitos e exemplos dessa pessoa.
      - Posso encontrar pontos comuns entre os mais ferozes inimigos, empatizando com eles e sempre trabalhando pela paz.
      - Eu vejo presságios em cada evento e ação. Os deuses tentam falar conosco, só precisamos escutar.
      - Nada pode me abalar da minha devoção religiosa.
      - Eu sou intolerante (ou tolerante) de outras religiões e respeito (ou condeno) a adoração de outros deuses.
      - Minha piedade me leva a ajudar todos os que precisam, mesmo que isso me prejudique.
      - Eu confio que minha divindade me guiará. Eu aceito o que acontece comigo como a vontade de um poder superior.
      - Eu gosto de manter meus pensamentos e preces para mim mesmo. Aqueles que esperam mais devoção ou zelo me irritam.
    ideals:
      choose: 1
