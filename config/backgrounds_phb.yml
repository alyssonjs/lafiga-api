    personality_traits:
      choose: 2
      options:
        - Canto shanties em qualquer tarefa.
        - Conto histórias de tempestades.
        - Supersticioso com presságios do mar.
        - Mantenho a calma sob ondas e açoites.
        - Respeito a hierarquia do convés.
        - Gosto de jogos de sorte.
