                                                                    garante. Seus camaradas, membros da guilda, irão provê-
                                                                    lo com hospedagem e comida, se necessário, e pagarão
                                                                    pelo seu funeral se preciso for. Em algumas cidades e
                                                                    vilas, um salão da guilda oferece um local central para
                                                                    conhecer outros membros de profissão, podendo ser um
                                                                    bom lugar para se conhecer patrões, aliados e empregados
                                                                    em potencial.
                                                                        Guildas, muitas vezes, detêm tremendos poderes
                                                                    políticos. Se você for acusado de um crime, sua guilda irá
                                                                    ampará-lo se uma boa defesa puder ser apresentada para
                                                                    provar sua inocência ou se o crime for justificável. Você
                                                                    pode, também, ter acesso a figuras políticas poderosas
                                                                    através da guilda, se você for um membro bem
                                                                    posicionado. Tais conexões devem exigir doações de
                                                                    dinheiro ou itens mágicos para os cofres da guilda.
                                                                        Você deve pagar cotas de 5 po por mês a guilda. Se
                                                                    você não pagar, você irá contrair uma dívida para
