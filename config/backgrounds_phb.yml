version: 2
source: livro_do_jogador.txt

# Esquema padronizado (referência):
# backgrounds.<slug>:
#   name: string
#   starting_proficiencies:
#     skills: [string]
#     tools: [string]                   # opcional
#     languages: { count: int, from?: [string] }  # opcional
#   starting_equipment: [ { item: string, qty: int, container: string|null } ]
#   starting_equipment_options: [ { choose: int, from: [ { item: string, qty: int } ] } ]
#   feature: { name: string, desc: string }
#   personality_traits: { choose: int, options: [string] }
#   ideals: { choose: int, options: [ { desc: string, alignments: [alignment] } ] }
#   bonds: { choose: int, options: [string] }
#   flaws: { choose: int, options: [string] }

backgrounds:

  acolyte:
    name: Acólito
    starting_proficiencies:
      skills: [Intuição, Religião]
      languages: { count: 2 }
    starting_equipment:
      - { item: "Símbolo sagrado",        qty: 1, container: null }
      - { item: "Livro/roda de orações",  qty: 1, container: null }
      - { item: "Incenso (5 varetas)",    qty: 5, container: "bolsa" }
      - { item: "Vestes comuns",          qty: 1, container: null }
      - { item: "Algibeira (15 po)",      qty: 1, container: "cinto" }
    starting_equipment_options: []
    feature:
      name: Abrigo dos Fiéis
      desc: >
        Fiéis de sua religião oferecem hospitalidade modesta, cura e caridade
        (componentes materiais por sua conta). Você mantém laços com um templo
        e pode pedir ajuda não perigosa aos sacerdotes locais.
    personality_traits:
      choose: 2
      options:
        - Idolatro um herói do meu panteão e cito seus feitos.
        - Procuro conciliar até inimigos jurados.
        - Vejo presságios em tudo.
        - Nada abala minha devoção.
        - Sou (in)tolerante com outras religiões.
        - Ajudo quem precisa mesmo com custo pessoal.
        - Aceito o destino como vontade divina.
        - Evito ostentar minha fé em público.
    ideals:
      choose: 1
      options:
        - { desc: "Tradição. Ritos antigos devem ser preservados.", alignments: [lawful-good, lawful-neutral, lawful-evil] }
        - { desc: "Caridade. Ajudar os necessitados sem esperar retorno.", alignments: [lawful-good, neutral-good, chaotic-good] }
        - { desc: "Mudança. O mundo divino pede renovação constante.", alignments: [chaotic-good, chaotic-neutral, chaotic-evil] }
        - { desc: "Poder. Busco posição na hierarquia da fé.", alignments: [lawful-good, neutral, lawful-evil] }
        - { desc: "Fé. Confio na orientação dos deuses.", alignments: [lawful-good, neutral-good, chaotic-good, lawful-neutral, neutral, chaotic-neutral, lawful-evil, neutral-evil, chaotic-evil] }
        - { desc: "Aspiração. Quero ser digno da graça da minha divindade.", alignments: [neutral] }
    bonds:
      choose: 1
      options:
        - Daria a vida por uma relíquia sagrada perdida.
        - Busco vingança contra um templo corrupto.
        - Devo minha vida ao sacerdote que me acolheu.
        - Tudo que faço é pelo povo.
        - Protegerei meu templo a qualquer custo.
        - Guardo um texto sagrado proibido.
    flaws:
      choose: 1
      options:
        - Julgo os outros com dureza.
        - Desvalorizo minha própria vida.
        - Minha fé me cega para fatos.
        - Sou inflexível.
        - Desconfio de estranhos.
        - Tenho dificuldade em admitir erro.

  criminal:
    name: Criminoso
    starting_proficiencies:
      skills: [Enganação, Furtividade]
      tools: ["Ferramentas de ladrão", "Jogo de azar (à escolha)"]
    starting_equipment:
      - { item: "Alavanca de ferro",               qty: 1, container: null }
      - { item: "Roupas escuras comuns (com capuz)", qty: 1, container: null }
      - { item: "Algibeira (15 po)",               qty: 1, container: "cinto" }
    starting_equipment_options: []
    feature:
      name: Contato Criminoso
      desc: >
        Você possui um contato confiável que o conecta a uma rede criminosa.
        Sabe usar sinais, senhas e intermediários para enviar/receber mensagens.
    personality_traits:
      choose: 2
      options:
        - Sempre tenho um plano de fuga.
        - Coleciono segredos alheios.
        - Não deixo lucro fácil passar.
        - Falo pouco e observo muito.
        - Confio em ferramentas mais que em pessoas.
        - Brinco para aliviar a tensão.
        - Leal ao meu bando acima de tudo.
        - Frio sob pressão.
    ideals:
      choose: 1
      options:
        - { desc: "Comunidade. O grupo vem primeiro.", alignments: [lawful-good, lawful-neutral, lawful-evil] }
        - { desc: "Generosidade. Uso meus talentos para ajudar.", alignments: [neutral-good] }
        - { desc: "Liberdade. Ninguém manda em mim.", alignments: [chaotic-good, chaotic-neutral, chaotic-evil] }
        - { desc: "Ganância. Lucro acima de tudo.", alignments: [lawful-evil, neutral-evil, chaotic-evil] }
        - { desc: "Povo. Importo-me com pessoas reais, não com ideais.", alignments: [neutral] }
        - { desc: "Aspiração. Serei o melhor no meu ofício.", alignments: [any] }
    bonds:
      choose: 1
      options:
        - Tenho uma dívida com alguém perigoso.
        - Protegerei meu parceiro de crimes.
        - Recuperarei um bem roubado de mim.
        - Devo lealdade ao meu bando de infância.
        - Quero derrubar um chefão local.
        - Conheço um esconderijo que ninguém mais sabe.
    flaws:
      choose: 1
      options:
        - Desconfio de todo mundo.
        - Não resisto a um arrombamento.
        - Sou impulsivo demais.
        - A ganância me cega.
        - Guardo rancor por anos.
        - Quebro promessas por conveniência.

  charlatan:
    name: Charlatão
    starting_proficiencies:
      skills: [Enganação, Prestidigitação]
      tools: ["Kit de disfarce", "Kit de falsificação"]
    starting_equipment:
      - { item: "Roupas finas",             qty: 1, container: null }
      - { item: "Kit de disfarce",          qty: 1, container: null }
      - { item: "Ferramentas do golpe (baralho marcado / dados viciados / frascos coloridos)", qty: 1, container: "bolsa" }
      - { item: "Sinetes falsos variados",  qty: 1, container: "bolsa" }
      - { item: "Algibeira (15 po)",        qty: 1, container: "cinto" }
    starting_equipment_options: []
    feature:
      name: Identidade Falsa
      desc: >
        Você mantém uma segunda identidade, com documentos, contatos e disfarces.
        Consegue forjar papéis oficiais e cartas após ver um exemplo.
    personality_traits:
      choose: 2
      options:
        - Minto com naturalidade.
        - Leio pessoas como livros abertos.
        - Adoro trambiques elaborados.
        - Sou vaidoso com meus disfarces.
        - Falo rápido e confundo ouvintes.
        - Finjo remorso quando convém.
        - Odeio ser desmascarado.
        - Tenho um lema para cada golpe.
    ideals:
      choose: 1
      options:
        - { desc: "Liberdade. Regras existem para ser contornadas.", alignments: [chaotic-neutral] }
        - { desc: "Caridade. Golpeio os ricos, ajudo os pobres.", alignments: [neutral-good] }
        - { desc: "Ambição. Subirei usando meu talento.", alignments: [lawful-evil, neutral-evil] }
        - { desc: "Honra entre malandros. Protejo meus cúmplices.", alignments: [lawful-neutral] }
        - { desc: "Diversão. O jogo é melhor que o prêmio.", alignments: [chaotic-good] }
        - { desc: "Sobrevivência. Faço o que for preciso.", alignments: [neutral] }
    bonds:
      choose: 1
      options:
        - Um antigo comparsa me salvou a vida.
        - Alguém inocente sofreu por um golpe meu; devo reparo.
        - Tenho um alvo que jurei derrubar.
        - Um disfarce virou minha “verdadeira” vida.
        - Devo proteção à minha pequena gangue.
        - Carrego um token de um admirador enganado.
    flaws:
      choose: 1
      options:
        - Acredito nas minhas próprias mentiras.
        - Não resisto a uma aposta.
        - Subestimo pessoas honestas.
        - Fico paranoico com exposição.
        - Prometo demais, cumpro de menos.
        - Desisto quando o golpe fica difícil.

  entertainer:
    name: Artista
    starting_proficiencies:
      skills: [Acrobacia, Atuação]
      tools: ["Kit de disfarce", "Instrumento musical (à escolha)"]
    starting_equipment:
      - { item: "Instrumento musical (à escolha)", qty: 1, container: null }
      - { item: "Lembrança de admirador (p.ex., carta de amor)", qty: 1, container: "bolsa" }
      - { item: "Figurino",                 qty: 1, container: null }
      - { item: "Algibeira (15 po)",        qty: 1, container: "cinto" }
    starting_equipment_options: []
    feature:
      name: Pela Demanda Popular
      desc: >
        Você sempre encontra lugar para se apresentar. Em tais locais,
        recebe comida e alojamento modestos gratuitos enquanto atuar.
    personality_traits:
      choose: 2
      options:
        - Vivo para os aplausos.
        - Transformo drama em espetáculo.
        - Sou amigo de todos os donos de taverna.
        - Exagero nas histórias.
        - Nunca perco o ritmo.
        - Adoro improvisar.
        - Coleciono figurinos chamativos.
        - Tenho fãs em todo lugar.
    ideals:
      choose: 1
      options:
        - { desc: "Beleza. A arte torna o mundo melhor.", alignments: [good] }
        - { desc: "Tradição. Canções antigas devem viver.", alignments: [lawful] }
        - { desc: "Criatividade. O novo inspira coragem.", alignments: [chaotic] }
        - { desc: "Fama. Eu quero o centro das atenções.", alignments: [neutral] }
        - { desc: "Generosidade. Entretenho para aliviar dores.", alignments: [good] }
        - { desc: "Lucro. Minha arte deve pagar bem.", alignments: [evil] }
    bonds:
      choose: 1
      options:
        - Alguém me ensinou tudo; devo honrá-lo.
        - Um público específico conquistou meu coração.
        - Um rival quer me superar.
        - Meu instrumento é um tesouro de família.
        - Devo um favor a um patrono rico.
        - Quero levar minha trupe à fama.
    flaws:
      choose: 1
      options:
        - Vaidade me cega a críticas.
        - Invejo artistas melhores.
        - Gasto tudo com luxos.
        - Não sei lidar com vaias.
        - Flerto com perigo por aplausos.
        - Quebro regras de etiqueta.

  folk-hero:
    name: Herói do Povo
    starting_proficiencies:
      skills: ["Lidar com Animais", Sobrevivência]   # canônico de skills.yml
      tools: ["Ferramentas de artesão (à escolha)", "Veículos (terrestres)"]
    starting_equipment:
      - { item: "Ferramentas de artesão (à escolha)", qty: 1, container: null }
      - { item: "Pá",                       qty: 1, container: null }
      - { item: "Panela de ferro",          qty: 1, container: null }
      - { item: "Roupas comuns",            qty: 1, container: null }
      - { item: "Algibeira (10 po)",        qty: 1, container: "cinto" }
    starting_equipment_options: []
    feature:
      name: Hospitalidade Rústica
      desc: >
        Camponeses oferecem abrigo e ajuda, contanto que não se coloquem
        em risco direto. Você se mistura facilmente entre o povo.
    personality_traits:
      choose: 2
      options:
        - Enfrento valentões sem hesitar.
        - Falo por quem não tem voz.
        - Trabalho primeiro, glória depois.
        - Sou prático e direto.
        - Não abandono os meus.
        - Odeio injustiças pequenas.
        - Tenho orgulho da minha vila.
        - Desconfio de nobres.
    ideals:
      choose: 1
      options:
        - { desc: "Comunidade. A força está nos laços.", alignments: [lawful] }
        - { desc: "Bondade. Ajudar quem precisa.", alignments: [good] }
        - { desc: "Liberdade. Povo livre, terra livre.", alignments: [chaotic] }
        - { desc: "Honra. Vencer sem trapacear.", alignments: [lawful] }
        - { desc: "Pragmatismo. Fazer o necessário.", alignments: [neutral] }
        - { desc: "Revolta. Derrubar tiranos.", alignments: [chaotic] }
    bonds:
      choose: 1
      options:
        - Protegerei minha comunidade.
        - Um tirano me fez mal; não esqueceré.
        - Devo tudo ao meu mentor.
        - Carrego um símbolo da minha vila.
        - Busco justiça por um desastre local.
        - Minha família depende de mim.
    flaws:
      choose: 1
      options:
        - Me meto em brigas por orgulho.
        - Subestimo autoridades.
        - Pouco tato com nobres.
        - Não sei recusar pedidos de ajuda.
        - Guardo rancor de quem explora o povo.
        - Arrisco demais para proteger os outros.

  guild-artisan:
    name: Artesão da Guilda
    starting_proficiencies:
      skills: [Intuição, Persuasão]
      tools: ["Ferramentas de artesão (à escolha)"]
      languages: { count: 1 }
    starting_equipment:
      - { item: "Ferramentas de artesão (à escolha)", qty: 1, container: null }
      - { item: "Carta de apresentação da guilda",    qty: 1, container: null }
      - { item: "Roupas de viajante",                 qty: 1, container: null }
      - { item: "Algibeira (15 po)",                  qty: 1, container: "cinto" }
    starting_equipment_options: []
    feature:
      name: Associados da Guilda
      desc: >
        A guilda fornece contatos, oportunidades e, em necessidade, comida/hospedagem.
        Você deve pagar 5 po/mês em cotas para manter os benefícios.
    personality_traits:
      choose: 2
      options:
        - Perfeccionista com meu ofício.
        - Falo com orgulho do meu trabalho.
        - Negocio até o último cobre.
        - Cumpro prazos custe o que custar.
        - Prezo por materiais de qualidade.
        - Ajudo aprendizes com paciência.
        - Tenho clientes fiéis em toda parte.
        - Desconfio de mercadores desonestos.
    ideals:
      choose: 1
      options:
        - { desc: "Comunidade. A guilda fortalece a cidade.", alignments: [lawful] }
        - { desc: "Qualidade. Trabalho bem-feito acima de tudo.", alignments: [neutral] }
        - { desc: "Progresso. Novas técnicas e invenções.", alignments: [chaotic] }
        - { desc: "Prestígio. Quero meu nome em todas as portas.", alignments: [neutral] }
        - { desc: "Justo preço. Nem fraude, nem esmola.", alignments: [lawful] }
        - { desc: "Lucro. Negócio é negócio.", alignments: [evil] }
    bonds:
      choose: 1
      options:
        - Minha loja/oficina é meu lar.
        - Devo meu sucesso à guilda.
        - Um cliente importante confia em mim.
        - Um concorrente me roubou um design.
        - Meu mestre desapareceu; vou encontrá-lo.
        - Forneço para uma causa nobre.
    flaws:
      choose: 1
      options:
        - Teimoso com padrões próprios.
        - Sovina ao extremo.
        - Subestimo quem não é “profissional”.
        - Vício em trabalho.
        - Guardo rancor de clientes maus pagadores.
        - Vaidoso com minha marca.

  hermit:
    name: Eremita
    starting_proficiencies:
      skills: [Medicina, Religião]
      tools: ["Kit de herbalismo"]
      languages: { count: 1 }
    starting_equipment:
      - { item: "Estojo com anotações/diário", qty: 1, container: null }
      - { item: "Cobertor de inverno",        qty: 1, container: null }
      - { item: "Roupas comuns",              qty: 1, container: null }
      - { item: "Kit de herbalismo",          qty: 1, container: null }
      - { item: "Algibeira (5 po)",           qty: 1, container: "cinto" }
    starting_equipment_options: []
    feature:
      name: Descoberta
      desc: >
        Sua reclusão levou a uma revelação singular (cosmológica, histórica,
        espiritual ou pessoal). Combine com o Mestre os detalhes e impacto.
    personality_traits:
      choose: 2
      options:
        - Prefiro silêncio e contemplação.
        - Falo por enigmas.
        - Escuto mais do que falo.
        - Registro tudo em meu diário.
        - Confio em presságios naturais.
        - Sou gentil, porém distante.
        - Valorizo rotinas simples.
        - Evito multidões.
    ideals:
      choose: 1
      options:
        - { desc: "Autoconhecimento. O caminho está dentro.", alignments: [neutral] }
        - { desc: "Tradição. Guardião de saberes antigos.", alignments: [lawful] }
        - { desc: "Iluminação. Compartilhar a verdade descoberta.", alignments: [good] }
        - { desc: "Segredo. Alguns saberes não devem se espalhar.", alignments: [evil] }
        - { desc: "Liberdade. Viver longe das amarras sociais.", alignments: [chaotic] }
        - { desc: "Devoção. Minha vida serve a um propósito maior.", alignments: [lawful] }
    bonds:
      choose: 1
      options:
        - Protejo meu eremitério/mosteiro.
        - Minha descoberta precisa de guardiões.
        - Um mentor salvou minha sanidade.
        - Faço vigília por um mal adormecido.
        - Devo uma cura a alguém.
        - Carrego relíquia/objeto do meu retiro.
    flaws:
      choose: 1
      options:
        - Socialmente desajeitado.
        - Obsessivo com rituais pessoais.
        - Desconfio da civilização.
        - Fixo em uma teoria única.
        - Falo verdades na hora errada.
        - Fujo de confrontos.

  noble:
    name: Nobre
    starting_proficiencies:
      skills: [História, Persuasão]
      tools: ["Jogo de azar (à escolha)"]
      languages: { count: 1 }
    starting_equipment:
      - { item: "Roupas finas",        qty: 1, container: null }
      - { item: "Anel de sinete",      qty: 1, container: "estojo" }
      - { item: "Registro de linhagem",qty: 1, container: null }
      - { item: "Algibeira (25 po)",   qty: 1, container: "cinto" }
    starting_equipment_options: []
    feature:
      name: Posição Privilegiada
      desc: >
        A alta sociedade o recebe com deferência; pessoas comuns evitam
        desagradar você. Consegue audiência com nobres locais com facilidade.
    personality_traits:
      choose: 2
      options:
        - Educação impecável em público.
        - Orgulho do brasão da família.
        - Trato criados com respeito (ou desdém).
        - Falo como quem espera ser obedecido.
        - Gosto de festas e intrigas.
        - Coletor de favores e alianças.
        - Caridoso com os pobres (ou indiferente).
        - Odeio humilhações públicas.
    ideals:
      choose: 1
      options:
        - { desc: "Dever. Nobreza é serviço.", alignments: [lawful-good] }
        - { desc: "Tradição. Manter costumes e títulos.", alignments: [lawful] }
        - { desc: "Liberdade. Nobre é quem age com coragem.", alignments: [chaotic] }
        - { desc: "Poder. Minha casa deve prosperar.", alignments: [evil] }
        - { desc: "Responsabilidade. Dar exemplo ao povo.", alignments: [good] }
        - { desc: "Pragmatismo. Política é jogo de resultados.", alignments: [neutral] }
    bonds:
      choose: 1
      options:
        - Minha família acima de tudo.
        - Um rival de outra casa me persegue.
        - Devo lealdade a um soberano.
        - Um escândalo ameaça minha linhagem.
        - Protejo um vassalo fiel.
        - Quero recuperar terras perdidas.
    flaws:
      choose: 1
      options:
        - Arrogância de berço.
        - Vícios caros.
        - Ira diante de insultos.
        - Desprezo pelos plebeus.
        - Vaidade com aparência.
        - Cedo a bajulações.

  outlander:
    name: Forasteiro
    starting_proficiencies:
      skills: [Atletismo, Sobrevivência]
      tools: ["Instrumento musical (à escolha)"]
      languages: { count: 1 }
    starting_equipment:
      - { item: "Bastão",                 qty: 1, container: null }
      - { item: "Armadilha de caça",      qty: 1, container: null }
      - { item: "Troféu de caça",         qty: 1, container: "bolsa" }
      - { item: "Roupas de viajante",     qty: 1, container: null }
      - { item: "Algibeira (10 po)",      qty: 1, container: "cinto" }
    starting_equipment_options: []
    feature:
      name: Andarilho
      desc: >
        Excelente memória de rotas e geografia. Normalmente encontra comida
        e água para si e até cinco pessoas por dia, se o ambiente permitir.
    personality_traits:
      choose: 2
      options:
        - Prefiro o céu aberto às muralhas.
        - Conheço histórias de todo vale.
        - Caminho em silêncio, observo muito.
        - Sou direto e prático.
        - Respeito espíritos da natureza.
        - Valorizo liberdade acima de conforto.
        - Carrego mapas feitos à mão.
        - Temo cidades superlotadas.
    ideals:
      choose: 1
      options:
        - { desc: "Equilíbrio. Viver em harmonia com a terra.", alignments: [neutral] }
        - { desc: "Hospitalidade. Compartilhar abrigo e comida.", alignments: [good] }
        - { desc: "Independência. Sigo meu próprio caminho.", alignments: [chaotic] }
        - { desc: "Tradição. Costumes do clã importam.", alignments: [lawful] }
        - { desc: "Exploração. Descobrir o que há além.", alignments: [neutral] }
        - { desc: "Caça. Somente os fortes prosperam.", alignments: [evil] }
    bonds:
      choose: 1
      options:
        - Protejo minha tribo/clã.
        - Guio viajantes perdidos.
        - Busco um local sagrado.
        - Carrego lembrança de um animal-tótem.
        - Um predador me deixou cicatriz e promessa.
        - Tenho uma rota secreta valiosa.
    flaws:
      choose: 1
      options:
        - Impaciência com etiqueta urbana.
        - Subestimo perigos de cidade.
        - Desconfio de “confortos”.
        - Odeio ficar preso a um lugar.
        - Levo ofensas a sério demais.
        - Insisto em fazer do meu jeito.

  sage:
    name: Sábio
    starting_proficiencies:
      skills: [Arcana, História]
      languages: { count: 2 }
    starting_equipment:
      - { item: "Tinta preta (frasco)",   qty: 1, container: "estojo" }
      - { item: "Pena",                   qty: 1, container: null }
      - { item: "Faca pequena",           qty: 1, container: null }
      - { item: "Carta de colega falecido", qty: 1, container: "bolsa" }
      - { item: "Roupas comuns",          qty: 1, container: null }
      - { item: "Algibeira (10 po)",      qty: 1, container: "cinto" }
    starting_equipment_options: []
    feature:
      name: Pesquisador
      desc: >
        Quando não sabe uma informação, você geralmente sabe onde e de quem
        obtê-la. Frequentemente tem acesso a bibliotecas e contatos acadêmicos.
    personality_traits:
      choose: 2
      options:
        - Anoto tudo meticulosamente.
        - Corrijo erros com educação (ou não).
        - Perco a noção do tempo estudando.
        - Cito fontes o tempo todo.
        - Sou curioso até demais.
        - Questiono dogmas.
        - Compartilho conhecimento livremente.
        - Sou distraído com o mundo prático.
    ideals:
      choose: 1
      options:
        - { desc: "Conhecimento. Saber por si só é valioso.", alignments: [neutral] }
        - { desc: "Verdade. Separar fato de ficção.", alignments: [lawful] }
        - { desc: "Descoberta. Empurrar as fronteiras do saber.", alignments: [chaotic] }
        - { desc: "Utilidade. Saber que ajuda pessoas.", alignments: [good] }
        - { desc: "Controle. Informação é poder.", alignments: [evil] }
        - { desc: "Preservação. Proteger acervos e memórias.", alignments: [neutral] }
    bonds:
      choose: 1
      options:
        - Devo tudo ao meu mentor.
        - Defendo uma biblioteca/arquivo.
        - Pesquiso um mistério específico.
        - Um livro raro me foi roubado.
        - Minha tese precisa de prova.
        - Protejo aprendizes promissores.
    flaws:
      choose: 1
      options:
        - Arrogância intelectual.
        - Distração crônica.
        - Subestimo ignorância alheia.
        - Falo demais quando empolgado.
        - Obsessão por um tema.
        - Dificuldade em admitir equívoco.

