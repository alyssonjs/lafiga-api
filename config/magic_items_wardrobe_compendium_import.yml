# Pack de import para produção — Compêndio Vestuário (Lafiga)
# Cobre: anéis (categoria `ring`) + 3 itens para cada `sub_category` de peça (inglês, canónico no front).
#
# Importar:
#   • Admin UI: POST /api/v1/admin/magic_items/bulk_import  body: { yaml: "<conteúdo>", dry_run: true }
#   • Rake:      bin/rails runner "puts MagicItemEngineSyncService.call(File.read('config/magic_items_wardrobe_compendium_import.yml'), dry_run: true).inspect"
#
# Depois de validar, repetir com dry_run: false. Slugs têm prefixo `lf-prod-ward-` para não colidir com `acc-*` e seeds existentes.
---
