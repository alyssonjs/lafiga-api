meta:
  currency_units:
    pc: 1        # cobre
    pp: 10       # prata
    po: 100      # ouro
    pl: 1000     # platina
  weight_unit: kg
  notes: "Custo normalizado em cp (cost_cp) + forma humana (cost). Use aliases para aceitar nomes PT/EN."
  # Armas com propriedade ammunition (5e): o rake `equipment:import_items` grava
  # `props.ammunition_index` alinhado a `items.api_index` da munição (flecha,
  # virote, …). Opcional no YAML por arma: chave `ammunition_index` (slug) para
  # override; senão o rake infere (besta→virote, funda→pedra-de-funda, etc.).

