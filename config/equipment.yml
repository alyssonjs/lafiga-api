itens:
  - api_index: tatuagem-absorvente
    name: Tatuagem Absorvente
    kind: magic_item
    category: wondrous
    sub_category:
    rarity: very rare
    requires_attunement: true
    attunement_note:
    cursed: false
    curse_text:
    value_gp:
    weight_kg:
    source: Compendium
    description: "Concede resistência a um tipo de dano escolhido; 1/dia você pode ter imunidade a esse tipo e recuperar metade dos PV perdidos."
    tags: [tattoo, defesa, resistencia]
    charges: 1
    recharge: long_rest
    props:
      effects:
        - { kind: select_damage_type, value: [acid, cold, fire, force, lightning, necrotic, poison, psychic, radiant, thunder, bludgeoning, piercing, slashing] }
        - { kind: grant_resistance, damage_type: selected }
        - { kind: daily_toggle_immunity_and_heal, damage_type: selected, duration_minutes: 10, heal_fraction: 0.5 }

  - api_index: armadura-de-adamantina
    name: Armadura de Adamantina
    kind: magic_item
    category: armor
    sub_category: varia
    rarity: uncommon
    requires_attunement: false
    attunement_note:
    cursed: false
    curse_text:
    value_gp:
    weight_kg:
    source: DMG
    description: "Acertos críticos contra você se tornam acertos normais."
    tags: [armadura, defesa]
    charges:
    recharge:
    props:
      effects:
        - { kind: negate_incoming_crits }

  - api_index: enxoo-de-annam
    name: Enxó de Annam
    kind: magic_item
    category: weapon
    sub_category: machado-grande
    rarity: artifact
    requires_attunement: true
    attunement_note:
    cursed: false
    curse_text:
    value_gp:
    weight_kg: 3.0
    source: Compendium
    description: "Arma +3; dano base 3d12; pode conjurar mover terra ou fabricar 1/dia."
    tags: [marcial, corpo-a-corpo, artefato]
    charges: 2
    recharge: dawn
    props:
      effects:
        - { kind: attack_bonus, type: magico, value: 3 }
        - { kind: damage_die_override, dice: 3d12, damage_type: slashing }
        - { kind: grant_spell, spell: move earth, per_day: 1 }
        - { kind: grant_spell, spell: fabricate, per_day: 1 }
