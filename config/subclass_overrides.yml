            description: "Modifica sua Bolsa de Cozinheiro. Quando causa dano cortante ou perfurante em criatura hostil que NÃO seja humanoide/celestial/morto-vivo/construto/fada com arma corpo-a-corpo, pode cortar pedaço e colocar na Bolsa como parte do mesmo ataque. O petisco (Corte Fresco) é temperado e cozido imediatamente. Não pode ter mais de 1 desses na Bolsa por vez."
