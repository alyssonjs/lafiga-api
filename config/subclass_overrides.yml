        grants:
          defenses:
            immunity: ["doenças","veneno"]
      - level: 18
        features:
          - { name: "Mutação Sobrevivente", description: "1/descanso longo: quando cair a 0 PV, fica com 1 PV em vez disso e obtém vantagem em testes de CON por 1 min; resistência a dano físico não mágico durante o efeito." }

  
