  # Novos arquétipos (Livro de Novos Arquétipos) — api_index alinhado a canonical_indexes / import
  atirador_inigualavel:
    name: "Atirador Inigualável"
    flavor: "Arquétipo Marcial"
    description: |
      O arquétipo Atirador Inigualável é escolhido por guerreiros que procuram a maestria com bestas, arcos e outras armas de disparo. Geralmente, elfos costumam trilhar o caminho desse arquétipo para dominar a arte do arco, mas ele é bastante comum entre todas as raças, já que é perceptível a vantagem de atacar seus inimigos e derrubá-los antes que eles tenham a chance de revidar.
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Tiro Rápido"
            description: |
              A partir do 3° nível, você aprende a disparar tiros com sua arma com uma velocidade surpreendente. Você pode, com uma ação bônus, realizar um ataque à distância com arma de munição. Você sofre desvantagem nessa jogada de ataque.
      - level: 7
        features:
          - name: "Melhor Posição de Tiro"
            description: |
              No 7° nível, você se torna especialista em localizar a melhor posição para atacar seus inimigos. Você ganha proficiência em Acrobacia, se já não tiver. Além disso, você pode realizar testes de Destreza (Acrobacia) para escalar e recebe vantagem nesses testes. Você recebe +2 de bônus nas jogadas de dano com armas de munição, se atingir uma criatura que esteja numa posição inferior à sua.
      - level: 10
        features:
          - name: "Tiro Certeiro"
            description: |
              No 10° nível, você pode mirar em uma criatura e realizar um tiro no ponto exato para exaurir a energia do seu alvo. Com sua ação, você realiza um único ataque à distância com uma arma de munição e você recebe vantagem nessa jogada de ataque. Se você atingir, o alvo sofre 5d10 de dano extra e deve realizar um teste de resistência de Constituição (CD 8 + seu bônus de proficiência + seu modificador de Destreza) ou ficará debilitado, sofrendo desvantagem nas jogadas de ataque e testes de Força e Destreza por 1 minuto. O alvo pode repetir o teste de resistência no final de cada turno dele, terminando o efeito de debilitação em si com um sucesso. Após usar essa característica, você precisa terminar um descanso curto ou longo para usá-la novamente. A partir do 16° nível, você pode usar essa característica duas vezes antes de precisar terminar um descanso.
      - level: 15
        features:
          - name: "Pontaria Aguçada"
            description: |
              Ao atingir o 15° nível, você aprimora sua velocidade e precisão ao atacar com sua arma escolhida. Você não sofre mais desvantagem na sua jogada de ataque quando usar uma ação bônus para realizar um ataque à distância com uma arma de munição. Além disso, você recebe vantagem na primeira jogada de ataque à distância com arco que fizer em cada turno seu.
      - level: 18
        features:
          - name: "Um Tiro, Uma Morte"
            description: |
              No 18° nível, você se torna especialista em atirar no ponto letal de criaturas mais frágeis. Sempre que você atingir um ataque à distância com uma arma de munição em uma criatura com 20 pontos de vida ou menos, o alvo deve realizar um teste de resistência de Constituição (CD 8 + seu bônus de proficiência + seu modificador de Destreza) ou cairá para 0 pontos de vida. Um alvo bem sucedido no teste ainda sofre o dano normal do seu ataque. Se você atingir um acerto crítico com um ataque à distância com uma arma de munição em uma criatura com 40 pontos de vida ou menos, ela deve realizar o mesmo teste de resistência para não cair a 0 pontos de vida.

  cavaleiro_implacavel:
    name: "Cavaleiro Implacável"
    flavor: "Arquétipo Marcial"
    description: |
      O arquétipo Cavaleiro Implacável reflete um guerreiro especializado em combater montado. Ele cria um forte elo com uma montaria que o serve lealmente enquanto ele a tratar com respeito. Enquanto está montado, um cavaleiro implacável é o oponente mais temível num campo de batalha, sendo capaz de dizimar toda uma linha de frente em uma única investida feroz sobre sua montaria.
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Montaria Fiel"
            description: |
              A partir do 3° nível, você adquire os serviços de uma leal montaria. Sua montaria normalmente será um cavalo de guerra, se você for Médio ou um pônei, se você for Pequeno ou um anão. Você pode adquirir uma besta diferente como montaria, com nível de desafio igual ou inferior a 1/2 e sem deslocamento de voo, com a permissão do Mestre. O máximo de pontos de vida dela será igual ao seu total normal ou a cinco vezes seu nível de guerreiro, o que for maior. Como qualquer criatura, sua montaria pode gastar Dados de Vida durante um descanso curto e recupera todos os seus pontos de vida ao terminar um descanso longo.
               Sua montaria realiza o turno dela na sua iniciativa e obedece seus direcionamentos enquanto você estiver montando-a. No seu turno, você pode coordenar sua montaria para guiar seu movimento (sem ação necessária). Você pode usar uma ação bônus para direcionar sua montaria a realizar as ações de Ataque, Disparada ou Desengajar. Ela age por contra própria se você estiver incapacitado ou ausente, focando-se em defender você.
               Se a montaria morrer, você pode obter outra montaria de formas tradicionais ou tentando adestrar uma nova besta selvagem apropriada que você encontrar, através de um teste de Carisma (Adestrar Animais) CD 15 que requer 8 horas para ser concluído.
      - level: 7
        features:
          - name: "Montaria Incansável"
            description: |
              A partir do 7° nível, sua montaria se torna extremamente eficiente em realizar longas jornadas. Sua montaria pode percorrer uma quantidade de quilômetros num dia de viagem igual ao dez vezes seu deslocamento de caminhada, sem precisar descansar. Uma montaria voadora pode percorrer uma quantidade de quilômetros por dia igual a quinze vezes seu deslocamento de voo. Para percorrer toda essa distância num dia de viagem, é necessário viajar por pelo menos 12 horas. Nem você nem sua montaria precisam realizar testes de resistência de Constituição para não sofrerem um nível de exaustão ao viajarem dessa forma, mas viajar além desse tempo num dia exigirá um teste de resistência de Constituição CD 15 + 1 para cada hora acima das 12 horas.
      - level: 10
        features:
          - name: "Investida Implacável"
            description: |
              No 10° nível, você ensina sua montaria a realizar um ataque de carga devastador. Com sua ação, enquanto estiver montado, você pode se mover 6 metros em linha reta e realizar um único ataque corpo-a-corpo com arma contra uma criatura logo após terminar seu movimento. Você recebe vantagem nesse ataque e, se atingir, você causa 4d8 de dano extra. Se você estiver usando uma arma de haste perfurante, como uma lança, o dano extra causado será de 6d8, ao invés. A partir do 20° nível, o dano extra será de 6d8, ou 8d8 com uma arma de haste perfurante.
      - level: 12
        features:
          - name: "Montaria dos Céus"
            description: |
              A partir do 12° nível, você pode escolher uma besta com nível de desafio 1 ou inferior capaz de voar, como sua montaria fiel.
      - level: 15
        features:
          - name: "Cavaleiro Protetor"
            description: |
              A partir do 15° nível, enquanto estiver montado, você pode adicionar seu bônus de proficiência na CA e nos testes de resistência da sua montaria. Além disso, quando sua montaria for atingida por um ataque ou fracassar em um teste de resistência para reduzir o dano de um efeito à metade, você pode usar sua reação para reduzir o dano sofrido por ela à metade.
      - level: 18
        features:
          - name: "Atropelar"
            description: |
              No 18° nível, você pode atravessar o campo de batalha com sua montaria, atropelando seus inimigos em uma investida devastadora. Com sua ação, enquanto estiver montado, você pode guiar sua montaria a se mover em linha reta todo o deslocamento dela. Todas as criaturas de tamanho igual ou inferior ao da sua montaria, que estiverem ocupando um quadrado por onde ela passou, devem ser bem sucedidos num teste de resistência de Destreza (CD 8 + seu bônus de proficiência + o modificador de Força da sua montaria) ou sofrerão dano de concussão igual a 2d6 + modificador de Força da sua montaria e serão derrubados no chão. Uma criatura bem sucedida reduz o dano à metade e não cairá no chão. Uma criatura de tamanho superior a sua montaria, ou qualquer outra barreira ocupando um espaço na linha de movimento, impede que esse ataque progrida. Sua montaria causa ataques de oportunidade ao se mover dessa forma, mas as criaturas sofrem desvantagem nessas jogadas de ataque.
              Você pode usar essa característica duas vezes. Após isso, você precisa terminar um descanso curto ou longo para poder usá-la novamente.
      - level: 20
        features:
          - name: "Investida Suprema"
            description: |
              No 20° nível, o dano extra da investida ajusta-se: 6d8 (8d8 com arma de haste perfurante).

  defensor_dedicado:
    name: "Defensor Dedicado"
    flavor: "Arquétipo Marcial"
    description: |
      O arquétipo Defensor Dedicado é a pura demonstração do potencial defensivo e resistente do guerreiro. Seus adeptos sempre estão bem armadurados e portando grandes escudos com os quais defendem a si próprios e aos seus aliados. Esses bravos guerreiros chamam a atenção dos mais poderosos oponentes para si, permitindo que seus aliados se foquem em derrotar outros adversários enquanto ele distrai a verdadeira ameaça.
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Postura Defensiva"
            description: |
              A partir do 3° nível, você pode assumir uma posição de combate focada totalmente na sua proteção.
              Enquanto estiver na postura defensiva, você recebe os seguintes benefícios caso esteja utilizando uma armadura e usando um escudo:
              • Você possui resistência contra dano de concussão, cortante e perfurante.
              • Quando você for atacado por um oponente que você possa ver e não estiver surpreso, você pode usar sua reação para erguer seu escudo e receber +3 de bônus na sua CA contra esse ataque. Você deve decidir usar essa habilidade antes de saber o resultado do ataque.
              • Você tem vantagem em testes de resistência de Força e Destreza.
              Você pode sustentar sua postura defensiva por até 1 minuto e, enquanto estiver nessa posição, seu deslocamento é reduzido à metade (arredondado para baixo, mínimo de 1,5 metro). Ela termina caso você use a ação de Disparada ou Desengajar. Você também pode terminá-la prematuramente com uma ação bônus no seu turno.
              Após usar essa característica, você precisa terminar um descanso curto ou longo para usá-la novamente.
      - level: 7
        features:
          - name: "Proteger Aliado"
            description: |
              A partir do 7° nível, você pode aprimorar a defesa de um aliado que esteja adjacente a você. Usando sua ação bônus, você pode aumentar a CA desse aliado num valor igual ao bônus fornecido pelo seu escudo. Você perde seu bônus de escudo na sua CA enquanto protege seu aliado dessa maneira. Esse efeito dura até o início do seu próximo turno. Você ainda pode usar sua reação para receber o benefício descrito na sua Postura Defensiva enquanto estiver protegendo um aliado. Seu aliado perde esse bônus na CA caso se afaste a mais de 1,5 metro de você.
      - level: 10
        features:
          - name: "Provocar"
            description: |
              No 10° nível, você pode incitar um inimigo a focar apenas você como seu adversário. Quando o fizer, escolha uma criatura que você possa ver a 9 metros. Se a criatura puder ver ou ouvir você, ela deve ser bem sucedida num teste de resistência de Sabedoria (CD igual a 8 + seu bônus de proficiência + seu modificador de Carisma) ou ficará provocada até o final do seu próximo turno. Enquanto estiver provocada, essa criatura deve usar todo seu deslocamento para se aproximar de você e não poderá atacar ou usar magias ou habilidades ofensivas contra nenhum dos seus aliados enquanto estiver sob esse efeito. Nos turnos seguintes, você pode usar sua ação para estender a duração desse efeito na criatura provocada até o início do seu próximo turno. Num turno em que provocar uma criatura, você pode usar uma ação bônus para realizar um ataque contra ela. Esse efeito termina se algum aliado seu atacar ou usar alguma magia ou habilidade nociva contra a criatura provocada. Se a criatura for bem sucedida no teste de resistência, você não poderá usar essa característica nessa criatura novamente por 24 horas.
      - level: 15
        features:
          - name: "Surto Defensivo"
            description: |
              A partir do 15° nível, você pode fortalecer seu corpo e mente contra um efeito nocivo que seja usado contra você. Quando for obrigado a realizar um teste de resistência contra um efeito nocivo, você pode usar sua reação para receber vantagem nesse teste de resistência.
              Você pode usar essa característica duas vezes. Após isso, você precisa terminar um descanso longo para usá-la novamente.
      - level: 18
        features:
          - name: "Baluarte Protetor"
            description: |
              No 18° nível, você se torna um baluarte de resistência no seu grupo, sendo praticamente impossível manter você sob um efeito nocivo por mais tempo que um breve momento. Quando você for alvo de algum efeito que exija um teste de resistência e você fracassar, mas o efeito persistir por mais tempo, você pode simplesmente ignorar esse efeito ao focar sua mente e corpo por um instante. Se o efeito nocivo persistente permitir um novo teste de resistência, no seu turno, para ser anulado, você pode usar sua ação para passar automaticamente no seu teste de resistência contra esse efeito.

  kensai:
    name: "Kensai"
    flavor: "Arquétipo Marcial"
    description: |
      O arquétipo Kensai representa um guerreiro que passou sua vida focando seu treinamento e meditação em uma lâmina de sua escolha dentre as possíveis de serem usadas com o iaijutsu. Conforme progride em seu caminho de meditação e autocontrole, o kensai desenvolve técnicas que prezam pela velocidade de raciocínio e amplitude dos sentidos de uma forma praticamente sobrenatural. É quase impossível pegar um kensai desprevenido, mas quando o inverso acontece, geralmente os oponentes não têm chance de revidar.
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Mestre do Iaijutsu"
            description: |
              A partir do 3° nível, você adquire a habilidade de surpreender seus inimigos com um ataque mortal com uma arma de sua escolha dentre adaga, cimitarra, espada curta, espada longa ou rapieira. Na primeira rodada de um combate, com sua arma ainda embainhada, você pode sacá-la e subitamente realizar a ação de Ataque com essa arma corpo-a-corpo contra um oponente que ainda não tenha agido. Você recebe vantagem na primeira jogada de ataque e, se atingir esse ataque, o alvo sofre dano extra igual à sua rolagem de iniciativa. Em um acerto crítico, adicione um d20 extra no dano desse ataque. Você não recebe os benefícios do Iaijutsu nos ataques realizados após o primeiro, independentemente de ter atingido ou não.
            choices:
              kensai_blade:
                choose: 1
                options:
                  - { id: "adaga", name: "Adaga" }
                  - { id: "cimitarra", name: "Cimitarra" }
                  - { id: "espada-curta", name: "Espada curta" }
                  - { id: "espada-longa", name: "Espada longa" }
                  - { id: "rapieira", name: "Rapieira" }
      - level: 7
        features:
          - name: "Busca da Autoperfeição"
            description: |
              No 7° nível, sua busca pelo constante aperfeiçoamento pessoal torna você um artesão capaz em todas as áreas possíveis. Você se torna proficiente em duas ferramentas de artesão, à sua escolha. Além disso, você adiciona metade do seu bônus de proficiência, arredondado para baixo, em qualquer teste de habilidade usando uma ferramenta de artesão, com a qual você não seja proficiente.
            grants:
              proficiencies:
                tools:
                  choose: 2
                  options: ["Ferramentas de artesão"]
      - level: 10
        features:
          - name: "Meditação da Lâmina"
            description: |
              No 10° nível, você pode realizar uma meditação logo após terminar um descanso curto, com sua espada em mãos, que fortalece seu elo com ela. Você pode escolher um dos benefícios a seguir que dura enquanto você empunhar sua arma ou até você realizar uma nova meditação:
              Força de Espírito. Você ganha vantagem em testes de resistência para não ser amedrontado.
              Intuição Extraordinária. Você ganha vantagem em jogadas de iniciativa.
              Mente Intocável. Você ganha vantagem em testes de resistência para não ser enfeitiçado.
              Percepção da Matéria. Você adquire percepção às cegas com 3 metros de alcance.
              Proteção Sobrenatural. Quando uma criatura atingir você com um ataque, você pode usar sua reação para adicionar +3 de bônus a sua CA contra esse ataque, possivelmente fazendo-o errar. Você não precisa ver a criatura atacante.
              Sexto Sentido. Quando sofrer um ataque corpo-a-corpo durante uma rodada surpresa, você pode usar sua reação para atacar a criatura que atacou você.
              Uno com a Espada. Você adiciona 1d8 de dano extra ao primeiro ataque corpo a corpo que você atingir a cada rodada.
              Após usar essa característica, você precisa terminar um descanso curto ou longo para usá-la novamente.
      - level: 15
        features:
          - name: "Movimento Antes do Pensamento"
            description: |
              A partir do 15° nível, você desenvolve uma técnica que aprimora seu raciocínio, antecipando sua ação momentos antes de um combate. Você pode aplicar seu bônus de proficiência em suas rolagens de iniciativa. Além disso, você pode rolar sua iniciativa mesmo em uma rodada que você estaria surpreso, mas você não age nesse turno. Se um inimigo com uma contagem de iniciativa inferior a sua se aproximar a 1,5 metro de você, você pode usar sua reação para sacar sua arma e realizar um ataque de Iaijutsu contra esse oponente.
      - level: 18
        features:
          - name: "Meditação Perfeita"
            description: |
              No 18° nível, você adquire a perfeição do foco da sua meditação, podendo manter dois efeitos de sua Meditação da Lâmina simultaneamente. Quando você realizar a meditação durante um descanso curto, você pode escolher dois benefícios descritos na sua Meditação da Lâmina que duram até você realizar uma nova meditação. Você deve escolher dois benefícios diferentes ao usar essa característica.

  mestre_correntes:
    name: "Mestre das Correntes"
    flavor: "Arquétipo Marcial"
    description: |
      O arquétipo Mestre das Correntes simula o estilo de combate exótico de um ser das profundezas: o diabo das correntes. Desarmar, enrolar e derrubar seus oponentes são manobras de combate eficientes, evitando que os adversários tenham sequer a chance de contra-atacar.
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Estilo de Combate Exótico"
            description: |
              A partir do 3° nível, você adquire perícia em combate usando armas maleáveis incomuns. Suas armas de mestre das correntes são a corda com gancho, a corrente, a corrente farpada, o chicote e o mangual. Quando você atingir uma criatura com um ataque corpo-a-corpo usando uma dessas armas, você pode abdicar de causar o dano normal e realizar uma tentativa de agarrar. Se você for bem sucedido em agarrar a criatura, ela permanecerá agarrada até você usar uma ação bônus para desencadear uma das manobras especiais a seguir.
              Enrolar. A criatura agarrada fica impedida e você não pode realizar ataques com sua arma, até o início do seu próximo turno.
              Puxão. Você pode realocar a criatura agarrada em qualquer espaço desocupado, no seu alcance, a até 3 metros do espaço que ela ocupava, liberando sua arma em seguida.
              Rasteira. A criatura agarrada fica caída, liberando sua arma em seguida.
              Desarme. Escolha um item que a criatura agarrada esteja empunhando. Você tira o item escolhido da criatura e pode colocá-lo em qualquer ponto dentro do seu alcance, liberando sua arma em seguida. Se você tiver uma mão livre, você pode segurar o item retirado da criatura.
              Como um mestre das correntes, você pode usar uma corda com gancho e uma corrente como arma e é proficiente com elas. A partir do 10° nível, você se torna proficiente com a corrente farpada. Corda com gancho: arma corpo-a-corpo marcial, 1d6 perfurante, propriedade alcance. Corrente: 1d10 concussão, pesada, alcance, duas mãos. Corrente farpada: 1d10 cortante, pesada, alcance, duas mãos.
      - level: 7
        features:
          - name: "Movimento da Corrente"
            description: |
              No 7° nível, você adquire um domínio tão extremo com correntes e cordas que pode usá-las para se balançar, escalar rapidamente ou até mesmo andar sobre ela, quando conveniente. Sua arma funciona como se fosse uma corda com arpéu de mesmo comprimento. Quando você fizer um teste de habilidade usando uma de suas armas de mestre das correntes para se movimentar, você ganha um bônus nesse teste igual ao dobro do seu bônus de proficiência. Além disso, escalar usando uma corda ou corrente não lhe custa movimento extra.
      - level: 10
        features:
          - name: "Maestria da Corrente"
            description: |
              No 10° nível, você aprimora suas técnicas e até suas armas de escolha. Você ganha proficiência em ferramentas de ferreiro, se ainda não tiver. Você pode forjar uma corrente farpada, com a qual você é proficiente, e pode usá-la para executar suas manobras de mestre das correntes. Além disso, você recebe vantagem nos testes de Força (Atletismo) feitos em testes resistidos de agarrar ao utilizar uma de suas armas de mestre das correntes para realizar as manobras especiais do seu estilo de combate exótico. Se você usar uma corrente farpada para usar as manobras especiais enrolar, puxão ou rasteira contra uma criatura que você está agarrando com ela, você causa 1d10 de dano perfurante à criatura agarrada.
      - level: 15
        features:
          - name: "Alcance Estendido"
            description: |
              A partir do 15° nível, você pode estender o alcance dos seus ataques com suas armas de escolha. Você pode realizar um ataque corpo-a-corpo contra uma criatura a até 4,5 metros de você com um chicote, corrente, corrente farpada ou corda com gancho.
      - level: 18
        features:
          - name: "Ataque Giratório"
            description: |
              No 18° nível, você é capaz de executar uma dança de aço contra todos os seus inimigos. Com sua ação, você pode realizar um ataque corpo-a-corpo com uma arma de mestre das correntes que você esteja empunhando, contra cada inimigo dentro do seu alcance. Após usar essa característica, você precisa terminar um descanso curto ou longo para usá-la novamente.

  mestre_arremesso:
    name: "Mestre do Arremesso"
    flavor: "Arquétipo Marcial"
    description: |
      O arquétipo Mestre do Arremesso simula um guerreiro focado em arremessar todo tipo de arma, enfraquecendo seus inimigos antes de se engajar em um combate corporal com eles. Esses guerreiros são devastadores com todo tipo de arma corpo-a-corpo, sendo capazes de arremessá-las com a mesma facilidade que arremessam uma adaga. Um guerreiro que adquira a maestria em arremessar todo tipo de arma torna-se um pesadelo numa batalha contra inimigos que tentem se engajar com eles para ter alguma chance de derrotá-los.
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Arremesso Versátil"
            description: |
              A partir do 3° nível, você pode usar qualquer arma que você seja proficiente como uma arma de arremesso. Todas as armas corpo-a-corpo em que você tiver proficiência ganham a propriedade arremesso (distância 6/18). Se a arma possuir a propriedade versátil, ela pode ser arremessada com as duas mãos, causando o dano indicado quando for usada para realizar um ataque corpo-a-corpo com as duas mãos.
      - level: 7
        features:
          - name: "Ataque de Retorno"
            description: |
              Ao atingir o 7° nível, você pode fazer com que armas arremessadas por você retornem para sua mão logo após o ataque ser definido. Quando você realizar um ataque com uma arma de arremesso, você pode usar uma ação bônus para fazer a arma arremessada voltar magicamente para sua mão logo após o ataque ser resolvido. A partir do 11° nível, você pode fazer com que uma arma arremessada por você volte para a sua mão após um ataque, sem precisar usar uma ação para tal.
      - level: 10
        features:
          - name: "Arremesso Estremecedor"
            description: |
              No 10° nível, você pode criar tensões inacreditáveis quando se prepara para arremessar sua arma, que fica visível ao seu redor como ondas de calor. Quando você libera sua arma, esse poder segue com sua arma. Como uma ação bônus, você pode escolher tratar suas jogadas de ataque à distância com armas com a propriedade arremesso como ataques corpo-a-corpo, até o início do seu próximo turno. Isso permite que você realize ataques de oportunidade com essas armas como se você tivesse alcance de 6 metros e impede que você sofra desvantagem por ter um inimigo adjacente a você enquanto realiza ataques à distância. Após usar essa característica, você precisa terminar um descanso curto ou longo para usá-la novamente.
      - level: 11
        features:
          - name: "Retorno Instintivo"
            description: |
              No 11° nível, a arma de arremesso retorna à mão após o ataque sem ação bônus (conforme Ataque de Retorno).
      - level: 15
        features:
          - name: "Ricochete Relâmpago"
            description: |
              A partir do 15° nível, você pode fazer sua arma ricochetear em um inimigo, potencialmente atingindo outra criatura próxima. Se você atingir uma criatura a até 6 metros de você com um ataque à distância com uma arma de arremesso, você pode usar sua reação para realizar um ataque à distância com a mesma arma contra um alvo que esteja a até 3 metros do alvo atingido.
      - level: 18
        features:
          - name: "Lâmina Giratória"
            description: |
              No 18° nível, você pode atirar sua arma fazendo parecer que você está atacando uma dezena de inimigos ao mesmo tempo. Você se torna o centro de uma tempestade de aço e sua arma de arremesso voa para golpear um inimigo, retorna e ricocheteia inofensiva em você, para então voar e atacar outro inimigo. Com sua ação, você pode fazer um ataque à distância com uma arma cortante com a propriedade arremesso contra cada inimigo a até 6 metros de você. Você pode atacar cada alvo só uma vez com este ataque. Após usar essa característica, você precisa terminar um descanso curto ou longo para usá-la novamente.

monk:
  mao-aberta:
    name: "Caminho da Mão Aberta"
    flavor: "Tradição Monástica"
    description: "Mestres do combate desarmado que desequilibram, curam e, no ápice, desfere a Palma Vibrante."
    choose_level: 3
    rules:
      ki_save_dc: "8 + bônus de proficiência + modificador de Sabedoria"
    levels:
      - level: 3
        features:
          - name: "Técnica da Mão Aberta"
            description: "Quando um golpe da sua Rajada de Golpes acerta, escolha um efeito."
            rules:
              applies_to: "apenas acertos de Rajada de Golpes"
              effects:
                - name: "Derrubar"
                  save: { ability: "Destreza", dc: "ki_save_dc", on_fail: "alvo fica caído" }
                - name: "Empurrar"
                  save: { ability: "Força", dc: "ki_save_dc", on_fail: "empurrado 4,5 m para longe de você" }
                - name: "Desarmar Reações"
                  effect: "o alvo não pode realizar reações até o fim do seu próximo turno"
      - level: 6
        features:
          - name: "Integridade Corporal"
            description: "Com uma ação, cura PV = 3 × seu nível de monge."
            rules:
              action: "Ação"
            uses:
              per: "descanso longo"
              uses: 1
      - level: 11
        features:
          - name: "Tranquilidade"
            description: "Após um descanso longo, ganha o efeito de 'santuário' até o próximo descanso longo."
            rules:
              save_dc: "ki_save_dc"
              ends_early: ["como a magia santuário (se atacar, conjurar ou afetar outro)"]
      - level: 17
        features:
          - name: "Palma Vibrante"
            description: "Marca vibrações letais num alvo que você acerta; termine-as com uma ação."
            rules:
              on_hit:
                cost_ki: 3
                limit: "apenas 1 criatura afetada por vez"
                duration: "dias = seu nível de monge"
              finish_action:
                action: "Ação"
                save:
                  ability: "Constituição"
                  dc: "ki_save_dc"
                  on_fail: "PV do alvo vão a 0"
                  on_success: "10d10 de dano necrótico"
              requirement: "você e o alvo devem estar no mesmo plano de existência"

  sombra:
    name: "Caminho da Sombra"
    flavor: "Tradição Monástica"
    description: "Furtividade e subterfúgio; usa o ki para conjurar sombras e mover-se através delas."
    choose_level: 3
    rules:
      ki_save_dc: "8 + bônus de proficiência + modificador de Sabedoria"
    levels:
      - level: 3
        features:
          - name: "Artes Sombrias"
            description: "Gasta ki para imitar magias das sombras; aprende 'ilusão menor'."
            rules:
              spells_with_ki:
                cost_per_cast: 2
                list: ["escuridão","visão no escuro","passos sem pegadas","silêncio"]
                components: { material: "não requer" }
                save_dc: "ki_save_dc"
            grants:
              cantrips: ["ilusão menor"]
      - level: 6
        features:
          - name: "Passo das Sombras"
            description: "Teleporta entre sombras e ganha vantagem no primeiro ataque corpo a corpo."
            rules:
              bonus_action: true
              requirements: ["você em penumbra/escuridão","destino em penumbra/escuridão"]
              teleport: { distance_m: 18 }
              after_teleport: "vantagem no primeiro ataque corpo a corpo antes do fim do turno"
      - level: 11
        features:
          - name: "Manto de Sombras"
            description: "Fica invisível nas sombras até agir ou entrar em luz plena."
            rules:
              action: "Ação"
              requirements: ["estar em penumbra ou escuridão"]
              invisible_until: ["você atacar","conjurar magia","entrar em luz plena"]
      - level: 17
        features:
          - name: "Oportunista"
            description: "Aproveita aberturas criadas por outros para golpear."
            rules:
              reaction: true
              trigger: "uma criatura a 1,5 m é atingida por um ataque de outra criatura (não você)"
              effect: "faz 1 ataque corpo a corpo contra essa criatura"

  quatro-elementos:
    name: "Caminho dos Quatro Elementos"
    flavor: "Tradição Monástica"
    description: "Manipula ar, terra, fogo e água; disciplinas substituem espaços de magia por ki."
    choose_level: 3
    rules:
      ki_save_dc: "8 + bônus de proficiência + modificador de Sabedoria"
      disciplines_common:
        casting:
          no_material_components: true
          save_dc: "ki_save_dc"
          upcast:
            rule: "pode gastar ki adicional para aumentar o nível efetivo"
            max_ki_per_spell_by_level:
              "5-8": 3
              "9-12": 4
              "13-16": 5
              "17-20": 6
      known_disciplines:
        at_3: 1
        at_6: 1
        at_11: 1
        at_17: 1
        always_known: ["Sintonia Elemental"]
    levels:
      - level: 3
        features:
          - name: "Discípulo dos Elementos"
            description: "Aprende 'Sintonia Elemental' e 1 disciplina elemental; ganha mais nos níveis 6, 11 e 17."
            choices:
              disciplines:
                choose: 1
                options:
                  - id: "golpe_varredura_cauterizante"
                    name: "Golpe de Varredura Cauterizante"
                    effect: "Conjura 'mãos flamejantes'."
                    rules: { ki_cost: 2, scaling: "gaste ki extra para aumentar o nível" }
                  - id: "punho_quatro_trovoes"
                    name: "Punho dos Quatro Trovões"
                    effect: "Conjura 'onda trovejante'."
                    rules: { ki_cost: 2 }
                  - id: "investida_espiritos_ventania"
                    name: "Investida dos Espíritos da Ventania"
                    effect: "Conjura 'lufada de vento'."
                    rules: { ki_cost: 2 }
                  - id: "chicote_de_agua"
                    name: "Chicote de Água"
                    effect: "3d10 concussão (DES ST); puxa 7,5 m ou derruba; +1d10 por ki extra."
                    rules: { ki_cost: 2, extra_d10_per_ki: 1 }
                  - id: "punho_do_ar_continuo"
                    name: "Punho do Ar Contínuo"
                    effect: "3d10 concussão (FOR ST); empurra até 6 m e derruba; +1d10 por ki extra."
                    rules: { ki_cost: 2, extra_d10_per_ki: 1 }
                  - id: "moldar_rio_corrente"
                    name: "Moldar o Rio Corrente"
                    effect: "Modela água/gelo em área para usos utilitários."
                    rules: { ki_cost: 1 }
                  - id: "presas_serpente_fogo"
                    name: "Presas da Serpente de Fogo"
                    effect: "Na ação de Ataque, alcance dos golpes desarmados +3 m até o fim do turno e o dano vira fogo; +1d10 de fogo ao acertar gastando 1 Chi."
                    rules: { ki_cost: 1, extra_fire_d10_on_hit_per_ki: 1 }
      - level: 6
        features:
          - name: "Disciplina Adicional"
            description: "Escolhe +1 disciplina."
            choices:
              disciplines:
                choose: 1
                options:
                  - id: "gongo_do_pico"
                    name: "Gongo do Pico"
                    effect: "Conjura 'despedaçar'."
                    rules: { ki_cost: 3 }
                  - id: "serragem_vento_norte"
                    name: "Serragem do Vento do Norte"
                    effect: "Conjura 'imobilizar pessoa'."
                    rules: { ki_cost: 3 }
      - level: 11
        features:
          - name: "Disciplina Adicional (11º)"
            description: "Escolhe +1 disciplina de 11º."
            choices:
              disciplines:
                choose: 1
                options:
                  - id: "cavalgar_o_vento"
                    name: "Cavalgar o Vento"
                    effect: "Conjura 'voo' (em si)."
                    rules: { ki_cost: 4, prereq_level: 11 }
                  - id: "chamas_da_fenix"
                    name: "Chamas da Fênix"
                    effect: "Conjura 'bola de fogo'."
                    rules: { ki_cost: 4, prereq_level: 11 }
                  - id: "postura_da_neblina"
                    name: "Postura da Neblina"
                    effect: "Conjura 'forma gasosa' (em si)."
                    rules: { ki_cost: 4, prereq_level: 11 }
      - level: 17
        features:
          - name: "Disciplina Adicional (17º)"
            description: "Escolhe +1 disciplina de 17º."
            choices:
              disciplines:
                choose: 1
                options:
                  - id: "defesa_eterna_da_montanha"
                    name: "Defesa Eterna da Montanha"
                    effect: "Conjura 'pele de pedra' (em si)."
                    rules: { ki_cost: 5, prereq_level: 17 }
                  - id: "rio_de_chamas_famintas"
                    name: "Rio de Chamas Famintas"
                    effect: "Conjura 'muralha de fogo'."
                    rules: { ki_cost: 5, prereq_level: 17 }
                  - id: "onda_de_pedras_rolantes"
                    name: "Onda de Pedras Rolantes"
                    effect: "Conjura 'muralha de pedra'."
                    rules: { ki_cost: 6, prereq_level: 17 }
                  - id: "sopro_do_inverno"
                    name: "Sopro do Inverno"
                    effect: "Conjura 'cone de frio'."
                    rules: { ki_cost: 6, prereq_level: 17 }
      - level: 0
        features:
          - name: "Sintonia Elemental (sempre conhecida)"
            description: "Gestos/efeitos elementais simples: acender/apagar chamas, pequenas brisas, aquecer/esfriar e afins."

  # Tradições do Livro de Novos Arquétipos (chaves = ruleSlug do wizard / front)
  caminho_aco:
    name: "Caminho do Aço"
    flavor: "Tradição Monástica"
    description: |
      Diferente de qualquer outro monge, um artista marcial que trilhe o Caminho do Aço não usa a agilidade e velocidade no combate. Ao invés disso, ele aprende a se proteger como guerreiros tradicionais e usar a força bruta para derrubar seus oponentes. Você passa a ser conhecido como um monge de ferro e desenvolve técnicas e trilha um caminho totalmente diferente do que seguia no início da sua carreira.
    choose_level: 3
    rules:
      ki_save_dc: "8 + bônus de proficiência + modificador de Sabedoria"
    levels:
      - level: 3
        features:
          - name: "Proficiência Adicional (Aço)"
            description: |
              A partir do 3° nível, você segue um rumo totalmente diferente das outras tradições monásticas. Você adquire proficiência com armaduras leves e médias.
          - name: "Técnicas do Monge de Ferro"
            description: |
              A partir do 3° nível, você desenvolve técnicas diferentes das do monge tradicional ao usar seu chi em um combate. Enquanto estiver vestindo uma armadura, você pode adicionar seu modificador de Sabedoria ou de Destreza (o que for maior) à CA base fornecida pela armadura (máximo de +2 para armaduras médias). Além disso, você pode usar todas as suas características de classe mesmo usando armadura, exceto a Rajada de Golpes, Defesa Paciente e Passo do Vento. Você pode usar as características a seguir, no lugar dessas características.
              Punho de Ferro. Você pode gastar 1 ponto de chi, com uma ação bônus, para focar sua energia em um único poderoso golpe. Quando você usar a ação de Ataque, você abdica de quaisquer ataques extras para realizar um único golpe desarmado ou com uma arma de monge. Você rola três dados de dano de arma adicionais, se atingir esse ataque. No 5° nível, você rola quatro dados de dano de arma adicionais, se atingir esse ataque.
              Defesa Blindada. Você pode gastar 1 ponto de chi, com uma ação bônus, para ganhar resistência a dano de concussão, cortante e perfurante até o início do seu próximo turno.
              Posição da Montanha. Você pode gastar 1 ponto de chi, com uma ação bônus, para receber vantagem em testes de Força e testes de resistência de Força até o início do seu próximo turno. Além disso, quando realizar um Encontrão, você pode empurrar uma criatura até 3 metros, se você vencer o teste resistido.
      - level: 6
        features:
          - name: "Golpe de Brutalidade Absoluta"
            description: |
              No 6° nível, quando você usar seu Punho de Ferro, você pode gastar 2 pontos de chi adicionais para realizar um poderoso golpe que tem uma grande chance de ser letal. Você realiza esse ataque com vantagem e ele possui uma margem de acerto crítico de 18 a 20.
      - level: 11
        features:
          - name: "Desarme Feroz"
            description: |
              Ao chegar no 11° nível, você aprende uma técnica de combate que surpreende seus inimigos. Ao realizar a ação de Ataque, você pode gastar 2 pontos de chi para realizar um ataque desarmado que não causa dano. Se você atingir, seu alvo deve realizar um teste de resistência de Força ou Destreza, à escolha dele (CD 8 + seu bônus de proficiência + seu modificador de Sabedoria). Se ele fracassar, você toma a arma da mão dele. Se ele obtiver sucesso, sofrerá desvantagem nas jogadas de ataque com essa arma até o início do seu próximo turno.
      - level: 17
        features:
          - name: "Contra-ataque Devastador"
            description: |
              No 17° nível, você aprende a contra-atacar com um vigor absurdo, usando toda a sua força sem se importar com precisão. Quando uma criatura atingir você com um ataque corpo-a-corpo, você pode gastar 3 pontos de chi, com sua reação, para usar seu Punho de Ferro contra ela. Você sofre –5 de penalidade nessa jogada de ataque, mas se atingir, será um ataque crítico.

  caminho_mestre_bebado:
    name: "Caminho do Mestre Bêbado"
    flavor: "Tradição Monástica"
    description: |
      Alguns monges menos convencionais aprendem um estilo de luta que se foca em estar aparentemente constantemente embriagado. Os mestres bêbados, também conhecidos como pugilistas embriagados, são monges que aprendem um estilo de luta nada ortodoxo, usando o estado cambaleante provocado pela embriaguez para obter vantagem. Os movimentos de um mestre bêbado são imprevisíveis, tornando muito difícil saber como atingi-lo e ainda mais difícil saber como se defender dos golpes aparentemente aleatórios desferidos por esse monge ébrio.
    choose_level: 3
    rules:
      ki_save_dc: "8 + bônus de proficiência + modificador de Sabedoria"
    levels:
      - level: 3
        features:
          - name: "Mestre do Improviso"
            description: |
              No 3° nível, quando você escolhe essa tradição, você adquire proficiência com armas improvisadas. Essas armas são consideradas armas de monge para você.
          - name: "Estilo do Mestre Bêbado"
            description: |
              Também no 3° nível, você pode realizar novas ações usando seu chi quando estiver embriagado. Você deve usar sua ação para ingerir, pelo menos, um litro de bebida alcoólica forte, como rum, saquê ou vinho, permanecendo bêbado enquanto possuir pontos de chi restantes. Enquanto estiver bêbado, você recebe vantagem em testes de Destreza (Acrobacia), mas sofre desvantagem em testes de Sabedoria (Percepção). Além disso, você pode usar as seguintes características enquanto estiver bêbado:
              Contra-Rasteira. Se uma criatura tentar derrubar você e falhar, você pode gastar 1 ponto de chi com sua reação para realizar um ataque desarmado contra ela. Se você atingir, além de causar o dano, a criatura deve ser bem sucedida num teste de Força (Atletismo) ou Destreza (Acrobacia), à escolha dela, resistido por um teste de Destreza (Acrobacia) seu, ou cairá no chão.
              Escorrer feito Água. Se uma criatura estiver agarrando você, você pode usar uma ação bônus para gastar 1 ponto de chi e realizar um teste de Destreza (Acrobacia) para escapar do agarrão. Se for bem sucedido, você pode realizar um ataque desarmado contra o alvo como parte dessa ação.
              Arremesso Atordoante. Você pode, com uma ação bônus, gastar 1 ponto de chi para arremessar uma arma de monge que cause dano de concussão em uma criatura a até 6 metros de você. Se você atingir, ela será afetada pelo seu Ataque Atordoante.
      - level: 6
        features:
          - name: "Recuperação Ébria"
            description: |
              No 6° nível, você pode usar bebidas alcoólicas para reabastecer seu poço de chi. Com sua ação, você deve beber, pelo menos, meio litro de bebida alcoólica forte e realiza um teste de resistência de Constituição CD 15. Se você for bem sucedido, recuperará uma quantidade de pontos de chi igual ao seu modificador de Sabedoria (mínimo 1). Após usar essa característica, você precisa terminar um descanso curto ou longo para usá-la novamente.
      - level: 11
        features:
          - name: "Hálito Flamejante"
            description: |
              Ao chegar no 11° nível, você consegue liberar um arroto extremamente inflamável. Com sua ação, você pode gastar 5 pontos de chi para expelir gás num cone de 9 metros e incendiá-lo com uma fonte de fogo em sua mão, como uma tocha ou isqueiro. Todas as criaturas na área, devem ser bem sucedidas num teste de resistência de Destreza (CD 8 + seu bônus de proficiência + seu modificador de Constituição) ou sofrerão 12d6 de dano de fogo. Um sucesso na resistência reduz esse dano à metade.
      - level: 17
        features:
          - name: "Sempre Bêbado"
            description: |
              No 17° nível, você está constantemente bêbado, não precisando ingerir álcool. Você pode ativar seu Estilo do Mestre Bêbado com uma ação bônus, sem precisar beber. Além disso, enquanto estiver sob efeito do seu Estilo do Mestre Bêbado, você pode gastar 2 pontos de chi para ativar, com uma única ação bônus, duas de suas características de monge, dentre as seguintes: Rajada de Golpes, Defesa Paciente, Passo do Vento, Escorrer feito Água ou Arremesso Atordoante. Você não pode usar a mesma característica duas vezes com uma única ação bônus dessa maneira.

  caminho_monge_tatuado:
    name: "Caminho do Monge Tatuado"
    flavor: "Tradição Monástica"
    description: |
      Um monge que segue o Caminho do Monge Tatuado descobre como encantar tatuagens feitas por ele com poder místico. Essas tatuagens não são meras pinturas para os monges que as ostentam. Elas são carregadas de significado e misticismo. Um monge tatuado costuma venerar a natureza, além das exuberantes criaturas naturais e sobrenaturais que existem nela.
    choose_level: 3
    rules:
      ki_save_dc: "8 + bônus de proficiência + modificador de Sabedoria"
    levels:
      - level: 3
        features:
          - name: "Tatuador Experiente"
            description: |
              No 3° nível, quando você escolhe essa tradição, você consegue fazer tatuagens com grande perícia. Você adquire proficiência com ferramentas de pintor e suprimentos de caligrafia. Com essas ferramentas, você pode criar tatuagens apropriadas para armazenar poder místico. Cada tatuagem requer uma sessão de 8 horas para ser feita, além do gasto de 100 po em tintas e materiais místicos.
          - name: "Tatuagem Mística"
            description: |
              Também no 3° nível, você pode despertar o poder místico em tatuagens que você possuir. Despertar uma tatuagem requer 1 hora de meditação e você não pode despertar outra tatuagem até terminar um descanso longo. Você pode ter duas tatuagens despertas, inicialmente. Cada tatuagem permite que você use seu chi de uma nova forma (Carvalho, Dragão, Fênix, Garça, Macaco, Serpente, Tigre — efeitos detalhados no livro). Ativar essas características não requer uma ação, mas só pode ser feito no seu turno.
      - level: 6
        features:
          - name: "Tatuagem de Poder"
            description: |
              No 6° nível, suas tatuagens passam a conceder a você benefícios permanentes. Você adquire os benefícios relacionados a cada tatuagem mística que você possuir (por exemplo, Carvalho: vantagem em Força (Atletismo) para não ser empurrado ou derrubado; Dragão: vantagem em testes de resistência de Sabedoria para não ser amedrontado; demais no livro).
      - level: 11
        features:
          - name: "Despertar Adicional (3ª)"
            description: |
              Ao chegar no 11° nível, você pode despertar o poder latente de uma terceira tatuagem que você possua. Escolha uma das opções de tatuagem, diferente das que você já despertou, descritas na sua Tatuagem Mística.
      - level: 17
        features:
          - name: "Desencarnar Tatuagem"
            description: |
              No 17° nível, você pode usar sua energia interior para desencarnar o poder contido em uma tatuagem mística sua, numa explosão de energia. Com sua ação, você pode escolher uma de suas tatuagens e desencarná-la, gastando 5 pontos de chi. Todas as criaturas inimigas a até 9 metros de você, devem realizar um teste de resistência de Destreza. Se fracassar, uma criatura sofrerá 10d8 de dano de energia e será empurrada 3 metros para longe de você. Os poderes da tatuagem escolhida adormecem e você perde todos os benefícios dela, até despertar a mesma ou outra conforme a Tatuagem Mística. Após usar essa característica, você precisa terminar um descanso curto ou longo para poder usá-la novamente.
      - level: 18
        features:
          - name: "Despertar Adicional (4ª)"
            description: |
              No 18° nível, você pode despertar uma quarta tatuagem diferente, dentre as opções disponíveis na sua Tatuagem Mística.

  caminho_ninjuts:
    name: "Caminho do Ninjútsu"
    flavor: "Tradição Monástica"
    description: |
      Os monges que enveredam pelo Caminho do Ninjútsu aprendem as técnicas secretas dos ninjas. Para se tornar um ninja, primeiramente o monge deve ser aceito em um clã secreto de ninjas. Após ser aceito, ele aprende técnicas que aperfeiçoam sua furtividade, além de técnicas de assassinato. Isso faz do ninja um matador extremamente eficiente, capaz de entrar em qualquer local sem ser percebido e eliminar seu alvo de forma rápida e limpa, estando bem longe antes que alguém perceba o que aconteceu.
    choose_level: 3
    rules:
      ki_save_dc: "8 + bônus de proficiência + modificador de Sabedoria"
    levels:
      - level: 3
        features:
          - name: "Arte do Ninjútsu"
            description: |
              No 3° nível, quando você adentra um clã secreto de ninjas, você adiciona as seguintes armas à sua lista de armas de monge: katana (espada longa), kodachi (cimitarra), fukiya (zarabatana) e naginata (glaive). Você adquire proficiência com essas armas e com kit de venenos.
          - name: "Golpe Súbito"
            description: |
              A partir do 3° nível, você se torna capaz de desferir um golpe letal ao pegar seu oponente desprevenido. Quando você usar uma arma de monge para atacar um oponente que não possa ver você ou que esteja surpreso, você adiciona 1d8 de dano extra ao primeiro ataque que você atingir no seu turno. O dano extra do seu Golpe Súbito aumenta em 1d8 para cada três níveis de monge que você possuir (2d8 no 6°, 3d8 no 9°, 4d8 no 12°, 5d8 no 15° e 6d8 no 18° nível).
      - level: 6
        features:
          - name: "Técnicas de Ninjútsu"
            description: |
              No 6° nível, você aprende técnicas que facilitam sua infiltração e evasão, gastando pontos de chi. Escalada Veloz. Com sua ação, você pode gastar 1 ponto de chi para adquirir deslocamento de escalada igual ao seu deslocamento de caminhada até o final do seu turno. Bomba de Fumaça. Com uma ação bônus, você pode gastar 2 pontos de chi e arremessar uma bomba de fumaça aos seus pés, criando uma nuvem de fumaça no espaço ocupado por você e em todos os espaços adjacentes, até o final do seu turno. Durante esse período, você adquire os benefícios da magia invisibilidade. Percepção Sobrenatural. Com uma ação bônus, você pode gastar 3 pontos de chi para adquirir percepção às cegas com um alcance de 3 metros por 1 minuto.
      - level: 11
        features:
          - name: "Mestre do Ocultismo"
            description: |
              Ao chegar no 11° nível, você se torna um mestre nas artes do oculto. Você recebe vantagem em testes de Destreza (Furtividade) e não pode ser rastreado por meios não-mágicos. A partir de agora, quando usar sua Bomba de Fumaça, você pode gastar 2 pontos de chi adicionais para fazê-la durar até o final do seu próximo turno. Durante esse período, você recebe os benefícios da magia invisibilidade maior enquanto permanecer na área ocupada pela fumaça.
      - level: 17
        features:
          - name: "Passo Fantasma"
            description: |
              No 17° nível, você se torna capaz de usar sua energia interior para adentrar o Plano Etéreo por um curto período. Com sua ação, você pode gastar 5 pontos de chi para adquirir uma forma incorpórea por 1 minuto. Enquanto estiver nessa forma, é difícil enxergar você; você ganha resistência a dano de concussão, perfurante e cortante de ataques não-mágicos e dano de veneno; não pode ser agarrado, derrubado, impedido, paralisado ou petrificado; pode se mover através de criaturas e objetos como se fossem terreno difícil (sofre 1d10 de dano de energia se terminar o turno dentro de um objeto); só pode realizar ataques com armas mágicas em criaturas no Plano Material, atacando no Etéreo normalmente. Após usar essa característica, você precisa terminar um descanso longo para poder usá-la novamente.

  caminho_punho_sagrado:
    name: "Caminho do Punho Sagrado"
    flavor: "Tradição Monástica"
    description: |
      O Caminho do Punho Sagrado é composto por monges doutrinados em alguma seita religiosa. Eles cultuam algum deus em particular, ou até um grupo de deuses com orientação similar. Durante suas meditações e orações, eles adquirem a capacidade de canalizar energia divina através dos seus corpos, usando sua energia mística interior como ferramenta para acessar sua fé. Assim como um clérigo ou paladino, um punho sagrado pode perder sua capacidade de conjuração caso age de forma contrária aos dogmas dos deuses que seu monastério cultua, apesar de ser muito mais difícil isso acontecer, já que ele costuma ter um panorama muito mais amplo de culto que as duas classes citadas.
    choose_level: 3
    rules:
      ki_save_dc: "8 + bônus de proficiência + modificador de Sabedoria"
      spell_save_dc_cleric: "8 + bônus de proficiência + modificador de Sabedoria"
      spellcasting:
        type: "parcial"
        ability: "Sabedoria"
        save_dc: "8 + bônus de proficiência + modificador de Sabedoria"
        attack_bonus: "bônus de proficiência + modificador de Sabedoria"
        list: "clérigo"
        preparation: "conhecidas"
        spells_known_source: "majoritariamente dos dois Domínios Sagrados; as do 8º, 14º e 20º nível podem vir da lista geral de clérigo"
        slots_recover_on: "descanso longo"
        # Tabela "Conjuração de Punho Sagrado" (por nível de monge).
        # Colunas: cantrips (truques), spells_known (magias conhecidas), 1/2/3/4 (espaços por nível de magia).
        table:
          "3":  { cantrips: 1, spells_known: 3,  "1": 2, "2": 0, "3": 0, "4": 0 }
          "4":  { cantrips: 1, spells_known: 4,  "1": 3, "2": 0, "3": 0, "4": 0 }
          "5":  { cantrips: 1, spells_known: 4,  "1": 3, "2": 0, "3": 0, "4": 0 }
          "6":  { cantrips: 1, spells_known: 4,  "1": 3, "2": 0, "3": 0, "4": 0 }
          "7":  { cantrips: 1, spells_known: 5,  "1": 4, "2": 2, "3": 0, "4": 0 }
          "8":  { cantrips: 1, spells_known: 6,  "1": 4, "2": 2, "3": 0, "4": 0 }
          "9":  { cantrips: 1, spells_known: 6,  "1": 4, "2": 2, "3": 0, "4": 0 }
          "10": { cantrips: 2, spells_known: 7,  "1": 4, "2": 3, "3": 0, "4": 0 }
          "11": { cantrips: 2, spells_known: 8,  "1": 4, "2": 3, "3": 0, "4": 0 }
          "12": { cantrips: 2, spells_known: 8,  "1": 4, "2": 3, "3": 0, "4": 0 }
          "13": { cantrips: 2, spells_known: 9,  "1": 4, "2": 3, "3": 2, "4": 0 }
          "14": { cantrips: 2, spells_known: 10, "1": 4, "2": 3, "3": 2, "4": 0 }
          "15": { cantrips: 2, spells_known: 10, "1": 4, "2": 3, "3": 2, "4": 0 }
          "16": { cantrips: 2, spells_known: 11, "1": 4, "2": 3, "3": 3, "4": 0 }
          "17": { cantrips: 2, spells_known: 11, "1": 4, "2": 3, "3": 3, "4": 0 }
          "18": { cantrips: 2, spells_known: 11, "1": 4, "2": 3, "3": 3, "4": 0 }
          "19": { cantrips: 2, spells_known: 12, "1": 4, "2": 3, "3": 3, "4": 1 }
          "20": { cantrips: 2, spells_known: 13, "1": 4, "2": 3, "3": 3, "4": 1 }
    levels:
      - level: 3
        features:
          - name: "Conjuração (Punho Sagrado)"
            description: |
              Quando você alcançar o 3° nível, você amplia sua versatilidade e autossuficiência com a capacidade de conjurar magias divinas. Truques: você aprende um truque, à sua escolha, da lista de magias de clérigo, além do truque chamas sagradas (aprende +1 truque adicional no 10° nível, totalizando 2). Espaços de magia, magias conhecidas e progressão seguem a tabela “Conjuração de Punho Sagrado” (ver rules.spellcasting.table). Habilidade de conjuração: Sabedoria. CD = 8 + bônus de proficiência + modificador de Sabedoria; ataque de magia = bônus de proficiência + modificador de Sabedoria.
            grants:
              cantrips: ["chamas sagradas"]
              cantrips_progression: { at_3: 1, at_10: 2 }
          - name: "Domínios Sagrados"
            description: |
              No 3° nível, você deve escolher dois dentre os Domínios Divinos disponíveis para o clérigo. Você deve escolher as magias da tabela de magias desses domínios como suas magias conhecidas, conforme as regras do capítulo do Punho Sagrado no livro.
          - name: "Energia Divina Interior"
            description: |
              Também no 3° nível, você adquire a capacidade de usar sua energia mística interior em conjunto com sua energia divina. Com uma ação bônus, você pode gastar pontos de chi para conjurar uma magia num espaço de magia superior. Para cada 2 pontos de chi gastos, o nível da magia é elevado em 1, até o máximo de 4° nível. Uma vez que tenha usado essa característica, você não poderá fazê-lo novamente até ter terminado um descanso curto ou longo.
      - level: 6
        features:
          - name: "Punho de Chamas Divinas"
            description: |
              A partir do 6° nível, você pode gastar 1 ponto de chi para canalizar sua energia divina através dos seus punhos. Quando você usar a ação de Ataque para realizar um ataque desarmado e atingir, você pode conjurar o truque chamas sagradas como parte do ataque no inimigo que você atingiu. O alvo tem desvantagem no seu teste de resistência contra o efeito dessa magia quando ela é conjurada dessa forma.
      - level: 11
        features:
          - name: "Rajada de Chamas Divinas"
            description: |
              No 11° nível, você aprimora a técnica dos punhos de chamas divinas. Quando você gastar pontos de chi para usar a característica Rajada de Golpes, você pode gastar 2 pontos de chi adicionais para conjurar o truque chamas sagradas em ambos os ataques desarmados realizados com sua ação bônus. Cada ataque que atingir o inimigo libera o efeito da magia nele e ele tem desvantagem nos seus testes de resistência contra os efeitos de ambas as magias quando elas são conjuradas dessa forma.
      - level: 17
        features:
          - name: "Armadura Interior"
            description: |
              A partir do 17° nível, você adquire a habilidade de usar seu chi em conjunto com sua energia divina para criar uma proteção intangível em volta de você. Se você não estiver vestindo nenhum tipo de armadura ou usando um escudo, você pode, com uma ação, gastar 3 pontos de chi e um espaço de magia, à sua escolha. Durante 1 minuto, você adquire um bônus na sua CA igual ao nível do espaço de magia gasto. Além disso, você adquire resistência a dano de concussão, cortante e perfurante de ataques não-mágicos pela duração. Uma vez que tenha usado essa característica, você não poderá fazê-lo novamente até ter terminado um descanso longo.

  caminho_sadhaka:
    name: "Caminho do Sadhaka"
    flavor: "Tradição Monástica"
    description: |
      Alguns monges conseguem atingir a evolução espiritual através de meditação e foco constante. Os monges que seguem o Caminho do Sadhaka trilham um caminho de paz interior e meditação constante. Eles conseguem realizar façanhas impressionantes ao concluir mantras espirituais ou se concentrar totalmente em seu espírito. Ao alcançar a evolução espiritual plena, um sadhaka consegue atingir o nirvana, adquirindo uma noção completa do mundo à sua volta e de todos os mundos que existem no multiverso. Apesar desses monges serem devotos religiosos, eles não seguem um deus em particular, mas sim uma doutrina espiritual.
    choose_level: 3
    rules:
      ki_save_dc: "8 + bônus de proficiência + modificador de Sabedoria"
    levels:
      - level: 3
        features:
          - name: "Mantra de Poder"
            description: |
              No 3° nível, quando você escolhe essa tradição, você aprende a realizar mantras. Durante um descanso, você pode se concentrar e realizar mantras que permitem que você acesse novos níveis espirituais. Ao terminar um descanso curto ou longo, você pode realocar uma porção de sua energia interior para ganhar um dos benefícios do livro: por exemplo, rolar 1d4 e adicionar a qualquer teste de habilidade (reduz teto de chi em 3); +1d4 de dano com armas de monge e desarmados (teto –4); +1d4 a testes de resistência (teto –5); +1d4 a jogadas de ataque (teto –5); resistência a B/P/S não mágico (teto –6); resistência a dano de magias (teto –6). Você mantém o benefício contanto que não esteja usando armadura ou escudo, até realizar um novo descanso.
      - level: 6
        features:
          - name: "Akasha Interior"
            description: |
              Ao chegar no 6° nível, você consegue ampliar sua força interior através da energia da quintessência universal. Assim que você terminar um descanso longo, role 1d6. Você adiciona o valor rolado ao máximo de pontos de chi que seu poço de chi pode comportar, até terminar um descanso longo. Ao atingir certos níveis, você pode rolar um dado superior: 1d8 no 10° nível, 1d10 no 14° nível e 1d12 no 18° nível.
      - level: 11
        features:
          - name: "Concentração Inabalável"
            description: |
              No 11° nível, você consegue focar seu espírito e corpo de uma forma excepcional. Quando você rolar um Dado de Vida para recuperar pontos de vida durante um descanso curto, você recupera uma quantidade de pontos de vida adicionais igual à metade do seu nível de monge. A partir de agora, você pode ativar e manter dois efeitos diferentes do seu mantra de poder simultaneamente.
      - level: 17
        features:
          - name: "Alcançar o Nirvana"
            description: |
              No 17° nível, você alcança o estado de libertação total na sua busca espiritual. Você pode gastar 8 pontos de chi para conjurar a magia sexto sentido, ou 6 pontos de chi para conjurar a magia limpar a mente, sem precisar de componentes materiais. Você só pode conjurar essas magias em si mesmo e cada uma dura 1 hora.

paladin:
  juramento-de-devocao:
    name: "Juramento de Devoção"
    flavor: "Juramento Sagrado"
    description: "Honestidade, coragem, compaixão, honra e dever. Um farol de virtude contra o profano."
    choose_level: 3
    levels:
      - level: 3
        features:
          - { name: "Canalizar Divindade: Arma Sagrada", description: "Ação; por 1 min, adiciona mod. Car às jogadas de ataque com 1 arma (mín. +1), arma emite luz (6 m/penumbra +6 m) e conta como mágica; você pode encerrar como parte de qualquer ação." }
          - { name: "Canalizar Divindade: Expulsar o Profano", description: "Ação; cada corruptor (diabo/demônio) e morto-vivo a até 9 m faz TS Sab (CD = sua CD de magia). Falha: fica 'expulso' por 1 min ou até sofrer dano." }
        grants:
          spells:
            always_prepared:
              3:  ["proteção contra o bem e mal","santuário"]
              5:  ["restauração menor","zona da verdade"]
              9:  ["sinal de esperança","dissipar magia"]
              13: ["movimentação livre","guardião da fé"]
              17: ["comunhão","coluna de chamas"]
        rules:
          channel_divinity:
            uses: 1
            recharge: "descanso curto ou longo"
            save_dc: "8 + bônus de proficiência + mod. Carisma"
      - level: 7
        features:
          - name: "Aura de Devoção"
            description: "Você e aliados a até 3 m não podem ser enfeitiçados enquanto você estiver consciente."
            rules: { aura_radius_m: 3, improves_at_level_18_to_m: 9 }
      - level: 15
        features:
          - { name: "Pureza de Espírito", description: "Você está permanentemente sob os efeitos de 'proteção contra o bem e mal'." }
      - level: 20
        features:
          - name: "Halo Sagrado"
            description: "Ação; por 1 min, luz plena 9 m (penumbra +9 m). Inimigo que inicia turno/entra na luz sofre 10 de dano radiante; você tem vantagem em TS contra magias de corruptores ou mortos-vivos. 1/descanso longo."
  juramento-dos-ancioes:
    name: "Juramento dos Anciões"
    flavor: "Juramento Sagrado"
    description: "A luz antiga do mundo: vida, bondade e beleza. Mistura proteção feérica e vínculos naturais."
    choose_level: 3
    levels:
      - level: 3
        features:
          - { name: "Canalizar Divindade: Fúria da Natureza", description: "Ação; vinhas espectrais tentam impedir 1 criatura a até 3 m (TS For ou Des contra sua CD). Falha: fica 'impedido'; repete TS no fim de cada turno." }
          - { name: "Canalizar Divindade: Expulsar os Infiéis", description: "Ação; fadas e corruptores que ouvirem você fazem TS Sab (CD de magia) para não serem 'expulsos' por 1 min ou até sofrer dano." }
        grants:
          spells:
            always_prepared:
              3:  ["golpe constritor","falar com animais"]
              5:  ["raio lunar","passo nebuloso"]
              9:  ["ampliar plantas","proteção contra energia"]
              13: ["tempestade de gelo","pele de pedra"]
              17: ["comunhão com a natureza","caminhar em árvores"]
        rules:
          channel_divinity:
            uses: 1
            recharge: "descanso curto ou longo"
            save_dc: "8 + bônus de proficiência + mod. Carisma"
      - level: 7
        features:
          - name: "Aura de Vigilância"
            description: "Você e aliados a até 3 m têm resistência ao dano de magias enquanto você estiver consciente."
            rules: { aura_radius_m: 3, improves_at_level_18_to_m: 9 }
      - level: 15
        features:
          - { name: "Sentinela Imortal", description: "Ao ser reduzido a 0 PV (sem morrer instantaneamente), pode optar por cair a 1 PV; 1/descanso longo. Além disso, não sofre efeitos de envelhecimento e não pode ser envelhecido magicamente." }
      - level: 20
        features:
          - name: "Campeão dos Anciões"
            description: "Ação; por 1 min: cura 10 PV no início de cada turno; magias de 1 ação viram ação bônus; inimigos a 3 m têm desvantagem nos TS contra suas magias/Canalizar. 1/descanso longo."
  juramento-de-vinganca:
    name: "Juramento de Vingança"
    flavor: "Juramento Sagrado"
    description: "Punir o mal maior a qualquer custo; caçadores implacáveis do injusto."
    choose_level: 3
    levels:
      - level: 3
        features:
          - { name: "Canalizar Divindade: Abjurar Inimigo", description: "Ação; 1 criatura a 18 m faz TS Sab (corruptores e mortos-vivos com desvantagem). Falha: amedrontada 1 min (desloc. 0) até sofrer dano; sucesso: desloc. do alvo reduzido à metade por 1 min ou até sofrer dano." }
          - { name: "Canalizar Divindade: Voto de Inimizade", description: "Ação; 1 criatura a 3 m: você tem vantagem nos ataques contra ela por 1 min ou até cair a 0 PV/ficar inconsciente." }
        grants:
          spells:
            always_prepared:
              3:  ["perdição","marca do caçador"]
              5:  ["imobilizar pessoa","passo nebuloso"]
              9:  ["velocidade","proteção contra energia"]
              13: ["banimento","porta dimensional"]
              17: ["imobilizar monstro","vidência"]
        rules:
          channel_divinity:
            uses: 1
            recharge: "descanso curto ou longo"
            save_dc: "8 + bônus de proficiência + mod. Carisma"
      - level: 7
        features:
          - { name: "Vingador Implacável", description: "Ao acertar um Ataque de Oportunidade, pode mover até metade do deslocamento sem provocar AO, como parte da mesma Reação." }
      - level: 15
        features:
          - { name: "Alma de Vingança", description: "Reação; quando a criatura sob seu Voto de Inimizade realizar um ataque, você faz 1 ataque corpo-a-corpo com arma contra ela, se ao alcance." }
      - level: 20
        features:
          - name: "Anjo Vingador"
            description: "Ação; por 1 h: voo 18 m e aura de 9 m que amedronta (TS Sab ao entrar/iniciar turno; falha: amedrontado 1 min). Ataques contra o amedrontado têm vantagem. 1/descanso longo."

  # ——— OBRAS ORIGINAIS DA SUA MESA ———
  juramento-danacao:
    name: "Juramento de Danação"
    flavor: "Juramento Sagrado"
    description: "O medo como arma contra os injustos e infiéis; cavaleiros das trevas que derrotam adversários mentalmente."
    choose_level: 3
    levels:
      - level: 3
        features:
          - { name: "Canalizar Divindade: Lâmina Amaldiçoada", description: "Ação; imbui sua arma com energia debilitante por 1 min. Ao acertar uma criatura, ela sofre 1d6 de penalidade nas jogadas de ataque e de dano com arma até o fim do seu próximo turno." }
          - { name: "Canalizar Divindade: Medo Paralisante", description: "Ação; 1 criatura que veja você a até 3 m faz TS Sab (CD de magia) ou fica amedrontada por 1 min, com deslocamento 0. Repete o TS no fim de cada turno se estiver a mais de 3 m ou sem ver você; se for atacada, pode mover-se, mas o medo persiste." }
        grants:
          spells:
            always_prepared:
              3:  ["Perdição","Repreensão Infernal"]
              5:  ["Coroa da Loucura","Imobilizar Pessoa"]
              9:  ["Medo","Rogar Maldição"]
              13: ["Assassino Fantasmagórico","Confusão"]
              17: ["Imobilizar Monstro","Sonho"]
        rules:
          channel_divinity: { uses: 1, recharge: "descanso curto ou longo", save_dc: "8 + bônus de proficiência + mod. Carisma" }
      - level: 7
        features:
          - name: "Aura de Danação"
            description: "Inimigos hostis a você e aliados a até 3 m não podem realizar reações e sofrem penalidade em TS contra medo = mod. Car (mín. −1). Criaturas imunes a amedrontar com ND ≤ seu nível de paladino perdem a imunidade dentro da aura (mas ganham vantagem nesses TS)."
            rules: { aura_radius_m: 3, improves_at_level_18_to_m: 9 }
      - level: 15
        features:
          - { name: "Pesadelo Interior", description: "Ação; 1 criatura a até 18 m (e um aliado dela a até 9 m que ela veja) faz TS Sab ou sofre 4d10 psíquico e fica amedrontada em relação ao aliado por 1 min (sucesso: metade do dano, sem medo). Em falha, sofre 2d10 psíquico no início de cada turno e repete o TS no fim de cada turno (sucesso encerra o medo). 1/descanso curto ou longo." }
      - level: 20
        features:
          - { name: "Medo Recorrente", description: "Ação bônus; por 1 min assume forma apavorante (visível só por criaturas que já o temeram); essas criaturas sofrem desvantagem em jogadas de ataque e testes de habilidade. 1/descanso longo." }

  juramento-equilibrio:
    name: "Juramento de Equilíbrio"
    flavor: "Juramento Sagrado"
    description: "Mantém a balança do multiverso entre bem e mal; impede que qualquer lado sobrepuje o outro."
    choose_level: 3
    levels:
      - level: 3
        features:
          - { name: "Canalizar Divindade: Combate Singular", description: "Ação; 1 criatura hostil que veja a até 18 m. Por 1 min, você e o alvo têm vantagem nos ataques um contra o outro, mas causam apenas metade do dano contra qualquer outra criatura; e todas as demais criaturas causam metade do dano contra vocês dois." }
          - { name: "Canalizar Divindade: Sacrifício Glorioso", description: "Ação; ativa uma aura de fluxo vital de 9 m por 1 min. A cada fim de turno você perde 1d4 PV e cada companheiro na aura recupera 2 PV. Encerra como parte de qualquer ação; termina se ficar inconsciente." }
        grants:
          spells:
            always_prepared:
              3:  ["Detectar o Bem e Mal","Proteção contra o Bem e Mal"]
              5:  ["Augúrio","Vínculo Protetor"]
              9:  ["Espíritos Guardiões","Revivificar"]
              13: ["Banimento","Guardião da Fé"]
              17: ["Dissipar o Bem e Mal","Reviver os Mortos"]
        rules:
          channel_divinity: { uses: 1, recharge: "descanso curto ou longo", save_dc: "8 + bônus de proficiência + mod. Carisma" }
      - level: 7
        features:
          - name: "Aura de Equidade"
            description: "Você e todas as criaturas a até 3 m (amigas e hostis) perdem resistências a dano e não podem ganhar resistência/imunidade enquanto estiverem na aura; imunidades viram resistência ao mesmo tipo."
            rules: { aura_radius_m: 3, improves_at_level_18_to_m: 9 }
      - level: 15
        features:
          - { name: "Destruição Igualitária", description: "Ao usar Destruição Divina, causa 3d8 de dano de energia ao gastar espaço de 1º nível, +1d8 por nível acima (máx. 6d8). Não causa dano extra contra corruptor ou morto-vivo." }
      - level: 20
        features:
          - { name: "Trazer o Equilíbrio", description: "Ação (só com menos da metade do PV máximo); ataque corpo-a-corpo com magia contra criatura hostil. Ao acertar, seu PV atual sobe para metade do máximo e o alvo faz TS Con ou tem o PV máximo reduzido à metade; em sucesso, sofre 10d6 necrótico. 1/descanso longo." }

  juramento-liberdade:
    name: "Juramento de Liberdade"
    flavor: "Juramento Sagrado"
    description: "A liberdade como bem maior; paladinos libertadores que viajam, depõem tiranos e rompem grilhões."
    choose_level: 3
    levels:
      - level: 3
        features:
          - { name: "Canalizar Divindade: Manto Anárquico", description: "Ação; por 1 min envolve-se em energia caótica. No início de cada turno role 1d6: ímpar → bônus na CA; par → bônus nas jogadas de ataque corpo-a-corpo, até o início do próximo turno. Encerra como parte de qualquer ação; termina se ficar inconsciente." }
          - { name: "Canalizar Divindade: Toque Libertador", description: "Ação; toca uma criatura amigável e remove uma condição à escolha (amedrontado, atordoado, enfeitiçado, impedido ou paralisado), tornando-a imune àquela condição por 1 min. Pode usar em si mesmo mesmo que a condição normalmente impeça ações." }
        grants:
          spells:
            always_prepared:
              3:  ["Área Escorregadia","Recuo Acelerado"]
              5:  ["Passos sem Pegadas","Patas de Aranha"]
              9:  ["Andar na Água","Piscar"]
              13: ["Movimentação Livre","Porta Dimensional"]
              17: ["Criar Passagem","Despertar"]
        rules:
          channel_divinity: { uses: 1, recharge: "descanso curto ou longo", save_dc: "8 + bônus de proficiência + mod. Carisma" }
      - level: 7
        features:
          - name: "Aura de Libertação"
            description: "Você e aliados a até 3 m têm vantagem em TS e testes para não serem agarrados, impedidos ou paralisados enquanto você estiver consciente."
            rules: { aura_radius_m: 3, improves_at_level_18_to_m: 9 }
      - level: 15
        features:
          - { name: "Espírito Livre", description: "Você está constantemente sob efeito de 'movimentação livre' e não pode ser enfeitiçado." }
      - level: 20
        features:
          - { name: "Viajar pelos Mundos", description: "Pode gastar um espaço de 5º nível para conjurar 'teletransporte' e 'viagem planar'. Alternativamente, gasta um espaço de 5º nível para abrir um portal e clamar por ajuda: uma besta, celestial ou fada de ND ≤ 10 (à escolha do Mestre) surge, amigável, e obedece comandos verbais por 1 min (ou até ser dispensada / cair a 0 PV). 1/descanso longo." }

  juramento-misericordia:
    name: "Juramento de Misericórdia"
    flavor: "Juramento Sagrado"
    description: "A vida acima de qualquer outro bem; cavaleiros que curam os vivos e exterminam a não-vida."
    choose_level: 3
    levels:
      - level: 3
        features:
          - { name: "Canalizar Divindade: Ataque Misericordioso", description: "Ação; por 1 min envolve sua arma e a dos aliados a até 9 m com energia radiante não letal. O dano de arma vira radiante, com +1d6 radiante contra mortos-vivos; as armas emitem penumbra (3 m). Criatura que caia a 0 PV por esses ataques estabiliza automaticamente." }
          - { name: "Canalizar Divindade: Guardião da Vida", description: "Ação; por 1 min dá a um aliado tocado resistência a concussão, cortante e perfurante — sempre que ele sofrer esse dano, você sofre quantidade igual. Alternativamente, toca um morto-vivo: TS Car ou ganha vulnerabilidade a concussão/cortante/perfurante por 1 min (repete o TS no fim de cada turno; sucesso encerra)." }
        grants:
          spells:
            always_prepared:
              3:  ["Palavra Curativa","Santuário"]
              5:  ["Cegueira/Surdez","Vínculo Protetor"]
              9:  ["Palavra Curativa em Massa","Sinal de Esperança"]
              13: ["Guardião da Fé","Pele de Pedra"]
              17: ["Consagrar","Restauração Maior"]
        rules:
          channel_divinity: { uses: 1, recharge: "descanso curto ou longo", save_dc: "8 + bônus de proficiência + mod. Carisma" }
      - level: 7
        features:
          - name: "Aura de Resiliência"
            description: "Você e aliados a até 3 m têm resistência a dano de veneno e necrótico enquanto você estiver consciente; quem cair a 0 PV na aura estabiliza automaticamente."
            rules: { aura_radius_m: 3, improves_at_level_18_to_m: 9 }
      - level: 15
        features:
          - { name: "Virtude da Vida", description: "Pode conjurar a magia 'cura completa' uma vez. 1/descanso longo." }
      - level: 20
        features:
          - { name: "Sacrifício do Mártir", description: "Ação; libera um pulso radiante em esfera de 9 m de raio. Todas as criaturas vivas amigáveis na área são curadas em 10d8 PV e você sofre 10d8 de dano. Corruptores e mortos-vivos na área fazem TS Des ou sofrem 10d8 radiante (metade em sucesso). 1/descanso longo." }

  juramento-ordenacao:
    name: "Juramento de Ordenação"
    flavor: "Juramento Sagrado"
    description: "Lei e ordem; justiçares que cumprem ordens legítimas e caçam infratores para julgamento."
    choose_level: 3
    levels:
      - level: 3
        features:
          - { name: "Canalizar Divindade: Incentivar o Grupo", description: "Ação; profere palavras animadoras a todas as criaturas amigáveis a até 9 m que o ouçam. Por 1 min, elas recebem bônus nas jogadas de dano com arma = mod. Car (mín. +1). Encerra como parte de qualquer ação; termina se ficar inconsciente." }
          - { name: "Canalizar Divindade: Proibição Imperiosa", description: "Ação; 1 criatura que veja você a até 18 m faz TS Car ou sofre por 1 min um efeito à sua escolha: Calado (não fala/conjura com componente verbal), Parado (impedida) ou Quieto (não ataca/conjura com componente gestual). Repete o TS no fim de cada turno (sucesso encerra)." }
        grants:
          spells:
            always_prepared:
              3:  ["Comando","Perdição"]
              5:  ["Acalmar Emoções","Zona da Verdade"]
              9:  ["Glifo de Vigilância","Manto do Cruzado"]
              13: ["Banimento","Localizar Criatura"]
              17: ["Âncora Planar","Missão"]
        rules:
          channel_divinity: { uses: 1, recharge: "descanso curto ou longo", save_dc: "8 + bônus de proficiência + mod. Carisma" }
      - level: 7
        features:
          - name: "Aura de Autoridade"
            description: "Criaturas hostis a até 3 m sofrem desvantagem em testes de Carisma e TS de Carisma."
            rules: { aura_radius_m: 3, improves_at_level_18_to_m: 9 }
      - level: 15
        features:
          - { name: "Vontade Indomável", description: "Imune à condição enfeitiçado; não pode ser alvo de magias/efeitos que controlem ou influenciem você a agir contra sua vontade (ex.: comando, confusão, coroa da loucura, dominar pessoa, riso histérico de Tasha)." }
      - level: 20
        features:
          - { name: "Sentença de Morte", description: "Ação; 1 criatura que veja a até 18 m e que você saiba ter cometido crime punível com a morte. Se estiver com 100 PV ou menos, faz TS Car ou cai a 0 PV. Criaturas com mais de 100 PV ou que não cometeram tal crime são imunes. 1/descanso longo." }

  juramento-pureza:
    name: "Juramento de Pureza"
    flavor: "Juramento Sagrado"
    description: "Castidade, sobriedade e abstinência; arqueiros puritanos que buscam ascender como seres de pura bondade e luz, combatendo à distância."
    choose_level: 3
    levels:
      - level: 3
        features:
          - { name: "Canalizar Divindade: Golpes Longínquos", description: "Ação; por 1 min seus ataques corpo-a-corpo com arma passam a contar como ataques à distância com 9 m; o dano vira energia e você pode usar Destruição Divina ou magias de ataque corpo-a-corpo como ataque à distância. Armas de disparo mantêm o alcance normal se maior que 9 m. Encerra como parte de qualquer ação; termina se ficar inconsciente." }
          - { name: "Canalizar Divindade: Manter a Pureza", description: "Ação; por 1 min qualquer magia benéfica com alcance de toque ou sua Cura pelas Mãos passa a ter alcance de 9 m. A partir do 6º nível, magias conjuradas em você ou em aliado sob este efeito recuperam +mod. Car PV (mín. 1), além dos efeitos normais." }
        grants:
          spells:
            always_prepared:
              3:  ["Marca do Caçador","Palavra Curativa"]
              5:  ["Cordão de Flechas","Levitação"]
              9:  ["Flecha Relampejante","Palavra Curativa em Massa"]
              13: ["Guardião da Fé","Movimentação Livre"]
              17: ["Aljava Veloz","Curar Ferimentos em Massa"]
        rules:
          channel_divinity: { uses: 1, recharge: "descanso curto ou longo", save_dc: "8 + bônus de proficiência + mod. Carisma" }
      - level: 7
        features:
          - name: "Aura de Integridade"
            description: "Aura de 3 m: qualquer criatura (exceto aliados ou celestial) que tente entrar pela primeira vez no turno faz TS Car ou não pode se aproximar a menos de 3 m naquela rodada. Repete o TS a cada nova tentativa; em sucesso fica imune até você terminar um descanso curto. Corruptores e mortos-vivos têm desvantagem no TS."
            rules: { aura_radius_m: 3, improves_at_level_18_to_m: 9 }
      - level: 15
        features:
          - { name: "Ascensão Divina", description: "Enquanto estiver sob efeito de Golpes Longínquos, libera asas plumadas e adquire deslocamento de voo 15 m." }
      - level: 20
        features:
          - { name: "Flecha Assassina", description: "Ação; ataque à distância com arco/besta empunhado contra criatura (exceto celestial). Ao acertar, o alvo faz TS Con ou cai a 0 PV automaticamente. Se passar, sofre o dano normal +6d10 radiante (8d10 se corruptor ou morto-vivo). 1/descanso longo." }

rogue:
  ladrao:
    name: "Ladrão"
    flavor: "Arquétipo do Ladino"
    description: "Especialista em furtos, mobilidade e uso criativo de objetos."
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Mãos Rápidas"
            description: "Usa Ação Ardilosa para Usar Objeto, desarmar armadilhas e abrir fechaduras com ferramentas de ladrão."
            rules:
              cunning_action_expands_to: ["Usar Objeto","Ferramentas de Ladrão: desarmar armadilhas/abrir fechaduras"]
          - name: "Andarilho de Telhados"
            description: "Escalar não custa movimento extra; aumenta a distância de salto em +mod. Des."
            rules:
              climb_no_extra_movement: true
              long_jump_bonus: "mod. Destreza"
      - level: 9
        features:
          - name: "Furtividade Suprema"
            description: "Vantagem nos testes de Destreza (Furtividade) se mover no máximo metade do deslocamento."
            rules:
              stealth_adv_if_move_≤_half_speed: true
      - level: 13
        features:
          - name: "Usar Instrumento Mágico"
            description: "Ignora requisitos de classe/raça/nível de itens mágicos ao ativá-los."
      - level: 17
        features:
          - name: "Reflexos de Ladrão"
            description: "Realiza dois turnos durante o primeiro turno de cada combate: o 1º na sua iniciativa e o 2º na ordem da sua iniciativa menos 10. Não pode usar enquanto estiver surpreso."
            rules:
              two_turns_first_round: true
              second_turn_initiative_offset: -10
              cannot_use_while_surprised: true

  assassino:
    name: "Assassino"
    flavor: "Arquétipo do Ladino"
    description: "Mestre de disfarce, infiltração e golpes decisivos."
    choose_level: 3
    levels:
      - level: 3
        grants:
          proficiencies:
            tools: ["Kit de Disfarce","Kit de Venenos"]
        features:
          - name: "Proficiência Adicional"
            description: "Ganha proficiência com kit de disfarce e kit de venenos."
          - name: "Assassinar"
            description: "Vantagem nas jogadas de ataque contra criaturas que ainda não agiram; qualquer acerto contra um alvo surpreendido é crítico."
            rules:
              advantage_vs_not_acted: true
              auto_crit_vs_surprised_on_hit: true
      - level: 9
        features:
          - name: "Especialização em Infiltração"
            description: "Cria uma identidade falsa funcional (≈7 dias e 25 po); não permite se passar por uma pessoa específica sem estudo prévio."
      - level: 13
        features:
          - name: "Impostor"
            description: "Imita voz, maneirismos e escrita de outra pessoa; vantagem em Carisma (Enganação) para sustentar o disfarce."
      - level: 17
        features:
          - name: "Golpe Letal"
            description: "Se atingir uma criatura surpreendida, ela faz TS CON (CD 8 + mod. Des + prof.). Falhou: dobra o dano do ataque; sucesso: dano normal."
            rules:
              save:
                ability: "Constituição"
                dc_formula: "8 + proficiência + mod. Destreza"
              on_fail: "dobra o dano total do ataque"
              on_success: "dano normal"

  trapaceiro-arcano:
    name: "Trapaceiro Arcano"
    flavor: "Arquétipo do Ladino"
    description: "Roubo com truques arcanos, ilusão e encantamento."
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Conjuração (Trapaceiro Arcano)"
            description: "Conjura como mago com INT (CD = 8 + prof. + INT; ataque mágico = prof. + INT). Truques e magias da lista de mago, com foco em Ilusão/Encantamento. Pelo menos 2 das 3 magias iniciais devem ser de encantamento ou ilusão; toda nova magia aprendida deve ser dessas escolas, exceto as aprendidas no 8º, 14º e 20º nível, que podem ser de qualquer escola. Espaços recobrados em descanso longo."
            rules:
              spellcasting:
                type: "third"
                casting_ability: "Inteligência"
                save_dc: "8 + proficiência + mod. INT"
                attack_bonus: "proficiência + mod. INT"
                list: "wizard"
                school_restriction: ["Encantamento","Ilusão"]
                min_starting_spells_in_school: 2
                learn_any_school_levels: [8,14,20]
                slots_recover_on: "descanso longo"
                progression:
                  # nível de ladino → truques, magias conhecidas, espaços por nível de magia
                  3:  { cantrips: 3, spells_known: 3,  slots: { 1: 2 } }
                  4:  { cantrips: 3, spells_known: 4,  slots: { 1: 3 } }
                  5:  { cantrips: 3, spells_known: 4,  slots: { 1: 3 } }
                  6:  { cantrips: 3, spells_known: 4,  slots: { 1: 3 } }
                  7:  { cantrips: 3, spells_known: 5,  slots: { 1: 4, 2: 2 } }
                  8:  { cantrips: 3, spells_known: 6,  slots: { 1: 4, 2: 2 } }
                  9:  { cantrips: 3, spells_known: 6,  slots: { 1: 4, 2: 2 } }
                  10: { cantrips: 4, spells_known: 7,  slots: { 1: 4, 2: 3 } }
                  11: { cantrips: 4, spells_known: 8,  slots: { 1: 4, 2: 3 } }
                  12: { cantrips: 4, spells_known: 8,  slots: { 1: 4, 2: 3 } }
                  13: { cantrips: 4, spells_known: 9,  slots: { 1: 4, 2: 3, 3: 2 } }
                  14: { cantrips: 4, spells_known: 10, slots: { 1: 4, 2: 3, 3: 2 } }
                  15: { cantrips: 4, spells_known: 10, slots: { 1: 4, 2: 3, 3: 2 } }
                  16: { cantrips: 4, spells_known: 11, slots: { 1: 4, 2: 3, 3: 3 } }
                  17: { cantrips: 4, spells_known: 11, slots: { 1: 4, 2: 3, 3: 3 } }
                  18: { cantrips: 4, spells_known: 11, slots: { 1: 4, 2: 3, 3: 3 } }
                  19: { cantrips: 4, spells_known: 12, slots: { 1: 4, 2: 3, 3: 3, 4: 1 } }
                  20: { cantrips: 4, spells_known: 13, slots: { 1: 4, 2: 3, 3: 3, 4: 1 } }
          - name: "Mãos Mágicas Malabaristas"
            description: "Sua Mãos Mágicas pode ser invisível e realizar tarefas finas (bater carteiras, abrir fechaduras, desarmar armadilhas) a até 9 m; pode controlá-la com ação bônus."
            rules:
              invisible_mage_hand: true
              fine_tasks: ["bater carteiras","abrir fechaduras","desarmar armadilhas"]
              range_m: 9
              bonus_action_control: true
      - level: 9
        features:
          - name: "Emboscada Mágica"
            description: "Se estiver escondido ao conjurar, os alvos têm desvantagem nos testes de resistência contra suas magias."
      - level: 13
        features:
          - name: "Trapaceiro Versátil"
            description: "Ação bônus: designa criatura a 1,5 m da mão espectral; você tem vantagem nos ataques contra ela até o fim do turno."
            rules:
              bonus_action_mark_via_mage_hand: true
              advantage_against_marked_until_eot: true
      - level: 17
        features:
          - name: "Ladrão de Magia"
            description: "Reação ao ser alvo/incluído por uma magia: o conjurador faz um teste com o modificador de habilidade de conjuração dele contra sua CD de magia. Numa falha, você ignora o efeito e rouba o conhecimento da magia (de pelo menos 1º nível e de um nível que você possa conjurar; não precisa ser de mago); por 8 horas você pode conjurá-la com seus espaços e a criatura não pode conjurá-la nesse período. 1 uso, recupera em descanso longo."
            rules:
              reaction_trigger: "ser alvo/incluído por magia"
              oppose_check: "mod. conjuração do alvo vs sua CD de magia"
              on_fail: ["imunidade ao efeito","aprende a magia por 8h","alvo não pode conjurar a magia por 8h"]
              stolen_spell_min_level: 1
              stolen_spell_any_class: true
              uses: 1
              recharge: "descanso longo"

  # ——— OBRAS ORIGINAIS DA SUA MESA ———
  cacador-de-tesouros:
    name: "Caçador de Tesouros"
    flavor: "Arquétipo do Ladino"
    description: |
      Você se especializou em invadir e saquear locais perigosos. Esse arquétipo é seguido por diversos aventureiros em busca de tesouros antigos e que desejam evitar os habitantes e perigos existentes na maioria dos hostis ambientes subterrâneos e selvagens. Conforme progride, você desenvolve técnicas que permitem que você tome o caminho mais fácil e seguro para os grandes prêmios existentes em quase todas as masmorras e covis de criaturas poderosas que habitam no mundo.
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Invasor Profissional"
            description: |
              A partir do 3° nível, você aprimora sua perícia em abrir fechaduras e desarmar armadilhas em masmorras. Você adquire vantagem em testes de Inteligência (Investigação) feitos para encontrar armadilhas e em testes feitos com ferramentas de ladrão para abrir fechaduras e desarmar armadilhas.
          - name: "Sentir Armadilha"
            description: |
              No 3° nível, você se torna perito em evitar os perigos mais comuns elaborados pelos habitantes de masmorras contra invasores. Você adquire resistência a dano de armadilhas e tem vantagem em testes de resistência contra armadilhas.
      - level: 9
        features:
          - name: "Evitar o Perigo"
            description: |
              No 9° nível, você consegue passar despercebido por áreas em que existam inimigos, mas que não tenham notado sua presença, silenciosamente escalando as paredes ou até passando pelo teto. Você adquire deslocamento de escalada 6 metros e pode escalar qualquer superfície não-mágica e até andar de cabeça para baixo no teto sem precisar realizar um teste de Força (Atletismo). Você recebe vantagem em testes de Destreza (Furtividade) se usar seu movimento ou a ação de Disparada e terminar seu turno atrás de uma barreira que possa dar cobertura a você. Além disso, é impossível rastrear você por meios não-mágicos.
      - level: 13
        features:
          - name: "Encontrar Tesouro"
            description: |
              No 13° nível, você sabe exatamente onde procurar por itens valiosos quando está explorando e nada passa despercebido ao seu olhar ganancioso e ávido por riquezas. Você recebe +5 de bônus nos seus valores de Sabedoria (Percepção) e Inteligência (Investigação) passivos para encontrar tesouros e saberá que um objeto é mágico assim que tocar nele. Além disso, sempre que você passar a menos de 6 metros de um item mágico, obra de arte, gema ou item de valor que esteja escondido, você saberá que existe algo valioso escondido nas proximidades e poderá realizar um teste de Inteligência (Investigação) com vantagem para procurar esse tesouro.
      - level: 17
        features:
          - name: "Fuga Sobrenatural"
            description: |
              Ao atingir o 17° nível, mesmo nos raros momentos em que você é descoberto por seus inimigos, você consegue criar uma rota de fuga totalmente inesperada. Você pode usar sua ação para magicamente atravessar uma barreira não-mágica de até 1,5 metro de espessura, aparecendo no espaço desocupado mais próximo dessa barreira do outro lado dela. Se a barreira tiver mais de 1,5 metro de espessura, sua tentativa fracassa e você permanece no espaço atual. Além disso, você ganha vantagem em testes de habilidade e testes de resistência contra efeitos que lhe imponham as condições agarrado, impedido ou paralisado.

  dancarino-das-sombras:
    name: "Dançarino das Sombras"
    flavor: "Arquétipo do Ladino"
    description: |
      Você enveredou por um caminho sombrio e sobrenatural, adquirindo poderes direto da Umbra. Ao se tornar um dançarino das sombras você aprende a manipular a energia das trevas com uma maestria sem igual. Você pode praticamente sumir na escuridão e até mesmo usar o Plano das Sombras para surpreender seus inimigos.
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Camuflagem Sombria"
            description: |
              A partir do 3° nível, você aprende a usar as trevas para se camuflar. Você recebe vantagem em testes de Destreza (Furtividade) enquanto estiver em áreas de escuridão ou penumbra. Além disso, uma criatura sofre desvantagem nas jogadas de ataque contra você enquanto permanecer nessa área, mesmo que possa ver no escuro.
          - name: "Ver nas Trevas"
            description: |
              A partir do 3° nível, sua visão se adapta às trevas, o ambiente em que você se sente mais confortável. Você enxerga na penumbra a até 18 metros como se fosse luz plena, e no escuro como se fosse na penumbra.
      - level: 9
        features:
          - name: "Projeção Sombria"
            description: |
              No 9° nível, você desenvolve uma técnica letal quando surpreende um inimigo com um ataque vindo das trevas. Usando sua ação, enquanto estiver escondido em uma área de escuridão ou penumbra, você pode fazer com que sua mão entre na sombra que você ocupa e apareça em outra, que você possa ver, a até 15 metros de você. Você pode realizar um ataque corpo-a-corpo como parte dessa ação e isso não denunciará sua localização.
      - level: 13
        features:
          - name: "Viagem Umbral"
            description: |
              No 13° nível, você pode viajar através do Plano das Sombras. Com sua ação, você pode entrar na Umbra e sair dela no início do seu próximo turno. No Plano das Sombras, você se move até o dobro do seu deslocamento de caminhada e pode se mover através de criaturas e objetos do Plano Material como se eles fossem terreno difícil, mas você não pode terminar seu turno em um espaço ocupado. Enquanto estiver lá, você não pode atacar nem ser atacado por ninguém no Plano Material, exceto por uma criatura que possa acessar o Plano das Sombras.
              Você pode usar essa característica duas vezes. Após isso, você precisa terminar um descanso curto ou longo para usá-la novamente.
      - level: 17
        features:
          - name: "Forma de Sombra"
            description: |
              Ao atingir o 17° nível, você consegue se mesclar às trevas a um ponto em que é impossível distinguir o que é você e o que é escuridão. Com sua ação, você pode assumir uma forma sombria por 1 minuto que tem as seguintes características:
              • Você tem resistência a dano de concussão, cortante e perfurante de ataques não-mágicos.
              • Você pode usar a característica Viagem Umbral, uma vez por rodada, enquanto permanecer nessa forma.
              • Você tem vantagem nas jogadas de ataque enquanto você e o alvo estiverem em escuridão ou penumbra.
              • Sob luz plena, você tem desvantagem nas jogadas de ataque e nos testes de resistência.
              Após usar essa característica, você precisa terminar um descanso longo para usá-la novamente.

  face-fantasmagorica:
    name: "Face Fantasmagórica"
    flavor: "Arquétipo do Ladino"
    description: |
      Você ingressou no clã recluso de assassinos mascarados conhecido como Face Fantasmagórica. Esse clã secreto surgiu quando seu fundador fez uma barganha com seres das trevas para conseguir vingança contra seus inimigos. Desde então, ele recrutou um exército de assassinos de elite especializados em matar seus oponentes usando o medo. Ao ingressar nesse clã, você passa a usar uma máscara apavorante que permite que você penetre na mente dos seus inimigos, alcançando seus mais profundos medos e despertando seus pesadelos adormecidos.
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Presença Intimidante"
            description: |
              A partir do 3° nível, sua mera presença já se torna desconfortável para outras criaturas. Você se torna proficiente em Intimidação, se ainda não for. Além disso, você tem vantagem em testes de Carisma (Intimidação), porém você sofre desvantagem em testes de Carisma (Persuasão). Quando você for bem sucedido em intimidar uma criatura, ela ficará amedrontada em relação a você até o início do seu próximo turno.
          - name: "Ataque Apavorante"
            description: |
              No 3° nível, quando você atacar uma criatura surpresa, você consegue gelar o coração dela de medo. Se você estiver com sua máscara apavorante e realizar um ataque corpo-a-corpo contra uma criatura que não possa ver você, além de causar o dano normal, você pode deixar o alvo amedrontado. Você aparece na frente da criatura atingida e, se ela puder ver você, ela deve ser bem sucedida num teste de resistência de Sabedoria (CD 8 + seu bônus de proficiência + seu modificador de Carisma) ou ficará amedrontada em relação a você por 1 minuto. O alvo pode realizar um novo teste de resistência no final de cada turno dele, terminando o efeito com um sucesso. Se uma criatura for bem sucedida no teste de resistência, você não poderá usar essa característica nessa criatura novamente por 24 horas.
      - level: 9
        features:
          - name: "Pesadelo Furtivo"
            description: |
              No 9° nível, você consegue desaparecer da mente de uma criatura que esteja com medo de você, apavorando-a através de sons fantasmagóricos ou sopros gélidos. Enquanto uma criatura estiver amedrontada em relação a você, você pode, com uma ação bônus, realizar um teste de Destreza (Furtividade) CD 15, para ficar invisível para essa criatura. A criatura sofre desvantagem em testes de habilidade e jogadas de ataque mesmo que não possa ver você, mas ela pode se mover voluntariamente para uma posição que a faça terminar o turno mais próximo de você, já que não consegue te ver. Você aparece para a criatura se atacá-la ou conjurar uma magia nela.
      - level: 13
        features:
          - name: "Inversão do Medo"
            description: |
              No 13° nível, você se torna uma cria dos pesadelos. Você tem vantagem em testes de resistência para não ser amedrontado. Além disso, quando uma criatura que você possa ver conjurar uma magia ou usar uma habilidade que possa amedrontar você e você for bem sucedido no teste de resistência contra o efeito, se você estiver com sua máscara apavorante, você pode usar sua reação para amedrontar essa criatura. Ela deve ser bem sucedida num teste de resistência de Sabedoria (CD 8 + seu bônus de proficiência + seu modificador de Carisma) ou ficará amedrontada em relação a você por 1 minuto. O alvo pode realizar um novo teste de resistência no final de cada turno dele, terminando o efeito com um sucesso.
      - level: 17
        features:
          - name: "Pavor Atormentador"
            description: |
              Ao atingir o 17° nível, quando você amedronta uma criatura, o alvo pode literalmente morrer de medo devido aos pesadelos que tumultuam sua mente. Sempre que uma criatura terminar o turno dela amedrontada em relação a você por qualquer motivo, você pode usar sua reação para causar 4d10 de dano psíquico nela. A partir de agora, seus efeitos de medo são tão poderosos que até mesmo criaturas imunes à condição amedrontado podem ser afetadas por suas características de medo. Essas criaturas recebem vantagem nos testes de resistência para não serem amedrontadas.

  lamina-invisivel:
    name: "Lâmina Invisível"
    flavor: "Arquétipo do Ladino"
    description: |
      Você focou todo o seu treinamento em técnicas de combate utilizando facas, adagas e armas similares. Armado com suas adagas, você é mais letal que a maioria dos combatentes treinados. Usando movimentos rápidos com suas mãos enquanto brande suas adagas, você ludibria os sentidos dos seus adversários, deixando-os aturdidos conforme você desfere golpes precisos em sequência. Além de adquirir uma maestria incomparável no uso de lâminas leves, você aprende a enganar a visão dos seus inimigos enquanto dança no campo de batalha.
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Mão Invisível"
            description: |
              A partir do 3° nível, você desenvolve uma técnica que permite desferir um ataque tão rápido que o alvo se quer percebe que foi atingido. Com sua ação, realize um único ataque com uma arma leve perfurante contra uma criatura surpresa. Se você atingir, role o dano normalmente, porém, o alvo não saberá que sofreu esse dano até o final do seu próximo turno. Se você atacou o alvo enquanto estava escondido, esse ataque não revelará sua localização. Além disso, você recebe vantagem em todos os testes de Destreza (Prestidigitação) que fizer usando armas leves perfurantes.
          - name: "Lâmina Veloz"
            description: |
              Também a partir do 3° nível, você pode realizar um ataque repentino com uma arma escondida. Com uma ação bônus, você pode sacar uma arma leve perfurante escondida e realizar um ataque com ela. Você recebe vantagem nesse ataque e, se atingir, ele será considerado um Ataque Furtivo mesmo que você já tenha realizado seu Ataque Furtivo nessa rodada. Se a arma tiver a propriedade arremesso, você pode arremessá-la com esse ataque. Após usar essa característica, você precisa terminar um descanso curto ou longo para usá-la novamente. No 13° nível, você pode usar essa característica duas vezes antes de precisar terminar um descanso, mas não mais de uma vez por turno.
      - level: 9
        features:
          - name: "Ataque Extra"
            description: |
              No 9° nível, você pode atacar duas vezes, ao invés de uma, quando usar a ação de Ataque durante seu turno.
      - level: 13
        features:
          - name: "Desaparecer na Multidão"
            description: |
              No 13° nível, você consegue sumir em meio ao combate ao provocar uma distração. Se você usar seu movimento para passar por trás de uma criatura amigável ou um barreira que seja maior que você, você pode usar uma ação bônus para ser afetado pela magia invisibilidade por até 1 minuto. Diferente dos efeitos normais de invisibilidade, apenas as criaturas inimigas cuja barreira estava entre você e elas quando você usou essa característica não poderão ver você. Você aparece para essas criaturas se realizar um ataque, conjurar uma magia ou fizer qualquer barulho, como falar ou quebrar um frasco. Após usar essa característica, você precisa terminar um descanso curto ou longo para usá-la novamente.
      - level: 17
        features:
          - name: "Técnica da Lâmina Furtiva"
            description: |
              Ao atingir o 17° nível, você desenvolve uma técnica de combate que usa uma troca de mão incrivelmente rápida para ludibriar seus adversários. Durante um combate, você pode usar uma ação bônus para ativar a técnica da mão invisível por 1 minuto. Quando uma criatura realizar uma jogada de ataque corpo-a-corpo contra você a até 1,5 metro de você, você pode usar sua reação para realizar um teste de Destreza (Prestidigitação). Sua CA contra o ataque dessa criatura será igual ao resultado do seu teste de Destreza (Prestidigitação) ou sua CA normal, o que for maior. Se a criatura errar esse ataque, você pode imediatamente realizar um ataque corpo-a-corpo com uma arma leve perfurante que você estiver empunhando. Você recebe vantagem nesse ataque e, se atingir, ele será considerado um Ataque Furtivo. Esse ataque não conta na quantidade de Ataques Furtivos que você pode realizar numa rodada. Após usar essa característica, você precisa terminar um descanso longo para usá-la novamente.

  larapio-de-almas:
    name: "Larápio de Almas"
    flavor: "Arquétipo do Ladino"
    description: |
      Em algumas ocasiões, ladinos se aliam a necromantes e outros manipuladores da morte, até mesmo com mortos-vivos, quando veem vantagem nisso. Alguns desses ladinos se aprofundam ainda mais nessas alianças, ingressando no arquétipo Larápio de Almas. Esses ladinos aprendem a drenar a energia vital das criaturas e manipular essa energia em seu próprio benefício. No momento em que se torna um larápio de almas, o ladino deixa de se interessar pelas frivolidades mundanas e passa a querer apenas se apossar da vida dos outros.
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Furto de Vida"
            description: |
              A partir do 3° nível, você se torna capaz de drenar a energia vital das criaturas. Quando você atingir uma criatura viva com um ataque corpo-a-corpo que se qualifique para um ataque furtivo, você pode decidir não causar o dano extra do seu ataque furtivo. Ao invés de sofrer o dano extra, o alvo do seu ataque deve ser bem sucedido num teste de resistência de Constituição (CD 8 + seu bônus de proficiência + seu modificador de Carisma) ou sofrerá dano necrótico igual ao dano extra do seu ataque furtivo. Além disso, o máximo de pontos de vida do alvo é reduzido numa quantidade igual ao dano necrótico sofrido e você recupera uma quantidade de pontos de vida igual a esse dano. Um sucesso na resistência reduz o dano necrótico à metade e ignora a redução no máximo de pontos de vida do alvo. Você não recupera pontos de vida se o alvo obtiver um sucesso na resistência. Após usar essa característica, você precisa terminar um descanso curto ou longo para usá-la novamente.
          - name: "Dependência de Vida"
            description: |
              Também no 3° nível, você não sente mais necessidade de se alimentar ou descansar como um ser vivo normal. Você não precisa mais comer, beber ou dormir. Você ainda precisa realizar um descanso (mas não precisa dormir) para recuperar pontos de vida ou características de classe que exijam terminar um descanso longo. Uma vez por dia, você precisa drenar a energia vital de uma criatura humanoide que esteja inconsciente, porém viva, através do seu Furto de Vida. Se não fizer isso, você sofrerá desvantagem nas suas jogadas de ataque e testes de habilidade até sugar a energia de uma criatura viva dessa forma.
      - level: 9
        features:
          - name: "Sentir Vida"
            description: |
              No 9° nível, você consegue sentir a presença de criaturas vivas e pode definir o estado físico delas. Com sua ação, você pode realizar um teste de Sabedoria (Percepção) CD 15, para descobrir quantas criaturas vivas existem a até 18 metros de você. Se você se concentrar em uma criatura específica no alcance, no seu turno subsequente, você saberá se a criatura está com mais ou menos da metade do seu máximo de pontos de vida.
      - level: 13
        features:
          - name: "Drenar Energia Mística"
            description: |
              No 13° nível, você aprimora sua habilidade de furtar a energia vital de um ser vivo e passa a ser capaz de drenar sua energia mística também. Quando você atingir uma criatura viva com um ataque corpo a corpo que se qualifique para um ataque furtivo, você pode decidir não causar o dano extra do seu ataque furtivo. Ao invés de sofrer o dano extra, o alvo do seu ataque deve ser bem sucedido num teste de resistência de Carisma (CD 8 + seu bônus de proficiência + seu modificador de Carisma) ou perderá um espaço de magia disponível de nível mais alto, até o máximo de 5° nível. Você armazena a energia drenada na arma que atingiu a criatura. Durante 1 minuto, seus ataques com essa arma são considerados mágicos com o propósito de ultrapassar resistência ou imunidade a ataques e danos não-mágicos. Além disso, você recebe um bônus nas suas jogadas de dano com essa arma igual ao nível do espaço de magia drenado. Após usar essa característica, você precisa terminar um descanso curto ou longo para usá-la novamente.
      - level: 17
        features:
          - name: "Usurpar a Alma"
            description: |
              Ao atingir o 17° nível, você se torna capaz de drenar a alma das criaturas que tenham uma centelha de vida fraca. Quando você atinge uma criatura viva que esteja com menos de 40 pontos de vida, com um ataque furtivo com uma arma corpo a corpo, você pode drenar a alma dessa criatura, se fortalecendo no processo. O alvo deve ser bem sucedido num teste de resistência de Constituição (CD 8 + seu bônus de proficiência + seu modificador de Carisma) ou morrerá instantaneamente. Mesmo que passe na resistência, o alvo ainda sofrerá o dano do seu ataque furtivo normalmente. Após matar uma criatura dessa forma, você recebe vantagem nos seus testes de resistência e testes de habilidade até o final do seu próximo turno.

  mimetizador:
    name: "Mimetizador"
    flavor: "Arquétipo do Ladino"
    description: |
      Um ladino que segue o arquétipo Mimetizador não rouba ou furta bens, ele copia as habilidades possuídas por outras criaturas. Com uma compreensão além do normal sobre treinamento e estudo, um mimetizador consegue entender a forma como uma criatura acessa e adquire uma determinada habilidade apenas observando. Com uma capacidade sobrenatural, ele simula com perfeição a ação que acabou de ver e pode, inclusive, privar a criatura de usar sua própria habilidade por um período ao atingir um nível de compreensão muito elevado.
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Proficiência Adicional (Mimetizador)"
            description: |
              No 3° nível, quando você escolhe esse arquétipo, você adquire proficiência em Enganação e Intuição, se ainda não tiver.
          - name: "Copiar Habilidade"
            description: |
              A partir do 3° nível, você adquire a capacidade de simular uma habilidade que você vê em ação. Quando você vir uma criatura de nível de desafio igual ou inferior à metade do seu nível de ladino usando uma característica ou traço, você pode realizar um teste de Sabedoria (Intuição) CD 10 para copiá-lo. Se for bem sucedido, você copia a habilidade e pode usá-la por 1 hora. Você não pode copiar traços de uso limitado (que possuam usos diários ou recarregáveis) com essa característica. Apenas características que usem ações, reações ou ações bônus podem ser copiadas. Você também não pode copiar tipos de deslocamento como voo ou escavar, ou traços passivos como visão no escuro, imunidades ou resistências. A partir do 11° nível, você pode copiar traços passivos como imunidades, sentidos ou qualquer outro traço que não exija algum tipo de ação para funcionar. Após usar essa característica, você precisa terminar um descanso curto ou longo para usá-la novamente.
      - level: 9
        features:
          - name: "Simulação Avançada"
            description: |
              No 9° nível, você consegue simular características mais exclusivas de outras criaturas. Quando você vir uma criatura de nível de desafio igual ou inferior à metade do seu nível de ladino usando uma característica ou traço de uso limitado, você pode realizar um teste de Sabedoria (Intuição) CD 15 para tentar compreender como essa habilidade funciona. Se for bem sucedido, você poderá ativar a habilidade copiada uma vez a qualquer momento, num período de 1 hora. Não é possível simular a característica Conjuração através dessa característica. Após usá-la, você precisa terminar um descanso curto ou longo para usar Simulação Avançada novamente.
      - level: 13
        features:
          - name: "Simular Conjuração"
            description: |
              No 13° nível, ao observar atentamente uma criatura conjurando uma magia, você consegue compreender os gestos e verbalizações da magia. Quando você vir uma criatura conjurando uma magia que pertença a um nível igual ou inferior ao seu nível de ladino dividido por quatro, você pode realizar um teste de Sabedoria (Intuição) CD 15 + nível da magia para compreendê-la. Se você for bem sucedido, poderá conjurar a magia, uma vez, a qualquer momento, num período de 1 hora. Você precisa fornecer os componentes materiais para essa magia, se ela possuir algum. Após usar essa característica, você precisa terminar um descanso curto ou longo para usá-la novamente.
      - level: 17
        features:
          - name: "Usurpar Característica"
            description: |
              Ao atingir o 17° nível, você pode privar uma criatura de uma característica que ela possua, quando você simulá-la. Quando você vir uma criatura usando uma característica que você possa copiar com uma de suas características de mimetizador, você pode, no seu turno, usar sua ação para tocar essa criatura e realizar o teste de Sabedoria (Intuição) com a CD apropriada. Se você obtiver sucesso, o alvo deve realizar um teste de resistência de Carisma (CD 8 + seu bônus de proficiência + seu modificador de Carisma). Se fracassar, ela não poderá usar a característica que você copiou por 1 hora. Copiar uma magia impede a criatura alvo de conjurar essa magia específica por 1 hora. Você pode usar essa característica duas vezes. Após isso, você precisa terminar um descanso longo para usá-la novamente.

wizard:
  # ——— ESCOLAS (PHB) ———
    escola-de-abjuracao:
      name: "Escola de Abjuração"
      flavor: "Tradição Arcana"
      description: "Proteção mágica e negação; molda barreiras e resiste a magias hostis."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Abjuração Instruída (Especialista)"
              description: "Copiar magias de abjuração no grimório custa metade do ouro e tempo."
              rules: { savant: { school: "abjuração", copy_cost_multiplier: 0.5, copy_time_multiplier: 0.5 } }
            - name: "Proteção Arcana"
              description: "Ao conjurar uma abjuração de 1º+ nível, cria/recupera um manto que absorve dano."
              rules:
                ward_init_hp: "2 × seu nível de mago + mod. INT"
                ward_recover_on_abjuration_cast: "2 × nível da magia"
        - level: 6
          features:
            - name: "Proteção Projetada"
              description: "Pode direcionar sua Proteção Arcana para reduzir dano de um aliado a até 9 m."
        - level: 10
          features:
            - name: "Abjuração Aprimorada"
              description: "Bônus de proficiência em testes feitos por magias de abjuração (ex.: dissipar, contra-magia)."
        - level: 14
          features:
            - name: "Resistência à Magia"
              description: "Vantagem em testes de resistência contra magias e resistência a dano de magias."

    escola-de-adivinhacao:
      name: "Escola de Adivinhação"
      flavor: "Tradição Arcana"
      description: "Vê o possível e dobra o destino com presságios."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Adivinhação Instruída (Especialista)"
              description: "Copiar magias de adivinhação custa metade do ouro e tempo."
              rules: { savant: { school: "adivinhação", copy_cost_multiplier: 0.5, copy_time_multiplier: 0.5 } }
            - name: "Prodígio"
              description: "Rola 2d20 após um descanso longo e pode substituir jogadas (sua ou de criaturas) por esses resultados."
              rules: { portent_dice: 2 }
        - level: 6
          features:
            - name: "Especialista em Adivinhação"
              description: "Ao conjurar adivinhação de 2º+ nível, recupera 1 espaço de magia de nível inferior."
        - level: 10
          features:
            - name: "O Terceiro Olho"
              description: "Ativa 1 sentido extra até o próximo descanso longo (ex.: visão no escuro, ver invisível, ler emoções)."
        - level: 14
          features:
            - name: "Prodígio Maior"
              description: "Portento gera 3 dados em vez de 2."
              rules: { portent_dice: 3 }

    escola-de-conjuracao:
      name: "Escola de Conjuração"
      flavor: "Tradição Arcana"
      description: "Traz coisas e seres; dobra o espaço."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Conjuração Instruída (Especialista)"
              description: "Copiar magias de conjuração custa metade do ouro e tempo."
              rules: { savant: { school: "conjuração", copy_cost_multiplier: 0.5, copy_time_multiplier: 0.5 } }
            - name: "Conjuração Menor"
              description: "Cria temporariamente um objeto não mágico simples e portátil."
        - level: 6
          features:
            - name: "Transposição Benigna"
              description: "Teleporta-se (ou troca de lugar com aliado/servo conjurado) como ação; recarrega ao conjurar conjuração."
        - level: 10
          features:
            - name: "Conjuração Focada"
              description: "Sua concentração em magias de conjuração não é quebrada por dano."
        - level: 14
          features:
            - name: "Invocações Resistentes"
              description: "Criaturas que você conjura ganham PV temporários significativos."
              rules: { temp_hp_summons: 30 }

    escola-de-encantamento:
      name: "Escola de Encantamento"
      flavor: "Tradição Arcana"
      description: "Charme, fascínio e dom da persuasão mental."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Encantamento Instruído (Especialista)"
              description: "Copiar magias de encantamento custa metade do ouro e tempo."
              rules: { savant: { school: "encantamento", copy_cost_multiplier: 0.5, copy_time_multiplier: 0.5 } }
            - name: "Olhar Hipnotizante"
              description: "Ação para hipnotizar criatura adjacente (TS Sab). Falha: enfeitiçada, incapacitada e deslocamento 0 enquanto sustentar; termina se levar dano."
        - level: 6
          features:
            - name: "Encanto Instintivo"
              description: "Reação para redirecionar um ataque que o alvo faria em você (TS Sab resiste)."
        - level: 10
          features:
            - name: "Dividir Encantamento"
              description: "Encantamentos de alvo único podem afetar 2 alvos, se ambos no alcance."
        - level: 14
          features:
            - name: "Alterar Memórias"
              description: "Ao terminar um encantamento, pode editar lembranças recentes dentro dos limites da magia."

    escola-de-evocacao:
      name: "Escola de Evocação"
      flavor: "Tradição Arcana"
      description: "Energia bruta canalizada em rajadas, raios e explosões."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Evocação Instruída (Especialista)"
              description: "Copiar magias de evocação custa metade do ouro e tempo."
              rules: { savant: { school: "evocação", copy_cost_multiplier: 0.5, copy_time_multiplier: 0.5 } }
            - name: "Esculpir Magias"
              description: "Ao evocar área, escolhe 1 + nível da magia em criaturas visíveis; elas passam automaticamente no teste e sofrem 0 no sucesso."
        - level: 6
          features:
            - name: "Truque Potente"
              description: "Se um alvo passa no teste contra seu truque que causa dano, ainda sofre metade do dano."
        - level: 10
          features:
            - name: "Evocação Potencializada"
              description: "Adiciona seu mod. INT ao dano de 1 magia de evocação por rodada."
        - level: 14
          features:
            - name: "Sobrecarga"
              description: "Ao conjurar uma magia de mago de 1º–5º nível (exceto truques) que cause dano, ela causa dano máximo. A 1ª vez por descanso longo é gratuita; reusos antes do descanso longo causam a você 2d12 de dano necrótico por nível da magia (acumula +1d12 por reuso; ignora resistência/imunidade)."
              rules:
                first_use_per_long_rest_free: true
                reuse_necrotic_damage: "2d12 por nível da magia (+1d12 por reuso adicional antes do descanso longo)"
                ignores_resistance_immunity: true

    escola-de-ilusao:
      name: "Escola de Ilusão"
      flavor: "Tradição Arcana"
      description: "Engana sentidos e refaz a ‘realidade’ com truques."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Ilusão Instruída (Especialista)"
              description: "Copiar magias de ilusão custa metade do ouro e tempo."
              rules: { savant: { school: "ilusão", copy_cost_multiplier: 0.5, copy_time_multiplier: 0.5 } }
            - name: "Ilusão Menor Aprimorada"
              description: "Ganha o truque ilusão menor (se não tiver) e pode criar imagem + som no mesmo lançamento."
        - level: 6
          features:
            - name: "Ilusões Moldáveis"
              description: "Pode remodelar uma ilusão com duração enquanto ela durar."
        - level: 10
          features:
            - name: "Eu Ilusório"
              description: "Reação para fazer um ataque contra você errar (consome a duplicata); 1/descanso curto ou longo."
        - level: 14
          features:
            - name: "Realidade Ilusória"
              description: "Torna parte de uma ilusão um objeto real e inofensivo por 1 min (sem causar dano direto)."

    escola-de-necromancia:
      name: "Escola de Necromancia"
      flavor: "Tradição Arcana"
      description: "Vida e morte como recursos; fortalece mortos-vivos."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Necromancia Instruída (Especialista)"
              description: "Copiar magias de necromancia custa metade do ouro e tempo."
              rules: { savant: { school: "necromancia", copy_cost_multiplier: 0.5, copy_time_multiplier: 0.5 } }
            - name: "Colheita Sinistra"
              description: "Quando mata com magia de 1º+ nível, cura PV = 2× nível da magia (3× se necromancia). Não funciona com construtos/mortos-vivos."
        - level: 6
          features:
            - name: "Escravos Mortos-Vivos"
              description: "Adiciona animar mortos ao grimório (se não tiver). animar mortos afeta +1 corpo; mortos-vivos criados por suas necromancias ficam mais fortes."
              rules:
                undead_bonuses:
                  - "PV máximos + seu nível de mago"
                  - "Adicionam seu bônus de proficiência às jogadas de dano"
          grants:
            spells:
              always_prepared:
                6: ["animate-dead"]
        - level: 10
          features:
            - name: "Acostumado à Morte-Vida"
              description: "Resistência a necrótico; seu máximo de PV não pode ser reduzido."
        - level: 14
          features:
            - name: "Comandar Mortos-Vivos"
              description: "Ação: impõe TS Carisma em morto-vivo; falha → você o controla até usar a habilidade novamente (inteligentes têm vantagens)."

    escola-de-transmutacao:
      name: "Escola de Transmutação"
      flavor: "Tradição Arcana"
      description: "Muda matéria, forma e propriedades; ferramenta versátil."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Transmutação Instruída (Especialista)"
              description: "Copiar magias de transmutação custa metade do ouro e tempo."
              rules: { savant: { school: "transmutação", copy_cost_multiplier: 0.5, copy_time_multiplier: 0.5 } }
            - name: "Alquimia Menor"
              description: "Altera temporariamente material de um objeto não mágico (madeira/pedra/ferro/cobre/prata)."
        - level: 6
          features:
            - name: "Pedra de Transmutador"
              description: "Cria uma pedra com um benefício ativo enquanto portada; troca o efeito ao conjurar transmutação de 1º+."
              rules:
                options:
                  - "Visão no escuro 18 m"
                  - "+3 m de deslocamento"
                  - "Proficiência em TS de Constituição"
                  - "Resistência a ácido/frio/fogo/relâmpago/trovão (escolha 1)"
        - level: 10
          features:
            - name: "Metamorfo"
              description: "Adiciona metamorfose ao grimório (se não tiver); 1×/descanso (curto ou longo) pode conjurá-la sem espaço, em si, CR 1 ou menor."
          grants:
            spells:
              always_prepared:
                10: ["polymorph"]
        - level: 14
          features:
            - name: "Mestre Transmutador"
              description: "Consome a pedra para: transmutar objeto; panaceia; reviver mortos (recentes); restaurar juventude."

    # ——— TRADIÇÕES ORIGINAIS DA SUA MESA ———
    arquearia-arcana:
      name: "Arquearia Arcana"
      flavor: "Tradição Arcana"
      description: "Mescla arco e magia arcana de precisão — herança élfica de arqueiros-magos. Exclusiva para elfos e meio-elfos (a critério do Mestre)."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Estilo de Arquearia"
              description: "Ganha proficiência com arcos curtos e longos e proficiência em Percepção (se já não tiver)."
            - name: "Tiro Arcano"
              description: "Com espaço de magia de 1º+ disponível, usa ação bônus para imbuir o próximo ataque à distância com arco de poder mágico (conta como mágico para resistência/imunidade) e +dano igual ao nível do maior espaço disponível. No Nv 7, com espaço de 4º+ disponível, cria flechas de pura energia (dispensa munição mundana; todos os ataques de arco contam como mágicos)."
              rules:
                action: "ação bônus"
                requires: "espaço de magia disponível"
                bonus_damage: "nível do maior espaço de magia disponível"
                level_7_upgrade: "com espaço 4º+ disponível, dispensa munição mundana e todos os ataques de arco contam como mágicos"
          grants:
            proficiencies:
              weapons: ["arco-curto","arco-longo"]
              skills: ["Percepção"]
        - level: 6
          features:
            - name: "Ataque Extra"
              description: "Pode atacar duas vezes, em vez de uma, sempre que usar a ação de Ataque no seu turno."
              rules: { attacks_per_attack_action: 2 }
        - level: 10
          features:
            - name: "Flecha Encantada"
              description: "Ao usar a ação de Ataque com arco, usa ação bônus para imbuir o próximo ataque com uma magia de mago de alcance de toque que afete 1 criatura; se acertar, a magia é descarregada no alvo. Erro desperdiça a magia. 2 usos, recuperados em descanso curto ou longo."
              rules:
                action: "ação bônus"
                uses: 2
                recharge: "descanso curto ou longo"
        - level: 14
          features:
            - name: "Chuva de Flechas"
              description: "Ação: gasta espaço de magia de 5º+ para 1 ataque de arco contra cada criatura no alcance; ou 5 ataques contra um único alvo. Sem desvantagem por distância longa. Recupera em descanso curto ou longo."
              rules:
                action: "ação"
                slot_required: "5º+"
                recharge: "descanso curto ou longo"

    iniciacao-demonologia:
      name: "Iniciação em Demonologia"
      flavor: "Tradição Arcana"
      description: "Especialista nos planos inferiores e nas criaturas que os habitam (demônios, diabos, yugoloths); estudo e controle do ocultismo."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Conhecimento Obscuro"
              description: "Vantagem em testes de Inteligência sobre o Inferno, o Abismo ou corruptores."
            - name: "Ludibriar Corruptor"
              description: "Ganha proficiência em Persuasão e Enganação; vantagem em Carisma (Persuasão/Enganação) ao lidar com corruptores. Corruptores têm desvantagem em TR para não serem enfeitiçados por você."
          grants:
            languages:
              choose: 1
              options: ["Abissal","Infernal"]
            proficiencies:
              skills: ["Persuasão","Enganação"]
        - level: 6
          features:
            - name: "Convocação Vil"
              description: "Ação: gasta espaço de magia de 3º nível e faz um ritual de 1 hora para invocar um corruptor de ND 4 ou inferior cujo nome verdadeiro conheça; ele fica sob seu controle (como dominar monstro) enquanto mantiver concentração, por até 8 horas. Sem o nome verdadeiro, o corruptor é indiferente e pode barganhar. Espaços superiores aumentam o ND máximo em +1 por nível acima do 3º. No Nv 13, um corruptor invocado e enfeitiçado revela seu nome verdadeiro voluntariamente."
              rules:
                action: "ação"
                ritual: "1 hora"
                slot_required: "3º"
                max_cr: 4
                higher_slots: "+1 no ND máximo por nível de espaço acima do 3º"
        - level: 10
          features:
            - name: "Resistir à Corrupção"
              description: "Vantagem em TRs e testes de habilidade contra ataques, magias e efeitos mágicos de corruptores."
        - level: 14
          features:
            - name: "Líder da Cabala"
              description: "Adquire seguidores fanáticos (cultistas leais) em número igual ao nível de mago ÷ 3 (inicialmente 4). Pode liderar um círculo ritualístico com eles para potencializar a Convocação Vil: cada seguidor gasta um espaço de 2º e você um de 3º+; o ND máximo do corruptor sobe +1 por seguidor participante. Ao surgir o corruptor, cada seguidor faz TR de Constituição CD 15 ou morre."
              rules:
                followers: "nível de mago ÷ 3 (mín. 4)"
                ritual_save: "TR de Constituição CD 15"

    maestria-alquimica:
      name: "Maestria Alquímica"
      flavor: "Tradição Arcana"
      description: "Magos que dominam alquimia e transmutação da matéria — poções, bombas e itens exclusivos."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Experimentos Alquímicos"
              description: "Proficiência (e vantagem) com suprimentos/ferramentas de alquimista. Cria itens alquímicos mais potentes que os de mercado: teste CD 15 e 1 dia de trabalho por 25 po do custo. Ex.: Ácido (2d6 + INT), Antídoto, Fogo Alquímico (1d4 + INT, CD 12), Veneno Básico (1d4 + INT, CD 12), e novos itens (Bastão de Fumaça, Bastão Solar, Bolsa de Cola, Pedra Trovão)."
              rules:
                tool_advantage: "vantagem em testes com ferramentas de alquimista"
                craft_check: "CD 15, 1 dia por 25 po do custo"
            - name: "Familiar Homúnculo"
              description: "Constrói um homúnculo (via convocar familiar, usando o próprio sangue) que age como familiar inteligente, partilha sua proficiência em ferramentas de alquimista e reduz pela metade o tempo de criação dos seus itens. Se morrer, precisa de descanso longo para refazê-lo."
              rules:
                craft_time_multiplier: 0.5
                recreate: "descanso longo se o homúnculo morrer"
          grants:
            proficiencies:
              tools: ["Kit de Alquimista"]
            spells:
              always_prepared:
                2: ["find-familiar"]
        - level: 6
          features:
            - name: "Criar Fórmulas"
              description: "Aprende fórmulas para criar poções mágicas (paga metade do custo da fórmula). Começa com 2 fórmulas (comum + incomum); ganha rara no Nv 9, muito rara no Nv 13 e lendária no Nv 17."
              rules:
                cost_multiplier: 0.5
                formulas: "2 iniciais (comum + incomum); rara Nv 9, muito rara Nv 13, lendária Nv 17"
        - level: 10
          features:
            - name: "Bombas Alquímicas"
              description: "Cria bombas arcanas (1 hora cada; CD = CD das suas magias de mago): Pegajosa (impede, TR Des), Fumegante (escuridão/asfixia), Ácida (4d6+ ácido), Tóxica (6d6 veneno), Flamejante (8d6 fogo). Quantidade = mod. INT (mín. 1), recuperada em descanso longo."
              rules:
                save_dc: "CD das suas magias de mago"
                uses: "mod. INT (mín. 1)"
                recharge: "descanso longo"
        - level: 14
          features:
            - name: "Magnum Opus"
              description: "Desvenda a fórmula da Pedra Filosofal (item lendário; criação trabalhosa, com componentes e condições a critério do Mestre). A pedra tem 4 cargas para transmutar metais (cobre→prata→ouro→platina)."
              rules:
                stone_charges: 4

    maestria-dos-automatos:
      name: "Maestria dos Autômatos"
      flavor: "Tradição Arcana"
      description: "Dedica a arte arcana à criação e animação de autômatos — constructos de materiais mundanos similares a seres vivos."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Engenheiro Perspicaz"
              description: "Adiciona o truque consertar (não conta no limite de truques) e ganha proficiência nas ferramentas de artesão: coureiro, entalhador, ferreiro e funileiro."
            - name: "Construir Autômato"
              description: "Fabrica um autômato (besta/humanoide/gigante/monstruosidade) de ND ≤ metade do nível de mago, gastando 1 dia por 50 po do custo e um espaço de magia do nível indicado na tabela para mantê-lo ativo (renovado a cada descanso longo). O autômato vira tipo Constructo (INT 3, SAB 11, CAR 5; imune a psíquico/veneno e a amedrontar/enfeitiçar/exausto/envenenado; visão no escuro 18 m). Apenas 1 autômato ativo por vez. Conserta-o com a magia consertar (1 po → 1 PV)."
              rules:
                max_cr: "metade do nível de mago"
                craft_cost: "1 dia por 50 po do custo"
                upkeep: "1 espaço de magia (renovado a cada descanso longo)"
                active_limit: 1
          grants:
            proficiencies:
              tools:
                - "Ferramentas de Coureiro"
                - "Ferramentas de Entalhador"
                - "Ferramentas de Ferreiro"
                - "Ferramentas de Funileiro"
            spells:
              always_prepared:
                2: ["mending"]
        - level: 6
          features:
            - name: "Reconstrução Mística"
              description: "Ação: toca um constructo seu e gasta espaço de magia de 1º para curar 1d8 + mod. INT PV (+1d8 por nível de espaço acima do 1º)."
              rules:
                action: "ação"
                slot_required: "1º"
                healing: "1d8 + mod. INT (+1d8 por nível de espaço acima do 1º)"
        - level: 10
          features:
            - name: "Reforçar Autômato"
              description: "Seus autômatos ganham resistência a concussão/cortante/perfurante de ataques não-mágicos (não-adamante) e vantagem em TR contra magias e efeitos mágicos."
        - level: 14
          features:
            - name: "Convocar Constructo"
              description: "Ação: gasta um espaço de magia um nível acima do necessário para manter o autômato para teletransportá-lo e ativá-lo a até 1,5 m de você (mesmo plano). O autômato anterior fica inativo e você passa a controlar o convocado."
              rules:
                action: "ação"
                slot_required: "um nível acima do necessário para manter o autômato"

    navegacao-planar:
      name: "Navegação Planar"
      flavor: "Tradição Arcana"
      description: "Viajantes dos planos — magos que estudam e atravessam os outros planos de existência."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Estudioso dos Planos"
              description: "Proficiência em Arcanismo (se já não tiver) e vantagem em testes de Inteligência (Arcanismo) sobre locais e criaturas de planos diferentes do Material."
            - name: "Afinidade Planar"
              description: "Vantagem em TRs para suportar efeitos adversos de outros planos (vento psíquico no Astral, ciclones de éter no Etéreo, calor extremo no Plano do Fogo, etc.)."
          grants:
            proficiencies:
              skills: ["Arcanismo"]
        - level: 6
          features:
            - name: "Acesso Planar"
              description: "Ritual de 10 min consumindo um espaço de 3º nível: envia você e até 4 criaturas voluntárias (de mãos dadas) a Faéria ou à Umbra por até 1 hora (+1 h por nível acima do 3º). O retorno ao Material atordoa todos até o fim do próximo turno. Recupera em descanso longo; no Nv 14, 2 usos por descanso longo."
              rules:
                ritual: "10 minutos"
                slot_required: "3º"
                targets: "você + até 4 criaturas voluntárias"
                recharge: "descanso longo (2 usos no Nv 14)"
        - level: 10
          features:
            - name: "Acesso Planar Maior"
              description: "Pode usar o Acesso Planar para qualquer plano que conheça, gastando espaço de 5º nível (planos diferentes de Faéria/Umbra), aparecendo em local aleatório por 1 hora (+1 h por nível acima do 5º)."
              rules:
                slot_required: "5º"
        - level: 14
          features:
            - name: "Viajante dos Planos"
              description: "Resistência a todo dano de efeitos planares adversos (como os da Afinidade Planar). Ao viajar (por magia ou Acesso Planar), pode chegar ao local exato desejado mesmo sem nunca ter ido lá. Permanência ilimitada. Fora do Material: vantagem em TR contra magias/efeitos de criaturas nativas e resistência a concussão/cortante/perfurante não-mágico dessas criaturas."

    teurgia-mistica:
      name: "Teurgia Mística"
      flavor: "Tradição Arcana"
      description: "Funde magia arcana e divina — magos devotos que ganham poderes de uma divindade."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Proficiência Adicional"
              description: "Ganha proficiência com armaduras leves e na perícia Religião."
            - name: "Adepto Divino"
              description: "Adota uma divindade e usa um símbolo sagrado como foco de conjuração. Escolhe 2 truques de clérigo como truques de mago. Magias de 1º a 5º nível da lista de clérigo passam a contar como magias de mago e podem ser copiadas ao grimório, até o limite de mod. SAB + metade do nível de mago (mín. 1)."
              rules:
                cleric_cantrips: 2
                cleric_spells: "1º–5º da lista de clérigo contam como magias de mago"
                spellbook_limit: "mod. SAB + metade do nível de mago (mín. 1)"
          grants:
            proficiencies:
              armor: ["armadura leve"]
              skills: ["Religião"]
        - level: 6
          features:
            - name: "Canalizar Divindade: Misticismo Divino"
              description: "Ao conjurar (no turno) uma magia de mago com espaço de até 2º nível, gasta Canalizar Divindade para conjurar, como ação bônus, uma magia adicional (de tempo de ação) com espaço de até 1º — desde que adicionada ao grimório via Adepto Divino. Escala: Nv 12 (até 4º + até 2º), Nv 18 (até 6º + até 3º). Recupera em descanso curto ou longo."
              rules:
                action: "ação bônus"
                uses: 1
                recharge: "descanso curto ou longo"
                scaling: "Nv 12 (até 4º + até 2º), Nv 18 (até 6º + até 3º)"
        - level: 10
          features:
            - name: "Recuperação Divina"
              description: "Ação bônus: gasta espaço de 3º+ para recuperar 1 uso de Canalizar Divindade."
              rules:
                action: "ação bônus"
                slot_required: "3º+"
        - level: 14
          features:
            - name: "Intervenção Divina"
              description: "Ação: roga à divindade (rola d100; ≤ nível de mago → ela intervém, com efeito escolhido pelo Mestre, geralmente uma magia de clérigo/domínio). Sucesso bloqueia o reuso por 7 dias; falha permite tentar de novo após descanso longo."
              rules:
                action: "ação"
                success: "d100 ≤ nível de mago"

warlock:
  # ——— REGRAS GERAIS DO BRUXO ———
  rules:
    spellcasting:
      casting_ability: "Carisma"
      save_dc: "8 + proficiência + mod.CAR"
      attack_bonus: "proficiência + mod.CAR"
      preparation: "magias conhecidas (não prepara por dia)"
    pact_magic:
      slots_same_level: true
      recover_on: ["descanso curto","descanso longo"]
      note: "Usa espaços de magia do mesmo nível; ganha 'Arcanismo Místico' nos níveis altos (magias 6º–9º 1/dia)."
    expanded_spells:
      note: "As listas do patrono ampliam as opções de APRENDER magias de bruxo; não são 'sempre preparadas'."

  # ——— PATRONOS (PHB) ———
  arquifada:
    name: "Arquifada"
    flavor: "Patrono Transcendental"
    description: "Senhores feéricos caprichosos; encantos, ilusões e desaparecimentos."
    choose_level: 1
    expanded_spells:
      1: ["fogo das fadas","sono"]
      2: ["acalmar emoções","força fantasmagórica"]
      3: ["piscar","ampliar plantas"]
      4: ["dominar besta","invisibilidade maior"]
      5: ["dominar pessoa","similaridade"]
    levels:
      - level: 1
        features:
          - name: "Presença Feérica"
            description: "Ação: cubo 3 m; criaturas fazem TS Sab (CD magias). Falha: enfeitiçado ou amedrontado (sua escolha) até o início do seu próximo turno."
            rules:
              uses: { per: "descanso curto/longo", value: 1 }
      - level: 6
        features:
          - name: "Névoa de Fuga"
            description: "Reação ao sofrer dano: teleporta até 18 m e fica invisível até o início do seu próximo turno (ou até atacar/conjurar)."
            rules:
              uses: { per: "descanso curto/longo", value: 1 }
      - level: 10
        features:
          - name: "Defesa Sedutora"
            description: "Imunidade a enfeitiçado; ao tentarem enfeitiçá-lo, reação: alvo faz TS Sab ou fica enfeitiçado por 1 min."
      - level: 14
        features:
          - name: "Delírio Sombrio"
            description: "Ação: 1 alvo a 18 m faz TS Sab; falha → preso em reino ilusório (enfeitiçado ou amedrontado, sua escolha) por até 1 min; requer concentração."
            rules:
              uses: { per: "descanso curto/longo", value: 1 }

  corruptor:
    name: "Corruptor"
    flavor: "Patrono Transcendental"
    description: "Pactos infernais; sobrevivência implacável e fogo devastador."
    choose_level: 1
    expanded_spells:
      1: ["mãos flamejantes","comando"]
      2: ["cegueira/surdez","raio ardente"]
      3: ["bola de fogo","névoa fétida"]
      4: ["escudo de fogo","muralha de fogo"]
      5: ["coluna de chamas","consagrar"]
    levels:
      - level: 1
        features:
          - name: "Bênção do Obscuro"
            description: "Ao reduzir uma criatura hostil a 0 PV: ganha PV temporários = CAR + nível de bruxo (mínimo 1)."
      - level: 6
        features:
          - name: "Sorte do Próprio Obscuro"
            description: "1/descanso: após rolar (antes do resultado), adiciona 1d10 a 1 teste de habilidade ou resistência."
      - level: 10
        features:
          - name: "Resistência Demoníaca"
            description: "Após um descanso curto ou longo, escolhe 1 tipo de dano; tem resistência a ele até escolher outro. Dano de armas mágicas ou de prata ignora essa resistência."
      - level: 14
        features:
          - name: "Lançar no Inferno"
            description: "Ao acertar um ataque: bane o alvo até o fim do seu turno (retorna ao espaço que ocupava ou ao desocupado mais próximo); se não for um corruptor, sofre 10d10 psíquico ao retornar."
            rules:
              uses: { per: "descanso curto/longo", value: 1 }

  grande-antigo:
    name: "Grande Antigo"
    flavor: "Patrono Transcendental"
    description: "Entidades cósmicas insondáveis; telepatia e manipulação mental."
    choose_level: 1
    expanded_spells:
      1: ["sussurros dissonantes","riso histérico de Tasha"]
      2: ["detectar pensamentos","força fantasmagórica"]
      3: ["clarividência","enviar mensagem"]
      4: ["dominar besta","tentáculos negros de Evard"]
      5: ["dominar pessoa","telecinésia"]
    levels:
      - level: 1
        features:
          - name: "Despertar a Mente"
            description: "Telepatia com criatura que você vê a até 18 m (se entender um idioma)."
      - level: 6
        features:
          - name: "Proteção Entrópica"
            description: "Reação ao ser alvo de ataque: impõe desvantagem; se errar, você tem vantagem no próximo ataque contra o alvo até o fim do seu próximo turno."
            rules:
              uses: { per: "descanso curto/longo", value: 1 }
      - level: 10
        features:
          - name: "Escudo de Pensamentos"
            description: "Resistência a psíquico; quando sofre psíquico, o agressor sofre a mesma quantidade."
      - level: 14
        features:
          - name: "Criar Lacaio"
            description: "Ação: toque um humanóide incapacitado; fica enfeitiçado indefinidamente (até efeitos como Remover Maldição). Telepatia com ele no mesmo plano."

  # ——— PATRONOS (EXTRAS DA SUA MESA) ———
  patrono-morte:
    name: "A Morte"
    flavor: "Patrono Transcendental"
    description: "Necromancia, mortos-vivos e toque fúnebre."
    choose_level: 1
    expanded_spells:
      1: ["raio adoecente","vitalidade falsa"]
      2: ["raio do enfraquecimento","repouso tranquilo"]
      3: ["animar mortos","falar com os mortos"]
      4: ["assassino fantasmagórico","malogro"]
      5: ["cúpula antivida","névoa mortal"]
    levels:
      - level: 1
        features:
          - name: "Cria da Não-Vida"
            description: "Resistência a necrótico e veneno; mortos-vivos não o hostilizam sem provocação."
            grants: { defenses: { resistance: ["necrótico","veneno"] } }
      - level: 6
        features:
          - name: "Toque Mortal"
            description: "Ação: toca um humanoide vivo inconsciente a 0 PV, matando-o; ele se ergue como zumbi sob seu comando (até 2 zumbis; comando por ação bônus). 2 usos a partir do 12º."
            rules:
              uses: { per: "descanso curto/longo", value: 1 }
      - level: 10
        features:
          - name: "Rigor Mortis"
            description: "Resistência a físico não-mágico não-prata; estabiliza a 0 PV; não precisa comer, beber, dormir ou respirar."
      - level: 14
        features:
          - name: "Dança da Morte"
            description: "Seu tipo muda para morto-vivo (não envelhece); imune a dano necrótico e de veneno e às condições enfeitiçado, envenenado e exausto. Ação bônus: comanda um morto-vivo com teste de Persuasão (CAR) CD 10 + ND (mín. 1), como a magia Comando."

  patrono-arcanjo-vingador:
    name: "O Arcanjo Vingador"
    flavor: "Patrono Transcendental"
    description: "Justiça radiante e vingança sagrada."
    choose_level: 1
    expanded_spells:
      1: ["detectar o bem e o mal","raio guiador"]
      2: ["marca da punição","zona da verdade"]
      3: ["destruição cegante","remover maldição"]
      4: ["destruição estonteante","proteção contra a morte"]
      5: ["dissipar o bem e o mal","onda destrutiva"]
    levels:
      - level: 1
        features:
          - name: "Servo dos Anjos"
            description: "Fala Celestial; resistência a radiante; proficiência em Intuição; ganha o truque 'chama sagrada'."
            grants:
              languages: ["Celestial"]
              defenses: { resistance: ["radiante"] }
              proficiencies: { skills: ["Intuição"] }
      - level: 6
        features:
          - name: "Poder Angelical"
            description: "Primeiro acerto do turno: +1d8 radiante (ou +2d8 vs corruptor/morto-vivo). No 12º: +2d8 / +4d8."
      - level: 10
        features:
          - name: "Virtudes Celestiais"
            description: "Vantagem contra medo, exaustão e encanto; vantagem em Intuição para detectar mentiras."
      - level: 14
        features:
          - name: "Marca da Vingança"
            description: "Ação (alvo a 18 m): marca por 1 min (TR CAR). Remove resistência/imunidade a radiante E o torna vulnerável a radiante, bloqueia teleporte; TR no fim de cada turno para encerrar (corruptor/morto-vivo faz com desvantagem)."
            rules:
              uses: { per: "descanso curto/longo", value: 1 }

  patrono-espirito-heroico:
    name: "O Espírito Heroico"
    flavor: "Patrono Transcendental"
    description: "Heroísmo ancestral emprestado; retaliação, tenacidade e avatar."
    choose_level: 1
    expanded_spells:
      1: ["heroísmo","passos longos"]
      2: ["aprimorar habilidade","arma espiritual"]
      3: ["espíritos guardiões","sinal de esperança"]
      4: ["guardião da fé","movimentação livre"]
      5: ["âncora planar","mão de Bigby"]
    levels:
      - level: 1
        features:
          - name: "Retaliação Resoluta"
            description: "Reação a crítico ou a cair a 0 PV: reduz dano à metade ou fica com 1 PV; ganha vantagem e +1d8 contra o agressor até o fim do próximo turno."
            rules:
              uses: { per: "descanso curto/longo", value: 1 }
      - level: 6
        features:
          - name: "Vigor do Herói"
            description: "Reduz 3 de dano físico não-mágico (10º: 5)."
      - level: 10
        features:
          - name: "Salvaguarda Heróica"
            description: "Reação quando uma criatura a até 9 m ataca um aliado seu: conjura truque/magia ofensiva no atacante ou defensiva no aliado atacado. 2 usos por descanso curto ou longo."
            rules:
              uses: { per: "descanso curto/longo", value: 2 }
      - level: 14
        features:
          - name: "Avatar Espiritual"
            description: "1 h: resistência a físico não-mágico, vantagem em ataques, +1 ataque bônus/turno e +CAR em todos os TS."
            rules:
              uses: { per: "descanso curto/longo", value: 1 }

  patrono-supragenio:
    name: "O Supragênio"
    flavor: "Patrono Transcendental"
    description: "Intelecto cósmico e poder elemental dos gênios."
    choose_level: 1
    expanded_spells:
      1: ["detectar o bem e o mal","disfarçar-se"]
      2: ["detectar pensamentos","truque de corda"]
      3: ["clarividência","piscar"]
      4: ["conjurar elementais menores","terreno alucinógeno"]
      5: ["conhecimento lendário","conjurar elemental"]
    choices:
      genie_lineage:
        choose: 1
        options:
          - id: "dao"
            name: "Dao (Terran)"
            grants:
              languages: ["Terran"]
              proficiencies: { skills: ["Atletismo"] }
              defenses: { resistance: ["ácido"] }
          - id: "djinni"
            name: "Djinni (Auran)"
            grants:
              languages: ["Auran"]
              proficiencies: { skills: ["Acrobacia"] }
              defenses: { resistance: ["elétrico"] }
          - id: "efreeti"
            name: "Efreeti (Ignan)"
            grants:
              languages: ["Ignan"]
              proficiencies: { skills: ["Intimidação"] }
              defenses: { resistance: ["fogo"] }
          - id: "marid"
            name: "Marid (Aquan)"
            grants:
              languages: ["Aquan"]
              traits: { amphibious: true }
              defenses: { resistance: ["frio"] }
    levels:
      - level: 1
        features:
          - name: "Traço do Sultão Planar"
            description: "Recebe idioma planar, 1 perícia (outra) e resistência ligada ao gênio escolhido."
      - level: 6
        features:
          - name: "Conjuração Elemental"
            description: "Ao conjurar magia/truque que cause dano, ação bônus para converter o tipo de dano para o do patrono e adicionar +1d6 no primeiro acerto (12º: +2d6)."
      - level: 10
        features:
          - name: "Forma Prodigiosa"
            description: "Metade inferior enevoada; voo planar por 10 min; imunidade ao elemento do patrono."
            rules:
              uses: { per: "descanso curto/longo", value: 1 }
      - level: 14
        features:
          - name: "Seu Desejo é uma Ordem"
            description: "Ação: role d100; se ≤ nível de bruxo + mod. CAR, o patrono surge e concede 1 desejo (como a magia Desejo; alvo a 18 m). Indisponível por 7 dias após conceder; efeito além de copiar magia = 33% de nunca mais invocar. No 20º, invoca automaticamente."

  patrono-tita-caido:
    name: "O Titã Caído"
    flavor: "Patrono Transcendental"
    description: "Força primordial e ruína antiga; forma titânica temporária."
    choose_level: 1
    expanded_spells:
      1: ["heroísmo","proteção contra o bem e o mal"]
      2: ["aumentar/reduzir","passos sem pegadas"]
      3: ["andar na água","respirar na água"]
      4: ["metamorfose","porta dimensional"]
      5: ["comunhão","dissipar o bem e o mal"]
    levels:
      - level: 1
        features:
          - name: "Manipulação de Energia"
            description: "Ao conjurar truque/magia com ataque de magia e dano elemental, ação bônus para trocar o tipo e adicionar +1d8 se atingir (só o primeiro ataque)."
            rules:
              uses: { per: "descanso curto/longo", value: 2 }
      - level: 6
        features:
          - name: "Incentivo Titânico"
            description: "Ação: aliados a 18 m que ouçam você não podem ser amedrontados/enfeitiçados e têm vantagem em testes/TS até o final do seu próximo turno."
            rules:
              uses: { per: "descanso curto/longo", value: 1 }
      - level: 10
        features:
          - name: "Bênção do Empírico"
            description: "Não envelhece; vantagem em TS contra magias/efeitos mágicos."
      - level: 14
        features:
          - name: "Pseudo-Titã"
            description: "Ação bônus: por 1 min, tamanho Grande, For 21, +1d8 com armas; ao acertar corpo-a-corpo o alvo faz TR de CON CD 15 ou fica atordoado; voo e natação = deslocamento; Manipulação de Energia ilimitada."
            rules:
              uses: { per: "descanso longo", value: 1 }

  patrono-vazio:
    name: "O Vazio"
    flavor: "Patrono Transcendental"
    description: "Nada e entropia; silencia, apaga e consome."
    choose_level: 1
    expanded_spells:
      1: ["infligir ferimentos","névoa obscurecente"]
      2: ["cegueira/surdez","silêncio"]
      3: ["dificultar detecção","piscar"]
      4: ["assassino fantasmagórico","invisibilidade maior"]
      5: ["criar passagem","névoa mortal"]
    levels:
      - level: 1
        features:
          - name: "Toque do Vazio"
            description: "Ação: ataque corpo-a-corpo com magia; se atingir, 1d8 de frio + CAR; se criatura, TR CON ou impedido até o fim do próximo turno. No 8º: ação bônus para anexar os efeitos a uma magia acertada."
      - level: 6
        features:
          - name: "Proteção do Vácuo"
            description: "Reação: anula totalmente o dano de uma fonte (1 uso; 13º: 2 usos)."
            rules:
              uses: { per: "descanso curto/longo", value: 1 }
      - level: 10
        features:
          - name: "Manto do Esquecimento"
            description: "Ação: alvo a 18 m faz TR INT ou esquece todos os eventos das últimas 24 horas."
            rules:
              uses: { per: "descanso curto/longo", value: 1 }
      - level: 14
        features:
          - name: "Esfera de Obliteração"
            description: "Ação: esfera de antimatéria a 18 m por até 1 min (concentração). No espaço/ao terminar turno nele: 4d6 de energia; adjacentes: 4d6 (TR DES, metade). 0 PV = sugado. Move 9 m com ação bônus. Imune à própria esfera."
            rules:
              uses: { per: "descanso curto/longo", value: 1 }

  # ——— DÁDIVAS DE PACTO (nível 3) ———
  boons:
    corrente:
      id: "pact_of_the_chain"
      name: "Pacto da Corrente"
      choose_level: 3
      description: "Um familiar especial serve como agente e espião; pode atacar."
      features:
        - name: "Familiar de Pacto"
          description: "Aprende 'encontrar familiar'; formas especiais (diabrete, pseudodragão, quasit, duende). Pode atacar e entregar magias de toque."
    lamina:
      id: "pact_of_the_blade"
      name: "Pacto da Lâmina"
      choose_level: 3
      description: "Cria/vence uma arma de pacto mágica, sempre à mão."
      features:
        - name: "Arma de Pacto"
          description: "Ação: cria arma corpo a corpo que você domina; conta como mágica. Pode vincular 1 arma mágica (ritual 1 h) e invocá-la."
    tomo:
      id: "pact_of_the_tome"
      name: "Pacto do Tomo"
      choose_level: 3
      description: "Um Livro das Sombras com 3 truques de qualquer lista."
      features:
        - name: "Livro das Sombras"
          description: "Ganha 3 truques de qualquer classe (CAR). Se perdido, pode recriar (ritual 1 h; destrói o anterior)."

  # ——— INVOCAÇÕES MÍSTICAS ———
  invocations:
    - id: "agonizing_blast"
      name: "Explosão Agonizante"
      effect: "Raio místico causa +CAR de dano."
    - id: "repelling_blast"
      name: "Explosão Repulsiva"
      effect: "Empurra o alvo até 3 m por acerto do Raio místico."
    - id: "eldritch_spear"
      name: "Lança Mística"
      effect: "Aumenta o alcance do Raio místico (~90 m)."
    - id: "eldritch_sight"
      name: "Visão Mística"
      effect: "Detectar Magia à vontade."
    - id: "devils_sight"
      name: "Visão do Diabo"
      effect: "Enxerga na escuridão normal e mágica (~36 m)."
    - id: "fiendish_vigor"
      name: "Vigor Ínfero"
      effect: "Armadura de Agathys em si à vontade (nível base)."
    - id: "mask_of_many_faces"
      name: "Máscara de Muitos Rostos"
      effect: "Disfarçar-se à vontade."
    - id: "misty_visions"
      name: "Visões Enevoadas"
      effect: "Imagem Silenciosa à vontade."
    - id: "beast_speech"
      name: "Fala com Bestas"
      effect: "Falar com Animais à vontade."
    - id: "beguiling_influence"
      name: "Influência Sedutora"
      effect: "Proficiência em Enganação e Persuasão."
    - id: "eyes_of_the_rune_keeper"
      name: "Olhos do Guardião de Runas"
      effect: "Lê todas as escritas."
    - id: "one_with_shadows"
      name: "Um com as Sombras"
      prereq: ["5º nível"]
      effect: "Fica invisível enquanto imóvel em luz fraca/escuridão."
    - id: "sign_of_ill_omen"
      name: "Sinal do Mau Augúrio"
      prereq: ["5º nível"]
      effect: "Pode conjurar Amaldiçoar usando espaço de bruxo."
    - id: "mire_the_mind"
      name: "Lama da Mente"
      prereq: ["5º nível"]
      effect: "Pode conjurar Lentidão usando espaço de bruxo."
    - id: "sculptor_of_flesh"
      name: "Escultor de Carne"
      prereq: ["7º nível"]
      effect: "Pode conjurar Metamorfose usando espaço de bruxo."
    - id: "dreadful_word"
      name: "Palavra Medonha"
      prereq: ["7º nível"]
      effect: "Pode conjurar Confusão usando espaço de bruxo."
    - id: "ascendant_step"
      name: "Passo Ascendente"
      prereq: ["9º nível"]
      effect: "Levitar em si mesmo à vontade."
    - id: "minions_of_chaos"
      name: "Lacaios do Caos"
      prereq: ["9º nível"]
      effect: "Conjurar Elemental usando espaço de bruxo."
    - id: "whispers_of_the_grave"
      name: "Sussurros da Sepultura"
      prereq: ["9º nível"]
      effect: "Falar com os Mortos à vontade."
    - id: "visions_of_distant_realms"
      name: "Visões de Reinos Distantes"
      prereq: ["15º nível"]
      effect: "Olho Arcano à vontade."
    - id: "master_of_myriad_forms"
      name: "Mestre de Incontáveis Formas"
      prereq: ["15º nível"]
      effect: "Transformação à vontade."
    - id: "witch_sight"
      name: "Visão de Bruxa"
      prereq: ["15º nível"]
      effect: "Vê a forma verdadeira de criaturas transformadas/invisíveis (alcance curto)."
    # — Invocações que exigem Dádiva específica —
    - id: "voice_of_the_chain_master"
      name: "Voz do Mestre das Correntes"
      prereq: ["Dádiva da Corrente"]
      requires_pact: "corrente"
      effect: "Vê/ouve via familiar e fala por ele; ignora distância/plano."
    - id: "chains_of_carceri"
      name: "Cadeias de Carceri"
      prereq: ["15º nível","Dádiva da Corrente"]
      requires_pact: "corrente"
      effect: "Conter Monstro à vontade contra celestiais/elementais/infernais (1/vez por alvo por descanso longo)."
    - id: "thirsting_blade"
      name: "Lâmina Sedenta"
      prereq: ["5º nível","Dádiva da Lâmina"]
      requires_pact: "lamina"
      effect: "Quando usa a ação Ataque com a arma de pacto, ataca duas vezes."
    - id: "lifedrinker"
      name: "Sorvedor de Vidas"
      prereq: ["12º nível","Dádiva da Lâmina"]
      requires_pact: "lamina"
      effect: "Ataques com a arma de pacto causam +CAR de dano necrótico."
    - id: "book_of_ancient_secrets"
      name: "Livro dos Segredos Antigos"
      prereq: ["Dádiva do Tomo"]
      requires_pact: "tomo"
      effect: "Inscreve e conjura quaisquer magias com a tag 'ritual' como ritual via Livro das Sombras."

cozinheiro:
  # ===========================================================================
  # ARQUÉTIPOS CANÔNICOS DO PDF (O_Cozinheiro_-_Classe.pdf — Sam Grierson,
  # tradução de Pedro Chicalhoni). 5 arquétipos canônicos + Doceiro Encantado
  # (homebrew Lafiga). Choose level: 3. Features em L3, L6, L10, L14, L18.
  # ===========================================================================

  sous-chef:
    name: "Sous Chef"
    flavor: "Arquétipo do Cozinheiro"
    description: "O Sous Chef tradicional acredita que seus aliados são mais merecedores de sua comida. Foca em entregar petiscos benéficos rapidamente, à distância, fortalecendo o grupo com molhos e refeições magníficas."
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Nós Entregamos"
            description: "Quando alimenta criatura voluntária com petisco, ela pode receber o petisco a até 18 m (sem cobertura total bloqueando boca/orifício). Adicionalmente, alimentar criatura voluntária que pode tocar (que não seja você mesmo) pode ser feito como ação bônus."
            rules:
              feed_range_m: 18
              feed_as_bonus_action: true
      - level: 6
        features:
          - name: "Molho Secreto"
            description: "Toda vez que alimenta criatura amigável com petisco, ela recupera pontos de vida iguais ao seu modificador de Constituição."
            rules:
              ally_heal_on_feed: "CON modifier"
      - level: 10
        features:
          - name: "Suor Aromático"
            description: "Como ação, expele odores em poderosa onda. Todas as criaturas amigáveis visíveis (incluindo você) em raio de 9 m recuperam PV = nível de Cozinheiro, e cada uma pode imediatamente usar reação para fazer 1 ataque corpo-a-corpo."
            rules:
              action: true
              range_m: 9
              heal: "Cook level"
              grants_reaction_attack: true
              uses:
                per: "descanso longo"
                value: 1
      - level: 14
        features:
          - name: "Refeição Magnífica"
            description: "Adquire a habilidade de conjurar a magia Banquete de Heróis. Substitui os componentes materiais por comidas finas no valor de 500 po."
            rules:
              spell: "Banquete de Heróis"
              material_substitution_gp: 500
              uses:
                per: "descanso longo"
                value: 1
      - level: 18
        features:
          - name: "Petisco Lendário — Cérebro de Macaco"
            description: "Durante descanso longo, prepara um petisco (apenas um, dura até o próximo descanso longo). Cérebro de Macaco: nos próximos 10 minutos, o alvo pode automaticamente ter sucesso em um teste de resistência da escolha dele (após rolar, antes do resultado)."
            rules:
              legendary_snack: "cerebro-de-macaco"
              prep_during: "long rest"
              effect:
                duration_minutes: 10
                auto_success_saves: 1
                save_choice: "alvo (após rolar, antes de saber o resultado)"
              uses:
                per: "descanso longo"
                value: 1

  sargento-alimentar:
    name: "Sargento Alimentar"
    flavor: "Arquétipo do Cozinheiro"
    description: "O Sargento Alimentar acredita em dieta rígida, controle completo do corpo. Busca a perfeição corporal através do cálculo exato dos nutrientes ingeridos."
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Nunca Satisfeito"
            description: "Pode comer petisco como ação bônus (em vez de ação). Adicionalmente, apetite regrado fortalece sua saúde: PV máximo aumenta em 3 imediatamente, e +1 por nível ganho nesta classe."
            rules:
              eat_snack_as_bonus_action: true
              max_hp_bonus_immediate: 3
              max_hp_bonus_per_level: 1
      - level: 6
        features:
          - name: "Arroto Sonoro"
            description: "Como ação, criaturas hostis em cone de 3 m fazem TR de Sabedoria contra CD de Petisco; falha: desvantagem em ataques contra todas as criaturas exceto você até início do seu próximo turno."
            rules:
              action: true
              area: "cone 3 m"
              save:
                ability: "Sabedoria"
                dc_formula: "snack_dc"
                on_fail: "desvantagem em ataques exceto contra você até início do próximo turno"
              uses:
                per: "descanso longo"
                value: "CON (mín. 1)"
      - level: 10
        features:
          - name: "Estômago Robusto"
            description: "Pode estar sob efeitos de 2 petiscos ao mesmo tempo. Se ingerir um terceiro, perde um dos efeitos originais (sua escolha)."
            rules:
              max_active_snacks: 2
      - level: 14
        features:
          - name: "Dieta Estrita"
            description: "Escolha Força, Destreza ou Constituição: aumenta o valor da habilidade em 2, e o limite passa a ser 22."
            rules:
              choose_one:
                - { ability: "FOR", increase: 2, max: 22 }
                - { ability: "DES", increase: 2, max: 22 }
                - { ability: "CON", increase: 2, max: 22 }
      - level: 18
        features:
          - name: "Petisco Lendário — Coração Cristalino"
            description: "Durante descanso longo, prepara um petisco. Coração Cristalino: por 10 minutos, se total de teste de habilidade ou TR de FOR, DES ou CON for menor que o valor da habilidade testada, alvo pode usar o valor da habilidade ao invés do total."
            rules:
              legendary_snack: "coracao-cristalino"
              prep_during: "long rest"
              uses:
                per: "descanso longo"
                value: 1

  mestre-cuca:
    name: "Mestre-Cuca"
    flavor: "Arquétipo do Cozinheiro"
    description: "O Mestre-Cuca tradicional acredita no aspecto científico da comida. A comida é o combustível, o corpo é o fogo. Foca em debilitar inimigos com petiscos venenosos e proficiência marcial."
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Proficiências Bônus"
            description: "Ganha proficiência com armas marciais."
            grants:
              proficiencies:
                weapons:
                  add: ["Armas Marciais"]
          - name: "Entregamos a Morte"
            description: "Pode alimentar inimigos à distância. Quando alimenta criatura hostil, ela pode estar a até 18 m (vê-la e boca/orifício não bloqueado por cobertura total)."
            rules:
              hostile_feed_range_m: 18
      - level: 6
        features:
          - name: "Ataque Extra"
            description: "Pode atacar duas vezes ao invés de uma sempre que realizar a ação Atacar."
            rules:
              extra_attack: 1
      - level: 10
        features:
          - name: "Fedor Horroroso"
            description: "Cheiro repugnante: sempre que criatura hostil a 3 m fizer TR contra um dos seus petiscos, subtrai 1d4 do TR."
            rules:
              aura_radius_m: 3
              save_penalty_against_snacks: "1d4"
      - level: 14
        features:
          - name: "Ataque Nocivo"
            description: "Quando uma criatura fizer TR contra efeito de um dos seus petiscos, pode impor desvantagem na rolagem."
            rules:
              impose_disadvantage_on_snack_save: true
              uses:
                per: "descanso curto ou longo"
                value: 1
      - level: 18
        features:
          - name: "Petisco Lendário — Pílula Gasosa"
            description: "Durante descanso longo, prepara um petisco. Pílula Gasosa: dióxido de carbono no estômago do alvo. TR de CON; falha: envenenado e deslocamento metade até fim do próximo turno. Sucesso ou falha, se o alvo morrer dentro de 1 hora, explode (criaturas em até 3 m fazem TR de DES; falha: 10d6 força Médio ou menor + 5d6 por categoria maior; sucesso: metade)."
            rules:
              legendary_snack: "pilula-gasosa"
              prep_during: "long rest"
              save:
                ability: "Constituição"
                on_fail: "envenenado e deslocamento pela metade até o fim do próximo turno"
              explosion:
                trigger: "alvo morre dentro de 1 hora (independente do TR inicial)"
                radius_m: 3
                save:
                  ability: "Destreza"
                  on_fail: "dano total"
                  on_success: "metade do dano"
                damage:
                  type: "força"
                  base: "10d6"
                  base_size: "Médio ou menor"
                  per_size_category_above: "5d6"
              uses:
                per: "descanso longo"
                value: 1

  doceiro-encantado:
    name: "Doceiro Encantado"
    flavor: "Arquétipo do Cozinheiro"
    description: "Açúcar, magia e calorosas lembranças; confeitos que inspiram, confundem e acalmam."
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Balas Inspiradoras"
            description: "Ação bônus: entrega doce que fornece um dado de inspiração açucarada."
            rules:
              bonus_action: true
              range_m: 3
              grant_die:
                size_by_level:
                  "3": "d6"
                  "10": "d8"
                  "14": "d10"
                usage:
                  - "jogada de ataque"
                  - "teste de habilidade"
                  - "teste de resistência"
              uses:
                per: "dia"
                value: "Carisma (mín. 1)"
          - name: "Confeitaria Apaziguante"
            description: "Quando alguém consumir um de seus doces durante descanso curto, adiciona +1d6 à cura de Dados de Vida dessa criatura."
            rules:
              hit_die_heal_bonus: "1d6"
              during: "short rest"
      - level: 6
        features:
          - name: "Guloseima Hipnótica"
            description: "Ação: oferta doce a 1 criatura que possa ver/ouvir você a 9 m; se aceitar ou falhar no TS, fica encantada brevemente."
            rules:
              action: true
              range_m: 9
              save:
                ability: "Sabedoria"
                dc_formula: "8 + proficiência + Car"
                on_fail: "enfeitiçado por você até o fim do seu próximo turno (não pode atacá-lo)"
              note: "Criaturas hostis raramente aceitam voluntariamente; ainda assim fazem TS."
              uses:
                per: "descanso curto ou longo"
                value: 2
      - level: 10
        features:
          - name: "Bolo de Camadas"
            description: "Ação bônus: concede camadas de cobertura doce que reduzem dano."
            rules:
              bonus_action: true
              range_m: 9
              target: "você ou aliado"
              effect:
                temp_hp: "2d6 + Car"
                damage_reduction_first_hit: "−proficiência (mín. 1) até o início do seu próximo turno"
              uses:
                per: "descanso curto ou longo"
                value: 2
      - level: 14
        features:
          - name: "Fatia da Festa"
            description: "Ação: divide um grande bolo entre até 6 aliados; remove efeitos mentais e dá euforia tática."
            rules:
              action: true
              range_m: 9
              effects:
                cleanse:
                  - "encantado"
                  - "amedrontado"
                buff_duration: "1 minuto"
                while_buffed:
                  - "vantagem em TS de Sabedoria"
                  - "+1d4 em jogadas de ataque (1/turno)"
              uses:
                per: "descanso longo"
                value: 1

  mestre-cervejeiro:
    name: "Mestre Cervejeiro"
    flavor: "Arquétipo do Cozinheiro"
    description: "Onde a maioria apenas enxerga o perigo do vício, o Mestre Cervejeiro vê potencial. Especialista em bebidas, manipula álcool e infusões para intoxicar aliados ou inimigos com benefícios estratégicos."
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Petiscos Adulterados"
            description: "Ganha proficiência com Suprimentos de Cervejeiro (se já não tiver). Pode adulterar petiscos ao prepará-los; se uma criatura sob efeito de petisco adulterado ingerir outro adulterado, o efeito original não cessa e ela fica intoxicada por 1 minuto. Intoxicada: imune a Enfeitiçado e Amedrontado. Quando termina, perde efeitos dos petiscos e fica de ressaca (não pode mover ou agir até fim do próximo turno). Uma vez intoxicada, não pode novamente até descanso curto/longo."
            grants:
              proficiencies:
                tools:
                  add: ["Suprimentos de Cervejeiro"]
            rules:
              intoxication_duration: "1 minuto"
              intoxication_immunities: ["enfeitiçado", "amedrontado"]
              hangover_after: "não pode mover ou agir até fim do próximo turno"
              once_per_rest: "descanso curto ou longo"
      - level: 6
        features:
          - name: "Andar Cambaleante"
            description: "Criaturas que você intoxica têm deslocamento +3 m e outras criaturas têm desvantagem em ataques de oportunidade contra elas."
            rules:
              intoxicated_speed_bonus_m: 3
              intoxicated_disadvantage_on_ao_against: true
      - level: 10
        features:
          - name: "Rendimento Ébrio"
            description: "Suas infusões relaxam os músculos, aliviando as pancadas de ataques recentes. Criaturas que você intoxica ganham resistência contra dano de concussão."
            grants:
              defenses:
                resistance: ["concussão (em criaturas intoxicadas)"]
      - level: 14
        features:
          - name: "Bravura Alcoólica"
            description: "Uma vez por turno, quando uma criatura que você intoxicou acertar uma criatura com um ataque, ela pode adicionar o seu modificador de Constituição na rolagem do dano."
            rules:
              once_per_turn: true
              add_con_to_intoxicated_damage: true
      - level: 18
        features:
          - name: "Petisco Lendário — Criação do Mestre"
            description: "Durante descanso longo, prepara um petisco. Criação do Mestre: licor fino com alto teor alcoólico. Quando ingerido, alvo fica imediatamente intoxicado por 10 minutos. Quando a intoxicação termina, alvo não fica de ressaca."
            rules:
              legendary_snack: "criacao-do-mestre"
              prep_during: "long rest"
              uses:
                per: "descanso longo"
                value: 1

  amassador-de-monstros:
    name: "Amassador de Monstros"
    flavor: "Arquétipo do Cozinheiro"
    description: "A maioria dos cozinheiros se depara com o poder físico da vitalidade ou simplesmente sentem seu poder instintivamente. Os amassadores estudam a vitalidade que dá poder aos seus petiscos, colhendo carnes monstruosas e canalizando essências vitais em refeições especiais."
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Proficiências Bônus"
            description: "Quando se torna um Amassador de Monstros no 3º nível, ganha proficiência com armas marciais."
            grants:
              proficiencies:
                weapons:
                  add: ["Armas Marciais"]
          - name: "Colheita Vital"
            description: "Se você ou aliado matar criatura de nível de desafio 1 ou maior e o corpo não for destruído, pode colher carne (até 1 hora após a morte) para uma refeição especial. Mantém a carne na Bolsa de Cozinheiro até preparar (apenas 1 dessas carnes por vez). Como parte de descanso curto/longo, prepara a refeição: 5 + mod CON criaturas podem partilhar e ganham um benefício baseado no tipo de criatura (24 h ou até próximo descanso longo)."
            rules:
              harvest_min_cr: 1
              harvest_window_hours: 1
              max_meat_in_bag: 1
              shareable_with: "5 + CON modifier"
              benefit_duration: "24 horas ou até o próximo descanso longo"
              creature_type_benefits:
                aberracao: "visão no escuro 18 m + telepatia 18 m"
                bestas: "PV atuais e máximos +10"
                corruptores: "vantagem em testes de perícia e TR de CAR e INT"
                dragao: "voo 18 m (cai se nada o suspende)"
                gigante: "efeito de Aumentar"
                limo: "percepção às cegas 3 m"
                monstruosidade: "vantagem em TR FOR/DES/CON contra magia"
                planta: "sob luz solar: vantagem perícia FOR/CON + cura máxima"
      - level: 6
        features:
