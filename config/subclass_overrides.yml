      - level: 3
        features:
          - { name: "Passo nas Sombras", description: "Teleporta entre sombras curtas." }
      - level: 9
        features:
          - { name: "Sombra Enganosa", description: "Cria distrações sombrias para vantagem." }
      - level: 13
        features:
          - { name: "Véu de Trevas", description: "Camuflagem avançada e silêncio leve." }
      - level: 17
        features:
          - { name: "Morte Silenciosa", description: "Execuções rápidas em penumbra." }

  face-fantasmagorica:
    name: "Face Fantasmagórica"
    flavor: "Arquétipo do Ladino"
    description: "Ilusão e disfarce para manipular e enganar."
    choose_level: 3
    levels:
      - level: 3
        features:
          - { name: "Persona Mutável", description: "Disfarces e identidades rápidas." }
      - level: 9
        features:
          - { name: "Máscara Fantasma", description: "Assusta/ilude inimigos com aparições." }
      - level: 13
        features:
          - { name: "Dublê Perfeito", description: "Imita voz e trejeitos com precisão." }
      - level: 17
        features:
          - { name: "Sumiço Etéreo", description: "Breve intangibilidade para escapar." }

  lamina-invisivel:
    name: "Lâmina Invisível"
    flavor: "Arquétipo do Ladino"
    description: "Ataques imperceptíveis, precisão letal."
    choose_level: 3
    levels:
      - level: 3
        features:
          - { name: "Golpe Oculto", description: "Ataques furtivos facilitados quando oculto." }
      - level: 9
        features:
          - { name: "Caminho Invisível", description: "Breve invisibilidade ao mover." }
      - level: 13
        features:
          - { name: "Perfuração Fantasma", description: "Ignora parte da armadura do alvo." }
      - level: 17
        features:
          - { name: "Fim Repentino", description: "Dano massivo contra alvo marcado." }

  larapio-de-almas:
    name: "Larápio de Almas"
    flavor: "Arquétipo do Ladino"
    description: "Rouba energia vital e capacidades."
    choose_level: 3
    levels:
      - level: 3
        features:
          - { name: "Tocar a Alma", description: "Dreno leve de vida ao acertar." }
      - level: 9
        features:
          - { name: "Espólio Espiritual", description: "Copia pequenos talentos temporariamente." }
      - level: 13
        features:
          - { name: "Despojamento", description: "Enfraquece habilidades do alvo." }
      - level: 17
        features:
          - { name: "Ladrão de Vida", description: "Grandes drenagens em críticos." }

  mimetizador:
    name: "Mimetizador"
    flavor: "Arquétipo do Ladino"
    description: "Observa e replica técnicas alheias."
    choose_level: 3
    levels:
      - level: 3
        features:
          - { name: "Imitação", description: "Aprende truques ao observar." }
      - level: 9
        features:
          - { name: "Reflexo Treinado", description: "Reações copiadas de oponentes." }
      - level: 13
        features:
          - { name: "Estilo Espelhado", description: "Espelha posturas para defesa/ofensa." }
      - level: 17
        features:
          - { name: "Mestre do Espelho", description: "Replica movimentos complexos." }

wizard:
  # ——— ESCOLAS (PHB) ———
    escola-de-abjuracao:
      name: "Escola de Abjuração"
      flavor: "Tradição Arcana"
      description: "Proteção mágica e negação; molda barreiras e resiste a magias hostis."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Abjuração Instruída (Especialista)"
              description: "Copiar magias de abjuração no grimório custa metade do ouro e tempo."
              rules: { savant: { school: "abjuração", copy_cost_multiplier: 0.5, copy_time_multiplier: 0.5 } }
            - name: "Proteção Arcana"
              description: "Ao conjurar uma abjuração de 1º+ nível, cria/recupera um manto que absorve dano."
              rules:
                ward_init_hp: "2 × seu nível de mago + mod. INT"
                ward_recover_on_abjuration_cast: "2 × nível da magia"
        - level: 6
          features:
            - name: "Proteção Projetada"
              description: "Pode direcionar sua Proteção Arcana para reduzir dano de um aliado a até 9 m."
        - level: 10
          features:
            - name: "Abjuração Aprimorada"
              description: "Bônus de proficiência em testes feitos por magias de abjuração (ex.: dissipar, contra-magia)."
        - level: 14
          features:
            - name: "Resistência à Magia"
              description: "Vantagem em testes de resistência contra magias e resistência a dano de magias."

    escola-de-adivinhacao:
      name: "Escola de Adivinhação"
      flavor: "Tradição Arcana"
      description: "Vê o possível e dobra o destino com presságios."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Adivinhação Instruída (Especialista)"
              description: "Copiar magias de adivinhação custa metade do ouro e tempo."
              rules: { savant: { school: "adivinhação", copy_cost_multiplier: 0.5, copy_time_multiplier: 0.5 } }
            - name: "Prodígio (Portento)"
              description: "Rola 2d20 após um descanso longo e pode substituir jogadas (sua ou de criaturas) por esses resultados."
              rules: { portent_dice: 2 }
        - level: 6
          features:
            - name: "Adivinhação Especialista"
              description: "Ao conjurar adivinhação de 2º+ nível, recupera 1 espaço de magia de nível inferior."
        - level: 10
          features:
            - name: "O Terceiro Olho"
              description: "Ativa 1 sentido extra até o próximo descanso longo (ex.: visão no escuro, ver invisível, ler emoções)."
        - level: 14
          features:
            - name: "Prodígio Maior"
              description: "Portento gera 3 dados em vez de 2."
              rules: { portent_dice: 3 }

    escola-de-conjuracao:
      name: "Escola de Conjuração"
      flavor: "Tradição Arcana"
      description: "Traz coisas e seres; dobra o espaço."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Conjuração Instruída (Especialista)"
              description: "Copiar magias de conjuração custa metade do ouro e tempo."
              rules: { savant: { school: "conjuração", copy_cost_multiplier: 0.5, copy_time_multiplier: 0.5 } }
            - name: "Conjuração Menor"
              description: "Cria temporariamente um objeto não mágico simples e portátil."
        - level: 6
          features:
            - name: "Transposição Benigna"
              description: "Teleporta-se (ou troca de lugar com aliado/servo conjurado) como ação; recarrega ao conjurar conjuração."
        - level: 10
          features:
            - name: "Conjuração Focada"
              description: "Sua concentração em magias de conjuração não é quebrada por dano."
        - level: 14
          features:
            - name: "Invocações Duráveis"
              description: "Criaturas que você conjura ganham PV temporários significativos."
              rules: { temp_hp_summons: 30 }

    escola-de-encantamento:
      name: "Escola de Encantamento"
      flavor: "Tradição Arcana"
      description: "Charme, fascínio e dom da persuasão mental."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Encantamento Instruído (Especialista)"
              description: "Copiar magias de encantamento custa metade do ouro e tempo."
              rules: { savant: { school: "encantamento", copy_cost_multiplier: 0.5, copy_time_multiplier: 0.5 } }
            - name: "Olhar Hipnótico"
              description: "Ação para hipnotizar criatura adjacente (TS Sab). Falha: enfeitiçada, incapacitada e deslocamento 0 enquanto sustentar; termina se levar dano."
        - level: 6
          features:
            - name: "Encanto Instintivo"
              description: "Reação para redirecionar um ataque que o alvo faria em você (TS Sab resiste)."
        - level: 10
          features:
            - name: "Dividir Encantamento"
              description: "Encantamentos de alvo único podem afetar 2 alvos, se ambos no alcance."
        - level: 14
          features:
            - name: "Alterar Memórias"
              description: "Ao terminar um encantamento, pode editar lembranças recentes dentro dos limites da magia."

    escola-de-evocacao:
      name: "Escola de Evocação"
      flavor: "Tradição Arcana"
      description: "Energia bruta canalizada em rajadas, raios e explosões."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Evocação Instruída (Especialista)"
              description: "Copiar magias de evocação custa metade do ouro e tempo."
              rules: { savant: { school: "evocação", copy_cost_multiplier: 0.5, copy_time_multiplier: 0.5 } }
            - name: "Esculpir Magias"
              description: "Ao evocar área, escolhe 1 + nível da magia em criaturas visíveis; elas passam automaticamente no teste e sofrem 0 no sucesso."
        - level: 6
          features:
            - name: "Truque Potente"
              description: "Se um alvo passa no teste contra seu truque que causa dano, ainda sofre metade do dano."
        - level: 10
          features:
            - name: "Evocação Potencializada"
              description: "Adiciona seu mod. INT ao dano de 1 magia de evocação por rodada."
        - level: 14
          features:
            - name: "Sobrecarga"
              description: "Pode maximizar dano de magias de 1º–5º; repetir antes de um descanso longo causa dano necrótico cumulativo a você."

    escola-de-ilusao:
      name: "Escola de Ilusão"
      flavor: "Tradição Arcana"
      description: "Engana sentidos e refaz a ‘realidade’ com truques."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Ilusão Instruída (Especialista)"
              description: "Copiar magias de ilusão custa metade do ouro e tempo."
              rules: { savant: { school: "ilusão", copy_cost_multiplier: 0.5, copy_time_multiplier: 0.5 } }
            - name: "Ilusão Menor Aprimorada"
              description: "Ganha o truque ilusão menor (se não tiver) e pode criar imagem + som no mesmo lançamento."
        - level: 6
          features:
            - name: "Ilusão Maleável"
              description: "Pode remodelar uma ilusão com duração enquanto ela durar."
        - level: 10
          features:
            - name: "Duplicata Ilusória"
              description: "Reação para fazer um ataque contra você errar (consome a duplicata); 1/descanso curto ou longo."
        - level: 14
          features:
            - name: "Realidade Ilusória"
              description: "Torna parte de uma ilusão um objeto real e inofensivo por 1 min (sem causar dano direto)."

    escola-de-necromancia:
      name: "Escola de Necromancia"
      flavor: "Tradição Arcana"
      description: "Vida e morte como recursos; fortalece mortos-vivos."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Necromancia Instruída (Especialista)"
              description: "Copiar magias de necromancia custa metade do ouro e tempo."
              rules: { savant: { school: "necromancia", copy_cost_multiplier: 0.5, copy_time_multiplier: 0.5 } }
            - name: "Colheita Sinistra"
              description: "Quando mata com magia de 1º+ nível, cura PV = 2× nível da magia (3× se necromancia). Não funciona com construtos/mortos-vivos."
        - level: 6
          features:
            - name: "Escravos Mortos-Vivos"
              description: "animar mortos afeta +1 corpo; mortos-vivos criados por suas necromancias ficam mais fortes."
              rules:
                undead_bonuses:
                  - "PV máximos + seu nível de mago"
                  - "Adicionam seu bônus de proficiência às jogadas de dano"
        - level: 10
          features:
            - name: "Acostumado à Morte-Vida"
              description: "Resistência a necrótico; seu máximo de PV não pode ser reduzido."
        - level: 14
          features:
            - name: "Comandar Mortos-Vivos"
              description: "Ação: impõe TS Carisma em morto-vivo; falha → você o controla até usar a habilidade novamente (inteligentes têm vantagens)."

    escola-de-transmutacao:
      name: "Escola de Transmutação"
      flavor: "Tradição Arcana"
      description: "Muda matéria, forma e propriedades; ferramenta versátil."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Transmutação Instruída (Especialista)"
              description: "Copiar magias de transmutação custa metade do ouro e tempo."
              rules: { savant: { school: "transmutação", copy_cost_multiplier: 0.5, copy_time_multiplier: 0.5 } }
            - name: "Alquimia Menor"
              description: "Altera temporariamente material de um objeto não mágico (madeira/pedra/ferro/cobre/prata)."
        - level: 6
          features:
            - name: "Pedra do Transmutador"
              description: "Cria uma pedra com um benefício ativo enquanto portada; troca o efeito ao conjurar transmutação de 1º+."
              rules:
                options:
                  - "Visão no escuro 18 m"
                  - "+3 m de deslocamento"
                  - "Proficiência em TS de Constituição"
                  - "Resistência a ácido/frio/fogo/relâmpago/trovão (escolha 1)"
        - level: 10
          features:
            - name: "Metamorfo"
              description: "Adiciona metamorfose ao grimório; 1×/descanso (curto ou longo) pode conjurá-la sem espaço, em si, CR 1 ou menor."
        - level: 14
          features:
            - name: "Mestre Transmutador"
              description: "Consome a pedra para: transmutar objeto; panaceia; reviver mortos (recentes); restaurar juventude."

    # ——— TRADIÇÕES ORIGINAIS DA SUA MESA ———
    arquearia-arcana:
      name: "Arquearia Arcana"
      flavor: "Tradição Arcana"
      description: "Combina arcos e magia de precisão."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Tiro Encantado"
              description: "Infunde flechas com efeitos mágicos menores (empurrar, ofuscar, marcar)."
              rules:
                weapons_proficiencies_granted: ["arco curto","arco longo"]
                once_per_turn_on_hit_with_bow: "aplica 1 efeito arcano temático"
          grants:
            proficiencies:
              weapons: ["arco-curto","arco-longo"]
        - level: 6
          features:
            - name: "Olho Místico"
              description: "Vantagens situacionais para adquirir alvo; ignora cobertura leve."
        - level: 10
          features:
            - name: "Voo da Flecha"
              description: "Aumenta alcance e as flechas ignoram vento e desvantagens por distância longa."
        - level: 14
          features:
            - name: "Pluie Arcana"
              description: "Rajada de flechas encantadas sobre múltiplos alvos em área pequena."

    iniciacao-demonologia:
      name: "Iniciação em Demonologia"
      flavor: "Tradição Arcana"
      description: "Estudo e controle de entidades demoníacas."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Círculo de Contenção"
              description: "Ritualiza um círculo que inibe/contém invocações menores e teleporte planar dentro da área."
          grants:
            languages:
              choose: 1
              options: ["Abissal","Infernal"]
        - level: 6
          features:
            - name: "Olhar Abissal"
              description: "Presença profana que assusta/fere mentalmente criaturas próximas (TS Sab)."
        - level: 10
          features:
            - name: "Pacto Controlado"
              description: "Invocações demoníacas ficam mais seguras; vantagem para impor comandos."
        - level: 14
          features:
            - name: "Domínio Infernal"
              description: "Pode subjugar temporariamente criaturas abissais poderosas (limites por ND/TS)."

    maestria-alquimica:
      name: "Maestria Alquímica"
      flavor: "Tradição Arcana"
      description: "Poções e transmutações práticas."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Laboratório Portátil"
              description: "Prepara poções com eficiência e menor custo; testes de alquimia com vantagem em condições ideais."
          grants:
            proficiencies:
              tools: ["Kit de Alquimista"]
        - level: 6
          features:
            - name: "Catalisadores"
              description: "Potencializa efeitos/alcances/durações de poções e transmutações leves."
        - level: 10
          features:
            - name: "Soluções Estáveis"
              description: "Diminui falhas; amplia durações de mutagênicos e extratos."
        - level: 14
          features:
            - name: "Pedra Filosofal"
              description: "Acesso a transmutações poderosas e versáteis (dentro de limites seguros da mesa)."

    maestria-dos-automatos:
      name: "Maestria dos Autômatos"
      flavor: "Tradição Arcana"
      description: "Construtos mecânicos e familiares artificiais."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Constructo Assistente"
              description: "Cria ajudante mecânico (familiar/servo) com funções utilitárias e simples de combate."
          grants:
            proficiencies:
              tools: ["Ferramentas de Artífice"]
        - level: 6
          features:
            - name: "Engenharia Arcana"
              description: "Modifica e reforça autômatos; upgrades modulares."
        - level: 10
          features:
            - name: "Rede Autômata"
              description: "Coordena múltiplos ajudantes; ações coordenadas em sua ordem."
        - level: 14
          features:
            - name: "Colosso Menor"
              description: "Constrói um guardião avançado (ND apropriado) sob seu comando."

    navegacao-planar:
      name: "Navegação Planar"
      flavor: "Tradição Arcana"
      description: "Transporte e percepção entre planos."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Bússola Etérea"
              description: "Sente portais e fendas planares próximos; vantagem em testes para navegação interplanar."
        - level: 6
          features:
            - name: "Âncora Planar"
              description: "Estabiliza áreas contra distorções/teleportes planar por curto período."
        - level: 10
          features:
            - name: "Pulo Entre Planos"
              description: "Saltos limitados entre planos/locais coterminantes (com custos/limites)."
        - level: 14
          features:
            - name: "Caminho dos Mundos"
              description: "Viagens seguras e precisas com escolta limitada; mitigação de riscos planares."

    teurgia-mistica:
      name: "Teurgia Mística"
      flavor: "Tradição Arcana"
      description: "Funde magia arcana e divina."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Ritos Teúrgicos"
              description: "Acessa magias divinas temáticas de baixo nível (passam a contar como magias de mago)."
        - level: 6
          features:
            - name: "Simbiose Arcana"
              description: "Sinergias entre listas arcana/divina (pequenos bônus de CD/alcance/duração)."
        - level: 10
          features:
            - name: "Favores Arcanos"
              description: "Adaptações de Canalizar/orações curtas em moldes arcanos (usos limitados)."
        - level: 14
          features:
            - name: "Epifania"
              description: "Magias híbridas potentes (ex.: cura/controle/banimento combinados) sob regras da mesa."

warlock:
  # ——— REGRAS GERAIS DO BRUXO ———
  rules:
    spellcasting:
      casting_ability: "Carisma"
      save_dc: "8 + proficiência + mod.CAR"
      attack_bonus: "proficiência + mod.CAR"
      preparation: "magias conhecidas (não prepara por dia)"
    pact_magic:
      slots_same_level: true
      recover_on: ["descanso curto","descanso longo"]
      note: "Usa espaços de magia do mesmo nível; ganha 'Arcanismo Místico' nos níveis altos (magias 6º–9º 1/dia)."
    expanded_spells:
      note: "As listas do patrono ampliam as opções de APRENDER magias de bruxo; não são 'sempre preparadas'."

  # ——— PATRONOS (PHB) ———
  arquifada:
    name: "Arquifada"
    flavor: "Patrono Transcendental"
    description: "Senhores feéricos caprichosos; encantos, ilusões e desaparecimentos."
    choose_level: 1
    expanded_spells:
      1: ["fogo das fadas","sono"]
      2: ["acalmar emoções","força fantasmagórica"]
      3: ["piscar","crescimento de plantas"]
      4: ["dominar besta","invisibilidade maior"]
      5: ["dominar pessoa","parecer"]
    levels:
      - level: 1
        features:
          - name: "Presença Feérica"
            description: "Ação: cubo 3 m; criaturas fazem TS Sab (CD magias). Falha: enfeitiçado ou amedrontado (sua escolha) até o fim do seu próximo turno."
            rules:
              uses: { per: "descanso curto/longo", value: 1 }
      - level: 6
        features:
          - name: "Fuga Nebulosa"
            description: "Reação ao sofrer dano: teleporta até 18 m e fica invisível até o início do seu próximo turno (ou até atacar/conjurar)."
            rules:
              uses: { per: "descanso curto/longo", value: 1 }
      - level: 10
        features:
          - name: "Defesas Sedutoras"
            description: "Imunidade a enfeitiçado; ao tentarem enfeitiçá-lo, reação: alvo faz TS Sab ou fica enfeitiçado por 1 min."
      - level: 14
        features:
          - name: "Delírio Sombrio"
            description: "Ação: 1 alvo a 18 m faz TS Sab; falha → preso em reino ilusório (enfeitiçado ou amedrontado, sua escolha) por até 1 min; requer concentração."
            rules:
              uses: { per: "descanso curto/longo", value: 1 }

  corruptor:
    name: "Corruptor"
    flavor: "Patrono Transcendental"
    description: "Pactos infernais; sobrevivência implacável e fogo devastador."
    choose_level: 1
    expanded_spells:
      1: ["mãos flamejantes","comando"]
      2: ["cegueira/surdez","raio abrasador"]
      3: ["bola de fogo","nuvem fétida"]
      4: ["escudo de fogo","muralha de fogo"]
      5: ["raio solar sagrado","solo consagrado"]
    levels:
      - level: 1
        features:
          - name: "Bênção do Diabo"
            description: "Ao reduzir uma criatura hostil a 0 PV: ganha PV temporários = CAR + nível de bruxo."
      - level: 6
        features:
          - name: "Sorte do Diabo"
            description: "1/descanso: após rolar (antes do resultado), adiciona 1d10 a 1 teste de habilidade ou resistência."
      - level: 10
        features:
          - name: "Resiliência Infernal"
            description: "Após um descanso, escolhe 1 tipo de dano (exceto físico não mágico); tem resistência até escolher outro."
      - level: 14
        features:
          - name: "Arremessar ao Inferno"
            description: "Ao acertar um ataque: bane o alvo até o fim do seu próximo turno; quando retorna, sofre 10d10 psíquico."
            rules:
              uses: { per: "descanso curto/longo", value: 1 }

  grande-antigo:
    name: "Grande Antigo"
    flavor: "Patrono Transcendental"
    description: "Entidades cósmicas insondáveis; telepatia e manipulação mental."
    choose_level: 1
    expanded_spells:
      1: ["sussurros dissonantes","gargalhada horrível de Tasha"]
      2: ["detectar pensamentos","força fantasmagórica"]
      3: ["clarividência","enviar mensagem"]
      4: ["tentáculos negros de Evard","dominar besta"]
      5: ["telecinesia","modificar memória"]
    levels:
      - level: 1
        features:
          - name: "Mente Desperta"
            description: "Telepatia com criatura que você vê a até 9 m (se entender um idioma)."
      - level: 6
        features:
          - name: "Distorção Entrópica"
            description: "Reação ao ser alvo de ataque: impõe desvantagem; se errar, você tem vantagem no próximo ataque contra o alvo por até 1 min."
            rules:
              uses: { per: "descanso curto/longo", value: 1 }
      - level: 10
        features:
          - name: "Escudo de Pensamentos"
            description: "Resistência a psíquico; quando sofre psíquico, o agressor sofre a mesma quantidade."
      - level: 14
        features:
          - name: "Criar Servo"
            description: "Ação: toque um humanóide incapacitado; fica enfeitiçado indefinidamente (até efeitos como Remover Maldição). Telepatia com ele no mesmo plano."

  # ——— PATRONOS (EXTRAS DA SUA MESA) ———
  patrono-morte:
    name: "A Morte"
    flavor: "Patrono Transcendental"
    description: "Necromancia, mortos-vivos e toque fúnebre."
    choose_level: 1
    expanded_spells:
      1: ["ray-of-sickness","false-life"]
      2: ["ray-of-enfeeblement","gentle-repose"]
      3: ["animate-dead","speak-with-dead"]
      4: ["phantasmal-killer","blight"]
      5: ["antilife-shell","cloudkill"]
    levels:
      - level: 1
        features:
          - name: "Cria da Não-Vida"
            description: "Resistência a necrótico e veneno; mortos-vivos não o hostilizam sem provocação."
            grants: { defenses: { resistance: ["necrótico","veneno"] } }
      - level: 6
        features:
          - name: "Toque Mortal"
            description: "Toca humanóide vivo a 0 PV para matá-lo; ergue como zumbi sob comando (2 usos a partir do 12º)."
      - level: 10
        features:
          - name: "Rigor Mortis"
            description: "Resistência a físico não-mágico não-prata; estabiliza a 0 PV; não precisa comer, beber, dormir ou respirar."
      - level: 14
        features:
          - name: "Dança da Morte"
            description: "Seu tipo muda para morto-vivo; imunidades amplas; pode influenciar/comandar mortos-vivos com Persuasão."

  patrono-arcanjo-vingador:
    name: "O Arcanjo Vingador"
    flavor: "Patrono Transcendental"
    description: "Justiça radiante e vingança sagrada."
    choose_level: 1
    expanded_spells:
      1: ["detect-evil-and-good","guiding-bolt"]
      2: ["branding-smite","zone-of-truth"]
      3: ["blinding-smite","death-ward"]
      4: ["staggering-smite","protection-from-death"]
      5: ["dispel-evil-and-good","destructive-wave"]
    levels:
      - level: 1
        features:
          - name: "Servo dos Anjos"
            description: "Fala Celestial; resistência a radiante; proficiência em Intuição; ganha o truque 'chama sagrada'."
            grants:
              languages: ["Celestial"]
              defenses: { resistance: ["radiante"] }
              proficiencies: { skills: ["Intuição"] }
      - level: 6
        features:
          - name: "Poder Angelical"
            description: "Primeiro acerto do turno: +1d8 radiante (ou +2d8 vs corruptor/morto-vivo). No 12º: +2d8 / +4d8."
      - level: 10
        features:
          - name: "Virtudes Celestiais"
            description: "Vantagem contra medo, exaustão e encanto; vantagem em Intuição para detectar mentiras."
      - level: 14
        features:
          - name: "Marca da Vingança"
            description: "Marca 1 min (TS CAR). Remove resistência/imunidade a radiante (pode torná-lo vulnerável) e bloqueia teleporte; penalidades extras vs corruptor/morto-vivo."

  patrono-espirito-heroico:
    name: "O Espírito Heroico"
    flavor: "Patrono Transcendental"
    description: "Heroísmo ancestral emprestado; retaliação, tenacidade e avatar."
    choose_level: 1
    expanded_spells:
      1: ["heroism","longstrider"]
      2: ["enhance-ability","spiritual-weapon"]
      3: ["spirit-guardians","beacon-of-hope"]
      4: ["guardian-of-faith","freedom-of-movement"]
      5: ["plane-shift-anchor","bigbys-hand"]
    levels:
      - level: 1
        features:
          - name: "Retaliação Resoluta"
            description: "Reação a crítico ou a cair a 0 PV: reduz dano à metade ou fica com 1 PV; ganha vantagem e +1d8 contra o agressor até o fim do próximo turno."
      - level: 6
        features:
          - name: "Vigor do Herói"
            description: "Reduz 3 de dano físico não-mágico (10º: 5)."
      - level: 10
        features:
          - name: "Salvaguarda Heróica"
            description: "Reação: conjura truque/magia ofensiva no atacante ou defensiva no aliado a 9 m."
      - level: 14
        features:
          - name: "Avatar Espiritual"
            description: "1 h: resistência a físico não-mágico, vantagem em ataques, +1 ataque bônus/turno e +CAR em todos os TS."

  patrono-supragenio:
    name: "O Supragênio"
    flavor: "Patrono Transcendental"
    description: "Intelecto cósmico e poder elemental dos gênios."
    choose_level: 1
    expanded_spells:
      1: ["detect-evil-and-good","disguise-self"]
      2: ["detect-thoughts","rope-trick"]
      3: ["clairvoyance","blink"]
      4: ["conjure-minor-elementals","hallucinatory-terrain"]
      5: ["legend-lore","conjure-elemental"]
    choices:
      genie_lineage:
        choose: 1
        options:
          - id: "dao"
            name: "Dao (Terran)"
            grants:
              languages: ["Terran"]
              proficiencies: { skills: ["Atletismo"] }
              defenses: { resistance: ["ácido"] }
          - id: "djinni"
            name: "Djinni (Auran)"
            grants:
              languages: ["Auran"]
              proficiencies: { skills: ["Acrobacia"] }
              defenses: { resistance: ["relâmpago"] }
          - id: "efreeti"
            name: "Efreeti (Ignan)"
            grants:
              languages: ["Ignan"]
              proficiencies: { skills: ["Intimidação"] }
              defenses: { resistance: ["fogo"] }
          - id: "marid"
            name: "Marid (Aquan)"
            grants:
              languages: ["Aquan"]
              movement: { swim_ft: 30 }
              defenses: { resistance: ["frio"] }
    levels:
      - level: 1
        features:
          - name: "Traço do Sultão Planar"
            description: "Recebe idioma planar, 1 perícia (outra) e resistência ligada ao gênio escolhido."
      - level: 6
        features:
          - name: "Conjuração Elemental"
            description: "Converte o tipo de dano das suas magias para o do patrono e adiciona +1d6 no primeiro acerto (12º: +2d6)."
      - level: 10
        features:
          - name: "Forma Prodigiosa"
            description: "Metade inferior enevoada; voo planar por 10 min; imunidade ao elemento do patrono."
      - level: 14
        features:
          - name: "Seu Desejo é uma Ordem"
            description: "Tenta invocar o patrono para realizar 1 desejo (riscos e limites). No 20º, invoca automaticamente."

  patrono-tita-caido:
    name: "O Titã Caído"
    flavor: "Patrono Transcendental"
    description: "Força primordial e ruína antiga; forma titânica temporária."
    choose_level: 1
    expanded_spells:
      1: ["heroism","protection-from-evil-and-good"]
      2: ["enlarge-reduce","pass-without-trace"]
      3: ["water-walk","water-breathing"]
      4: ["polymorph","dimension-door"]
      5: ["commune","dispel-evil-and-good"]
    levels:
      - level: 1
        features:
          - name: "Manipulação de Energia"
            description: "Quando uma magia sua causaria dano elemental, pode trocar o tipo e adicionar +1d8 (2 usos/descanso)."
      - level: 6
        features:
          - name: "Incentivo Titânico"
            description: "Ação: aliados a 18 m não podem ser amedrontados/encantados e têm vantagem em testes/TS até seu próximo turno."
      - level: 10
        features:
          - name: "Bênção do Empírico"
            description: "Não envelhece; vantagem em TS contra magias/efeitos mágicos."
      - level: 14
        features:
          - name: "Pseudo-Titã"
            description: "1 min: tamanho Grande, For 21, +1d8 com armas, CON 15 pode atordoar; deslocamentos extras; Manipulação de Energia ilimitada."

  patrono-vazio:
    name: "O Vazio"
    flavor: "Patrono Transcendental"
    description: "Nada e entropia; silencia, apaga e consome."
    choose_level: 1
    expanded_spells:
      1: ["inflict-wounds","fog-cloud"]
      2: ["blindness-deafness","silence"]
      3: ["nondetection","blink"]
      4: ["phantasmal-killer","greater-invisibility"]
      5: ["passwall","cloudkill"]
    levels:
      - level: 1
        features:
          - name: "Toque do Vazio"
            description: "Ataque corpo-a-corpo: 1d8 frio + CAR; TS CON ou alvo fica impedido brevemente."
      - level: 6
        features:
          - name: "Proteção do Vácuo"
            description: "Reação: anula totalmente o dano de uma fonte (1 uso; 13º: 2 usos)."
      - level: 10
        features:
          - name: "Manto do Esquecimento"
            description: "Impõe amnésia (TS INT) a 18 m por 24 h."
      - level: 14
        features:
          - name: "Esfera de Obliteração"
            description: "Cria esfera de antimatéria por até 1 min (concentração); dano de energia e sucção a 0 PV; move com ação bônus."

  # ——— DÁDIVAS DE PACTO (nível 3) ———
  boons:
    corrente:
      id: "pact_of_the_chain"
      name: "Dádiva da Corrente"
      choose_level: 3
      description: "Um familiar especial serve como agente e espião; pode atacar."
      features:
        - name: "Familiar de Pacto"
          description: "Aprende 'encontrar familiar'; formas especiais (diabrete, pseudodragão, quasit, duende). Pode atacar e entregar magias de toque."
    lamina:
      id: "pact_of_the_blade"
      name: "Dádiva da Lâmina"
      choose_level: 3
      description: "Cria/vence uma arma de pacto mágica, sempre à mão."
      features:
        - name: "Arma de Pacto"
          description: "Ação: cria arma corpo a corpo que você domina; conta como mágica. Pode vincular 1 arma mágica (ritual 1 h) e invocá-la."
    tomo:
      id: "pact_of_the_tome"
      name: "Dádiva do Tomo"
      choose_level: 3
      description: "Um Livro das Sombras com 3 truques de qualquer lista."
      features:
        - name: "Livro das Sombras"
          description: "Ganha 3 truques de qualquer classe (CAR). Se perdido, pode recriar (ritual 1 h; destrói o anterior)."

  # ——— INVOCAÇÕES MÍSTICAS ———
  invocations:
    - id: "agonizing_blast"
      name: "Explosão Agonizante"
      effect: "Raio místico causa +CAR de dano."
    - id: "repelling_blast"
      name: "Explosão Repulsiva"
      effect: "Empurra o alvo até 3 m por acerto do Raio místico."
    - id: "eldritch_spear"
      name: "Lança Mística"
      effect: "Aumenta o alcance do Raio místico (~90 m)."
    - id: "eldritch_sight"
      name: "Visão Mística"
      effect: "Detectar Magia à vontade."
    - id: "devils_sight"
      name: "Visão do Diabo"
      effect: "Enxerga na escuridão normal e mágica (~36 m)."
    - id: "fiendish_vigor"
      name: "Vigor Ínfero"
      effect: "Armadura de Agathys em si à vontade (nível base)."
    - id: "mask_of_many_faces"
      name: "Máscara de Muitos Rostos"
      effect: "Disfarçar-se à vontade."
    - id: "misty_visions"
      name: "Visões Enevoadas"
      effect: "Imagem Silenciosa à vontade."
    - id: "beast_speech"
      name: "Fala com Bestas"
      effect: "Falar com Animais à vontade."
    - id: "beguiling_influence"
      name: "Influência Sedutora"
      effect: "Proficiência em Enganação e Persuasão."
    - id: "eyes_of_the_rune_keeper"
      name: "Olhos do Guardião de Runas"
      effect: "Lê todas as escritas."
    - id: "one_with_shadows"
      name: "Um com as Sombras"
      prereq: ["5º nível"]
      effect: "Fica invisível enquanto imóvel em luz fraca/escuridão."
    - id: "sign_of_ill_omen"
      name: "Sinal do Mau Augúrio"
      prereq: ["5º nível"]
      effect: "Pode conjurar Amaldiçoar usando espaço de bruxo."
    - id: "mire_the_mind"
      name: "Lama da Mente"
      prereq: ["5º nível"]
      effect: "Pode conjurar Lentidão usando espaço de bruxo."
    - id: "sculptor_of_flesh"
      name: "Escultor de Carne"
      prereq: ["7º nível"]
      effect: "Pode conjurar Metamorfose usando espaço de bruxo."
    - id: "dreadful_word"
      name: "Palavra Medonha"
      prereq: ["7º nível"]
      effect: "Pode conjurar Confusão usando espaço de bruxo."
    - id: "ascendant_step"
      name: "Passo Ascendente"
      prereq: ["9º nível"]
      effect: "Levitar em si mesmo à vontade."
    - id: "minions_of_chaos"
      name: "Lacaios do Caos"
      prereq: ["9º nível"]
      effect: "Conjurar Elemental usando espaço de bruxo."
    - id: "whispers_of_the_grave"
      name: "Sussurros da Sepultura"
      prereq: ["9º nível"]
      effect: "Falar com os Mortos à vontade."
    - id: "visions_of_distant_realms"
      name: "Visões de Reinos Distantes"
      prereq: ["15º nível"]
      effect: "Olho Arcano à vontade."
    - id: "master_of_myriad_forms"
      name: "Mestre de Incontáveis Formas"
      prereq: ["15º nível"]
      effect: "Transformação à vontade."
    - id: "witch_sight"
      name: "Visão de Bruxa"
      prereq: ["15º nível"]
      effect: "Vê a forma verdadeira de criaturas transformadas/invisíveis (alcance curto)."
    # — Invocações que exigem Dádiva específica —
    - id: "voice_of_the_chain_master"
      name: "Voz do Mestre das Correntes"
      prereq: ["Dádiva da Corrente"]
      requires_pact: "corrente"
      effect: "Vê/ouve via familiar e fala por ele; ignora distância/plano."
    - id: "chains_of_carceri"
      name: "Cadeias de Carceri"
      prereq: ["15º nível","Dádiva da Corrente"]
      requires_pact: "corrente"
      effect: "Conter Monstro à vontade contra celestiais/elementais/infernais (1/vez por alvo por descanso longo)."
    - id: "thirsting_blade"
      name: "Lâmina Sedenta"
      prereq: ["5º nível","Dádiva da Lâmina"]
      requires_pact: "lamina"
      effect: "Quando usa a ação Ataque com a arma de pacto, ataca duas vezes."
    - id: "lifedrinker"
      name: "Sorvedor de Vidas"
      prereq: ["12º nível","Dádiva da Lâmina"]
      requires_pact: "lamina"
      effect: "Ataques com a arma de pacto causam +CAR de dano necrótico."
    - id: "book_of_ancient_secrets"
      name: "Livro dos Segredos Antigos"
      prereq: ["Dádiva do Tomo"]
      requires_pact: "tomo"
      effect: "Inscreve e conjura quaisquer magias com a tag 'ritual' como ritual via Livro das Sombras."

cozinheiro:
  mestre-da-fritura:
    name: "Mestre da Fritura"
    flavor: "Arquétipo do Cozinheiro"
    description: "Especialista em óleo quente, frigideiras chiando e estalos que distraem inimigos enquanto fortalecem o grupo."
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Óleo Borbulhante"
            description: "Acende óleo e o arremessa como ação: área pequena que causa dano e pode derrubar."
            rules:
              action: true
              range_m: 6
              area: "círculo 1,5 m"
              save:
                ability: "Destreza"
                dc_formula: "8 + proficiência + Sab ou Int (à sua escolha)"
                on_fail:
                  - "sofre 2d6 fogo"
                  - "fica caído (se já estava encharcado/oleoso)"
                on_success: "metade do dano e não cai"
              ongoing:
                start_of_turn_damage: "1d6 fogo"
                end_condition:
                  - "ação para apagar"
                  - "chuva/imersão"
                  - "passar no TS Destreza uma vez"
              uses:
                per: "descanso curto ou longo"
                value: 2
          - name: "Frigideira Tática"
            description: "Proficiência com frigideiras/utensílios como armas improvisadas; contam como mágicas para resistências."
            rules:
              weapons:
                improvised:
                  treated_as: "Clava (1d6 concussão)"
                  counts_as_magical: true
              bonus:
                on_hit_once_per_turn: "+1d4 fogo"
      - level: 6
        features:
          - name: "Sela e Sela!"
            description: "Ação bônus após acertar ataque corpo a corpo: marca o alvo e o deixa relutante a se mover por causa do óleo quente."
            rules:
              bonus_action: true
              mark_until: "fim do seu próximo turno"
              effects_while_marked:
                move_penalty: "terreno difícil quando se afasta de você"
                first_time_leaves_your_reach_each_turn:
                  damage: "1d6 fogo"
              uses:
                per: "descanso curto ou longo"
                value: "Sab (mín. 1)"
      - level: 10
        features:
          - name: "Crosta Perfeita"
            description: "Quando você ou aliado em até 3 m causar dano de fogo, pode realçar o sabor (e a dor)."
            rules:
              reaction: true
              range_m: 3
              trigger: "você ou aliado causa dano de fogo"
              effect: "+1d8 fogo ao dano"
              uses:
                per: "descanso curto ou longo"
                value: 2
      - level: 14
        features:
          - name: "Tempestade de Estalos"
            description: "Ação: cria zona chiando (concentração) que cega/distrai e queima levemente."
            rules:
              action: true
              duration: "1 minuto (concentração)"
              area: "raio 6 m, centrado em ponto a 18 m"
              effects:
                obscurement: "leve; visão sofre desvantagem na área"
                start_of_turn_damage: "1d4 fogo (criaturas hostis)"
                save_end_of_turn:
                  ability: "Constituição"
                  on_fail: "desvantagem em Percepção (visão) e na primeira jogada de ataque dentro da área até o próximo turno"
              uses:
                per: "descanso longo"
                value: 1

  alquimista-gourmet:
    name: "Alquimista Gourmet"
    flavor: "Arquétipo do Cozinheiro"
    description: "Caldeirão, infusões e especiarias tônicas; cozinha que cura, fortifica e explode."
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Caldeirão de Campo"
            description: "Durante descanso curto, prepara duas poções culinárias simples."
            rules:
              short_rest:
                brew:
                  count: 2
                  options:
                    - id: "sopa_vigor"
                      name: "Sopa do Vigor"
                      effect: "Ao beber, ganha 1d6 + seu mod. Sab PV temporários por 1 h"
                    - id: "cha_clareza"
                      name: "Chá da Clareza"
                      effect: "Vantagem no próximo teste de Sabedoria ou Inteligência em 1 h (consome no uso)"
                    - id: "molho_ardente"
                      name: "Molho Ardente"
                      effect: "Próximo ataque corpo a corpo do alvo causa +1d6 fogo"
              spoilage: "estragam ao final de um descanso longo"
          - name: "Kit de Alquicozinha"
            description: "Proficiência com Kit de Herbalismo e Ferramentas de Alquimia; usa Sab para CD de itens criados."
            grants:
              proficiencies:
                tools:
                  add:
                    - "Kit de Herbalismo"
                    - "Ferramentas de Alquimia"
      - level: 6
        features:
          - name: "Redução e Concentração"
            description: "Pode gastar ação para concentrar uma infusão existente e turbinar seu efeito."
            rules:
              action: true
              target: "uma poção culinária sua não consumida"
              effect: "duplica o dado base (ex.: 1d6 → 2d6) OU transforma vantagem em +1d4 de bônus (escolha no uso)"
              uses:
                per: "descanso curto ou longo"
                value: 2
      - level: 10
        features:
          - name: "Granada de Pimenta"
            description: "Ação: arremessa frasco que irrita olhos e pulmões; área pequena com dano leve e cegueira breve."
            rules:
              action: true
              range_m: 9
              area: "círculo 3 m"
              save:
                ability: "Constituição"
                dc_formula: "8 + proficiência + Sab"
                on_fail:
                  - "cegueira até o fim do próximo turno"
                  - "1d8 ácido (vapores)"
                on_success: "metade do dano e não fica cego"
              uses:
                per: "descanso curto ou longo"
                value: 2
      - level: 14
        features:
          - name: "Cardápio Magistral"
            description: "Durante descanso longo, prepara 1 refeição lendária para até 6 criaturas."
            rules:
              long_rest:
                cook_legendary_meal: true
                pick_one_menu:
                  - id: "banquete_vital"
                    name: "Banquete Vital"
                    effects:
                      - "cada alvo recupera 4d8 + seu mod. Sab PV"
                      - "remove 1 condição: envenenado, amedrontado ou exausto (−1 nível)"
                  - id: "mesa_do_ferreiro"
                    name: "Mesa do Ferreiro"
                    effects:
                      - "por 24 h, armas dos alvos contam como mágicas e ganham +1 no dano (não acumula com bônus existentes)"
                  - id: "sobremesa_eterea"
                    name: "Sobremesa Etérea"
                    effects:
                      - "cada alvo pode, 1 vez nas próximas 24 h, usar ação bônus para ficar etéreo até o fim do turno"
              uses:
                per: "descanso longo"
                value: 1

  doceiro-encantado:
    name: "Doceiro Encantado"
    flavor: "Arquétipo do Cozinheiro"
    description: "Açúcar, magia e calorosas lembranças; confeitos que inspiram, confundem e acalmam."
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Balas Inspiradoras"
            description: "Ação bônus: entrega doce que fornece um dado de inspiração açucarada."
            rules:
              bonus_action: true
              range_m: 3
              grant_die:
                size_by_level:
                  "3": "d6"
                  "10": "d8"
                  "14": "d10"
                usage:
                  - "jogada de ataque"
                  - "teste de habilidade"
                  - "teste de resistência"
              uses:
                per: "dia"
                value: "Carisma (mín. 1)"
          - name: "Confeitaria Apaziguante"
            description: "Quando alguém consumir um de seus doces durante descanso curto, adiciona +1d6 à cura de Dados de Vida dessa criatura."
      - level: 6
        features:
          - name: "Guloseima Hipnótica"
