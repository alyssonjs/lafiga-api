druid:
  circulo-da-terra:
    name: "Círculo da Terra"
    flavor: "Círculo Druídico"
    description: "Místicos que guardam ritos antigos; magias do terreno e recuperação arcana."
    choose_level: 2
    rules:
      spellcasting:
        ability: "Sabedoria"
