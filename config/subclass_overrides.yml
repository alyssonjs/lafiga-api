  # ——— OBRAS ORIGINAIS DA SUA MESA ———
  cacador-de-tesouros:
    name: "Caçador de Tesouros"
    flavor: "Arquétipo do Ladino"
    description: |
      Você se especializou em invadir e saquear locais perigosos. Esse arquétipo é seguido por diversos aventureiros em busca de tesouros antigos e que desejam evitar os habitantes e perigos existentes na maioria dos hostis ambientes subterrâneos e selvagens. Conforme progride, você desenvolve técnicas que permitem que você tome o caminho mais fácil e seguro para os grandes prêmios existentes em quase todas as masmorras e covis de criaturas poderosas que habitam no mundo.
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Invasor Profissional"
            description: |
              A partir do 3° nível, você aprimora sua perícia em abrir fechaduras e desarmar armadilhas em masmorras. Você adquire vantagem em testes de Inteligência (Investigação) feitos para encontrar armadilhas e em testes feitos com ferramentas de ladrão para abrir fechaduras e desarmar armadilhas.
          - name: "Sentir Armadilha"
            description: |
              No 3° nível, você se torna perito em evitar os perigos mais comuns elaborados pelos habitantes de masmorras contra invasores. Você adquire resistência a dano de armadilhas e tem vantagem em testes de resistência contra armadilhas.
      - level: 9
        features:
          - name: "Evitar o Perigo"
            description: |
              No 9° nível, você consegue passar despercebido por áreas em que existam inimigos, mas que não tenham notado sua presença, silenciosamente escalando as paredes ou até passando pelo teto. Você adquire deslocamento de escalada 6 metros e pode escalar qualquer superfície não-mágica e até andar de cabeça para baixo no teto sem precisar realizar um teste de Força (Atletismo). Você recebe vantagem em testes de Destreza (Furtividade) se usar seu movimento ou a ação de Disparada e terminar seu turno atrás de uma barreira que possa dar cobertura a você. Além disso, é impossível rastrear você por meios não-mágicos.
      - level: 13
        features:
          - name: "Encontrar Tesouro"
            description: |
              No 13° nível, você sabe exatamente onde procurar por itens valiosos quando está explorando e nada passa despercebido ao seu olhar ganancioso e ávido por riquezas. Você recebe +5 de bônus nos seus valores de Sabedoria (Percepção) e Inteligência (Investigação) passivos para encontrar tesouros e saberá que um objeto é mágico assim que tocar nele. Além disso, sempre que você passar a menos de 6 metros de um item mágico, obra de arte, gema ou item de valor que esteja escondido, você saberá que existe algo valioso escondido nas proximidades e poderá realizar um teste de Inteligência (Investigação) com vantagem para procurar esse tesouro.
      - level: 17
        features:
          - name: "Fuga Sobrenatural"
            description: |
              Ao atingir o 17° nível, mesmo nos raros momentos em que você é descoberto por seus inimigos, você consegue criar uma rota de fuga totalmente inesperada. Você pode usar sua ação para magicamente atravessar uma barreira não-mágica de até 1,5 metro de espessura, aparecendo no espaço desocupado mais próximo dessa barreira do outro lado dela. Se a barreira tiver mais de 1,5 metro de espessura, sua tentativa fracassa e você permanece no espaço atual. Além disso, você ganha vantagem em testes de habilidade e testes de resistência contra efeitos que lhe imponham as condições agarrado, impedido ou paralisado.

  dancarino-das-sombras:
    name: "Dançarino das Sombras"
    flavor: "Arquétipo do Ladino"
    description: |
      Você enveredou por um caminho sombrio e sobrenatural, adquirindo poderes direto da Umbra. Ao se tornar um dançarino das sombras você aprende a manipular a energia das trevas com uma maestria sem igual. Você pode praticamente sumir na escuridão e até mesmo usar o Plano das Sombras para surpreender seus inimigos.
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Camuflagem Sombria"
            description: |
              A partir do 3° nível, você aprende a usar as trevas para se camuflar. Você recebe vantagem em testes de Destreza (Furtividade) enquanto estiver em áreas de escuridão ou penumbra. Além disso, uma criatura sofre desvantagem nas jogadas de ataque contra você enquanto permanecer nessa área, mesmo que possa ver no escuro.
          - name: "Ver nas Trevas"
            description: |
              A partir do 3° nível, sua visão se adapta às trevas, o ambiente em que você se sente mais confortável. Você enxerga na penumbra a até 18 metros como se fosse luz plena, e no escuro como se fosse na penumbra.
      - level: 9
        features:
          - name: "Projeção Sombria"
            description: |
              No 9° nível, você desenvolve uma técnica letal quando surpreende um inimigo com um ataque vindo das trevas. Usando sua ação, enquanto estiver escondido em uma área de escuridão ou penumbra, você pode fazer com que sua mão entre na sombra que você ocupa e apareça em outra, que você possa ver, a até 15 metros de você. Você pode realizar um ataque corpo-a-corpo como parte dessa ação e isso não denunciará sua localização.
      - level: 13
        features:
          - name: "Viagem Umbral"
            description: |
              No 13° nível, você pode viajar através do Plano das Sombras. Com sua ação, você pode entrar na Umbra e sair dela no início do seu próximo turno. No Plano das Sombras, você se move até o dobro do seu deslocamento de caminhada e pode se mover através de criaturas e objetos do Plano Material como se eles fossem terreno difícil, mas você não pode terminar seu turno em um espaço ocupado. Enquanto estiver lá, você não pode atacar nem ser atacado por ninguém no Plano Material, exceto por uma criatura que possa acessar o Plano das Sombras.
              Você pode usar essa característica duas vezes. Após isso, você precisa terminar um descanso curto ou longo para usá-la novamente.
      - level: 17
        features:
          - name: "Forma de Sombra"
            description: |
              Ao atingir o 17° nível, você consegue se mesclar às trevas a um ponto em que é impossível distinguir o que é você e o que é escuridão. Com sua ação, você pode assumir uma forma sombria por 1 minuto que tem as seguintes características:
              • Você tem resistência a dano de concussão, cortante e perfurante de ataques não-mágicos.
              • Você pode usar a característica Viagem Umbral, uma vez por rodada, enquanto permanecer nessa forma.

  face-fantasmagorica:
    name: "Face Fantasmagórica"
    flavor: "Arquétipo do Ladino"
    description: |
      Você ingressou no clã recluso de assassinos mascarados conhecido como Face Fantasmagórica. Esse clã secreto surgiu quando seu fundador fez uma barganha com seres das trevas para conseguir vingança contra seus inimigos. Desde então, ele recrutou um exército de assassinos de elite especializados em matar seus oponentes usando o medo. Ao ingressar nesse clã, você passa a usar uma máscara apavorante que permite que você penetre na mente dos seus inimigos, alcançando seus mais profundos medos e despertando seus pesadelos adormecidos.
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Presença Intimidante"
            description: |
              A partir do 3° nível, sua mera presença já se torna desconfortável para outras criaturas. Você se torna proficiente em Intimidação, se ainda não for. Além disso, você tem vantagem em testes de Carisma (Intimidação), porém você sofre desvantagem em testes de Carisma (Persuasão). Quando você for bem sucedido em intimidar uma criatura, ela ficará amedrontada em relação a você até o início do seu próximo turno.
          - name: "Ataque Apavorante"
            description: |
              No 3° nível, quando você atacar uma criatura surpresa, você consegue gelar o coração dela de medo. Se você estiver com sua máscara apavorante e realizar um ataque corpo-a-corpo contra uma criatura que não possa ver você, além de causar o dano normal, você pode deixar o alvo amedrontado. Você aparece na frente da criatura atingida e, se ela puder ver você, ela deve ser bem sucedida num teste de resistência de Sabedoria (CD 8 + seu bônus de proficiência + seu modificador de Carisma) ou ficará amedrontada em relação a você por 1 minuto. O alvo pode realizar um novo teste de resistência no final de cada turno dele, terminando o efeito com um sucesso. Se uma criatura for bem sucedida no teste de resistência, você não poderá usar essa característica nessa criatura novamente por 24 horas.
      - level: 9
        features:
          - name: "Pesadelo Furtivo"
            description: |
              No 9° nível, você consegue desaparecer da mente de uma criatura que esteja com medo de você, apavorando-a através de sons fantasmagóricos ou sopros gélidos. Enquanto uma criatura estiver amedrontada em relação a você, você pode, com uma ação bônus, realizar um teste de Destreza (Furtividade) CD 15, para ficar invisível para essa criatura. A criatura sofre desvantagem em testes de habilidade e jogadas de ataque mesmo que não possa ver você, mas ela pode se mover voluntariamente para uma posição que a faça terminar o turno mais próximo de você, já que não consegue te ver. Você aparece para a criatura se atacá-la ou conjurar uma magia nela.
      - level: 13
        features:
          - name: "Inversão do Medo"
            description: |
              No 13° nível, você se torna uma cria dos pesadelos. Você tem vantagem em testes de resistência para não ser amedrontado. Além disso, quando uma criatura que você possa ver conjurar uma magia ou usar uma habilidade que possa amedrontar você e você for bem sucedido no teste de resistência contra o efeito, se você estiver com sua máscara apavorante, você pode usar sua reação para amedrontar essa criatura. Ela deve ser bem sucedida num teste de resistência de Sabedoria (CD 8 + seu bônus de proficiência + seu modificador de Carisma) ou ficará amedrontada em relação a você por 1 minuto. O alvo pode realizar um novo teste de resistência no final de cada turno dele, terminando o efeito com um sucesso.
      - level: 17
        features:
          - name: "Pavor Atormentador"
            description: |
              Ao atingir o 17° nível, quando você amedronta uma criatura, o alvo pode literalmente morrer de medo devido aos pesadelos que tumultuam sua mente. Sempre que uma criatura terminar o turno dela amedrontada em relação a você por qualquer motivo, você pode usar sua reação para causar 4d10 de dano psíquico nela. A partir de agora, seus efeitos de medo são tão poderosos que até mesmo criaturas imunes à condição amedrontado podem ser afetadas por suas características de medo. Essas criaturas recebem vantagem nos testes de resistência para não serem amedrontadas.

  lamina-invisivel:
    name: "Lâmina Invisível"
    flavor: "Arquétipo do Ladino"
    description: |
      Você focou todo o seu treinamento em técnicas de combate utilizando facas, adagas e armas similares. Armado com suas adagas, você é mais letal que a maioria dos combatentes treinados. Usando movimentos rápidos com suas mãos enquanto brande suas adagas, você ludibria os sentidos dos seus adversários, deixando-os aturdidos conforme você desfere golpes precisos em sequência. Além de adquirir uma maestria incomparável no uso de lâminas leves, você aprende a enganar a visão dos seus inimigos enquanto dança no campo de batalha.
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Mão Invisível"
            description: |
              A partir do 3° nível, você desenvolve uma técnica que permite desferir um ataque tão rápido que o alvo se quer percebe que foi atingido. Com sua ação, realize um único ataque com uma arma leve perfurante contra uma criatura surpresa. Se você atingir, role o dano normalmente, porém, o alvo não saberá que sofreu esse dano até o final do seu próximo turno. Se você atacou o alvo enquanto estava escondido, esse ataque não revelará sua localização. Além disso, você recebe vantagem em todos os testes de Destreza (Prestidigitação) que fizer usando armas leves perfurantes.
          - name: "Lâmina Veloz"
            description: |
              Também a partir do 3° nível, você pode realizar um ataque repentino com uma arma escondida. Com uma ação bônus, você pode sacar uma arma leve perfurante escondida e realizar um ataque com ela. Você recebe vantagem nesse ataque e, se atingir, ele será considerado um Ataque Furtivo mesmo que você já tenha realizado seu Ataque Furtivo nessa rodada. Se a arma tiver a propriedade arremesso, você pode arremessá-la com esse ataque. Após usar essa característica, você precisa terminar um descanso curto ou longo para usá-la novamente. No 13° nível, você pode usar essa característica duas vezes antes de precisar terminar um descanso, mas não mais de uma vez por turno.
      - level: 9
        features:
          - name: "Ataque Extra"
            description: |
              No 9° nível, você pode atacar duas vezes, ao invés de uma, quando usar a ação de Ataque durante seu turno.
      - level: 13
        features:
          - name: "Desaparecer na Multidão"
            description: |
              No 13° nível, você consegue sumir em meio ao combate ao provocar uma distração. Se você usar seu movimento para passar por trás de uma criatura amigável ou um barreira que seja maior que você, você pode usar uma ação bônus para ser afetado pela magia invisibilidade por até 1 minuto. Diferente dos efeitos normais de invisibilidade, apenas as criaturas inimigas cuja barreira estava entre você e elas quando você usou essa característica não poderão ver você. Você aparece para essas criaturas se realizar um ataque, conjurar uma magia ou fizer qualquer barulho, como falar ou quebrar um frasco. Após usar essa característica, você precisa terminar um descanso curto ou longo para usá-la novamente.
      - level: 17
        features:
          - name: "Técnica da Lâmina Furtiva"
            description: |
              Ao atingir o 17° nível, você desenvolve uma técnica de combate que usa uma troca de mão incrivelmente rápida para ludibriar seus adversários. Durante um combate, você pode usar uma ação bônus para ativar a técnica da mão invisível por 1 minuto. Quando uma criatura realizar uma jogada de ataque corpo-a-corpo contra você a até 1,5 metro de você, você pode usar sua reação para realizar um teste de Destreza (Prestidigitação). Sua CA contra o ataque dessa criatura será igual ao resultado do seu teste de Destreza (Prestidigitação) ou sua CA normal, o que for maior. Se a criatura errar esse ataque, você pode imediatamente realizar um ataque corpo-a-corpo com uma arma leve perfurante que você estiver empunhando. Você recebe vantagem nesse ataque e, se atingir, ele será considerado um Ataque Furtivo. Esse ataque não conta na quantidade de Ataques Furtivos que você pode realizar numa rodada. Após usar essa característica, você precisa terminar um descanso longo para usá-la novamente.

  larapio-de-almas:
    name: "Larápio de Almas"
    flavor: "Arquétipo do Ladino"
    description: |
      Em algumas ocasiões, ladinos se aliam a necromantes e outros manipuladores da morte, até mesmo com mortos-vivos, quando veem vantagem nisso. Alguns desses ladinos se aprofundam ainda mais nessas alianças, ingressando no arquétipo Larápio de Almas. Esses ladinos aprendem a drenar a energia vital das criaturas e manipular essa energia em seu próprio benefício. No momento em que se torna um larápio de almas, o ladino deixa de se interessar pelas frivolidades mundanas e passa a querer apenas se apossar da vida dos outros.
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Furto de Vida"
            description: |
              A partir do 3° nível, você se torna capaz de drenar a energia vital das criaturas. Quando você atingir uma criatura viva com um ataque corpo-a-corpo que se qualifique para um ataque furtivo, você pode decidir não causar o dano extra do seu ataque furtivo. Ao invés de sofrer o dano extra, o alvo do seu ataque deve ser bem sucedido num teste de resistência de Constituição (CD 8 + seu bônus de proficiência + seu modificador de Carisma) ou sofrerá dano necrótico igual ao dano extra do seu ataque furtivo. Além disso, o máximo de pontos de vida do alvo é reduzido numa quantidade igual ao dano necrótico sofrido e você recupera uma quantidade de pontos de vida igual a esse dano. Um sucesso na resistência reduz o dano necrótico à metade e ignora a redução no máximo de pontos de vida do alvo. Você não recupera pontos de vida se o alvo obtiver um sucesso na resistência. Após usar essa característica, você precisa terminar um descanso curto ou longo para usá-la novamente.
          - name: "Dependência de Vida"
            description: |
              Também no 3° nível, você não sente mais necessidade de se alimentar ou descansar como um ser vivo normal. Você não precisa mais comer, beber ou dormir. Você ainda precisa realizar um descanso (mas não precisa dormir) para recuperar pontos de vida ou características de classe que exijam terminar um descanso longo. Uma vez por dia, você precisa drenar a energia vital de uma criatura humanoide que esteja inconsciente, porém viva, através do seu Furto de Vida. Se não fizer isso, você sofrerá desvantagem nas suas jogadas de ataque e testes de habilidade até sugar a energia de uma criatura viva dessa forma.
      - level: 9
        features:
          - name: "Sentir Vida"
            description: |
              No 9° nível, você consegue sentir a presença de criaturas vivas e pode definir o estado físico delas. Com sua ação, você pode realizar um teste de Sabedoria (Percepção) CD 15, para descobrir quantas criaturas vivas existem a até 18 metros de você. Se você se concentrar em uma criatura específica no alcance, no seu turno subsequente, você saberá se a criatura está com mais ou menos da metade do seu máximo de pontos de vida.
      - level: 13
        features:
          - name: "Drenar Energia Mística"
            description: |
              No 13° nível, você aprimora sua habilidade de furtar a energia vital de um ser vivo e passa a ser capaz de drenar sua energia mística também. Quando você atingir uma criatura viva com um ataque corpo a corpo que se qualifique para um ataque furtivo, você pode decidir não causar o dano extra do seu ataque furtivo. Ao invés de sofrer o dano extra, o alvo do seu ataque deve ser bem sucedido num teste de resistência de Carisma (CD 8 + seu bônus de proficiência + seu modificador de Carisma) ou perderá um espaço de magia disponível de nível mais alto, até o máximo de 5° nível. Você armazena a energia drenada na arma que atingiu a criatura. Durante 1 minuto, seus ataques com essa arma são considerados mágicos com o propósito de ultrapassar resistência ou imunidade a ataques e danos não-mágicos. Além disso, você recebe um bônus nas suas jogadas de dano com essa arma igual ao nível do espaço de magia drenado. Após usar essa característica, você precisa terminar um descanso curto ou longo para usá-la novamente.
      - level: 17
        features:
          - name: "Usurpar a Alma"
            description: |
              Ao atingir o 17° nível, você se torna capaz de drenar a alma das criaturas que tenham uma centelha de vida fraca. Quando você atinge uma criatura viva que esteja com menos de 40 pontos de vida, com um ataque furtivo com uma arma corpo a corpo, você pode drenar a alma dessa criatura, se fortalecendo no processo. O alvo deve ser bem sucedido num teste de resistência de Constituição (CD 8 + seu bônus de proficiência + seu modificador de Carisma) ou morrerá instantaneamente. Mesmo que passe na resistência, o alvo ainda sofrerá o dano do seu ataque furtivo normalmente. Após matar uma criatura dessa forma, você recebe vantagem nos seus testes de resistência e testes de habilidade até o final do seu próximo turno.

  mimetizador:
    name: "Mimetizador"
    flavor: "Arquétipo do Ladino"
    description: |
      Um ladino que segue o arquétipo Mimetizador não rouba ou furta bens, ele copia as habilidades possuídas por outras criaturas. Com uma compreensão além do normal sobre treinamento e estudo, um mimetizador consegue entender a forma como uma criatura acessa e adquire uma determinada habilidade apenas observando. Com uma capacidade sobrenatural, ele simula com perfeição a ação que acabou de ver e pode, inclusive, privar a criatura de usar sua própria habilidade por um período ao atingir um nível de compreensão muito elevado.
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Proficiência Adicional (Mimetizador)"
            description: |
              No 3° nível, quando você escolhe esse arquétipo, você adquire proficiência em Enganação e Intuição, se ainda não tiver.
          - name: "Copiar Habilidade"
            description: |
              A partir do 3° nível, você adquire a capacidade de simular uma habilidade que você vê em ação. Quando você vir uma criatura de nível de desafio igual ou inferior à metade do seu nível de ladino usando uma característica ou traço, você pode realizar um teste de Sabedoria (Intuição) CD 10 para copiá-lo. Se for bem sucedido, você copia a habilidade e pode usá-la por 1 hora. Você não pode copiar traços de uso limitado (que possuam usos diários ou recarregáveis) com essa característica. Apenas características que usem ações, reações ou ações bônus podem ser copiadas. Você também não pode copiar tipos de deslocamento como voo ou escavar, ou traços passivos como visão no escuro, imunidades ou resistências. A partir do 11° nível, você pode copiar traços passivos como imunidades, sentidos ou qualquer outro traço que não exija algum tipo de ação para funcionar. Após usar essa característica, você precisa terminar um descanso curto ou longo para usá-la novamente.
      - level: 9
        features:
          - name: "Simulação Avançada"
            description: |
              No 9° nível, você consegue simular características mais exclusivas de outras criaturas. Quando você vir uma criatura de nível de desafio igual ou inferior à metade do seu nível de ladino usando uma característica ou traço de uso limitado, você pode realizar um teste de Sabedoria (Intuição) CD 15 para tentar compreender como essa habilidade funciona. Se for bem sucedido, você poderá ativar a habilidade copiada uma vez a qualquer momento, num período de 1 hora. Não é possível simular a característica Conjuração através dessa característica. Após usá-la, você precisa terminar um descanso curto ou longo para usar Simulação Avançada novamente.
      - level: 13
        features:
          - name: "Simular Conjuração"
            description: |
              No 13° nível, ao observar atentamente uma criatura conjurando uma magia, você consegue compreender os gestos e verbalizações da magia. Quando você vir uma criatura conjurando uma magia que pertença a um nível igual ou inferior ao seu nível de ladino dividido por quatro, você pode realizar um teste de Sabedoria (Intuição) CD 15 + nível da magia para compreendê-la. Se você for bem sucedido, poderá conjurar a magia, uma vez, a qualquer momento, num período de 1 hora. Você precisa fornecer os componentes materiais para essa magia, se ela possuir algum. Após usar essa característica, você precisa terminar um descanso curto ou longo para usá-la novamente.
      - level: 17
        features:
          - name: "Usurpar Característica"
            description: |
              Ao atingir o 17° nível, você pode privar uma criatura de uma característica que ela possua, quando você simulá-la. Quando você vir uma criatura usando uma característica que você possa copiar com uma de suas características de mimetizador, você pode, no seu turno, usar sua ação para tocar essa criatura e realizar o teste de Sabedoria (Intuição) com a CD apropriada. Se você obtiver sucesso, o alvo deve realizar um teste de resistência de Carisma (CD 8 + seu bônus de proficiência + seu modificador de Carisma). Se fracassar, ela não poderá usar a característica que você copiou por 1 hora. Copiar uma magia impede a criatura alvo de conjurar essa magia específica por 1 hora. Você pode usar essa característica duas vezes. Após isso, você precisa terminar um descanso longo para usá-la novamente.

wizard:
  # ——— ESCOLAS (PHB) ———
    escola-de-abjuracao:
      name: "Escola de Abjuração"
      flavor: "Tradição Arcana"
      description: "Proteção mágica e negação; molda barreiras e resiste a magias hostis."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Abjuração Instruída (Especialista)"
              description: "Copiar magias de abjuração no grimório custa metade do ouro e tempo."
              rules: { savant: { school: "abjuração", copy_cost_multiplier: 0.5, copy_time_multiplier: 0.5 } }
            - name: "Proteção Arcana"
              description: "Ao conjurar uma abjuração de 1º+ nível, cria/recupera um manto que absorve dano."
              rules:
                ward_init_hp: "2 × seu nível de mago + mod. INT"
                ward_recover_on_abjuration_cast: "2 × nível da magia"
        - level: 6
          features:
            - name: "Proteção Projetada"
              description: "Pode direcionar sua Proteção Arcana para reduzir dano de um aliado a até 9 m."
        - level: 10
          features:
            - name: "Abjuração Aprimorada"
              description: "Bônus de proficiência em testes feitos por magias de abjuração (ex.: dissipar, contra-magia)."
        - level: 14
          features:
            - name: "Resistência à Magia"
              description: "Vantagem em testes de resistência contra magias e resistência a dano de magias."

    escola-de-adivinhacao:
      name: "Escola de Adivinhação"
      flavor: "Tradição Arcana"
      description: "Vê o possível e dobra o destino com presságios."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Adivinhação Instruída (Especialista)"
              description: "Copiar magias de adivinhação custa metade do ouro e tempo."
              rules: { savant: { school: "adivinhação", copy_cost_multiplier: 0.5, copy_time_multiplier: 0.5 } }
            - name: "Prodígio (Portento)"
              description: "Rola 2d20 após um descanso longo e pode substituir jogadas (sua ou de criaturas) por esses resultados."
              rules: { portent_dice: 2 }
        - level: 6
          features:
            - name: "Adivinhação Especialista"
              description: "Ao conjurar adivinhação de 2º+ nível, recupera 1 espaço de magia de nível inferior."
        - level: 10
          features:
            - name: "O Terceiro Olho"
              description: "Ativa 1 sentido extra até o próximo descanso longo (ex.: visão no escuro, ver invisível, ler emoções)."
        - level: 14
          features:
            - name: "Prodígio Maior"
              description: "Portento gera 3 dados em vez de 2."
              rules: { portent_dice: 3 }

    escola-de-conjuracao:
      name: "Escola de Conjuração"
      flavor: "Tradição Arcana"
      description: "Traz coisas e seres; dobra o espaço."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Conjuração Instruída (Especialista)"
              description: "Copiar magias de conjuração custa metade do ouro e tempo."
              rules: { savant: { school: "conjuração", copy_cost_multiplier: 0.5, copy_time_multiplier: 0.5 } }
            - name: "Conjuração Menor"
              description: "Cria temporariamente um objeto não mágico simples e portátil."
        - level: 6
          features:
            - name: "Transposição Benigna"
              description: "Teleporta-se (ou troca de lugar com aliado/servo conjurado) como ação; recarrega ao conjurar conjuração."
        - level: 10
          features:
            - name: "Conjuração Focada"
              description: "Sua concentração em magias de conjuração não é quebrada por dano."
        - level: 14
          features:
            - name: "Invocações Duráveis"
              description: "Criaturas que você conjura ganham PV temporários significativos."
              rules: { temp_hp_summons: 30 }

    escola-de-encantamento:
      name: "Escola de Encantamento"
      flavor: "Tradição Arcana"
      description: "Charme, fascínio e dom da persuasão mental."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Encantamento Instruído (Especialista)"
              description: "Copiar magias de encantamento custa metade do ouro e tempo."
              rules: { savant: { school: "encantamento", copy_cost_multiplier: 0.5, copy_time_multiplier: 0.5 } }
            - name: "Olhar Hipnótico"
              description: "Ação para hipnotizar criatura adjacente (TS Sab). Falha: enfeitiçada, incapacitada e deslocamento 0 enquanto sustentar; termina se levar dano."
        - level: 6
          features:
            - name: "Encanto Instintivo"
              description: "Reação para redirecionar um ataque que o alvo faria em você (TS Sab resiste)."
        - level: 10
          features:
            - name: "Dividir Encantamento"
              description: "Encantamentos de alvo único podem afetar 2 alvos, se ambos no alcance."
        - level: 14
          features:
            - name: "Alterar Memórias"
              description: "Ao terminar um encantamento, pode editar lembranças recentes dentro dos limites da magia."

    escola-de-evocacao:
      name: "Escola de Evocação"
      flavor: "Tradição Arcana"
      description: "Energia bruta canalizada em rajadas, raios e explosões."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Evocação Instruída (Especialista)"
              description: "Copiar magias de evocação custa metade do ouro e tempo."
              rules: { savant: { school: "evocação", copy_cost_multiplier: 0.5, copy_time_multiplier: 0.5 } }
            - name: "Esculpir Magias"
              description: "Ao evocar área, escolhe 1 + nível da magia em criaturas visíveis; elas passam automaticamente no teste e sofrem 0 no sucesso."
        - level: 6
          features:
            - name: "Truque Potente"
              description: "Se um alvo passa no teste contra seu truque que causa dano, ainda sofre metade do dano."
        - level: 10
          features:
            - name: "Evocação Potencializada"
              description: "Adiciona seu mod. INT ao dano de 1 magia de evocação por rodada."
        - level: 14
          features:
            - name: "Sobrecarga"
              description: "Pode maximizar dano de magias de 1º–5º; repetir antes de um descanso longo causa dano necrótico cumulativo a você."

    escola-de-ilusao:
      name: "Escola de Ilusão"
      flavor: "Tradição Arcana"
      description: "Engana sentidos e refaz a ‘realidade’ com truques."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Ilusão Instruída (Especialista)"
              description: "Copiar magias de ilusão custa metade do ouro e tempo."
              rules: { savant: { school: "ilusão", copy_cost_multiplier: 0.5, copy_time_multiplier: 0.5 } }
            - name: "Ilusão Menor Aprimorada"
              description: "Ganha o truque ilusão menor (se não tiver) e pode criar imagem + som no mesmo lançamento."
        - level: 6
          features:
            - name: "Ilusão Maleável"
              description: "Pode remodelar uma ilusão com duração enquanto ela durar."
        - level: 10
          features:
            - name: "Duplicata Ilusória"
              description: "Reação para fazer um ataque contra você errar (consome a duplicata); 1/descanso curto ou longo."
        - level: 14
          features:
            - name: "Realidade Ilusória"
              description: "Torna parte de uma ilusão um objeto real e inofensivo por 1 min (sem causar dano direto)."

    escola-de-necromancia:
      name: "Escola de Necromancia"
      flavor: "Tradição Arcana"
      description: "Vida e morte como recursos; fortalece mortos-vivos."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Necromancia Instruída (Especialista)"
              description: "Copiar magias de necromancia custa metade do ouro e tempo."
              rules: { savant: { school: "necromancia", copy_cost_multiplier: 0.5, copy_time_multiplier: 0.5 } }
            - name: "Colheita Sinistra"
              description: "Quando mata com magia de 1º+ nível, cura PV = 2× nível da magia (3× se necromancia). Não funciona com construtos/mortos-vivos."
        - level: 6
          features:
            - name: "Escravos Mortos-Vivos"
              description: "animar mortos afeta +1 corpo; mortos-vivos criados por suas necromancias ficam mais fortes."
              rules:
                undead_bonuses:
                  - "PV máximos + seu nível de mago"
                  - "Adicionam seu bônus de proficiência às jogadas de dano"
        - level: 10
          features:
            - name: "Acostumado à Morte-Vida"
              description: "Resistência a necrótico; seu máximo de PV não pode ser reduzido."
        - level: 14
          features:
            - name: "Comandar Mortos-Vivos"
              description: "Ação: impõe TS Carisma em morto-vivo; falha → você o controla até usar a habilidade novamente (inteligentes têm vantagens)."

    escola-de-transmutacao:
      name: "Escola de Transmutação"
      flavor: "Tradição Arcana"
      description: "Muda matéria, forma e propriedades; ferramenta versátil."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Transmutação Instruída (Especialista)"
              description: "Copiar magias de transmutação custa metade do ouro e tempo."
              rules: { savant: { school: "transmutação", copy_cost_multiplier: 0.5, copy_time_multiplier: 0.5 } }
            - name: "Alquimia Menor"
              description: "Altera temporariamente material de um objeto não mágico (madeira/pedra/ferro/cobre/prata)."
        - level: 6
          features:
            - name: "Pedra do Transmutador"
              description: "Cria uma pedra com um benefício ativo enquanto portada; troca o efeito ao conjurar transmutação de 1º+."
              rules:
                options:
                  - "Visão no escuro 18 m"
                  - "+3 m de deslocamento"
                  - "Proficiência em TS de Constituição"
                  - "Resistência a ácido/frio/fogo/relâmpago/trovão (escolha 1)"
        - level: 10
          features:
            - name: "Metamorfo"
              description: "Adiciona metamorfose ao grimório; 1×/descanso (curto ou longo) pode conjurá-la sem espaço, em si, CR 1 ou menor."
        - level: 14
          features:
            - name: "Mestre Transmutador"
              description: "Consome a pedra para: transmutar objeto; panaceia; reviver mortos (recentes); restaurar juventude."

    # ——— TRADIÇÕES ORIGINAIS DA SUA MESA ———
    arquearia-arcana:
      name: "Arquearia Arcana"
      flavor: "Tradição Arcana"
      description: "Combina arcos e magia de precisão."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Tiro Encantado"
              description: "Infunde flechas com efeitos mágicos menores (empurrar, ofuscar, marcar)."
              rules:
                weapons_proficiencies_granted: ["arco curto","arco longo"]
                once_per_turn_on_hit_with_bow: "aplica 1 efeito arcano temático"
          grants:
            proficiencies:
              weapons: ["arco-curto","arco-longo"]
        - level: 6
          features:
            - name: "Olho Místico"
              description: "Vantagens situacionais para adquirir alvo; ignora cobertura leve."
        - level: 10
          features:
            - name: "Voo da Flecha"
              description: "Aumenta alcance e as flechas ignoram vento e desvantagens por distância longa."
        - level: 14
          features:
            - name: "Pluie Arcana"
              description: "Rajada de flechas encantadas sobre múltiplos alvos em área pequena."

    iniciacao-demonologia:
      name: "Iniciação em Demonologia"
      flavor: "Tradição Arcana"
      description: "Estudo e controle de entidades demoníacas."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Círculo de Contenção"
              description: "Ritualiza um círculo que inibe/contém invocações menores e teleporte planar dentro da área."
          grants:
            languages:
              choose: 1
              options: ["Abissal","Infernal"]
        - level: 6
          features:
            - name: "Olhar Abissal"
              description: "Presença profana que assusta/fere mentalmente criaturas próximas (TS Sab)."
        - level: 10
          features:
            - name: "Pacto Controlado"
              description: "Invocações demoníacas ficam mais seguras; vantagem para impor comandos."
        - level: 14
          features:
            - name: "Domínio Infernal"
              description: "Pode subjugar temporariamente criaturas abissais poderosas (limites por ND/TS)."

    maestria-alquimica:
      name: "Maestria Alquímica"
      flavor: "Tradição Arcana"
      description: "Poções e transmutações práticas."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Laboratório Portátil"
              description: "Prepara poções com eficiência e menor custo; testes de alquimia com vantagem em condições ideais."
          grants:
            proficiencies:
              tools: ["Kit de Alquimista"]
        - level: 6
          features:
            - name: "Catalisadores"
              description: "Potencializa efeitos/alcances/durações de poções e transmutações leves."
        - level: 10
          features:
            - name: "Soluções Estáveis"
              description: "Diminui falhas; amplia durações de mutagênicos e extratos."
        - level: 14
          features:
            - name: "Pedra Filosofal"
              description: "Acesso a transmutações poderosas e versáteis (dentro de limites seguros da mesa)."

    maestria-dos-automatos:
      name: "Maestria dos Autômatos"
      flavor: "Tradição Arcana"
      description: "Construtos mecânicos e familiares artificiais."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Engenheiro perspicaz"
              description: "No 2º nível, adiciona o truque consertar (não conta no limite de truques) e adquire proficiência em Ferramentas de coureiro, entalhador, ferreiro e funileiro (Livro de Novos Arquétipos)."
            - name: "Construir autômato"
              description: "No 2º nível, fabrica autômato (ver ND, custo, espaço de magia e tabela de fabricação no material de campanha)."
          grants:
            proficiencies:
              tools:
                - "Ferramentas de Coureiro"
                - "Ferramentas de Entalhador"
                - "Ferramentas de Ferreiro"
                - "Ferramentas de Funileiro"
        - level: 6
          features:
            - name: "Engenharia Arcana"
              description: "Modifica e reforça autômatos; upgrades modulares."
        - level: 10
          features:
            - name: "Rede Autômata"
              description: "Coordena múltiplos ajudantes; ações coordenadas em sua ordem."
        - level: 14
          features:
            - name: "Colosso Menor"
              description: "Constrói um guardião avançado (ND apropriado) sob seu comando."

    navegacao-planar:
      name: "Navegação Planar"
      flavor: "Tradição Arcana"
      description: "Transporte e percepção entre planos."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Bússola Etérea"
              description: "Sente portais e fendas planares próximos; vantagem em testes para navegação interplanar."
        - level: 6
          features:
            - name: "Âncora Planar"
              description: "Estabiliza áreas contra distorções/teleportes planar por curto período."
        - level: 10
          features:
            - name: "Pulo Entre Planos"
              description: "Saltos limitados entre planos/locais coterminantes (com custos/limites)."
        - level: 14
          features:
            - name: "Caminho dos Mundos"
              description: "Viagens seguras e precisas com escolta limitada; mitigação de riscos planares."

    teurgia-mistica:
      name: "Teurgia Mística"
      flavor: "Tradição Arcana"
      description: "Funde magia arcana e divina."
      choose_level: 2
      levels:
        - level: 2
          features:
            - name: "Ritos Teúrgicos"
              description: "Acessa magias divinas temáticas de baixo nível (passam a contar como magias de mago)."
        - level: 6
          features:
            - name: "Simbiose Arcana"
              description: "Sinergias entre listas arcana/divina (pequenos bônus de CD/alcance/duração)."
        - level: 10
          features:
            - name: "Favores Arcanos"
              description: "Adaptações de Canalizar/orações curtas em moldes arcanos (usos limitados)."
        - level: 14
          features:
            - name: "Epifania"
              description: "Magias híbridas potentes (ex.: cura/controle/banimento combinados) sob regras da mesa."

warlock:
  # ——— REGRAS GERAIS DO BRUXO ———
  rules:
    spellcasting:
      casting_ability: "Carisma"
      save_dc: "8 + proficiência + mod.CAR"
      attack_bonus: "proficiência + mod.CAR"
      preparation: "magias conhecidas (não prepara por dia)"
    pact_magic:
      slots_same_level: true
      recover_on: ["descanso curto","descanso longo"]
      note: "Usa espaços de magia do mesmo nível; ganha 'Arcanismo Místico' nos níveis altos (magias 6º–9º 1/dia)."
    expanded_spells:
      note: "As listas do patrono ampliam as opções de APRENDER magias de bruxo; não são 'sempre preparadas'."

  # ——— PATRONOS (PHB) ———
  arquifada:
    name: "Arquifada"
    flavor: "Patrono Transcendental"
    description: "Senhores feéricos caprichosos; encantos, ilusões e desaparecimentos."
    choose_level: 1
    expanded_spells:
      1: ["fogo das fadas","sono"]
      2: ["acalmar emoções","força fantasmagórica"]
      3: ["piscar","crescimento de plantas"]
      4: ["dominar besta","invisibilidade maior"]
      5: ["dominar pessoa","parecer"]
    levels:
      - level: 1
        features:
          - name: "Presença Feérica"
            description: "Ação: cubo 3 m; criaturas fazem TS Sab (CD magias). Falha: enfeitiçado ou amedrontado (sua escolha) até o fim do seu próximo turno."
            rules:
              uses: { per: "descanso curto/longo", value: 1 }
      - level: 6
        features:
          - name: "Fuga Nebulosa"
            description: "Reação ao sofrer dano: teleporta até 18 m e fica invisível até o início do seu próximo turno (ou até atacar/conjurar)."
            rules:
              uses: { per: "descanso curto/longo", value: 1 }
      - level: 10
        features:
          - name: "Defesas Sedutoras"
            description: "Imunidade a enfeitiçado; ao tentarem enfeitiçá-lo, reação: alvo faz TS Sab ou fica enfeitiçado por 1 min."
      - level: 14
        features:
          - name: "Delírio Sombrio"
            description: "Ação: 1 alvo a 18 m faz TS Sab; falha → preso em reino ilusório (enfeitiçado ou amedrontado, sua escolha) por até 1 min; requer concentração."
            rules:
              uses: { per: "descanso curto/longo", value: 1 }

  corruptor:
    name: "Corruptor"
    flavor: "Patrono Transcendental"
    description: "Pactos infernais; sobrevivência implacável e fogo devastador."
    choose_level: 1
    expanded_spells:
      1: ["mãos flamejantes","comando"]
      2: ["cegueira/surdez","raio abrasador"]
      3: ["bola de fogo","nuvem fétida"]
      4: ["escudo de fogo","muralha de fogo"]
      5: ["raio solar sagrado","solo consagrado"]
    levels:
      - level: 1
        features:
          - name: "Bênção do Diabo"
            description: "Ao reduzir uma criatura hostil a 0 PV: ganha PV temporários = CAR + nível de bruxo."
      - level: 6
        features:
          - name: "Sorte do Diabo"
            description: "1/descanso: após rolar (antes do resultado), adiciona 1d10 a 1 teste de habilidade ou resistência."
      - level: 10
        features:
          - name: "Resiliência Infernal"
            description: "Após um descanso, escolhe 1 tipo de dano (exceto físico não mágico); tem resistência até escolher outro."
      - level: 14
        features:
          - name: "Arremessar ao Inferno"
            description: "Ao acertar um ataque: bane o alvo até o fim do seu próximo turno; quando retorna, sofre 10d10 psíquico."
            rules:
              uses: { per: "descanso curto/longo", value: 1 }

  grande-antigo:
    name: "Grande Antigo"
    flavor: "Patrono Transcendental"
    description: "Entidades cósmicas insondáveis; telepatia e manipulação mental."
    choose_level: 1
    expanded_spells:
      1: ["sussurros dissonantes","gargalhada horrível de Tasha"]
      2: ["detectar pensamentos","força fantasmagórica"]
      3: ["clarividência","enviar mensagem"]
      4: ["tentáculos negros de Evard","dominar besta"]
      5: ["telecinesia","modificar memória"]
    levels:
      - level: 1
        features:
          - name: "Mente Desperta"
            description: "Telepatia com criatura que você vê a até 9 m (se entender um idioma)."
      - level: 6
        features:
          - name: "Distorção Entrópica"
            description: "Reação ao ser alvo de ataque: impõe desvantagem; se errar, você tem vantagem no próximo ataque contra o alvo por até 1 min."
            rules:
              uses: { per: "descanso curto/longo", value: 1 }
      - level: 10
        features:
          - name: "Escudo de Pensamentos"
            description: "Resistência a psíquico; quando sofre psíquico, o agressor sofre a mesma quantidade."
      - level: 14
        features:
          - name: "Criar Servo"
            description: "Ação: toque um humanóide incapacitado; fica enfeitiçado indefinidamente (até efeitos como Remover Maldição). Telepatia com ele no mesmo plano."

  # ——— PATRONOS (EXTRAS DA SUA MESA) ———
  patrono-morte:
    name: "A Morte"
    flavor: "Patrono Transcendental"
    description: "Necromancia, mortos-vivos e toque fúnebre."
    choose_level: 1
    expanded_spells:
      1: ["ray-of-sickness","false-life"]
      2: ["ray-of-enfeeblement","gentle-repose"]
      3: ["animate-dead","speak-with-dead"]
      4: ["phantasmal-killer","blight"]
      5: ["antilife-shell","cloudkill"]
    levels:
      - level: 1
        features:
          - name: "Cria da Não-Vida"
            description: "Resistência a necrótico e veneno; mortos-vivos não o hostilizam sem provocação."
            grants: { defenses: { resistance: ["necrótico","veneno"] } }
      - level: 6
        features:
          - name: "Toque Mortal"
            description: "Toca humanóide vivo a 0 PV para matá-lo; ergue como zumbi sob comando (2 usos a partir do 12º)."
      - level: 10
        features:
          - name: "Rigor Mortis"
            description: "Resistência a físico não-mágico não-prata; estabiliza a 0 PV; não precisa comer, beber, dormir ou respirar."
      - level: 14
        features:
          - name: "Dança da Morte"
            description: "Seu tipo muda para morto-vivo; imunidades amplas; pode influenciar/comandar mortos-vivos com Persuasão."

  patrono-arcanjo-vingador:
    name: "O Arcanjo Vingador"
    flavor: "Patrono Transcendental"
    description: "Justiça radiante e vingança sagrada."
    choose_level: 1
    expanded_spells:
      1: ["detect-evil-and-good","guiding-bolt"]
      2: ["branding-smite","zone-of-truth"]
      3: ["blinding-smite","death-ward"]
      4: ["staggering-smite","protection-from-death"]
      5: ["dispel-evil-and-good","destructive-wave"]
    levels:
      - level: 1
        features:
          - name: "Servo dos Anjos"
            description: "Fala Celestial; resistência a radiante; proficiência em Intuição; ganha o truque 'chama sagrada'."
            grants:
              languages: ["Celestial"]
              defenses: { resistance: ["radiante"] }
              proficiencies: { skills: ["Intuição"] }
      - level: 6
        features:
          - name: "Poder Angelical"
            description: "Primeiro acerto do turno: +1d8 radiante (ou +2d8 vs corruptor/morto-vivo). No 12º: +2d8 / +4d8."
      - level: 10
        features:
          - name: "Virtudes Celestiais"
            description: "Vantagem contra medo, exaustão e encanto; vantagem em Intuição para detectar mentiras."
      - level: 14
        features:
          - name: "Marca da Vingança"
            description: "Marca 1 min (TS CAR). Remove resistência/imunidade a radiante (pode torná-lo vulnerável) e bloqueia teleporte; penalidades extras vs corruptor/morto-vivo."

  patrono-espirito-heroico:
    name: "O Espírito Heroico"
    flavor: "Patrono Transcendental"
    description: "Heroísmo ancestral emprestado; retaliação, tenacidade e avatar."
    choose_level: 1
    expanded_spells:
      1: ["heroism","longstrider"]
      2: ["enhance-ability","spiritual-weapon"]
      3: ["spirit-guardians","beacon-of-hope"]
      4: ["guardian-of-faith","freedom-of-movement"]
      5: ["plane-shift-anchor","bigbys-hand"]
    levels:
      - level: 1
        features:
          - name: "Retaliação Resoluta"
            description: "Reação a crítico ou a cair a 0 PV: reduz dano à metade ou fica com 1 PV; ganha vantagem e +1d8 contra o agressor até o fim do próximo turno."
      - level: 6
        features:
          - name: "Vigor do Herói"
            description: "Reduz 3 de dano físico não-mágico (10º: 5)."
      - level: 10
        features:
          - name: "Salvaguarda Heróica"
            description: "Reação: conjura truque/magia ofensiva no atacante ou defensiva no aliado a 9 m."
      - level: 14
        features:
          - name: "Avatar Espiritual"
            description: "1 h: resistência a físico não-mágico, vantagem em ataques, +1 ataque bônus/turno e +CAR em todos os TS."

  patrono-supragenio:
    name: "O Supragênio"
    flavor: "Patrono Transcendental"
    description: "Intelecto cósmico e poder elemental dos gênios."
    choose_level: 1
    expanded_spells:
      1: ["detect-evil-and-good","disguise-self"]
      2: ["detect-thoughts","rope-trick"]
      3: ["clairvoyance","blink"]
      4: ["conjure-minor-elementals","hallucinatory-terrain"]
      5: ["legend-lore","conjure-elemental"]
    choices:
      genie_lineage:
        choose: 1
        options:
          - id: "dao"
            name: "Dao (Terran)"
            grants:
              languages: ["Terran"]
              proficiencies: { skills: ["Atletismo"] }
              defenses: { resistance: ["ácido"] }
          - id: "djinni"
            name: "Djinni (Auran)"
            grants:
              languages: ["Auran"]
              proficiencies: { skills: ["Acrobacia"] }
              defenses: { resistance: ["relâmpago"] }
          - id: "efreeti"
            name: "Efreeti (Ignan)"
            grants:
              languages: ["Ignan"]
              proficiencies: { skills: ["Intimidação"] }
              defenses: { resistance: ["fogo"] }
          - id: "marid"
            name: "Marid (Aquan)"
            grants:
              languages: ["Aquan"]
              movement: { swim_ft: 30 }
              defenses: { resistance: ["frio"] }
    levels:
      - level: 1
        features:
          - name: "Traço do Sultão Planar"
            description: "Recebe idioma planar, 1 perícia (outra) e resistência ligada ao gênio escolhido."
      - level: 6
        features:
          - name: "Conjuração Elemental"
            description: "Converte o tipo de dano das suas magias para o do patrono e adiciona +1d6 no primeiro acerto (12º: +2d6)."
      - level: 10
        features:
          - name: "Forma Prodigiosa"
            description: "Metade inferior enevoada; voo planar por 10 min; imunidade ao elemento do patrono."
      - level: 14
        features:
          - name: "Seu Desejo é uma Ordem"
            description: "Tenta invocar o patrono para realizar 1 desejo (riscos e limites). No 20º, invoca automaticamente."

  patrono-tita-caido:
    name: "O Titã Caído"
    flavor: "Patrono Transcendental"
    description: "Força primordial e ruína antiga; forma titânica temporária."
    choose_level: 1
    expanded_spells:
      1: ["heroism","protection-from-evil-and-good"]
      2: ["enlarge-reduce","pass-without-trace"]
      3: ["water-walk","water-breathing"]
      4: ["polymorph","dimension-door"]
      5: ["commune","dispel-evil-and-good"]
    levels:
      - level: 1
        features:
          - name: "Manipulação de Energia"
            description: "Quando uma magia sua causaria dano elemental, pode trocar o tipo e adicionar +1d8 (2 usos/descanso)."
      - level: 6
        features:
          - name: "Incentivo Titânico"
            description: "Ação: aliados a 18 m não podem ser amedrontados/encantados e têm vantagem em testes/TS até seu próximo turno."
      - level: 10
        features:
          - name: "Bênção do Empírico"
            description: "Não envelhece; vantagem em TS contra magias/efeitos mágicos."
      - level: 14
        features:
          - name: "Pseudo-Titã"
            description: "1 min: tamanho Grande, For 21, +1d8 com armas, CON 15 pode atordoar; deslocamentos extras; Manipulação de Energia ilimitada."

  patrono-vazio:
    name: "O Vazio"
    flavor: "Patrono Transcendental"
    description: "Nada e entropia; silencia, apaga e consome."
    choose_level: 1
    expanded_spells:
      1: ["inflict-wounds","fog-cloud"]
      2: ["blindness-deafness","silence"]
      3: ["nondetection","blink"]
      4: ["phantasmal-killer","greater-invisibility"]
      5: ["passwall","cloudkill"]
    levels:
      - level: 1
        features:
          - name: "Toque do Vazio"
            description: "Ataque corpo-a-corpo: 1d8 frio + CAR; TS CON ou alvo fica impedido brevemente."
      - level: 6
        features:
          - name: "Proteção do Vácuo"
            description: "Reação: anula totalmente o dano de uma fonte (1 uso; 13º: 2 usos)."
      - level: 10
        features:
          - name: "Manto do Esquecimento"
            description: "Impõe amnésia (TS INT) a 18 m por 24 h."
      - level: 14
        features:
          - name: "Esfera de Obliteração"
            description: "Cria esfera de antimatéria por até 1 min (concentração); dano de energia e sucção a 0 PV; move com ação bônus."

  # ——— DÁDIVAS DE PACTO (nível 3) ———
  boons:
    corrente:
      id: "pact_of_the_chain"
      name: "Dádiva da Corrente"
      choose_level: 3
      description: "Um familiar especial serve como agente e espião; pode atacar."
      features:
        - name: "Familiar de Pacto"
          description: "Aprende 'encontrar familiar'; formas especiais (diabrete, pseudodragão, quasit, duende). Pode atacar e entregar magias de toque."
    lamina:
      id: "pact_of_the_blade"
      name: "Dádiva da Lâmina"
      choose_level: 3
      description: "Cria/vence uma arma de pacto mágica, sempre à mão."
      features:
        - name: "Arma de Pacto"
          description: "Ação: cria arma corpo a corpo que você domina; conta como mágica. Pode vincular 1 arma mágica (ritual 1 h) e invocá-la."
    tomo:
      id: "pact_of_the_tome"
      name: "Dádiva do Tomo"
      choose_level: 3
      description: "Um Livro das Sombras com 3 truques de qualquer lista."
      features:
        - name: "Livro das Sombras"
          description: "Ganha 3 truques de qualquer classe (CAR). Se perdido, pode recriar (ritual 1 h; destrói o anterior)."

  # ——— INVOCAÇÕES MÍSTICAS ———
  invocations:
    - id: "agonizing_blast"
      name: "Explosão Agonizante"
      effect: "Raio místico causa +CAR de dano."
    - id: "repelling_blast"
      name: "Explosão Repulsiva"
      effect: "Empurra o alvo até 3 m por acerto do Raio místico."
    - id: "eldritch_spear"
      name: "Lança Mística"
      effect: "Aumenta o alcance do Raio místico (~90 m)."
    - id: "eldritch_sight"
      name: "Visão Mística"
      effect: "Detectar Magia à vontade."
    - id: "devils_sight"
      name: "Visão do Diabo"
      effect: "Enxerga na escuridão normal e mágica (~36 m)."
    - id: "fiendish_vigor"
      name: "Vigor Ínfero"
      effect: "Armadura de Agathys em si à vontade (nível base)."
    - id: "mask_of_many_faces"
      name: "Máscara de Muitos Rostos"
      effect: "Disfarçar-se à vontade."
    - id: "misty_visions"
      name: "Visões Enevoadas"
      effect: "Imagem Silenciosa à vontade."
    - id: "beast_speech"
      name: "Fala com Bestas"
      effect: "Falar com Animais à vontade."
    - id: "beguiling_influence"
      name: "Influência Sedutora"
      effect: "Proficiência em Enganação e Persuasão."
    - id: "eyes_of_the_rune_keeper"
      name: "Olhos do Guardião de Runas"
      effect: "Lê todas as escritas."
    - id: "one_with_shadows"
      name: "Um com as Sombras"
      prereq: ["5º nível"]
      effect: "Fica invisível enquanto imóvel em luz fraca/escuridão."
    - id: "sign_of_ill_omen"
      name: "Sinal do Mau Augúrio"
      prereq: ["5º nível"]
      effect: "Pode conjurar Amaldiçoar usando espaço de bruxo."
    - id: "mire_the_mind"
      name: "Lama da Mente"
      prereq: ["5º nível"]
      effect: "Pode conjurar Lentidão usando espaço de bruxo."
    - id: "sculptor_of_flesh"
      name: "Escultor de Carne"
      prereq: ["7º nível"]
      effect: "Pode conjurar Metamorfose usando espaço de bruxo."
    - id: "dreadful_word"
      name: "Palavra Medonha"
      prereq: ["7º nível"]
      effect: "Pode conjurar Confusão usando espaço de bruxo."
    - id: "ascendant_step"
      name: "Passo Ascendente"
      prereq: ["9º nível"]
      effect: "Levitar em si mesmo à vontade."
    - id: "minions_of_chaos"
      name: "Lacaios do Caos"
      prereq: ["9º nível"]
      effect: "Conjurar Elemental usando espaço de bruxo."
    - id: "whispers_of_the_grave"
      name: "Sussurros da Sepultura"
      prereq: ["9º nível"]
      effect: "Falar com os Mortos à vontade."
    - id: "visions_of_distant_realms"
      name: "Visões de Reinos Distantes"
      prereq: ["15º nível"]
      effect: "Olho Arcano à vontade."
    - id: "master_of_myriad_forms"
      name: "Mestre de Incontáveis Formas"
      prereq: ["15º nível"]
      effect: "Transformação à vontade."
    - id: "witch_sight"
      name: "Visão de Bruxa"
      prereq: ["15º nível"]
      effect: "Vê a forma verdadeira de criaturas transformadas/invisíveis (alcance curto)."
    # — Invocações que exigem Dádiva específica —
    - id: "voice_of_the_chain_master"
      name: "Voz do Mestre das Correntes"
      prereq: ["Dádiva da Corrente"]
      requires_pact: "corrente"
      effect: "Vê/ouve via familiar e fala por ele; ignora distância/plano."
    - id: "chains_of_carceri"
      name: "Cadeias de Carceri"
      prereq: ["15º nível","Dádiva da Corrente"]
      requires_pact: "corrente"
      effect: "Conter Monstro à vontade contra celestiais/elementais/infernais (1/vez por alvo por descanso longo)."
    - id: "thirsting_blade"
      name: "Lâmina Sedenta"
      prereq: ["5º nível","Dádiva da Lâmina"]
      requires_pact: "lamina"
      effect: "Quando usa a ação Ataque com a arma de pacto, ataca duas vezes."
    - id: "lifedrinker"
      name: "Sorvedor de Vidas"
      prereq: ["12º nível","Dádiva da Lâmina"]
      requires_pact: "lamina"
      effect: "Ataques com a arma de pacto causam +CAR de dano necrótico."
    - id: "book_of_ancient_secrets"
      name: "Livro dos Segredos Antigos"
      prereq: ["Dádiva do Tomo"]
      requires_pact: "tomo"
      effect: "Inscreve e conjura quaisquer magias com a tag 'ritual' como ritual via Livro das Sombras."

cozinheiro:
  mestre-da-fritura:
    name: "Mestre da Fritura"
    flavor: "Arquétipo do Cozinheiro"
    description: "Especialista em óleo quente, frigideiras chiando e estalos que distraem inimigos enquanto fortalecem o grupo."
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Óleo Borbulhante"
            description: "Acende óleo e o arremessa como ação: área pequena que causa dano e pode derrubar."
            rules:
              action: true
              range_m: 6
              area: "círculo 1,5 m"
              save:
                ability: "Destreza"
                dc_formula: "8 + proficiência + Sab ou Int (à sua escolha)"
                on_fail:
                  - "sofre 2d6 fogo"
                  - "fica caído (se já estava encharcado/oleoso)"
                on_success: "metade do dano e não cai"
              ongoing:
                start_of_turn_damage: "1d6 fogo"
                end_condition:
                  - "ação para apagar"
                  - "chuva/imersão"
                  - "passar no TS Destreza uma vez"
              uses:
                per: "descanso curto ou longo"
                value: 2
          - name: "Frigideira Tática"
            description: "Proficiência com frigideiras/utensílios como armas improvisadas; contam como mágicas para resistências."
            rules:
              weapons:
                improvised:
                  treated_as: "Clava (1d6 concussão)"
                  counts_as_magical: true
              bonus:
                on_hit_once_per_turn: "+1d4 fogo"
      - level: 6
        features:
          - name: "Sela e Sela!"
            description: "Ação bônus após acertar ataque corpo a corpo: marca o alvo e o deixa relutante a se mover por causa do óleo quente."
            rules:
              bonus_action: true
              mark_until: "fim do seu próximo turno"
              effects_while_marked:
                move_penalty: "terreno difícil quando se afasta de você"
                first_time_leaves_your_reach_each_turn:
                  damage: "1d6 fogo"
              uses:
                per: "descanso curto ou longo"
                value: "Sab (mín. 1)"
      - level: 10
        features:
          - name: "Crosta Perfeita"
            description: "Quando você ou aliado em até 3 m causar dano de fogo, pode realçar o sabor (e a dor)."
            rules:
              reaction: true
              range_m: 3
              trigger: "você ou aliado causa dano de fogo"
              effect: "+1d8 fogo ao dano"
              uses:
                per: "descanso curto ou longo"
                value: 2
      - level: 14
        features:
          - name: "Tempestade de Estalos"
            description: "Ação: cria zona chiando (concentração) que cega/distrai e queima levemente."
            rules:
              action: true
              duration: "1 minuto (concentração)"
              area: "raio 6 m, centrado em ponto a 18 m"
              effects:
                obscurement: "leve; visão sofre desvantagem na área"
                start_of_turn_damage: "1d4 fogo (criaturas hostis)"
                save_end_of_turn:
                  ability: "Constituição"
                  on_fail: "desvantagem em Percepção (visão) e na primeira jogada de ataque dentro da área até o próximo turno"
              uses:
                per: "descanso longo"
                value: 1

  alquimista-gourmet:
    name: "Alquimista Gourmet"
    flavor: "Arquétipo do Cozinheiro"
    description: "Caldeirão, infusões e especiarias tônicas; cozinha que cura, fortifica e explode."
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Caldeirão de Campo"
            description: "Durante descanso curto, prepara duas poções culinárias simples."
            rules:
              short_rest:
                brew:
                  count: 2
                  options:
                    - id: "sopa_vigor"
                      name: "Sopa do Vigor"
                      effect: "Ao beber, ganha 1d6 + seu mod. Sab PV temporários por 1 h"
                    - id: "cha_clareza"
                      name: "Chá da Clareza"
                      effect: "Vantagem no próximo teste de Sabedoria ou Inteligência em 1 h (consome no uso)"
                    - id: "molho_ardente"
                      name: "Molho Ardente"
                      effect: "Próximo ataque corpo a corpo do alvo causa +1d6 fogo"
              spoilage: "estragam ao final de um descanso longo"
          - name: "Kit de Alquicozinha"
            description: "Proficiência com Kit de Herbalismo e Ferramentas de Alquimia; usa Sab para CD de itens criados."
            grants:
              proficiencies:
                tools:
                  add:
                    - "Kit de Herbalismo"
                    - "Ferramentas de Alquimia"
      - level: 6
        features:
          - name: "Redução e Concentração"
            description: "Pode gastar ação para concentrar uma infusão existente e turbinar seu efeito."
            rules:
              action: true
              target: "uma poção culinária sua não consumida"
              effect: "duplica o dado base (ex.: 1d6 → 2d6) OU transforma vantagem em +1d4 de bônus (escolha no uso)"
              uses:
                per: "descanso curto ou longo"
                value: 2
      - level: 10
        features:
          - name: "Granada de Pimenta"
            description: "Ação: arremessa frasco que irrita olhos e pulmões; área pequena com dano leve e cegueira breve."
            rules:
              action: true
              range_m: 9
              area: "círculo 3 m"
              save:
                ability: "Constituição"
                dc_formula: "8 + proficiência + Sab"
                on_fail:
                  - "cegueira até o fim do próximo turno"
                  - "1d8 ácido (vapores)"
                on_success: "metade do dano e não fica cego"
              uses:
                per: "descanso curto ou longo"
                value: 2
      - level: 14
        features:
          - name: "Cardápio Magistral"
            description: "Durante descanso longo, prepara 1 refeição lendária para até 6 criaturas."
            rules:
              long_rest:
                cook_legendary_meal: true
                pick_one_menu:
                  - id: "banquete_vital"
                    name: "Banquete Vital"
                    effects:
                      - "cada alvo recupera 4d8 + seu mod. Sab PV"
                      - "remove 1 condição: envenenado, amedrontado ou exausto (−1 nível)"
                  - id: "mesa_do_ferreiro"
                    name: "Mesa do Ferreiro"
                    effects:
                      - "por 24 h, armas dos alvos contam como mágicas e ganham +1 no dano (não acumula com bônus existentes)"
                  - id: "sobremesa_eterea"
                    name: "Sobremesa Etérea"
                    effects:
                      - "cada alvo pode, 1 vez nas próximas 24 h, usar ação bônus para ficar etéreo até o fim do turno"
              uses:
                per: "descanso longo"
                value: 1

  doceiro-encantado:
    name: "Doceiro Encantado"
    flavor: "Arquétipo do Cozinheiro"
    description: "Açúcar, magia e calorosas lembranças; confeitos que inspiram, confundem e acalmam."
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Balas Inspiradoras"
            description: "Ação bônus: entrega doce que fornece um dado de inspiração açucarada."
            rules:
              bonus_action: true
              range_m: 3
              grant_die:
                size_by_level:
                  "3": "d6"
                  "10": "d8"
                  "14": "d10"
                usage:
                  - "jogada de ataque"
                  - "teste de habilidade"
                  - "teste de resistência"
              uses:
                per: "dia"
                value: "Carisma (mín. 1)"
          - name: "Confeitaria Apaziguante"
            description: "Quando alguém consumir um de seus doces durante descanso curto, adiciona +1d6 à cura de Dados de Vida dessa criatura."
      - level: 6
        features:
          - name: "Guloseima Hipnótica"
            description: "Ação: oferta doce a 1 criatura que possa ver/ouvir você a 9 m; se aceitar ou falhar no TS, fica encantada brevemente."
            rules:
              action: true
              range_m: 9
              save:
                ability: "Sabedoria"
                dc_formula: "8 + proficiência + Car"
                on_fail: "enfeitiçado por você até o fim do seu próximo turno (não pode atacá-lo)"
              note: "Criaturas hostis raramente aceitam voluntariamente; ainda assim fazem TS."
              uses:
                per: "descanso curto ou longo"
                value: 2
      - level: 10
        features:
          - name: "Bolo de Camadas"
            description: "Ação bônus: concede camadas de cobertura doce que reduzem dano."
            rules:
              bonus_action: true
              range_m: 9
              target: "você ou aliado"
              effect:
                temp_hp: "2d6 + Car"
                damage_reduction_first_hit: "−proficiência (mín. 1) até o início do seu próximo turno"
              uses:
                per: "descanso curto ou longo"
                value: 2
      - level: 14
        features:
          - name: "Fatia da Festa"
            description: "Ação: divide um grande bolo entre até 6 aliados; remove efeitos mentais e dá euforia tática."
            rules:
              action: true
              range_m: 9
              effects:
                cleanse:
                  - "encantado"
                  - "amedrontado"
                buff_duration: "1 minuto"
                while_buffed:
                  - "vantagem em TS de Sabedoria"
                  - "+1d4 em jogadas de ataque (1/turno)"
              uses:
                per: "descanso longo"
                value: 1

  mestre-do-fogo-e-fumaca:
    name: "Mestre do Fogo e Fumaça"
    flavor: "Arquétipo do Cozinheiro"
    description: "Defumação, brasas e controle de visibilidade; combate de zona com aroma de madeira."
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Brasa Viva"
            description: "Ação: cria braseiro portátil que emana luz e pode ser chutado como ataque improvisado."
            rules:
              action: true
              place_brazier:
                duration: "1 hora ou até você desfazer"
                light: "6 m/penumbra +6 m"
              bonus_action:
                kick_brazier:
                  range_m: 6
                  save:
                    ability: "Destreza"
                    on_fail: "1d6 fogo e pega fogo (1d4 no início do turno até apagar)"
              limit: "1 braseiro por vez"
      - level: 6
        features:
          - name: "Cortina de Fumaça"
            description: "Ação: erige nuvem de fumaça controlada."
            rules:
              action: true
              range_m: 18
              area: "cilindro 6 m raio, 6 m alt."
              duration: "1 minuto (concentração)"
              effects:
                lightly_obscured_all: true
                heavy_for_creatures_outside_looking_in: true
                advantage_on_stealth_inside: true
                suffocation_note: "criaturas que iniciarem turno na nuvem fazem TS CON; falha: 1 nível de exaustão (máx. 1x durante a duração)"
              uses:
                per: "descanso curto ou longo"
                value: 1
      - level: 10
        features:
          - name: "Defumador de Guerra"
            description: "Aliados que comecem o turno no seu braseiro ou na sua fumaça ganham bônus temporário."
            rules:
              aura_radius_from_brazier_m: 3
              start_of_turn_buff:
                choose_one_each_turn:
                  - "+1d4 em dano do próximo ataque até o fim do turno"
                  - "resistência a fogo até o fim do turno"
      - level: 14
        features:
          - name: "Chama Domada"
            description: "Imunidade a dano de fogo de fontes não-mágicas; resistência contra fogo mágico; pode atravessar e mover o braseiro 3 m como ação bônus."
            grants:
              defenses:
                immunity:
                  - "fogo (não-mágico)"
                resistance:
                  - "fogo (mágico)"

  cantineiro-de-guerra:
    name: "Cantineiro de Guerra"
    flavor: "Arquétipo do Cozinheiro"
    description: "Logística, ração quente na linha de frente e disciplina de campo; suporte tático robusto."
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Ração Quente"
            description: "Durante descanso curto, serve guisado que acelera recuperação."
            rules:
              short_rest:
                serve: true
                effects_on_up_to:
                  creatures: "proficiência + Sab (mín. 1)"
                  benefits:
                    - "+1 dado adicional de DV gasto (cura bônus = 1d6, sem consumir DV extra)"
                    - "remove condição para todo o grupo: exausto (−1 nível) OU envenenado"
          - name: "Linha de Serviço"
            description: "Você e aliados adjacentes ganham +1 CA contra ataques à distância se não se moverem no turno."
      - level: 6
        features:
          - name: "Café da Disciplina"
            description: "Ação bônus: dá caneca para 1 aliado; ele ganha 1 reação extra com restrições táticas."
            rules:
              bonus_action: true
              range_m: 6
              effect:
                grant_reaction:
                  extra_reaction_until: "início do seu próximo turno"
                  restriction:
                    - "Usar Preparar"
                    - "Ataque de Oportunidade"
                    - "Ajudar (somente Defesa)"
              uses:
                per: "descanso curto ou longo"
                value: "Sab (mín. 1)"
      - level: 10
        features:
          - name: "Campo Bem Montado"
            description: "Ao iniciar combate, se não estiver surpreso, pode posicionar abrigo leve."
            rules:
              pre_combat:
                place_cover:
                  count: 2
                  size: "1,5 m × 1,5 m"
                  ac_bonus_when_behind: 2
                  hp_each: 10
                  immunities:
                    - "psíquico"
                    - "necrótico"
                    - "veneno"
                  duration: "até o fim do encontro ou destruído"
      - level: 14
        features:
          - name: "Refeição de Batalha"
            description: "Ação: até 6 criaturas em 9 m recebem vigor e foco."
            rules:
              action: true
              range_m: 9
              targets: 6
              effects:
                temp_hp: "2d8 + Sab"
                buff_duration: "1 minuto (concentração)"
                while_buffed:
                  - "vantagem em TS de Constituição para manter concentração"
                  - "+3 m de deslocamento"
              uses:
                per: "descanso longo"
                value: 1
