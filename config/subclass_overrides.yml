barbarian:
  caminho-do-furioso:
    name: "Caminho do Furioso"
    flavor: "Caminho Primitivo"
    description: "Violência crua; entrega-se ao frenesi e aterroriza inimigos."
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Frenesi"
            description: "Enquanto em Fúria, pode entrar em frenesi: em cada turno, faz 1 ataque corpo a corpo com arma como Ação Bônus; ao terminar a Fúria, sofre 1 nível de Exaustão."
            rules:
              activation: "quando entrar em Fúria (opcional)"
              bonus_action_attack: 1
              exhaustion_on_end: 1
      - level: 6
        features:
          - name: "Fúria Inconsciente"
            description: "Enquanto em Fúria, não pode ser Enfeitiçado nem Amedrontado; se estava, o efeito fica suspenso até a Fúria acabar."
            rules:
              while_raging:
                conditions_suppressed: ["enfeitiçado","amedrontado"]
      - level: 10
        features:
          - name: "Presença Intimidante"
            description: "Ação: uma criatura até 9 m que possa ver/ouvir você faz TR Sabedoria; falha → Amedrontado até o fim do seu próximo turno. Você pode usar Ação para estender."
            rules:
              action: true
              range_m: 9
              target: "1 criatura que perceba você"
              save:
                ability: "Sabedoria"
                dc_formula: "8 + proficiência + Car"
                on_fail:
                  condition: "amedrontado"
                  duration: "até o fim do seu próximo turno"
              extend_with_action: true
              wasted_use_for_24h_on_save: true
              breaks_if:
                - "alvo fora da linha de visão no fim do turno"
                - "alvo a >18 m no fim do turno"
      - level: 14
        features:
          - name: "Retaliação"
            description: "Reação: quando sofre dano de criatura a até 1,5 m, faz 1 ataque corpo a corpo com arma contra ela."
            rules:
              reaction: true
              trigger: "sofrer dano de uma criatura a até 1,5 m"
              make_melee_attack: true

  caminho-do-guerreiro-totemico:
    name: "Caminho do Guerreiro Totêmico"
    flavor: "Caminho Primitivo"
    description: "Jornada espiritual guiada por um espírito animal; rituais e bênçãos do totem amplificam a Fúria."
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Conselheiro Espiritual"
            description: "Pode conjurar Sentido Bestial e Falar com Animais como rituais."
            rules:
              casting:
                ritual_only: true
                spells: ["sentido bestial","falar com animais"]
          - name: "Totem Espiritual"
            description: "Escolhe um totem (requer um objeto-totem). Enquanto em Fúria, recebe o benefício do animal escolhido."
            rules:
              requires_totem_object: true
        choices:
          totem_spirit:
            choose: 1
            options:
              - id: "aguia"
                name: "Águia"
                rules:
                  while_raging:
                    dash_as_bonus_action: true
                    opportunity_attacks_against_you: "desvantagem (se não usar armadura pesada)"
              - id: "lobo"
                name: "Lobo"
                rules:
                  while_raging:
                    allies_melee_attacks_vs_hostiles_within_1_5m_of_you: "vantagem"
              - id: "urso"
                name: "Urso"
                rules:
                  while_raging:
                    resistance_to_damage_types: "todos, exceto psíquico"
      - level: 6
        features:
          - name: "Aspecto da Besta"
            description: "Escolhe um aspecto (podendo repetir animal ou escolher outro). Benefício constante, independente da Fúria."
        choices:
          beast_aspect:
            choose: 1
            options:
              - id: "aspecto_aguia"
                name: "Águia"
                rules:
                  senses:
                    sight:
                      long_vision_km: 1.6
                      fine_detail_within_m: 30
                      dim_light_imposes_disadvantage_on_perception: false
              - id: "aspecto_lobo"
                name: "Lobo"
                rules:
                  travel:
                    track_at_fast_pace: true
                    stealth_at_normal_pace: true
              - id: "aspecto_urso"
                name: "Urso"
                rules:
                  carry:
                    capacity_multiplier: 2.0
                  advantage_on_checks:
                    - "Força (empurrar, puxar, erguer ou quebrar objetos)"
      - level: 10
        features:
          - name: "Andarilho Espiritual"
            description: "Pode conjurar Comunhão com a Natureza como ritual."
            rules:
              casting:
                ritual_only: true
                spells: ["comunhão com a natureza"]
      - level: 14
        features:
          - name: "Sintonia Totêmica"
            description: "Ganha um benefício poderoso do animal escolhido (pode repetir ou escolher outro)."
        choices:
          totemic_attunement:
            choose: 1
            options:
              - id: "att_aguia"
                name: "Águia"
                rules:
                  while_raging:
                    fly_speed_equals_walk_speed: true
                    fall_if_ending_turn_in_air: true
              - id: "att_lobo"
                name: "Lobo"
                rules:
                  while_raging:
                    bonus_action:
                      on_hit_melee_vs_large_or_smaller: "derrubar (derrubado)"
              - id: "att_urso"
                name: "Urso"
                rules:
                  while_raging:
                    impose_disadvantage_on_enemies_attacking_others_within_1_5m: true
                    exceptions:
                      - "não possa ver/ouvir você"
                      - "imune a medo"

  barbaro-cicatrizes-runicas:
    name: "Caminho do Bárbaro das Cicatrizes Rúnicas"
    flavor: "Caminho Primitivo"
    description: "Runas gravadas no corpo concedem truques e magias; sinergia com a Fúria."
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Conjuração"
            description: "Aprende truques e magias de feiticeiro; usa Carisma; tem tabela própria de espaços."
            rules:
              spellcasting:
                list: "feiticeiro"
                ability: "Carisma"
                has_separate_slot_table: true
                preparation: "conhecidas"
          - name: "Inscrever Cicatriz Rúnica"
            description: "Ritual para vincular truques/magias às cicatrizes; fala, lê e escreve Dracônico."
            rules:
              ritual_inscribe: { time_minutes: 60, extra_minutes_per_spell_level_above_1: 60 }
              bind_spell_to_scar: true
            grants:
              languages:
                fixed: ["Dracônico"]
          - name: "Magia Furiosa"
            description: "Pode conjurar normalmente enquanto em Fúria, exceto magias que exijam concentração."
            rules:
              while_raging:
                can_cast_spells: true
                concentration_spells_blocked: true
      - level: 6
        features:
          - name: "Ritual de Misticismo"
            description: "10 min + espaço 1º: visão no escuro e vantagem em testes de Sabedoria por 1 h (+1 h por nível acima). Ação bônus: percepção às cegas 9 m até o início do seu próximo turno."
            rules:
              activation: "ritual 10 min (+ gastar espaço 1º+)"
              duration: "1 h (+1 h por nível acima do 1º)"
              effects:
                darkvision_ft: 60
                advantage_on_checks: ["Sabedoria (percepção/insight/sobrevivência)"]
              bonus_action:
                grant_blindsight_ft: 30
                blindsight_until: "início do seu próximo turno"
      - level: 10
        features:
          - name: "Magia Instintiva"
            description: "Enquanto em Fúria e usando Ataque, pode usar Ação Bônus para um truque de ataque corpo a corpo; com Ataque Descuidado, esse ataque mágico corpo a corpo tem vantagem."
            rules:
              while_raging:
                bonus_action:
                  cast_melee_attack_cantrip: true
                  synergy_with_reckless_attack: "vantagem no ataque mágico corpo a corpo"
      - level: 14
        features:
          - name: "Cicatriz Ritualística"
            description: "Após 1 h de ritual, escolha 2 benefícios aplicados às cicatrizes quando conjurá-las."
            rules:
              ritual_time_minutes: 60
        choices:
          ritual_scars:
            choose: 2
            options:
              - { id: "scar_thp", name: "+THP ao conjurar", rules: { temp_hp_on_cast: { formula: "1d8 + 2 × nível da magia" } } }
              - { id: "scar_upcast", name: "Conjura como se +1 nível de espaço", rules: { treat_as_upcast: 1 } }
              - { id: "scar_offense", name: "+bônus em ataque/dano corpo-a-corpo = nível da magia", rules: { melee_attack_bonus: "nível da magia", melee_damage_bonus: "nível da magia", duration: "até o fim do próximo turno" } }
              - { id: "scar_defense", name: "+CA = nível da magia", rules: { ac_bonus: "nível da magia", duration: "até o início do seu próximo turno" } }
              - { id: "scar_resistances", name: "Resistência a ácido/elétrico/frio/fogo/trovejante por rodadas = nível", rules: { resistances: ["acido","eletrico","frio","fogo","trovejante"], duration_rounds: "nível da magia" } }

  desistente:
    name: "Caminho do Desistente"
    flavor: "Caminho Primitivo"
    description: "Bárbaro antimagia que rejeita e resiste a efeitos mágicos."
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Aversão à Magia"
            description: "Nunca aceita magia voluntária; toque mágico em você exige ataque corpo-a-corpo. Vantagem em TS contra magias/efeitos; resistência a dano de magias/efeitos; cura mágica recebida pela metade."
            rules:
              voluntary_magic_on_self: "não"
              touch_spells_against_you_require_melee_attack: true
              saves_vs_spells: "vantagem"
              resistance_to_spell_damage: true
              magical_healing_received_multiplier: 0.5
      - level: 6
        features:
          - name: "Descanso Revigorante"
            description: "Em local sem efeitos místicos a 6 m, no fim do descanso curto recupera PV = CON + nível de bárbaro (sem gastar DV); se gastar DV, soma esse valor. Não funciona se houver magia perceptível a 6 m."
            rules:
              short_rest:
                heal_flat: "Con + nível de bárbaro"
                stacks_with_hit_dice: true
                suppressed_if_magic_within_m: 6
      - level: 10
        features:
          - name: "Supersticioso Revoltado"
            description: "Reação a 9 m: frustra conjuração (se o conjurador falhar TS Sab, gasta o espaço). Ao acertar um item obviamente mágico, pode suprimi-lo por 1 turno (artefatos imunes)."
            rules:
              reaction: true
              range_m: 9
              countercast:
                save:
                  ability: "Sabedoria (do conjurador)"
                  dc_formula: "8 + proficiência + Car"
                on_fail: "conjurador perde o espaço e a magia falha"
              suppress_magic_item_on_hit:
                duration: "até o fim do seu próximo turno"
                exceptions: ["artefatos"]
      - level: 14
        features:
          - name: "Fúria Absorvente"
            description: "Em Fúria, ao passar em TS contra magia/efeito, Reação para ganhar bônus de ataque/dano com armas = nível da magia até o início do próximo turno; ataques com magia contra você têm desvantagem."
            rules:
              while_raging:
                reaction: true
                trigger: "você passa em um teste de resistência contra magia/efeito mágico"
                gain_bonus_attack_damage: "nível da magia"
                gain_bonus_attack_damage_min: 1
                duration: "até o início do seu próximo turno"
                impose_disadvantage_on_spell_attacks_against_you: true

  furioso-imortal:
    name: "Caminho do Furioso Imortal"
    flavor: "Caminho Primitivo"
    description: "Vitalidade insana; recusa a morrer."
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Fúria Imortal"
            description: "Se em Fúria e com menos da metade dos PV: no fim do seu turno, Ação Bônus cura = bônus de Dano de Fúria; e adiciona o mesmo bônus às jogadas de dano com arma usando Força."
            rules:
              while_raging:
                threshold: "PV atuais < 50% dos PV máximos"
                bonus_action_heal: "bônus de Dano de Fúria"
                add_same_bonus_to_weapon_damage_with_str: true
      - level: 6
        features:
          - name: "Guerreiro do Fogo e Gelo"
            description: "Vantagem contra frio/calor extremos; ignora penalidade do 1º nível de exaustão; desloca os efeitos dos níveis seguintes; recupera 2 níveis quando normalmente recuperaria 1."
            rules:
              extreme_cold_heat_checks: "vantagem"
              exhaustion_handling:
                ignore_level_1: true
                shift_exhaustion_effects_by_one_level: true
                dies_at_exhaustion_level: 7
                reduce_two_levels_on_recovery_of_one: true
      - level: 10
        features:
          - name: "Ira Sangrenta"
            description: "Em Fúria: dobra o Dano de Fúria; e, se < metade dos PV, a cura da Fúria Imortal usa o valor dobrado."
            rules:
              while_raging:
                rage_damage_bonus_multiplier: 2
                if_below_half_hp_double_heal: true
      - level: 14
        features:
          - name: "Fortitude Instintiva"
            description: "Morre após 5 falhas de morte. Se cair a 0 PV e tiver Fúria disponível, Reação para entrar em Fúria, ficar com 1 PV e ativar Fúria Implacável; vantagem em TR de Constituição enquanto em Fúria."
            rules:
              death_saves_to_die: 5
              reaction_on_drop_to_0:
                enter_rage_if_available: true
                set_hp_to: 1
                trigger_relentless_rage: true
              while_raging:
                con_saves_advantage: true

  guerreiro-urso:
    name: "Caminho do Guerreiro Urso"
    flavor: "Caminho Primitivo"
    description: "Metamorfose em homem-urso com poder bruto e resiliência."
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Forma de Urso"
            description: "Ao entrar em Fúria, Ação Bônus para assumir forma de homem-urso enquanto a Fúria durar. Ganha For 19 (progressões), +1 CA natural, ataques naturais (mordida 1d8; garras 2d6→2d4), resistência a concussão/corte/perfuração; progressões nos níveis 5,7,9,11,16."
            rules:
              bonus_action_on_rage_start: true
              lasts_while_rage: true
              form_stats:
                ac_natural_bonus: 1
                str_override_by_level:
                  3: 19
                  9: 21
                  16: 23
                natural_attacks:
                  bite: { dmg: "1d8 perfurante" }
                  claws:
                    base: { dmg: "2d6 cortante" }
              resistances_while_in_form: ["contundente","cortante","perfurante"]
              milestones:
                5:
                  extra_attacks_with_weapons: true
                  multiattack: "mordida + 2 garras (ou mordida + 2 ataques com arma)"
                  claws_dmg: "2d4"
                7: { natural_attacks_count_as_magical: true }
                11:
                  size: "Grande"
                  bite_dmg: "2d8"
                  claws_dmg: "2d6"
                  bonus_with_weapons: "+1d6 dano"
      - level: 6
        features:
          - name: "Traços Ferais"
            description: "Faro (vantagem em Percepção por olfato); escalada 9 m; ursos o tratam como amigável e você se comunica com eles."
            rules:
              senses:
                smell_checks_advantage: true
              movement:
                climb_ft: 30
              beast_affinity: { bear_attitude: "amigável", can_communicate: true }
      - level: 10
        features:
          - name: "Abraço Esmagador"
            description: "Garras podem agarrar; Ação Bônus para espremer (2d8 + For); alvo fica impedido enquanto agarrado (CD escapar = 8 + prof + For)."
            rules:
              grapple_with_claws: true
              bonus_action_crush:
                damage: "2d8 + For"
                damage_type: "concussão"
              restrained_while_grappled: true
              escape_dc: "8 + prof + For"
      - level: 14
        features:
          - name: "Vigor do Urso"
            description: "Ao assumir a forma, ganha THP = 2 × nível de bárbaro; vantagem em testes de For e TS de For/Con enquanto na forma."
            rules:
              temp_hp_on_form: "2 × nível de bárbaro"
              while_in_form:
                advantage_on_checks: ["Força"]
                advantage_on_saves: ["Força","Constituição"]

  protetor-tribal:
    name: "Caminho do Protetor Tribal"
    flavor: "Caminho Primitivo"
    description: "Guarda tribal que protege aliados e desafia inimigos no seu território."
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Fúria Protetora"
            description: "+2 CA contra ataques corpo-a-corpo enquanto usar escudo; Reação para trocar de lugar com aliado adjacente e receber o ataque."
            rules:
              while_raging_and_shield:
                ac_bonus_vs_melee: 2
              reaction:
                trigger: "aliado adjacente for alvo de ataque"
                swap_positions_and_become_target: true
      - level: 6
        features:
          - name: "Ligação com a Terra Natal"
            description: "Escolha um terreno: nesse terreno, ignora difícil; Desengajar como Ação Bônus; vantagem em TS For/Dex e em Sobrevivência/Atletismo/Furtividade."
        choices:
          homeland:
            choose: 1
            options:
              - { id: "artico", name: "Ártico" }
              - { id: "costa", name: "Costa" }
              - { id: "deserto", name: "Deserto" }
              - { id: "floresta", name: "Floresta" }
              - { id: "montanha", name: "Montanha" }
              - { id: "pantano", name: "Pântano" }
              - { id: "planicie", name: "Planície" }
              - { id: "subterraneo", name: "Subterrâneo" }
        rules:
          in_homeland:
            ignore_difficult_terrain: true
            bonus_action_disengage: true
            saves_advantage: ["Força","Destreza"]
            skills_advantage: ["Sobrevivência","Atletismo","Furtividade"]
      - level: 10
        features:
          - name: "Defensor da Tribo"
            description: "Reação quando aliado cair a 0 PV, ficar inconsciente ou paralisado: move-se até o espaço dele; enquanto o ocupar, o aliado não pode ser alvo de ataques. Pode proteger contra área sofrendo desvantagem no próprio TS para impedir dano ao aliado."
            rules:
              reaction: true
              triggers: ["aliado cair a 0 PV","aliado ficar inconsciente","aliado ficar paralisado"]
              take_space_and_ally_cannot_be_targeted: true
              protect_from_aoe:
                self_save_disadvantage: true
                prevent_damage_to_ally: true
      - level: 14
        features:
          - name: "Bastião Incansável"
            description: "Ação: desafia hostis a 18 m (TS Sab) por 1 min; quem falha tem desvantagem para atacar outros que não você. A criatura repete o TR no fim de cada turno dela, terminando com sucesso; quem passar fica imune por 24 h. Recarga descanso curto/longo."
            rules:
              action: true
              range_m: 18
              duration: "1 minuto (concentração não necessária)"
              save:
                ability: "Sabedoria"
                dc_formula: "8 + proficiência + Car"
                on_fail:
                  impose_disadvantage_when_targeting_others: true
                repeat_save_end_of_each_turn: true
                immune_for_24h_on_save: true
              uses:
                per: "descanso curto ou longo"
                value: 1

  raivoso-elemental:
    name: "Caminho do Raivoso Elemental"
    flavor: "Caminho Primitivo"
    description: "Canaliza um elemento (água, ar, fogo, terra) em sua fúria."
    choose_level: 3
    choices:
      element:
        choose: 1
        options:
          - { id: "water", name: "Água", grants: { defenses: { resistance: ["frio"] } } }
          - { id: "air",   name: "Ar",   grants: { defenses: { resistance: ["eletrico"] } } }
          - { id: "fire",  name: "Fogo", grants: { defenses: { resistance: ["fogo"] } } }
          - { id: "earth", name: "Terra",grants: { defenses: { resistance: ["acido"] } } }
    levels:
      - level: 3
        features:
          - name: "Despertar do Elemento"
            description: "Escolhe Água/Ar/Fogo/Terra; ganha resistência ligada e traços temáticos menores."
            rules:
              elemental_choice_links_resistance: true
          - name: "Fúria Elemental"
            description: "Enquanto em Fúria, +1d6 (9º: +1d8; 16º: +1d10) do tipo do elemento nos ataques corpo-a-corpo com Força."
            rules:
              while_raging:
                extra_damage_by_level:
                  3: "1d6"
                  9: "1d8"
                  16: "1d10"
                damage_type: "do elemento escolhido"
      - level: 6
        features:
          - name: "Trilha Primordial"
            description: "Benefícios de mobilidade/sentidos temáticos ao elemento."
            rules:
              water:
                movement: { swim_ft: 20 }
                perception_ignores_weather_penalties: true
              air:
                ignore_wind_for_ranged_and_perception: true
                dash_bonus_ft: 10
              fire:
                ignore_smoke_and_nonmagical_fire_hazards: true
              earth:
                ignore_earth_rock_difficult_terrain: true
                movement: { climb_ft: 20 }  # em rocha
      - level: 10
        features:
          - name: "Ira Primitiva"
            description: "Efeito adicional por elemento ao atingir."
            rules:
              water:  { on_hit: { save: { ability: "Con", on_fail: "impedido (contido) até o início do seu próximo turno" } } }
              air:    { on_hit: { effect: "alvo não pode realizar reações até o fim do seu próximo turno" } }
              fire:   { on_hit: { save: { ability: "Des", on_fail: "incendeia: sofre 1d4 de fogo no início de cada turno; repete o TR no fim de cada turno para apagar, ou usa uma ação para apagar automaticamente", ongoing_damage: "1d4 fogo", extinguish: "repete TR no fim de cada turno, ou ação para apagar" } } }
              earth:  { on_hit: { save: { ability: "Con", on_fail: "desvantagem em ataques até o início do seu próximo turno" } } }
      - level: 14
        features:
          - name: "Apogeu Elemental"
            description: "Imunidade ao dano do seu elemento; Reação de retaliação 2d6 + Con do tipo do elemento contra quem lhe acerta em corpo-a-corpo (Des ST metade)."
            rules:
              immunity_to_element: true
              reaction:
                trigger: "ser acertado por ataque corpo a corpo"
                retaliatory_damage: "2d6 + Con (tipo do elemento)"
                save:
                  ability: "Destreza"
                  on_success: "metade"

bard:
  colegio-busca-cancao:
    name: "Colégio da Busca da Canção"
    flavor: "Colégio Bárdico"
    description: "Manipula a música primordial via canções de desbravador."
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Canções de Desbravador"
            description: "Gasta Inspiração de Bardo + um espaço de magia para produzir efeitos musicais (raio flamejante, reestruturação, cone gélido, cura em área, antimagia móvel, teleporte em grupo etc.)."
            rules:
              activation: "ação"
              spend:
                bardic_inspiration_die: 1
                spell_slot: "1º+"
              effect_family: ["ofensivo (raio/cone)","suporte (cura)","controle (antimagia móvel)","mobilidade (teleporte em grupo)"]
              scaling: "melhora com o nível do espaço e o tamanho do dado de Inspiração"
      - level: 6
        features:
          - name: "Refrão de Desbravador"
            description: "Ação bônus, ao iniciar uma canção de desbravador: concede a você ou a um aliado a até 9 m um benefício conforme a canção (resistência a um tipo de dano, imunidade a condição, bônus de deslocamento) por 1 minuto. Trocar o refrão numa criatura extingue o anterior."
            rules:
              bonus_action: true
              duration: "1 minuto"
              range_m: 9
              benefits_examples: ["resistência a um tipo de dano","Vantagem em testes/TS temáticos","bônus de deslocamento"]
              uses:
                per: "descanso longo"
                value: "Carisma (mín. 1)"
      - level: 14
        features:
          - name: "Combinar Canções"
            description: "Ao usar uma canção de desbravador, ativa uma 2ª canção diferente (espaço de magia de no máximo 5º nível) como ação bônus no mesmo turno, gastando os custos de ambas. Recarga com descanso curto ou longo."
            rules:
              activation: "ação bônus"
              combine_two_songs: true
              max_second_song_slot: 5
              different_songs: true
              spend:
                bardic_inspiration_die: 2
                spell_slots: "conforme cada canção"
              uses:
                per: "descanso curto ou longo"
                value: 1

  colegio-comedia:
    name: "Colégio da Comédia"
    flavor: "Colégio Bárdico"
    description: "Humor como arma: debuffs, incapacidade e a piada mortal."
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Artista da Comédia"
            description: "Proficiência em Atuação e Persuasão; vantagem para impressionar plateias."
            grants:
              proficiencies:
                skills:
                  fixed: ["Atuação","Persuasão"]
            rules:
              performance_checks_to_entertain: { advantage: true }
          - name: "Satirizar"
            description: "Gasta Inspiração: alvo a 9 m (TR Sab) fica irritado por 1 min — desvantagem em INT/SAB, sem ação bônus, e teste de Arcanismo (CD 10 + dado) para manter concentração."
            rules:
              action: true
              range_m: 9
              spend:
                bardic_inspiration_die: 1
              save:
                ability: "Sabedoria"
                dc_formula: "8 + prof + Car"
                on_fail:
                  condition: "irritado"
                  penalties:
                    - "desvantagem em testes de INT e SAB"
                    - "no início de cada turno, faz teste de Arcanismo (CD 10 + dado de Inspiração) para manter concentração em magias"
                    - "não pode usar ação bônus"
              concentration_check:
                skill: "Arcanismo"
                dc_formula: "10 + dado de Inspiração"
              repeat_save: "no fim de cada turno (sucesso encerra)"
              immune_if: ["não puder ser enfeitiçada"]
              duration: "1 minuto"
      - level: 6
        features:
          - name: "Faça-os Rir"
            description: "Gasta Inspiração: inimigos a 6 m fazem TR Sab; falha → incapacitados (rindo). Você pode manter por rodadas adicionais até o valor do seu dado de Inspiração."
            rules:
              action: true
              area_radius_m: 6
              spend:
                bardic_inspiration_die: 1
              save:
                ability: "Sabedoria"
                dc_formula: "8 + prof + Car"
                on_fail: "incapacitado (riso incontrolável) até o início do seu próximo turno"
              extend:
                action: true
                max_extra_rounds: "valor do seu dado de Inspiração"
              expire_on_damage: true
              lockout_on_success: "24 horas"
              immune_if: ["não puder ser enfeitiçada"]
      - level: 14
        features:
          - name: "A Piada Mortal"
            description: "Gasta Inspiração: 1 alvo vivo a 9 m faz TR Sab (CD soma o dado); se tiver ≤ 50 PV e falhar, cai a 0 PV (inconsciente); se for bem-sucedido, ainda sofre 5d10 psíquico."
            rules:
              action: true
              range_m: 9
              spend:
                bardic_inspiration_die: 1
              threshold_hp: 50
              save:
                ability: "Sabedoria"
                dc_formula: "8 + prof + Car + dado de Inspiração"
                on_fail_if_leq_threshold: "cai a 0 PV (inconsciente)"
                on_success: "5d10 psíquico"
              immune_if: ["não puder ser enfeitiçada"]
              uses:
                per: "descanso longo"
                value: 1

  colegio-fortuna:
    name: "Colégio da Fortuna"
    flavor: "Colégio Bárdico"
    description: "Sorte sobrenatural e manipulação de rolagens."
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Bon Vivant"
            description: "Proficiência em Persuasão e 2 ferramentas de jogo."
            grants:
              proficiencies:
                skills:
                  fixed: ["Persuasão"]
                tools:
                  choose: 2
                  options: ["Ferramentas de jogo"]
          - name: "Sorte no Jogo, Sorte no Amor"
            description: "Vantagem em jogos e em Carisma (Persuasão); pode aplicar discretamente seu dado de Inspiração em si mesmo."
            rules:
              advantage_on: ["testes de jogo","Carisma (Persuasão)"]
              self_apply_bardic_inspiration_silently: true
      - level: 6
        features:
          - name: "Manipular a Sorte"
            description: "Reação: quando você ou um aliado a até 9 m faz uma jogada de ataque, teste de habilidade ou TR, força a rerrolagem do d20. O alvo fica com o 2º resultado, podendo ser melhor ou pior."
            rules:
              reaction: true
              range_m: 9
              trigger: "você ou um aliado a até 9 m rolar um d20 (ataque, teste de habilidade ou TR)"
              force_reroll: true
              keep_result: "o 2º resultado (melhor ou pior)"
              uses:
                per: "descanso longo"
                value: "Carisma (mín. 1)"
      - level: 14
        features:
          - name: "Roda do Infortúnio"
            description: "Ação: gasta 1 dado de Inspiração; uma criatura hostil a até 18 m faz TR de Carisma ou sofre um efeito da tabela Roda do Infortúnio (definido pelo valor do dado de Inspiração) por 1 minuto. Repete a TR no fim de cada turno (sucesso encerra)."
            rules:
              action: true
              range_m: 18
              spend:
                bardic_inspiration_die: 1
              save:
                ability: "Carisma"
                dc_formula: "8 + prof + Car"
              duration: "1 minuto"
              repeat_save: "no fim de cada turno (sucesso encerra)"
              wheel_of_misfortune_table:
                "1-2": "desvantagem em testes de habilidade"
                "3-4": "desvantagem em jogadas de ataque"
                "5-6": "desvantagem em testes de resistência"
                "7-8": "sofre +1d8 de dano por ataque recebido"
                "9-10": "outras criaturas têm vantagem em ataques contra o alvo"
                "11-12": "no início do turno rola 1d6: 1-4 não faz nada nesse turno, 5-6 age normalmente"
              uses:
                per: "descanso curto ou longo"
                value: 1

  colegio-quietude:
    name: "Colégio da Quietude"
    flavor: "Colégio Bárdico"
    description: "Silêncio e vibrações imperceptíveis."
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Menestrel Silencioso"
            description: "Proficiência em Enganação e Furtividade; aprende silêncio (não conta no limite)."
            rules:
              bonus_known_spell_does_not_count_against_limit: true
          - name: "Inspiração Subconsciente"
            description: "Você pode conceder o dado de Inspiração por vibração (o aliado não precisa ouvi-lo, mas deve estar a até 9 m). Além disso, quando você ou um aliado tenta influenciar/enfeitiçar/amedrontar uma criatura a até 9 m, usa a reação e 1 dado de Inspiração para impor penalidade (= seu dado) ao teste/TR dela; a criatura faz Sabedoria (Percepção) CD 20 ou não percebe o efeito mágico."
            rules:
              range_m: 9
              reaction: true
              trigger: "alvo realizar teste ou TR"
              impose_penalty_die: "seu dado de Inspiração"
              detection_save:
                skill: "Sabedoria (Percepção)"
                dc: 20
                on_fail: "não percebe o efeito mágico"
        grants:
          proficiencies:
            skills:
              fixed: ["Enganação","Furtividade"]
          spells:
            always_prepared:
              3: ["silence"]
      - level: 6
        features:
          - name: "Magia Imperceptível"
            description: "Conjura magia verbal sem ser percebido: teste de Carisma (Enganação); criatura com Percepção passiva inferior ao resultado não percebe (sentido sísmico não é enganado)."
            rules:
              once_per_rest: true
              uses:
                per: "descanso curto ou longo"
                value: 1
              check: { skill: "Carisma (Enganação)", vs: "Percepção passiva" }
      - level: 14
        features:
          - name: "Voz Além do Som"
            description: "silêncio centrado em si que o acompanha; você ainda conjura magias verbais e concede Inspiração a aliados dentro da área."
            rules:
              action: true
              self_centered_silence_aura: true
              you_ignore_your_own_silence: true
              duration: "1 minuto"
              uses:
                per: "descanso longo"
                value: 1

  colegio-pavor:
    name: "Colégio do Pavor"
    flavor: "Colégio Bárdico"
    description: "Terror teatral que quebra a moral inimiga."
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Proficiência Adicional"
            description: "Ganha Enganação e Intimidação (ou substitui se já tiver)."
            grants:
              proficiencies:
                skills:
                  add_or_replace: ["Enganação","Intimidação"]
          - name: "Melodia Lamuriante"
            description: "Gasta Inspiração: alvo perde ações bônus e reações e recebe penalidade no próximo ataque."
            rules:
              action: true
              range_m: 18
              spend:
                bardic_inspiration_die: 1
              effects:
                remove_bonus_actions_and_reactions: true
                next_attack_penalty: "−dado de Inspiração"
              duration: "até o fim do próximo turno do alvo"
      - level: 6
        features:
          - name: "Canção Assustadora"
            description: "Gasta Inspiração: amedronta por 1 min (TR Sab com penalidade = seu dado)."
            rules:
              action: true
              range_m: 18
              spend:
                bardic_inspiration_die: 1
              save:
                ability: "Sabedoria"
                dc_formula: "8 + prof + Car"
                save_penalty: "−seu dado de Inspiração"
                on_fail: { condition: "amedrontado", duration: "1 minuto" }
      - level: 14
        features:
          - name: "Música Mística Atormentadora"
            description: "Ao conjurar magia que afete um único inimigo, com uma ação bônus gasta Inspiração para impor penalidade (seu dado) ao próximo TS do alvo, além dos efeitos normais da magia."
            rules:
              trigger: "você conjura magia de alvo único"
              bonus_action: true
              spend:
                bardic_inspiration_die: 1
              apply_debuff:
                target_next_save_penalty: "−seu dado de Inspiração"
                applies_to: "o próximo TR que o alvo fizer (sem limite de tempo)"

  colegio-virtuosismo:
    name: "Colégio do Virtuosismo"
    flavor: "Colégio Bárdico"
    description: "Poliglota carismático; contra-magia performática e ecolocalização musical."
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Proficiência Adicional"
            description: "+3 instrumentos e 2 idiomas."
            grants:
              languages:
                choose: 2
                options: ["Comum","Anão","Élfico","Gnômico","Halfling","Orc","Goblinóide","Dracônico","Infernal","Celestial","Silvestre","Aquan","Auran","Ignan","Terran"]
              proficiencies:
                instruments:
                  choose: 3
                  options: ["Instrumento musical"]
          - name: "Personalidade Forte"
            description: "Vantagem em Persuasão/Intimidação; ao resistir a medo (passar no TS), usa a AÇÃO para desmoralizar o agressor (desvantagem nos ataques dele contra você e vantagem nos seus contra ele até o fim do próximo turno dele)."
            rules:
              advantage_on: ["Carisma (Persuasão)","Carisma (Intimidação)"]
              on_pass_fear_save_demoralize_attacker: true
              demoralize_uses_action: true
      - level: 6
        features:
          - name: "Acorde Distrativo"
            description: "Reação: gasta Inspiração para quebrar conjuração que você vê (TR Sab do alvo)."
            rules:
              reaction: true
              trigger: "criatura conjurando magia"
              spend:
                bardic_inspiration_die: 1
              save:
                ability: "Sabedoria (do conjurador)"
                dc_formula: "8 + prof + Car"
                save_penalty: "−seu dado de Inspiração"
                on_fail: "perde a concentração e a magia falha (espaço gasto)"
      - level: 14
        features:
          - name: "Música de Revelação"
            description: "Sentido sísmico 18 m por até 1 min; mantém com ação bônus. 1/descanso curto ou longo."
            rules:
              action: true
              tremorsense_m: 18
              duration: "1 minuto"
              sustain_with_bonus_action: true
              uses:
                per: "descanso curto ou longo"
                value: 1

  colegio-do-conhecimento:
    name: "Colégio do Conhecimento"
    flavor: "Colégio Bárdico"
    description: "Erudição versátil; coleta saberes e desfere palavras para desestabilizar inimigos."
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Proficiência Adicional"
            description: "Ganha proficiência em 3 perícias à sua escolha."
            grants:
              proficiencies:
                skills:
                  choose: 3
                  options: ":selected_from_class_skills"
          - name: "Palavras de Interrupção"
            description: "Reação: quando uma criatura a até 18 m faz uma jogada de ataque, um teste de habilidade ou uma jogada de dano, gasta 1 dado de Inspiração de Bardo e subtrai o resultado da rolagem da criatura (decide após a rolagem, antes de saber o resultado/dano). A criatura é imune se não puder ouvi-lo ou não puder ser enfeitiçada."
            rules:
              reaction: true
              range_m: 18
              spend:
                bardic_inspiration_die: 1
              apply_as_penalty_to: ["jogada de ataque","dano","teste de habilidade"]
              immune_if: ["não puder ouvir você","não puder ser enfeitiçada"]
      - level: 6
        features:
          - name: "Segredos Mágicos Adicionais"
            description: "Aprende 2 magias de qualquer classe; contam como magias de bardo."
            grants:
              spells:
                learn_any_class: 2
      - level: 14
        features:
          - name: "Perícia Inigualável"
            description: "Ao fazer um teste de habilidade, gasta 1 dado de Inspiração de Bardo e soma o resultado ao teste. Pode decidir após rolar o d20, mas antes de saber o resultado."
            rules:
              trigger: "você faz um teste de habilidade"
              spend:
                bardic_inspiration_die: 1
              add_die_to: "teste de habilidade"
              decide_after_d20_before_outcome: true

  colegio-da-bravura:
    name: "Colégio da Bravura"
    flavor: "Colégio Bárdico"
    description: "Inspiradores de coragem; fortalecem aliados na luta."
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Proficiência Adicional"
            description: "Ganha proficiência com armaduras médias, escudos e armas marciais."
            grants:
              proficiencies:
                armor: ["armaduras médias","escudos"]
                weapons: ["armas marciais"]
          - name: "Inspiração em Combate"
            description: "Uma criatura que tenha um dado de Inspiração de Bardo seu pode rolá-lo e somar à jogada de dano que acabou de fazer; ou, ao ser alvo de um ataque, usar a reação para rolá-lo e somar à CA contra esse ataque (após a rolagem, antes de saber se o ataque acertou)."
            rules:
              ally_can_use_bardic_inspiration_to:
                - "rolar o dado e somar à jogada de dano que acabou de fazer"
                - "ao ser alvo de um ataque, usar a reação para rolar o dado e somar à CA contra esse ataque (após a rolagem, antes de saber se acertou)"
      - level: 6
        features:
          - name: "Ataque Extra"
            description: "Pode atacar duas vezes ao usar a ação de Ataque."
            rules:
              extra_attack: 1
      - level: 14
        features:
          - name: "Magia de Batalha"
            description: "Ao usar sua ação para conjurar uma magia de bardo, pode realizar um ataque com arma como ação bônus."
            rules:
              trigger: "você usa a ação para conjurar uma magia de bardo"
              bonus_action: true
              effect: "realiza um ataque com arma como ação bônus"

  # ============================================================================
  # College of Glamour (XGtE) — Colégio do Glamour
  # Bardos imbuídos com magia das fadas; encantam, comandam e protegem aliados
  # com presença carismática.
  # ============================================================================
  colegio-do-glamour:
    name: "Colégio do Glamour"
    flavor: "Colégio Bárdico"
    description: "Bardos que aprenderam sua magia diretamente do mundo das fadas (Feywild). Usam carisma sobrenatural para inspirar aliados, comandar inimigos e se manter inalcançáveis em combate."
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Manto de Inspiração"
            description: "Ação bônus: gasta 1 uso de Inspiração Bárdica para envolver-se em magia feérica. Até 5 criaturas amigáveis em 18 m que possam ver você ganham 5 PV temporários (escala com nível: 8 nv 5, 11 nv 10, 14 nv 15). Ao receber, cada uma pode usar reação para se mover até seu deslocamento sem provocar ataques de oportunidade."
            rules:
              bonus_action: true
              cost:
                bardic_inspiration_die: 1
              range_m: 18
              targets: 5
              temp_hp_by_level:
                3: 5
                5: 8
                10: 11
                15: 14
              reaction_grant: "movimento até deslocamento sem provocar AO"
          - name: "Presença Cativante"
            description: "Como ação, gasta 1 minuto realizando performance bárdica. Criaturas humanóides em 18 m que possam ver e ouvir você fazem TR de Sabedoria contra sua CD de Magia ou ficam encantadas por 1 minuto OU até sofrerem dano. Recobra ao terminar descanso curto ou longo."
            rules:
              action: true
              performance_time_minutes: 1
              range_m: 18
              targets_type: "humanoides"
              save:
                ability: "Sabedoria"
                dc_formula: "spell_dc"
                on_fail: "encantada por 1 minuto ou até sofrer dano"
              uses:
                per: "descanso curto ou longo"
                value: 1
      - level: 6
        features:
          - name: "Manto de Majestade"
            description: "Ação bônus: ganha aura de majestade por 1 minuto (concentração). A cada turno na duração, pode usar ação bônus para conjurar Comando como magia (sem gastar slot, contra criaturas que possam ver e ouvir você). Criaturas encantadas por você falham automaticamente em TR contra esse Comando."
            rules:
              bonus_action_to_activate: true
              duration: "1 minuto (concentração)"
              each_turn_bonus_action: "conjura Comando sem slot"
              charmed_auto_fail: true
              uses:
                per: "descanso longo"
                value: 1
      - level: 14
        features:
          - name: "Majestade Inquebrável"
            description: "Ação bônus: assume aparência sobrenatural. Por 1 minuto, todo ataque corpo-a-corpo que acertá-lo força o atacante a fazer TR de Carisma; falha: não pode atacar você até o fim do próximo turno (precisa atacar outra criatura ou desperdiça a ação). Adicionalmente, ataques contra você sofrem desvantagem se atacante puder ver você."
            rules:
              bonus_action: true
              duration: "1 minuto"
              save_on_melee_hit:
                ability: "Carisma"
                dc_formula: "8 + proficiência + Car"
                on_fail: "não pode atacar você até fim do próximo turno"
              attacks_against_you_disadvantage_if_can_see: true
              uses:
                per: "descanso longo"
                value: 1

cleric:
  # ======== DOMÍNIOS ORIGINAIS (seus) ========

  dominio-agua:
    name: "Domínio da Água"
    flavor: "Domínio Divino"
    description: "Fluxos, gelo e mares; manipula água e frio."
    choose_level: 1
    levels:
      - level: 1
        features:
          - name: "Magias do Domínio"
            description: "Magias adicionais sempre preparadas."
            grants:
              spells:
                always_prepared:
                  1: ["grease","create-or-destroy-water"]
                  3: ["misty-step","lesser-restoration"]
                  5: ["water-walk","water-breathing"]
                  7: ["control-water","blight"]
                  9: ["conjure-elemental","scrying"]
          - name: "Proficiência Adicional"
            description: "Ganha Atletismo e fala Aquan."
            grants:
              languages:
                fixed: ["Aquan"]
              proficiencies:
                skills:
                  fixed: ["Atletismo"]
          - name: "Lança de Gelo"
            description: "Ação bônus: ataque à distância 9 m (1d6 perfurante + 1d6 frio)."
            rules:
              bonus_action: true
              range_m: 9
              attack: "à distância com magia"
              damage: ["1d6 perfurante","1d6 frio"]
              uses:
                per: "dia"
                value: "Sabedoria (mín. 1)"
      - level: 2
        features:
          - name: "Canalizar Divindade: Bolha Protetora"
            description: "Engolfa um aliado a 18 m numa bolha de água móvel por 1 min; dentro respira normalmente mas o deslocamento cai à metade; concede resistências (ácido, fogo, frio, trovejante, e concussão/cortante não-mágicos)."
            rules:
              action: true
              duration: "1 minuto (concentração)"
              range_m: 18
              aura_m: 3
              movement_penalty: "deslocamento à metade dentro da bolha"
              grants_resistance: ["acido","fogo","frio","trovejante","contundente (não-mágico)","cortante (não-mágico)"]
      - level: 6
        features:
          - name: "Água Revigorante"
            description: "Criatura na bolha recupera 2 PV no início do turno."
            rules:
              trigger: "início do turno na bolha"
              heal: 2
      - level: 8
        features:
          - name: "Golpe Divino (Frio)"
            description: "1/turno, +1d8 de frio em um ataque com arma (2d8 no 14º)."
            rules:
              once_per_turn: true
              damage: { type: "frio", dice: "1d8 (14º: 2d8)" }
      - level: 17
        features:
          - name: "Chuva Ácida"
            description: "1/dia: conjura uma nuvem ácida móvel por 1 min; 3d8 (DES metade)."
            rules:
              uses: { per: "dia", value: 1 }
              action: true
              duration: "1 minuto (concentração)"
              area: "nuvem móvel (defina tamanho na mesa)"
              damage: { type: "acido", dice: "3d8", save: "DES metade" }

  dominio-criacao:
    name: "Domínio da Criação"
    flavor: "Domínio Divino"
    description: "Cria, molda e anima objetos; sustento e construção."
    choose_level: 1
    levels:
      - level: 1
        features:
          - name: "Magias do Domínio"
            description: "Magias sempre preparadas de criação/utilidade."
            grants:
              spells:
                always_prepared:
                  1: ["create-or-destroy-water","unseen-servant"]
                  3: ["continual-flame","web"]
                  5: ["create-food-and-water","phantom-steed"]
                  7: ["fabricate","stoneskin"]
                  9: ["creation","passwall"]
          - name: "Proficiência Adicional"
            description: "Armaduras pesadas e 1 ferramenta de artesão."
            grants:
              proficiencies:
                armors: { add: ["pesadas"] }
                tools:
                  choose: 1
