        features:
          - name: "Proficiências Bônus"
            description: "Armaduras pesadas e armas marciais."
            grants:
              proficiencies:
                armors: { add: ["pesadas"] }
                weapons: { add: ["marciais"] }
          - name: "Sacerdote da Guerra"
            description: "Quando usar a ação Ataque, pode fazer 1 ataque com arma como Ação Bônus (usos/descanso longo = mod.Sab)."
            rules:
              bonus_action_attack_on_attack_action: true
              uses: { per: "descanso longo", value: "Sabedoria (mín. 1)" }
          - name: "Magias do Domínio"
            description: "Sempre preparadas."
            grants:
              spells:
                always_prepared:
                  1: ["divine-favor","escudo da fé"]
                  3: ["arma mágica","arma espiritual"]
                  5: ["manto do cruzado","espíritos guardiões"]
                  7: ["movimentação livre","pele de pedra"]
                  9: ["coluna de chamas","imobilizar monstro"]
      - level: 2
        features:
          - name: "CD: Ataque Dirigido"
            description: "Reação: +10 a uma jogada de ataque sua após ver o resultado."
      - level: 6
        features:
          - name: "Bênção do Deus da Guerra"
            description: "Reação: concede +10 à jogada de ataque de um aliado a 9 m, gastando CD."
      - level: 8
        features:
          - name: "Golpe Divino (Radiante)"
            description: "1/turno, +1d8 radiante (2d8 no 14º) em ataque com arma."
            rules:
              once_per_turn: true
              damage: { type: "radiante", dice: "1d8 (14º: 2d8)" }
      - level: 17
        features:
          - name: "Avatar da Batalha"
            description: "Resistência a concussão/corte/perf de armas não mágicas."
            grants:
              defenses: { resistance: ["contundente (não-mágico)","cortante (não-mágico)","perfurante (não-mágico)"] }

druid:
  circulo-da-terra:
    name: "Círculo da Terra"
    flavor: "Círculo Druídico"
    description: "Místicos que guardam ritos antigos; magias do terreno e recuperação arcana."
    choose_level: 2
    rules:
      spellcasting:
        ability: "Sabedoria"
        save_dc: "8 + proficiência + Sab"
        attack_bonus: "proficiência + Sab"
    levels:
      - level: 2
        features:
          - name: "Truque Adicional"
            description: "Aprende 1 truque de druida extra ao escolher o círculo."
            grants:
              spells:
                add_cantrips_from_class:
                  class: "druid"
                  count: 1
          - name: "Recuperação Natural"
            description: "Durante um descanso curto, recupera espaços de magia gastos."
            rules:
              natural_recovery:
                recover_on: "descanso curto"
                total_levels_recovered: "≤ metade do nível de druida (arred. p/ baixo)"
                slot_level_limit: "sem recuperar 6º+"
                uses: { per: "descanso longo", value: 1 }
      - level: 3
        features:
          - name: "Magias de Círculo"
            description: "Magias sempre preparadas, definidas pelo terreno do seu círculo."
            choices:
              terrain:
                choose: 1
                options:
                  - { id: "artico",       name: "Ártico" }
                  - { id: "costa",        name: "Costa" }
                  - { id: "deserto",      name: "Deserto" }
                  - { id: "floresta",     name: "Floresta" }
                  - { id: "montanha",     name: "Montanha" }
                  - { id: "pantano",      name: "Pântano" }
                  - { id: "planicie",     name: "Planície" }
                  - { id: "subterraneo",  name: "Subterrâneo" }
            grants:
              spells:
                always_prepared_by_terrain:
                  artico:
                    3: ["imobilizar pessoa","crescer espinho"]
                    5: ["nevasca","lentidão"]
                    7: ["movimentação livre","tempestade de gelo"]
                    9: ["comunhão com a natureza","cone de frio"]
                  costa:
                    3: ["passo nebuloso","reflexos"]
                    5: ["andar na água","respirar água"]
                    7: ["movimentação livre","controlar água"]
                    9: ["vidência","conjurar elemental"]
                  deserto:
                    3: ["nublar","silêncio"]
                    5: ["criar alimentos","proteção contra energia"]
                    7: ["praga","terreno alucinógeno"]
                    9: ["muralha de pedra","praga de insetos"]
                  floresta:
                    3: ["patas de aranha","pele de árvore"]
                    5: ["convocar relâmpagos","crescer plantas"]
                    7: ["adivinhação","movimentação livre"]
                    9: ["comunhão com a natureza","passo de árvore"]
                  montanha:
                    3: ["crescer espinho","patas de aranha"]
                    5: ["mesclar-se às rochas","relâmpago"]
                    7: ["moldar rochas","pele de pedra"]
                    9: ["criar passagem","muralha de pedra"]
                  pantano:
                    3: ["escuridão","flecha ácida"]
                    5: ["andar na água","névoa fétida"]
                    7: ["localizar criatura","movimentação livre"]
                    9: ["vidência","praga de insetos"]
                  planicie:
                    3: ["invisibilidade","passos sem pegadas"]
                    5: ["luz do dia","velocidade"]
                    7: ["adivinhação","movimentação livre"]
                    9: ["praga de insetos","sonho"]
                  subterraneo:
                    3: ["patas de aranha","teia"]
                    5: ["forma gasosa","névoa fétida"]
                    7: ["invisibilidade maior","moldar rochas"]
                    9: ["praga de insetos","névoa mortal"]
            rules:
              circle_spells:
                always_prepared: true
                counts_against_prepared: false
                offlist_becomes_druid_spell: true
      - level: 6
        features:
          - name: "Caminho da Floresta"
            description: "Ignora terreno difícil não mágico; atravessa plantas não mágicas sem penalidades; vantagem vs. plantas mágicas que impeçam movimento."
      - level: 10
        features:
          - name: "Proteção Natural"
            description: "Imune a venenos e doenças; não pode ser enfeitiçado/amedrontado por fadas e elementais."
            grants:
              defenses:
                conditions_immunity: ["envenenado? (veneno e doenças)"]
      - level: 14
        features:
          - name: "Santuário Natural"
            description: "Bestas e plantas que o ataquem fazem ST de Sabedoria (CD de magias de druida) ou devem escolher outro alvo/errar (24h de imunidade no sucesso)."
            rules:
              save: { ability: "Sabedoria", dc: "8 + prof + Sab" }

  circulo-da-lua:
    name: "Círculo da Lua"
    flavor: "Círculo Druídico"
    description: "Guardião selvagem focado em Forma Selvagem para combate e versatilidade."
    choose_level: 2
    rules:
      wild_shape:
        action_to_use_at_2: "ação bônus (Combate)"
        healing_in_beast_form: "ação bônus; gasta espaço de magia para curar 1d8 por nível do espaço"
        circle_forms:
          cr_at_2: 1
          cr_at_6: "nível de druida ÷ 3 (arred. p/ baixo)"
          movement_restrictions: "limitações padrão da Forma Selvagem (voo só quando permitido)"
    levels:
      - level: 2
        features:
          - name: "Forma Selvagem de Combate"
            description: "Usa Forma Selvagem como ação bônus; pode curar-se com espaços de magia enquanto em forma de besta."
            rules:
              use_bonus_action: true
              heal_with_slot: "1d8 por nível do espaço (ação bônus) enquanto em forma de besta"
          - name: "Formas de Círculo"
            description: "Amplia os ND das formas: ND 1 no 2º; ND máx = nível/3 no 6º (arred. p/ baixo)."
      - level: 6
        features:
          - name: "Ataque Primordial"
            description: "Ataques na forma de besta contam como mágicos para superar resistência/imunidade a dano não mágico."
            rules:
              attacks_count_as_magical: true
      - level: 10
        features:
          - name: "Forma Selvagem de Elemental"
            description: "Gasta 2 usos de Forma Selvagem para assumir forma de Elemental (Ar, Terra, Fogo ou Água)."
            rules:
              cost_uses: 2
              forms: ["elemental do ar","elemental da terra","elemental do fogo","elemental da água"]
      - level: 14
        features:
          - name: "Mil Formas"
            description: "Pode conjurar 'alterar-se' à vontade."
            grants:
              spells:
                at_will: ["alterar-se"]

  circulo-infestacao:
    name: "Círculo da Infestação"
    flavor: "Círculo Druídico"
    description: "Drena e corrompe a natureza para obter poder."
    choose_level: 2
    levels:
      - level: 2
        features:
          - { name: "Proficiência Adicional", description: "Armaduras pesadas e Kit de Venenos." }
          - { name: "Trilha do Infestador", description: "Magias temáticas sempre preparadas; flora próxima murcha ao conjurar." }
        grants:
          proficiencies:
            armors: { add: ["pesadas"] }
            tools: { add: ["Kit de Venenos"] }
          spells:
            always_prepared:
              2: ["ray-of-sickness","false-life"]
              3: ["ray-of-enfeeblement","web"]
              5: ["bestow-curse","vampiric-touch"]
              7: ["blight","evards-black-tentacles"]
              9: ["cloudkill","contagion"]
      - level: 6
        features:
          - name: "Drenar Energia"
            description: "Em terreno vivo, durante um descanso curto, recupera espaços (como Recuperação Arcana adaptada)."
            rules:
              recover_on: "descanso curto"
              total_levels_recovered: "≤ metade do nível de druida (arred. p/ baixo)"
              slot_level_limit: "nenhum espaço de 6º+"
      - level: 10
        features:
          - name: "Aura Antinatural"
            description: "Criaturas (exceto bestas/plantas, que fogem) a 6 m fazem TS Sab no início do turno; falha: desvantagem em testes e TS enquanto na aura."
            rules:
              aura_radius_m: 6
              save:
                ability: "Sabedoria"
                dc: "CD de magias de druida"
                timing: "início do turno na aura (ou ao entrar)"
              ends: "quando sai da aura; sucesso torna imune por 24h"
      - level: 14
        features:
          - name: "Corromper a Natureza"
            description: "1/descanso longo: em território natural com plantas, anima a vegetação como infectados sob seu comando, escolhendo entre oito galhos infectados, quatro espetos infectados ou duas vinhas infectadas; ao cair a 0 PV, explodem causando dano necrótico em área."
            rules:
              activate: { time: "1 ação", uses: "1/descanso longo" }
              options:
                choose: 1
                infected:
                  - { id: "galhos", name: "oito galhos infectados" }
                  - { id: "espetos", name: "quatro espetos infectados" }
                  - { id: "vinhas", name: "duas vinhas infectadas" }
              control: "rolam iniciativa e agem por conta; obedecem comandos verbais (sem ação); sem ordens, atacam vivos/plantas mais próximos"
              empowered: "resistência a contundente/cortante/perfurante não-mágico; vantagem em ataques enquanto a até 9 m de você"
              death_burst:
                area_m: 3
                damage: "1d8 necrótico por Dado de Vida do infectado"
                save: { ability: "Destreza", dc: 15, effect: "metade no sucesso" }
  circulo-vida:
    name: "Círculo da Vida"
    flavor: "Círculo Druídico"
    description: "Celebram o ciclo natural; curas, abundância e renascimento."
    choose_level: 2
    levels:
      - level: 2
        features:
          - { name: "Proficiência Adicional", description: "Medicina e Sobrevivência." }
          - name: "Ervas Curativas"
            description: "Durante um descanso curto, usando um kit de herbalismo, trata até seu mod. de Sabedoria criaturas (mín. 1); cada uma recupera 1d8 + mod. Sabedoria PV. Um kit trata 5 criaturas ao todo antes de se esgotar."
            rules:
              uses_per_rest: "até seu mod. de Sabedoria (mín. 1)"
              heal_amount: "1d8 + mod. Sabedoria"
              requires: "Kit de Herbalismo (trata 5 criaturas por kit)"
        grants:
          proficiencies:
            skills:
              fixed: ["Medicina","Sobrevivência"]
      - level: 6
        features:
          - { name: "Ritual de Fartura", description: "Ritual de 1 h (1×/descanso longo): por 24 h, você e os participantes têm vantagem em testes de Sabedoria (Sobrevivência) para forragear/caçar e encontram o dobro do normal em sucesso." }
      - level: 10
        features:
          - { name: "Renovação do Ciclo", description: "Ritual de 8 h + foco material de uma criatura morta há no máx. 1 dia por nível de druida: você dá à luz a criatura renascida como criança 24 h depois (cresce até a idade da morte em 1 semana). O parto é extenuante: -4 em jogadas de ataque, TRs e testes de habilidade, reduzido em 1 a cada descanso longo até desaparecer. Não pode reutilizar enquanto a penalidade estiver ativa." }
      - level: 14
        features:
          - { name: "Celebração da Vida", description: "Festa de 8 h (1×/descanso longo): você e as criaturas amigáveis participantes recebem os benefícios de um descanso longo e, por 24 h, ganham vantagem em testes e TRs de Constituição e recuperam 1 PV por minuto. Perde-se os benefícios de Constituição/recuperação se a criatura tirar a vida de outra criatura viva." }
  circulo-fadas:
    name: "Círculo das Fadas"
    flavor: "Círculo Druídico"
    description: "Vínculo com Faéria; truques feéricos e companheiro pixie."
    choose_level: 2
    levels:
      - level: 2
        features:
          - { name: "Linguagem Feérica", description: "Fala, lê e escreve em Silvestre; as magias do círculo são sempre preparadas e não contam no limite (se não estiver na lista de druida, ainda é magia de druida para você)." }
          - { name: "Personalidade Feérica", description: "Vantagem em testes de Carisma ao lidar com criaturas do tipo besta, fada e planta; e vantagem em testes de resistência contra magias e habilidades dessas criaturas." }
        grants:
          languages: { fixed: ["Silvestre"] }
          spells:
            always_prepared:
              2: ["animal-friendship","faerie-fire"]
              3: ["enthrall","invisibility"]
              5: ["speak-with-plants","major-image"]
              7: ["confusion","hallucinatory-terrain"]
              9: ["mislead","dream"]
      - level: 6
        features:
          - name: "Companheiro Feérico"
            description: "Um pixie tímido o acompanha; fica invisível a maior parte do tempo e o ajuda como pode, mas não arrisca a própria vida para defendê-lo. Em combate, você pode usar sua ação para pedir que ele conjure uma magia específica; caso contrário, ele só se move ou fala com você. Só conjura Metamorfose como último recurso, se a própria vida estiver em risco. Se cair a 0 PV, volta à Faéria; pode ser reconvocado após um descanso longo."
            rules:
              action_to_cast: "use sua ação para pedir que o pixie conjure uma magia específica"
              polymorph_last_resort: "só conjura Metamorfose como último recurso e apenas se a própria vida estiver em risco"
              return_to_feywild: "ao cair a 0 PV; reconvocado após descanso longo"
      - level: 10
        features:
          - { name: "Encontrar Encruzilhada", description: "Ritual de 10 min (1/descanso longo): descobre a localização de quaisquer encruzilhadas que levem à Faéria num raio de 10 km e como acessá-las." }
      - level: 14
        features:
          - name: "Criatura de Faéria"
            description: "Assume uma forma feérica similar a uma dríade por 1 h (1/descanso longo): vantagem em TS contra magias e efeitos mágicos; 1×/turno usa 3 m do deslocamento para entrar numa árvore viva ao alcance e surgir de outra a até 18 m (ambas de categoria de tamanho superior à sua), a 1,5 m dela; e, com ação bônus, conjura Invisibilidade à vontade em floresta ou terreno natural similar."
            rules:
              uses: "1/descanso longo"
              benefits: ["vantagem em TS contra magias e efeitos mágicos","1×/turno: teleporte entre árvores vivas maiores que você, até 18 m","ação bônus: Invisibilidade à vontade em floresta/terreno natural"]

  circulo-feras:
    name: "Círculo das Feras"
    flavor: "Círculo Druídico"
    description: "Mestre das bestas; convoca e fortalece criaturas selvagens."
    choose_level: 2
    levels:
      - level: 2
        features:
          - name: "Chamado Selvagem"
            description: "Convoca besta (ND ≤ nível/3) amigável para ajudar; chega em 1d4 rodadas e permanece até o fim do combate ou até chegar a 1 PV (quando foge). Do 8º em diante, também fada/elemental/planta."
            rules:
              action: "1 ação"
              arrival: "1d4 rodadas"
              duration: "até o fim do combate ou até a besta chegar a 1 PV (foge)"
              cr_limit: "≤ nível/3 (arred. p/ baixo)"
              uses: "recobra em descanso curto ou longo"
              types_at_8: ["besta","fada","elemental","planta"]
          - { name: "Empatia com a Natureza", description: "Teste de Sabedoria (Lidar com Animais) para influenciar a atitude de qualquer besta, elemental, fada ou planta, sem precisar partilhar um idioma; vantagem no teste se a atitude inicial da criatura não for hostil." }
      - level: 6
        features:
          - name: "Vínculo Selvagem"
            description: "Ação bônus dá vantagem na próxima jogada de ataque de uma criatura sob seu comando (até o início do seu próximo turno); ao conjurar uma magia com alvo 'você', pode fazer o efeito também afetar 1 criatura sob seu comando que possa ver a até 9 m."
            rules:
              bonus_action_mark: "1 criatura sob seu comando ganha vantagem na próxima jogada de ataque até o início do seu próximo turno"
              spell_echo:
                range_m: 9
                targets: "uma criatura sob seu comando que você possa ver"
                limits: "apenas magias com alvo 'você'"
      - level: 10
        features:
          - { name: "Fortalecer Invocações", description: "Criaturas invocadas têm resistência a físico não-mágico; ataques naturais contam como mágicos." }
      - level: 14
        features:
          - name: "Convocar Ancião"
            description: "Ritual de 1 h: convoca criatura (besta/fada/elemental/planta) ND ≤ metade do nível (ou grupo equivalente) por até 8 h, enquanto mantiver concentração, sob seus comandos. 1/descanso longo. No 20º nível, comanda as criaturas com ação bônus."
            rules:
              duration: "até 8 horas (concentração)"
              control: "usa a ação para comandar verbalmente (sem ordens, só se defendem)"
              uses: "1/descanso longo"
              at_20: "comanda as criaturas com ação bônus"

  circulo-mundos:
    name: "Círculo dos Mundos"
    flavor: "Círculo Druídico"
    description: "Peregrino planar; atalhos, formas nativas e proteção multiversal."
    choose_level: 2
    levels:
      - level: 2
        features:
          - { name: "Eremita dos Planos", description: "Proficiência em Arcanismo; vantagem em testes sobre planos; magias planares sempre preparadas." }
        grants:
          proficiencies:
            skills: { fixed: ["Arcanismo"] }
          spells:
            always_prepared:
              2: ["comprehend-languages","protection-from-evil-and-good"]
              3: ["misty-step","moonbeam"]
              5: ["blink","protection-from-energy"]
              7: ["banishment","dimension-door"]
              9: ["planar-binding","contact-other-plane"]
      - level: 6
        features:
          - name: "Atalho Planar"
            description: "Ritual (1 h + espaço de 3º nível): teste de Inteligência (Arcanismo) CD 15 para localizar o portal mais próximo que leva a um plano que você já estudou e o que é preciso para acessá-lo; fracassa se não houver portal para esse plano onde você está. 1/descanso longo."
            rules:
              cost: "1 espaço de 3º nível"
              check: "Inteligência (Arcanismo) CD 15"
              uses: "1/descanso longo"
      - level: 10
        features:
          - name: "Forma Nativa"
            description: "Estando em outro plano, ao conjurar Metamorfose em si mesmo pode assumir a forma de uma criatura de qualquer tipo nativa daquele plano (ND ≤ metade do nível); segue as regras de Metamorfose."
            rules:
              duration: "como Metamorfose (até 1 hora)"
              cr_limit: "≤ metade do nível"
              notes: "usa a magia Metamorfose (não a Forma Selvagem); o Mestre decide quais criaturas são nativas do plano"
      - level: 14
        features:
          - name: "Protetor dos Mundos"
            description: "Quando o equilíbrio de um plano é afetado por forças externas, você toma ciência (sem saber o local exato) e pode viajar até ele com as criaturas amigáveis a até 9 m, para um local conhecido, num ritual de 1 minuto gastando um espaço de magia de 7º nível. Já no plano, conhece a fonte da interferência e você e os aliados ficam imunes aos efeitos adversos do plano e ignoram terreno difícil."
            rules:
              ritual: "1 minuto"
              cost: "1 espaço de 7º nível"
              allies_range_m: 9
              awareness: "toma ciência de um plano em desequilíbrio (sem saber o local exato)"
              destination: "local já conhecido nesse plano"
              on_arrival: "conhece a fonte da interferência"
              benefits: ["você e aliados imunes aos efeitos adversos do plano (vento psíquico, ciclones de éter, perda de memória em Faéria, calor do Plano do Fogo etc.)","terreno difícil não custa movimento adicional"]

  circulo-verdejante:
    name: "Círculo Verdejante"
    flavor: "Círculo Druídico"
    description: "Druidas que veneram árvores e plantas acima de tudo; aprimoram a Forma Selvagem e contam com um aliado vegetal."
    choose_level: 2
    levels:
      - level: 2
        features:
          - name: "Aspecto de Árvore"
            description: "Pele como casca: +1 de armadura natural na CA (e +1 na forma de Forma Selvagem, se ela tiver armadura natural). Vantagem em Destreza (Furtividade) para se esconder em áreas de floresta ou com muito verde."
            rules:
              natural_armor_bonus: 1
              wild_shape_bonus: "+1 de armadura natural na forma assumida (se já possuir)"
              stealth_advantage: "em áreas de floresta ou com muito verde"
          - name: "Aliado Planta"
            description: "Adquire uma planta cativada (≤ Pequena, ND ≤ 1/4) como aliado; soma seu PB à CA, ataques, dano, TS e perícias proficientes dela; age na sua iniciativa sob seus comandos."
            rules:
              companion:
                size_max: "Pequena"
                cr_max: "1/4"
                add_proficiency_bonus_to: ["CA","ataques","dano","testes de resistência","perícias proficientes"]
                hp_max: "maior entre o total normal e 4× nível de druida"
                command: "movimento por comando verbal (sem ação); ação bônus para Atacar/Disparada/Desengajar/Esquivar/Ajuda"
                replace_if_dead: "8 horas para vincular outra planta"
              scaling:
                at_9: "besta Média ou menor de ND ≤ 1/2 como aliado verdejante"
                at_13: "planta Grande ou menor de ND ≤ 1 como aliado verdejante"
      - level: 6
        features:
          - name: "Forma de Planta"
            description: "Pode usar Forma Selvagem para se transformar em uma planta com ND ≤ nível de druida ÷ 3 (arred. p/ baixo)."
            rules:
              cr_limit: "nível de druida ÷ 3 (arred. p/ baixo)"
      - level: 10
        features:
          - name: "Crescimento Virente"
            description: "Ação: faz brotar 1d4 árvores frutíferas em espaços desocupados a até 9 m; plenamente crescidas e carregadas de frutos ao fim do turno (cada uma alimenta até 4 criaturas Médias por dia)."
            rules:
              action: "1 ação"
              range_m: 9
              trees: "1d4 árvores frutíferas"
              uses: "1/descanso longo"
      - level: 14
        features:
          - name: "Chamado do Senhor Verdejante"
            description: "Ação: anima uma árvore a até 18 m com estatísticas de ente (exceto INT e CAR = 1, sem fala e sem a ação Animar Árvores), amigável e sob seus comandos; dura enquanto você concentrar, até 1 h. No 20º nível, anima duas árvores com uma única ação."
            rules:
              action: "1 ação"
              range_m: 18
              statblock: "ente (Manual dos Monstros), com INT e CAR = 1, sem fala e sem a ação Animar Árvores"
              command: "ação para ordenar (senão apenas se defende); permanece enquanto concentração, até 1 hora; depois se enraíza"
              uses: "1/descanso longo"
              at_20: "anima 2 árvores e comanda ambas com uma única ação"

ranger:
  batedor:
    name: "Batedor"
    flavor: "Arquétipo do Patrulheiro"
    description: |
      O arquétipo de Batedor é um perito em se deslocar pelos terrenos mais difíceis sem se preocupar com quaisquer impedimentos. Seu treinamento em terrenos naturais faz com que ele tire proveito do terreno e do seu movimento para atacar seus adversários rapidamente, se afastando deles para um lugar seguro em seguida. Sua percepção do ambiente faz dele o personagem ideal para avançar nas trilhas mantendo seu grupo informado do que está por vir.
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Tática de Batedor"
            description: |
              No 3° nível, você aprende a se manter na dianteira do seu grupo de forma vantajosa. Você pode deixar uma trilha que o seu grupo pode localizar com um teste de Sabedoria (Percepção) CD 10. Qualquer criatura que não conheça sua trilha deve ser bem sucedida num teste de Sabedoria (Percepção) CD 15 para encontrá-la. Se você for alvo de uma emboscada, cair em uma armadilha ou quiser avisar seus companheiros de algo, você pode usar sua reação para emitir um silvo ou dar algum sinal sonoro similar. Todos os seus companheiros a até 120 metros de você ouvirão seu alerta e poderão seguir até a localização em que você o emitiu com um sucesso num teste de Sabedoria (Sobrevivência) CD 10.
          - name: "Escaramuça"
            description: |
              Também no 3° nível, você desenvolve um estilo de caça que se baseia em se manter em movimento todo o tempo. Se você se mover pelo menos 6 metros, você causa 2d6 de dano extra no primeiro ataque que você fizer logo após ter se movido. Além disso, se uma criatura realizar um ataque numa rodada em que você tenha se movido pelo menos 6 metros, você pode usar sua reação para impor desvantagem na jogada de ataque dessa criatura.
            rules:
              once_per_turn: true
              move_before_attack_m: 6
              bonus_damage:
                dice_by_level:
                  "3": "2d6"
                  "9": "1d8 (substitui 2d6)"
                  "16": "1d10 (substitui 1d8)"
        grants:
          languages:
            choose: 1
            options: ["Anão","Élfico","Orc","Gnômico","Goblinóide","Silvestre"]
          proficiencies:
            skills:
              choose: 1
              options: ["Furtividade","Sobrevivência","Percepção"]
      - level: 7
        features:
          - name: "Movimento de Batedor"
            description: |
              A partir do 7° nível, você se desloca com mais velocidade se estiver usando uma armadura leve ou nenhuma armadura. Seu deslocamento terrestre aumenta em 3 metros e você pode usar uma ação bônus para realizar as ações de Disparada ou Desengajar. Além disso, se uma criatura realizar um ataque de oportunidade contra você, você pode usar sua reação para fazer o ataque errar.
            grants:
              movement:
                walk_bonus_ft: 10
            rules:
              bonus_action_options: ["Desengajar","Disparada"]
      - level: 11
        features:
          - name: "Percepção Instintiva"
            description: |
              No 11° nível, você amplia seus sentidos, se tornando capaz de prever o que está para acontecer e o que encontrará pelo caminho. Você recebe vantagem em testes de Sabedoria (Percepção), Inteligência (Investigação) e nas suas jogadas de iniciativa.
            grants:
              advantages:
                skills: ["Percepção","Investigação"]
                initiative: true
      - level: 15
        features:
          - name: "Liberdade de Movimentos"
            description: |
              A partir do 15° nível, você se torna imune a efeitos que possam impedir seu movimento, como se tivesse sob efeito da magia movimentação livre.
            rules:
              ignores_difficult_terrain: true
              conditions_immunity: ["redução de deslocamento por terreno","impedido/contido por terreno"]

  flagelo-dos-inimigos:
    name: "Flagelo dos Inimigos"
    flavor: "Arquétipo do Patrulheiro"
    description: |
      O arquétipo de Flagelo dos Inimigos simula um patrulheiro que se especializou em caçar e abater seus inimigos favoritos. Você se focou em estudar profundamente as criaturas que você encontra pelo seu caminho, se tornando um caçador implacável quando aprende os pontos fracos e peculiaridades dessas criaturas. Não importa o tipo de monstro que você encontre, sua tenacidade e foco permitem que você os abate com uma maestria incomparável.
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Inimigo Favorito Adicional"
            description: |
              No 3° nível, você amplia seu estudo aprofundado sobre as criaturas que você encontra em suas aventuras. Você pode escolher um inimigo favorito adicional, assim como um idioma associado. No 10° nível, você pode escolher outro inimigo favorito adicional e um idioma associado. Suas escolhas devem refletir os tipos de monstros que você encontrou nas suas aventuras.
            choices:
              favored_enemy:
                choose: 1
                options:
                  - { id: "aberration",  name: "Aberração" }
                  - { id: "beast",       name: "Fera" }
                  - { id: "celestial",   name: "Celestial" }
                  - { id: "construct",   name: "Construto" }
                  - { id: "dragon",      name: "Dragão" }
                  - { id: "elemental",   name: "Elemental" }
                  - { id: "fey",         name: "Feérico" }
                  - { id: "fiend",       name: "Infernal/Abissal" }
                  - { id: "giant",       name: "Gigante" }
                  - { id: "humanoid",    name: "Humanóide (subtipo)" }
                  - { id: "monstrosity", name: "Monstruosidade" }
                  - { id: "ooze",        name: "Lodo" }
                  - { id: "plant",       name: "Planta" }
                  - { id: "undead",      name: "Morto-vivo" }
            grants:
              languages:
                choose: 1
                options: ["Anão","Élfico","Orc","Gnômico","Goblinóide","Infernal","Abissal","Celestial","Dracônico","Silvestre"]
          - name: "Esquiva Predileta"
            description: |
              No 3° nível também, você sabe como evitar os ataques dos seus inimigos favoritos. Quando um inimigo favorito seu que você possa ver realizar uma jogada de ataque contra você, você pode usar sua reação para dar desvantagem nessa jogada de ataque. A partir do 13° nível, quando você for alvo de uma magia ou efeito de um inimigo favorito seu que você possa ver, que exija um teste de resistência de Força, Destreza ou Sabedoria, você pode usar sua reação para ganhar vantagem no seu teste de resistência.
            rules:
              reaction: true
              trigger: "ser alvo de ataque de um inimigo favorito"
              impose: "desvantagem no ataque"
              level_13_reaction:
                trigger: "ser alvo de magia ou efeito de um inimigo favorito visível que exija TR de Força, Destreza ou Sabedoria"
                grants: "vantagem no teste de resistência"
      - level: 7
        features:
          - name: "Caçador de Inimigos"
            description: |
              A partir do 7° nível, você se torna mais eficiente em combater seus inimigos favoritos. Você recebe vantagem na primeira jogada de ataque que fizer contra um inimigo favorito seu em cada um dos seus turnos. Se você atingir esse ataque, você causa 1d8 de dano extra. Se você atacar um inimigo favorito enquanto ele estiver surpreso, seu ataque causa 2d8 de dano extra.
            rules:
              once_per_turn: true
              advantage_first_attack_vs_favored: true
              extra_damage: "1d8"
              extra_damage_if_surprised: "2d8"
      - level: 10
        features:
          - name: "Inimigo Favorito Adicional"
            description: |
              No 10° nível, você pode escolher outro inimigo favorito adicional e um idioma associado. Suas escolhas devem refletir os tipos de monstros que você encontrou nas suas aventuras.
            choices:
              favored_enemy:
                choose: 1
                options:
                  - { id: "aberration",  name: "Aberração" }
                  - { id: "beast",       name: "Fera" }
                  - { id: "celestial",   name: "Celestial" }
                  - { id: "construct",   name: "Construto" }
                  - { id: "dragon",      name: "Dragão" }
                  - { id: "elemental",   name: "Elemental" }
                  - { id: "fey",         name: "Feérico" }
                  - { id: "fiend",       name: "Infernal/Abissal" }
                  - { id: "giant",       name: "Gigante" }
                  - { id: "humanoid",    name: "Humanóide (subtipo)" }
                  - { id: "monstrosity", name: "Monstruosidade" }
                  - { id: "ooze",        name: "Lodo" }
                  - { id: "plant",       name: "Planta" }
                  - { id: "undead",      name: "Morto-vivo" }
            grants:
              languages:
                choose: 1
                options: ["Anão","Élfico","Orc","Gnômico","Goblinóide","Infernal","Abissal","Celestial","Dracônico","Silvestre"]
      - level: 11
        features:
          - name: "Estudar Inimigo"
            description: |
              No 11° nível, sua análise e estudo das habilidades e poderes dos seus inimigos favoritos tornam você um oponente difícil de confrontar. Quando você encontrar um inimigo favorito seu, você pode usar sua ação para realizar um teste de Sabedoria (Percepção) CD 5 + nível de desafio da criatura, para analisar esse inimigo. Se você for bem sucedido, o Mestre revela a você uma das informações sobre as estatísticas da criatura, à sua escolha: Classe de Armadura; Pontos de vida atuais; Tipos de deslocamento e valor em metros; Valores de Habilidades Físicas; Resistências e Imunidades; Sentidos; Um traço especial; Uma ação de combate. Se o resultado do seu teste superar a CD em 5 ou mais, você descobrirá uma informação adicional, à sua escolha, dentre as informações disponíveis. Após usar essa característica, você precisa terminar um descanso curto ou longo para usá-la novamente.
            uses:
              per: "descanso curto ou longo"
              value: 1
      - level: 15
        features:
          - name: "Inimizade Imediata"
            description: |
              A partir do 15° nível, você consegue magicamente se especializar instantaneamente na caça e combate contra um tipo de criatura que não é um inimigo favorito seu. Com sua ação, você pode gastar um espaço de magia de 4° nível ou superior e escolher um tipo de criatura dentre aberrações, bestas, celestiais, constructos, corruptores, dragões, elementais, fadas, gigantes, limos, monstruosidades, mortos-vivos, plantas ou um tipo de raça humanoide. Durante 1 hora, esse tipo de criatura é considerado um inimigo favorito para você. Você pode gastar um espaço de magia de 5° nível com essa característica, aumentando a duração para 8 horas. Após usar essa característica, você precisa terminar um descanso longo para usá-la novamente.
            rules:
              spell_slot_required: [4,5]
              duration_by_slot:
                "4": "1 hora"
                "5": "8 horas"
              uses:
                per: "descanso longo"
                value: 1

  cacador:
    name: "Caçador"
    flavor: "Arquétipo do Patrulheiro"
    description: "Flexível contra colossos, hordas ou criaturas enormes."
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Presa do Caçador"
            description: "Escolha uma tática ofensiva permanente."
            choices:
              hunter_prey:
                choose: 1
                options:
                  - id: "assassino_de_colossos"
                    name: "Assassino de Colossos"
                    rules:
                      once_per_turn: true
                      effect: "Quando atinge com arma, causa +1d8 se o alvo não estiver com PV cheios."
                  - id: "matador_de_gigantes"
                    name: "Matador de Gigantes"
                    rules:
                      reaction: true
                      trigger: "Criatura Grande+ a 1,5 m atingir ou errar você com um ataque"
                      effect: "Você faz 1 ataque com arma contra a criatura"
                  - id: "destruidor_de_hordas"
                    name: "Destruidor de Hordas"
                    rules:
                      once_per_turn: true
                      effect: "Após um ataque com arma, faz 1 ataque extra contra outro alvo a 1,5 m do original e no alcance da arma"
      - level: 7
        features:
          - name: "Táticas Defensivas"
            description: "Escolha uma defesa situacional."
            choices:
              defensive_tactics:
                choose: 1
                options:
                  - id: "escapar_da_horda"
                    name: "Escapar da Horda"
                    rules:
                      effect: "Ataques de oportunidade contra você têm desvantagem"
                  - id: "defesa_multiataque"
                    name: "Defesa contra Múltiplos Ataques"
                    rules:
                      effect: "+4 CA contra todos os ataques subsequentes da mesma criatura após ela acertar você (até o fim do turno)"
                  - id: "vontade_de_aco"
                    name: "Vontade de Aço"
                    rules:
                      effect: "Vantagem em testes de resistência contra amedrontado"
      - level: 11
        features:
          - name: "Ataque Múltiplo"
            description: "Escolha um padrão de ataque em área com arma."
            choices:
              multiattack:
                choose: 1
                options:
                  - id: "saraivada"
                    name: "Saraivada"
                    rules:
                      action: "Ação"
                      effect: "Ataque à distância contra qualquer número de criaturas a até 3 m de um ponto no alcance da arma; 1 jogada por alvo"
                  - id: "ataque_giratorio"
                    name: "Ataque Giratório"
                    rules:
                      action: "Ação"
                      effect: "Ataque corpo a corpo contra qualquer número de criaturas a 1,5 m; 1 jogada por alvo"
      - level: 15
        features:
          - name: "Defesa de Caçador Superior"
            description: "Escolha uma defesa superior."
            choices:
              superior_defense:
                choose: 1
                options:
                  - id: "evasao"
                    name: "Evasão"
                    rules:
                      effect: "Em ST de DES para metade do dano, no sucesso sofre 0; no fracasso sofre metade"
                  - id: "manter_se_contra_a_mare"
                    name: "Manter-se Contra a Maré"
                    rules:
                      reaction: true
                      trigger: "um inimigo erra um ataque corpo a corpo contra você"
                      effect: "força-o a repetir o mesmo ataque contra outra criatura elegível"
                  - id: "esquiva_sobrenatural"
                    name: "Esquiva Sobrenatural"
                    rules:
                      reaction: true
                      trigger: "um atacante que você vê o acerta"
                      effect: "reduz o dano à metade"

  mestre-das-bestas:
    name: "Mestre das Bestas"
    flavor: "Arquétipo do Patrulheiro"
    description: "Luta em parceria com um companheiro animal treinado."
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Companheiro de Patrulha"
            description: "Vínculo com uma besta aliada que age no seu turno sob seus comandos."
            rules:
              companion_selection:
                size_max: "Médio"
                cr_max: "1/4"
                examples: ["falcão","mastim","pantera"]
              companion_stats:
                add_proficiency_to: ["CA","ataques","dano","testes de resistência","perícias proficientes"]
                hp: "máximo entre PV normais da besta e 4 × seu nível de patrulheiro"
                hd_spend: "companheiro pode gastar Dados de Vida em descanso curto"
              initiative_and_commands:
                acts_on_your_initiative: true
                defaults: "sem ações (exceto reações) até receber comando"
                movement_command: "mover-se pode ser ordenado verbalmente (sem ação)"
                action_command:
                  action_cost: "Ação"
                  actions_allowed: ["Ataque","Disparada","Desengajar","Esquivar","Ajuda"]
                  extra_attack_synergy: "se você tiver Ataque Extra, faz 1 ataque com arma ao comandar 'Ataque'"
              autonomy_and_travel:
                if_you_are_incapacitated_or_absent: "prioriza defender você"
                favored_terrain_stealth: "viajando só com a besta no terreno favorito, pode mover-se furtivamente em ritmo normal"
              replacing_companion:
                ritual: "8 horas para vincular nova besta não-hostil"
      - level: 7
        features:
          - name: "Treinamento Excepcional"
            description: "Quando a besta não atacar no seu turno, você pode usar Ação Bônus para comandá-la a Disparar, Desengajar, Esquivar ou Ajudar."
            rules:
              bonus_action_command: ["Disparar","Desengajar","Esquivar","Ajudar"]
      - level: 11
        features:
          - name: "Fúria Bestial"
            description: "Quando você comanda 'Ataque', a besta faz 2 ataques (ou usa Ataque Múltiplo, se tiver)."
            rules:
              companion_attacks_on_attack_command: 2
      - level: 15
        features:
          - name: "Compartilhar Magias"
            description: "Magias que tenham você como alvo também afetam o companheiro a até 9 m."
            rules:
              share_target_self_spells_with_companion_within_m: 9

  # Novos arquétipos (Livro de Novos Arquétipos) — chaves alinhadas a characterCreationData / canonical_indexes
  arqueiro_floresta_alta:
    name: "Arqueiro da Floresta Alta"
    flavor: "Arquétipo do Patrulheiro"
    description: |
      O arquétipo de Arqueiro da Floresta Alta geralmente é seguido por elfos da floresta que usam a cobertura e proteção das copas das altas árvores em seu favor. Eles espreitam no alto das árvores enquanto buscam invasores em seu território. Raramente uma criatura hostil consegue avistar esses arqueiros, e nas raras ocasiões em que os encontram escondidos nas árvores, já é tarde demais.
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Arqueiro Bem-Suprido"
            description: |
              No 3° nível, você aprende a entalhar suas próprias flechas, prevenindo você de ficar sem munição. Você adquire proficiência em ferramentas de entalhador. Além disso, durante um descanso curto, você pode usar galhos e varetas coletadas na floresta para criar suas próprias flechas. Realize um teste de Destreza CD 15 usando suas ferramentas de entalhador. Se você for bem sucedido, criará 2d10 flechas para o arco escolhido por você.
          - name: "Visão Aguçada"
            description: |
              Também no 3° nível, você aprimora sua visão e se torna um especialista em localizar e abater seus inimigos de longas distâncias. Você recebe vantagem em testes de Sabedoria (Percepção) relacionados à visão. Além disso, quando você realiza um ataque à distância com arco, a distância dele é dobrada.
      - level: 7
        features:
          - name: "Atirar e Esconder"
            description: |
              A partir do 7° nível, você aprende uma tática de combate que visa minar seus oponentes sem que eles consigam perceber você. Enquanto estiver em um dos seus terrenos favoritos, você pode usar uma ação bônus para usar a ação de Esconder sempre que realizar um ataque à distância com arco contra um inimigo a mais de 18 metros de você. O alvo sofre desvantagem em testes de Sabedoria (Percepção) para definir onde você se escondeu enquanto você estiver a mais de 18 metros dele.
              Você pode escalar árvores e outras superfícies íngremes em seu terreno favorito como se fossem terreno difícil. Você não precisa realizar um teste de Força (Atletismo) para isso.
      - level: 15
        features:
          - name: "Tiro de Misericórdia"
            description: |
              No 15° nível, você pode desferir um tiro devastador contra uma presa ferida. Com sua ação, realize um único ataque à distância com arco contra uma criatura no alcance. Se o alvo estiver com menos da metade do seu máximo de pontos de vida, ele deve ser bem sucedido num teste de resistência de Constituição (CD 8 + seu bônus de proficiência + seu modificador de Sabedoria) ou sofrerá 10d8 de dano extra. Um sucesso na resistência reduz o dano extra à metade. Um alvo que caia para 0 pontos de vida por causa desse dano, morre instantaneamente. Após usar essa característica, você precisa terminar um descanso longo para usá-la novamente.
            uses:
              per: "descanso longo"
              value: 1
          - name: "Flechas Perfeitas"
            description: |
              A partir do 15° nível, você consegue fabricar flechas impressionantes para seu arco. Você pode passar 8 horas num processo de fabricação tentando usar suas ferramentas de entalhador para fazer flechas obra-prima. Realize um teste de Destreza CD 20 usando suas ferramentas de entalhador. Se você for bem sucedido, você cria 2d10 flechas obra-prima. Essas flechas causam 1d10 de dano, se forem feitas para arcos longos, ou 1d8 de dano, se forem feitas para arcos curtos. Além disso, essas flechas atingem um acerto crítico numa rolagem 19 ou 20 no d20. Após usar essa característica, você precisa terminar um descanso longo para usá-la novamente.
            uses:
              per: "descanso longo"
              value: 1

  guardiao_selvagem:
    name: "Guardião Selvagem"
    flavor: "Arquétipo do Patrulheiro"
    description: |
      O arquétipo de Guardião Selvagem emula um patrulheiro que nasceu e passou a maior parte da sua vida vivendo em territórios selvagens acompanhado exclusivamente por animais silvestres e bestas perigosas. Graças à sua vida isolada em terrenos naturais, você aprendeu a se comunicar com os seres das florestas e a usar sua intuição e instinto muito mais que seu raciocínio. Você se torna um exímio caçador em seus territórios nativos e pode se transformar em um animal feroz em batalha.
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Linguagem Bestial"
            description: |
              No 3° nível, seu convívio com bestas e outras criaturas selvagens permite que você se comunique e interaja de forma mais efetiva com elas. Você pode falar com bestas como se compartilhasse um idioma com elas e a reação inicial de uma besta em relação a você é mais favorável. Uma besta será indiferente a você se ela seria hostil e será amigável se ela seria indiferente.
          - name: "Grito Primitivo"
            description: |
              Também no 3° nível, você é capaz de trazer à tona o poder inerente em você através de um poderoso grito bestial. Com uma ação bônus, você emite um grito selvagem que aflora um frenesi feral em você. Você assume uma aparência ferina fazendo garras afiadas brotarem de seus dedos e seus caninos crescerem na sua boca. Durante 1 minuto, você recebe os seguintes benefícios:
              • Você ganha a ação Ataques Múltiplos. Você pode realizar um ataque de mordida e dois ataques de garra, ou um ataque de mordida e um ataque com uma arma com essa ação. Você é proficiente com suas armas naturais e suas jogadas de ataque e dano com elas são baseadas em Força ou Destreza, à sua escolha. Seu ataque de mordida causa 1d6 de dano perfurante e cada ataque de garra seu causa 1d4 de dano cortante.
              • Você ganha vantagem em testes de resistência para não ser amedrontado.
              • Você ganha vantagem em testes de Carisma (Intimidação).
              • Você pode usar a ação de Disparada com uma ação bônus.
              Enquanto estiver nesse estado, você não pode conjurar magias que não estejam na sua lista de magias de patrulheiro nem pode realizar ações que exijam concentração. A partir do 5° nível, quando você usar a ação de Ataques Múltiplos você pode realizar um ataque de mordida e três ataques com garra ou um ataque de mordida e dois ataques com arma. Após usar essa característica, você precisa terminar um descanso curto ou longo para usá-la novamente.
            uses:
              per: "descanso curto ou longo"
              value: 1
      - level: 7
        features:
          - name: "Instinto Animal"
            description: |
              No 7° nível, seu instinto animal se aflora quando você está caçando, rastreando ou em perigo. Você recebe vantagem em testes de Sabedoria (Sobrevivência) para rastrear e em jogadas de iniciativa. Além disso, você ganha +5 de bônus na sua Sabedoria (Percepção) passiva.
      - level: 11
        features:
          - name: "Bote Dilacerador"
            description: |
              A partir do 11° nível, você é capaz de saltar sobre seus inimigos com suas garras, dilacerando-os. Enquanto você estiver sob efeito do seu grito primitivo, se você usar a ação de Disparada com uma ação bônus para correr, pelo menos 6 metros em linha reta, e logo em seguida usar a ação de Ataques Múltiplos para atacar uma criatura com suas garras e mordida, você pode dilacerá-la. Você causa 1d8 de dano extra para cada ataque que você atingir. Além disso, o alvo deve ser bem sucedido em um teste de resistência de Força (CD 8 + seu bônus de proficiência + seu modificador de Força) ou cairá no chão.
      - level: 15
        features:
          - name: "Território de Caça"
            description: |
              A partir do 15° nível, você se transforma numa besta incansável no seu território de caça. Enquanto você estiver em um terreno favorito seu, você ganha os seguintes benefícios adicionais:
              • Você ganha vantagem na sua primeira jogada de ataque a cada turno seu.
              • Você ganha +1 de bônus na sua CA.
              • Você ganha vantagem em testes de Destreza (Furtividade).
              • Você ganha vantagem em testes de resistência de Força e Destreza.

  rastreador_urbano:
    name: "Rastreador Urbano"
    flavor: "Arquétipo do Patrulheiro"
    description: |
      O arquétipo Rastreador Urbano se foca em sobreviver e se adaptar aos ambientes urbanos com maestria. O patrulheiro que segue esse caminho consegue perceber as nuances no ambiente das grandes cidades e localiza um indivíduo em particular no meio de uma multidão de forma quase sobrenatural. Sua percepção ao território moldado pelos humanoides é perfeita e ele consegue caçar e abater criaturas como um verdadeiro caçador.
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Explorador Urbano"
            description: |
              No 3° nível, você terá os benefícios da característica Explorador Natural em qualquer território urbano. Um território urbano, com esse propósito, é qualquer local que, segundo o Mestre, se encaixe como uma vila, cidade ou metrópole. Além disso, você adquire proficiência na perícia Persuasão e tem vantagem em testes de Carisma (Persuasão) com os propósitos de obter informações sobre uma criatura, item ou local que você deseja encontrar.
      - level: 7
        features:
          - name: "Buscar e Abater"
            description: |
              A partir do 7° nível, você aprende a rastrear e abater seus inimigos de forma extremamente eficaz. Sempre que atacar uma criatura surpresa, você pode gastar um espaço de magia de 1° nível para causar dano adicional nesse ataque. Você causa 1d10 de dano adicional e esse dano aumenta em 1d10 para cada nível do espaço de magia acima do 1°. Além disso, se o ataque atingir, você receberá um bônus nas suas jogadas de ataque contra essa criatura igual ao seu modificador de Sabedoria (mínimo +1) por 1 minuto.
      - level: 11
        features:
          - name: "Percepção do Antinatural"
            description: |
              No 11° nível, você se torna extremamente familiarizado com um ambiente que não seja natural. Em qualquer ambiente urbano ou masmorra que não seja natural, você recebe vantagem em testes de Sabedoria (Percepção) ou Inteligência (Investigação) realizados para encontrar rastros, portas secretas, armadilhas, passagens escondidas ou qualquer outra característica no terreno que não tenha sido feita naturalmente. Além disso, você adquire proficiência com ferramentas de ladrão e tem vantagem em qualquer teste que fizer com elas num território urbano ou masmorra que não seja natural. Alternativamente, se preferir, ao invés de dar vantagem nas jogadas de ataque de seus companheiros, você pode usar sua ação bônus para realizar um ataque que, ao invés de causar dano, cansa seu oponente. O alvo deve realizar um teste de resistência de Constituição (CD 8 + seu bônus de proficiência + seu modificador de Destreza) ou receberá 1 nível de exaustão.
      - level: 15
        features:
          - name: "Líder de Caçada"
            description: |
              A partir do 15° nível, você se torna especialista em enfrentar qualquer inimigo que você pegue em desvantagem. Sempre que atacar uma criatura afetada por Buscar e Abater, você pode usar sua ação bônus para dar vantagem nas jogadas de ataque que seus aliados fizerem contra essa criatura até o início do seu próximo turno.

sorcerer:
  linhagem-draconica:
    name: "Linhagem Dracônica"
    flavor: "Origem de Feiticeiro"
    description: "Poder herdado dos dragões; vigor, resistência e domínio elemental."
    choose_level: 1
    levels:
      - level: 1
        features:
          - name: "Ancestral Dracônico"
            description: "Escolhe um tipo de dragão; aprende Dracônico e define o tipo de dano associado às suas magias temáticas. Ao fazer testes de Carisma interagindo com dragões, dobra o bônus de proficiência (se aplicável)."
          - name: "Resiliência Dracônica"
            description: "CA base 13 + Des (sem armadura); máximo de PV +1 no 1º nível e +1 a cada nível de feiticeiro."
        grants:
          languages:
            fixed: ["Dracônico"]
        choices:
          draconic_ancestry:
            choose: 1
            options:
              - { id: "black",  name: "Negro (Ácido)",      damage_type: "ácido" }
              - { id: "blue",   name: "Azul (Relâmpago)",   damage_type: "elétrico" }
              - { id: "brass",  name: "Latão (Fogo)",       damage_type: "fogo" }
              - { id: "bronze", name: "Bronze (Relâmpago)", damage_type: "elétrico" }
              - { id: "copper", name: "Cobre (Ácido)",      damage_type: "ácido" }
              - { id: "gold",   name: "Ouro (Fogo)",        damage_type: "fogo" }
              - { id: "green",  name: "Verde (Veneno)",     damage_type: "veneno" }
              - { id: "red",    name: "Vermelho (Fogo)",    damage_type: "fogo" }
              - { id: "silver", name: "Prata (Frio)",       damage_type: "frio" }
              - { id: "white",  name: "Branco (Frio)",      damage_type: "frio" }
      - level: 6
        features:
          - name: "Afinidade Elemental"
            description: "Quando causar dano do seu tipo ancestral com uma magia, adicione +mod. CAR a UM rolar de dano da magia; pode gastar 1 SP para ganhar resistência a esse tipo por 1 h."
            rules:
              add_cha_to_damage_once: true
              spend_sp_for_resistance: { cost_sp: 1, duration: "1 h" }
      - level: 14
        features:
          - name: "Asas de Dragão"
            description: "Ação bônus: manifesta asas por tempo indeterminado (até dispensar); ganha voo = desloc. de caminhada; não funciona com armaduras que não as acomodem."
            rules:
              bonus_action: true
              fly_speed_equals_walk: true
      - level: 18
        features:
          - name: "Presença Dracônica"
            description: "Ação: gasta 5 SP para emitir aura de medo ou admiração (sua escolha) em raio de 18 m por 1 min (concentração). Cada criatura hostil que COMEÇAR o turno na aura faz TS Sab (CD de magias) ou fica amedrontada (medo) ou enfeitiçada (admiração) até a aura terminar; sucesso → imune à aura por 24 h."
            rules:
              cost_sp: 5
              action: true
              concentration: true
              duration: "1 min"
              area_radius_m: 18
              trigger: "criatura hostil que começa o turno na aura"
              condition_choice: ["amedrontado","enfeitiçado"]
              on_success_immune_hours: 24

  magia-selvagem:
    name: "Magia Selvagem"
    flavor: "Origem de Feiticeiro"
    description: "Caos arcano imprevisível; sorte volátil e explosões de efeito."
    choose_level: 1
    levels:
      - level: 1
        features:
          - name: "Surto de Magia Selvagem"
            description: "Quando conjura magia de 1º+ nível, o mestre pode pedir um d20; com 1 (ou quando usar Marés de Caos), role na Tabela de Surto para um efeito aleatório (no máximo 1 surto por turno)."
          - name: "Marés de Caos"
            description: "1 vez (recupera ao terminar um descanso longo, ou quando o mestre desencadeia um Surto em você): ganha vantagem em 1 jogada de ataque, teste de habilidade ou TS."
            rules:
              uses: 1
              refresh: "descanso longo, ou quando o mestre desencadeia um Surto de Magia Selvagem em você"
      - level: 6
        features:
          - name: "Dobrar a Sorte"
            description: "Reação: gaste 2 SP para somar/subtrair 1d4 a uma jogada de uma criatura que você possa ver (após a rolagem, antes do resultado)."
            rules:
              reaction: true
              cost_sp: 2
      - level: 14
        features:
          - name: "Caos Controlado"
            description: "Ao rolar na Tabela de Surto, role 2 vezes e escolha o resultado."
      - level: 18
        features:
          - name: "Bombardeio de Magia"
            description: "Quando rolar dano de magia e qualquer dado mostrar o valor máximo, role 1 dado adicional do mesmo tipo e adicione ao dano (apenas 1 vez por rodada)."

  feiticaria-da-espada:
    name: "Feitiçaria da Espada"
    flavor: "Origem de Feiticeiro"
    description: "Magia canalizada por lâminas; estilos de combate arcanos e aprimoramento de armas."
    choose_level: 1
    levels:
      - level: 1
        features:
          - { name: "Treinamento Marcial", description: "Ganha proficiência com 1 arma marcial à sua escolha e pode usá-la como foco arcano." }
          - name: "Magia da Espada"
            description: "Ação bônus: realiza um ataque corpo-a-corpo com arma e gasta um espaço de magia de 1º nível para adicionar 1d6 de dano de energia a todos os ataques corpo-a-corpo com arma até o fim do turno (incluindo o que desencadeou); +1d6 a cada 2 níveis de espaço acima do 1º. Enquanto tiver pelo menos 1 espaço de magia disponível, seus ataques corpo-a-corpo contam como mágicos."
            rules:
              bonus_action: true
              cost_spell_slot: 1
              damage: "1d6 de energia (por ataque corpo-a-corpo no turno)"
              scaling: "+1d6 a cada 2 níveis de espaço acima do 1º"
              attacks_count_as_magical: true
        grants:
          proficiencies:
            weapons:
              choose: 1
              options: ["espada curta","espada longa","cimitarra","florete","sabre","montante","lança"]
      - level: 6
        features:
          - name: "Estilo Místico de Batalha"
            description: "Ação bônus: entra na postura por 1 min. Enquanto durar: (1) bônus de dano no PRIMEIRO ataque corpo-a-corpo que acertar a cada rodada = mod. CAR (mín. +1); (2) ganha PV temporários = 1d10 + nível de feiticeiro; (3) quando um inimigo o acertar corpo-a-corpo, pode usar reação para conjurar um truque que conheça nele. 2 usos; recupera em descanso longo."
            rules:
              bonus_action: true
              duration: "1 min"
              uses: 2
              recharge: "descanso longo"
      - level: 14
        features:
          - name: "Lâmina Encantada"
            description: "Ação, gasta 4 PF; mantém concentração por até 1 h; concede UMA propriedade à arma empunhada: +2 nas jogadas de ataque e dano; OU +1d8 de dano elemental (ácido, elétrico, fogo, frio ou trovejante); OU margem de crítico 19–20; OU arremesso (6/18) retornando à mão; OU +1d6 de dano necrótico e recupera PV = dano necrótico causado."
            rules:
              action: true
              cost_sp: 4
              concentration: true
              duration: "1 h"
              property_choice: 1
      - level: 18
        features:
          - name: "Canalização Devastadora"
            description: "Ao obter acerto crítico com arma corpo-a-corpo, pode usar reação para conjurar uma magia de 1º a 5º nível no alvo atingido."
            rules:
              reaction: true
              trigger: "acerto crítico com arma corpo-a-corpo"
              cast_spell_level: "1º a 5º"

  feiticaria-do-sangue:
    name: "Feitiçaria do Sangue"
    flavor: "Origem de Feiticeiro"
    description: "Seu sangue é combustível arcano — poder em troca de vitalidade."
    choose_level: 1
    levels:
      - level: 1
        features:
          - name: "Magia do Sangue"
            description: "Truque de dano: logo antes de conjurar, aceita sofrer 2 de dano para aumentar o dano do truque em 1d6. Magia de 1º a 5º nível (ação bônus): logo antes de conjurar, sofre 1d6 de dano para conjurar a magia como se usasse um espaço um nível acima do gasto; cada +1d6 de dano = +1 nível de espaço (não pode elevar acima dos níveis de espaço acessíveis)."
            rules:
              cantrip_boost: "sofre 2 de dano → +1d6 no dano do truque"
              spell_boost: "ação bônus; sofre 1d6 de dano → +1 nível de espaço (cada +1d6 = +1 nível)"
      - level: 6
        features:
          - name: "Energia Revigorante"
            description: "Ação, gasta 2 PF + um espaço de magia de 1º nível para recuperar 2d6 PV; +1d6 PV por nível de espaço acima do 1º."
            rules:
              action: true
              cost_sp: 2
              cost_spell_slot: 1
              healing: "2d6 PV (+1d6 por nível acima do 1º)"
      - level: 14
        features:
          - name: "Fonte de Sangue"
            description: "Ação: aceita sofrer 1d6 de dano para recuperar 1 PF; pode sofrer dados adicionais até 5d6, recuperando 1 PF por dado. Recarga em descanso curto ou longo."
            rules:
              action: true
              effect: "1d6 de dano → 1 PF (até 5d6 / 5 PF)"
              recharge: "descanso curto ou longo"
      - level: 18
        features:
          - name: "Ataque Vascular"
            description: "Ação, gasta 4 PF; alvo vivo a até 18 m faz TR de Constituição. Falha: 10d6 de dano + 2d6 de sangramento no fim de cada turno dele por 3 rodadas, e o máximo de PV é reduzido pelo total causado. Sucesso: metade do dano e sem sangramento. O alvo repete o TR no fim de cada turno (sucesso encerra o sangramento); cura mágica também encerra. +2 PF além dos 4 = +1d6 de sangramento (até 5d6 com 10 PF). Recarga em descanso longo."
            rules:
              action: true
              cost_sp: 4
              range_m: 18
              save: "Constituição (CD de magias)"
              damage: "10d6 (metade no sucesso)"
              bleed: "2d6/turno por 3 rodadas; +1d6 por +2 PF (máx 5d6)"
              recharge: "descanso longo"

  linhagem-elemental:
    name: "Linhagem Elemental"
    flavor: "Origem de Feiticeiro"
    description: "Sangue marcado por Água, Ar, Fogo ou Terra; magia que desperta forças primordiais."
    choose_level: 1
    levels:
      - level: 1
        features:
          - { name: "Ancestral Elemental", description: "Escolha Água (frio), Ar (elétrico), Fogo (fogo) ou Terra (ácido); o tipo de dano associado é usado por features posteriores. Aprende Primordial e, ao fazer testes de Carisma interagindo com elementais, dobra o bônus de proficiência (se aplicável)." }
          - { name: "Despertar Poder Inerente", description: "Ganha resistência ao tipo de dano do ancestral. Ao conjurar uma magia de feiticeiro que cause dano, pode usar ação bônus para converter o dano dessa magia para o tipo do seu ancestral elemental." }
        grants:
          languages:
            fixed: ["Primordial"]
          defenses:
            # resistência preenchida dinamicamente pelo elemento escolhido
            # exemplo: { resistance: ["frio"] } para Água
        choices:
          element:
            choose: 1
            options:
              - { id: "agua",  name: "Água (frio)" }
              - { id: "ar",    name: "Ar (elétrico)" }
              - { id: "fogo",  name: "Fogo (fogo)" }
              - { id: "terra", name: "Terra (ácido)" }
      - level: 6
        features:
          - name: "Energia Penetrante"
            description: "Adiciona o mod. CAR ao dano de qualquer magia de feiticeiro que cause dano do tipo do ancestral (a UMA rolagem de dano, não a várias). A partir do 9º nível, essas magias ignoram resistência ao tipo e causam metade do dano contra criaturas imunes."
            rules:
              add_cha_to_damage_once: true
              from_level_9_ignore_resistance: true
              from_level_9_half_vs_immune: true
      - level: 14
        features:
          - { name: "Dádiva Elemental", description: "Ao conjurar magia de 5º nível ou superior do tipo do ancestral, pode usar ação bônus para manifestar poderes elementais por 1 min: Água — natação = caminhada e respira ar/água; Ar — voo = caminhada; Fogo — imunidade a fogo e 1d6 de fogo em quem o atingir corpo-a-corpo a 1,5 m; Terra — escavação = caminhada e +1 de armadura natural na CA." }
      - level: 18
        features:
          - name: "Corpo Elemental"
            description: "Ação, gasta 5 PF; assume a forma de um elemental de ND 5 do seu tipo por 1 h (ou até cair a 0 PV, morrer ou reverter com ação bônus). Substitui estatísticas pelas do elemental, mas mantém INT/SAB/CAR, tendência e personalidade; assume os PV da forma. Em forma elemental: magias do seu elemento ignoram resistência; pode conjurar magias normalmente e conjurar truque de dano do seu elemento como ação bônus; equipamento mescla-se à forma (não utilizável)."
            rules:
              action: true
              cost_sp: 5
              duration: "1 h"
              form: "elemental de ND 5 do tipo do ancestral"

  origem-aberrante:
    name: "Origem Aberrante"
    flavor: "Origem de Feiticeiro"
    description: "Mente e carne tocadas pelo Reino Distante; poder psíquico e mutações."
    choose_level: 1
    levels:
      - level: 1
        features:
          - { name: "Linhagem Aberrante", description: "Proficiência em Intuição; fala, lê e escreve o Dialeto Subterrâneo (Submerso). Ao fazer testes de Carisma interagindo com aberrações, dobra o bônus de proficiência (se aplicável)." }
          - { name: "Vestígio Aberrante", description: "Desenvolve um longo tentáculo que serve como terceiro braço (pode segurar o foco arcano e conjurar com as duas mãos ocupadas; empunha arma leve ou de arremesso). Ação bônus: ataque corpo-a-corpo com o apêndice (1d4 de concussão, FOR ou DES à escolha)." }
        grants:
          languages:
            fixed: ["Subcomum"]
          proficiencies:
            skills:
              fixed: ["Intuição"]
      - level: 6
        features:
          - name: "Olhar Enlouquecedor"
            description: "Ação: abre um terceiro olho e o aponta a um alvo visível a até 18 m, que faz TR de Sabedoria (CD de magias). Falha: efeito de loucura de curta duração por 1 min (alvo repete o TR no fim de cada turno, encerrando com sucesso). Sucesso: 4d6 de dano psíquico. Recarga em descanso curto ou longo."
            rules:
              action: true
              range_m: 18
              save: "Sabedoria (CD de magias)"
              on_fail: "loucura de curta duração por 1 min"
              on_success: "4d6 psíquico"
              recharge: "descanso curto ou longo"
      - level: 14
        features:
          - { name: "Mente Insondável", description: "Não pode ser alvo de detectar pensamentos, localizar criatura ou vidência; resistência a dano psíquico. Criaturas têm desvantagem em testes de Sabedoria (Intuição) para compreender suas intenções, e você tem vantagem em TR para não ser enfeitiçado." }
        grants:
          defenses: { resistance: ["psíquico"] }
      - level: 18
        features:
          - { name: "Ser do Reino Distante", description: "Ação: escolhe espaço desocupado a até 18 m; surge uma aberração de ND 10 ou inferior (sua escolha), amigável, por 10 min (ou até dispensá-la / cair a 0 PV). Comunicação telepática ilimitada no mesmo plano; obedece a comandos mentais. Recarga em descanso longo." }

  origem-abissal:
    name: "Origem Abissal"
    flavor: "Origem de Feiticeiro"
    description: "Chama demoníaca em suas veias; caos, fogo e violência planar."
    choose_level: 1
    levels:
      - level: 1
        features:
          - { name: "Linhagem Demoníaca", description: "Resistência a dano de fogo; fala, lê e escreve Abissal. Ao fazer testes de Carisma interagindo com corruptores (demônios/yugoloths), dobra o bônus de proficiência (se aplicável)." }
          - name: "Influência Abissal"
            description: "Vantagem em testes de Carisma (Intimidação) e Carisma (Persuasão). Adiciona enfeitiçar pessoa à lista de magias conhecidas e, no 5º nível de feiticeiro, adiciona medo; essas magias não contam no total de magias conhecidas."
            rules:
              bonus_known_spell_does_not_count_against_limit: true
        grants:
          languages:
            fixed: ["Abissal"]
          defenses:
            resistance: ["fogo"]
          spells:
            always_prepared:
              1: ["charm-person"]
              5: ["fear"]
      - level: 6
        features:
          - { name: "Aura de Fogo", description: "Ação bônus (3 PF): emana chamas por 1 min; no início do seu turno, criaturas a 1,5 m sofrem 2d6 de fogo." }
      - level: 14
        features:
          - { name: "Passo Dimensional", description: "Após conjurar magia de 1º+, ação bônus para se teleportar até 9 m para espaço desocupado visível." }
      - level: 18
        features:
          - { name: "Resistência Demoníaca", description: "Ação bônus (5 PF): por 1 min, resistência a concussão/cortante/perfurante de armas não mágicas e vantagem em TS contra magias (1/descanso longo)." }

  origem-mutavel:
    name: "Origem Mutável"
    flavor: "Origem de Feiticeiro"
    description: "Corpo adaptativo e metabolismo impossível; sobrevivência acima de tudo."
    choose_level: 1
    levels:
      - level: 1
        features:
          - { name: "Proficiência Adicional", description: "Ganha proficiência em Medicina e Sobrevivência." }
          - { name: "Adaptação Climática", description: "Após 1 h de exposição a um ambiente, faz teste de Sabedoria (Sobrevivência) CD 10. Sucesso: vantagem em TR contra efeitos climáticos/ambientais do local; não gasta movimento extra em terreno difícil típico desse ambiente; ganha resistência a frio (ambiente gelado) ou a fogo (ambiente quente). Mantém-se adaptado até gastar mais 1 h se adaptando a outro ambiente. Recarga em descanso longo." }
        grants:
          proficiencies:
            skills:
              fixed: ["Medicina","Sobrevivência"]
      - level: 6
        features:
          - name: "Pele Reflexiva"
            description: "Reação ao sofrer dano de tipo diferente de concussão/cortante/perfurante: reduz esse dano à metade. Como parte da reação, pode gastar um espaço de magia de 1º nível para devolver dano (jogada de ataque à distância com magia; se acertar, 2d8 + mod. CAR do mesmo tipo sofrido, +1d8 por nível de espaço acima do 1º). Recarga em descanso curto ou longo (2 usos a partir do 11º). Adicionalmente, com menos da metade dos PV, pode usar ação bônus gastando 2 PF para recuperar 2d6 + mod. CON PV."
            rules:
              reaction: true
              halves_damage: "tipo diferente de concussão/cortante/perfurante"
              reflect: "espaço de 1º nível → ataque à distância 2d8 + CAR (+1d8 por nível acima do 1º)"
              recharge: "descanso curto ou longo (2 usos a partir do 11º)"
              self_heal: "ação bônus, 2 PF, abaixo de metade dos PV → 2d6 + CON"
      - level: 14
        features:
