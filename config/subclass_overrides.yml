            description: "Durante descanso longo, prepara um petisco. Carne Vital: pedaço de uma das suas colheitas. Quando preparado, escolhe um benefício listado em Colheita Vital. Quando ingerido, o alvo recebe o benefício escolhido por 1 minuto."
