    description: "Vento e trovão; mobilidade e cortes de ar."
    choose_level: 1
    levels:
      - level: 1
        features:
          - name: "Magias do Domínio"
            description: "Queda suave, levitar, muralha de vento, cone de frio etc. sempre preparadas."
            grants:
              spells:
                always_prepared:
                  1: ["feather-fall","jump"]
                  3: ["levitate","gust-of-wind"]
                  5: ["gaseous-form","wind-wall"]
                  7: ["freedom-of-movement","ice-storm"]
                  9: ["cone-of-cold","conjure-elemental"]
          - name: "Proficiência Adicional"
            description: "Acrobacia e fala Auran."
            grants:
              languages: { fixed: ["Auran"] }
              proficiencies:
                skills:
                  fixed: ["Acrobacia"]
          - name: "Sopro Defletor"
            description: "Reação: desvantagem a um ataque à distância contra você/aliado a 9 m."
            rules:
              reaction: true
              range_m: 9
              uses: { per: "dia", value: "Sabedoria (mín. 1)" }
      - level: 2
        features:
          - name: "Canalizar Divindade: Vento Cortante"
            description: "Linha 9 m × 1,5 m: 2d10 cortante (DES metade) e pode derrubar."
            rules:
              action: true
              area: "linha 9 m × 1,5 m"
              damage: { type: "cortante", dice: "2d10", save: "DES metade" }
              rider: "derruba no chão (a critério da mesa)"
      - level: 6
        features:
          - name: "Vento Cortante Aprimorado"
            description: "Linha 18 m; 5d10 cortante (DES metade)."
