                value: "CON (mín. 1)"
      - level: 10
        features:
          - name: "Bolsa de Combate"
            description: "Modifica sua Bolsa em arma que cospe petiscos como projéteis. Funciona como arma simples à distância que apenas você tem proficiência. Causa 1d12 de concussão e tem propriedade munição (9/36). Munição = seus petiscos. Você escolhe qual petisco usa como munição para cada ataque. Quando acerta uma criatura, pode forçar o alvo a ingerir imediatamente o petisco usado como munição."
