              total_levels_recovered: "≤ metade do nível de druida (arred. p/ baixo)"
              slot_level_limit: "nenhum espaço de 6º+"
      - level: 10
        features:
          - name: "Aura Antinatural"
            description: "Criaturas (exceto bestas/plantas, que fogem) a 6 m fazem TS Sab no início do turno; falha: desvantagem em testes e TS enquanto na aura."
            rules:
              aura_radius_m: 6
              save:
                ability: "Sabedoria"
                dc: "CD de magias de druida"
                timing: "início do turno na aura (ou ao entrar)"
              ends: "quando sai da aura; sucesso torna imune por 24h"
      - level: 14
        features:
          - name: "Corromper a Natureza"
            description: "1/descanso longo: anima plantas próximas como servos infectados sob seu comando; ao morrer, explodem causando dano necrótico em área."
            rules:
              activate: { time: "1 ação", duration: "até 1 hora", uses: "1/descanso longo" }
              control: "compreende seus comandos (ação para ordenar ações complexas)"
              death_burst:
                area_m: 3
                damage: "2d6 necrótico"
                save: { ability: "Destreza", dc: "CD de magias", effect: "metade no sucesso" }
  circulo-vida:
    name: "Círculo da Vida"
    flavor: "Círculo Druídico"
    description: "Celebram o ciclo natural; curas, abundância e renascimento."
    choose_level: 2
    levels:
      - level: 2
        features:
          - { name: "Proficiência Adicional", description: "Medicina e Sobrevivência." }
          - name: "Ervas Curativas"
            description: "Durante um descanso curto, trata até SAB criaturas (1d8 + SAB cada) usando kit de herbalismo."
            rules:
              uses_per_rest: "até seu mod. de Sabedoria (mín. 1)"
              heal_amount: "1d8 + mod. Sabedoria"
              requires: "Kit de Herbalismo"
        grants:
          proficiencies:
            skills:
              fixed: ["Medicina","Sobrevivência"]
      - level: 6
        features:
          - { name: "Ritual de Fartura", description: "Ritual de 1 h: por 24 h, participantes têm vantagem para forragear/caçar e dobram resultados em sucesso." }
      - level: 10
        features:
          - { name: "Renovação do Ciclo", description: "Ritual de 8 h + foco material da criatura: renasce como criança; cresce até a idade original em 1 semana; penalidades temporárias por 7 dias." }
      - level: 14
        features:
          - { name: "Celebração da Vida", description: "Festa de 8 h conta como descanso longo; por 24 h: vantagem ampla e recuperação de PV por minuto (a critério da mesa; sem abusos éticos)." }
  circulo-fadas:
    name: "Círculo das Fadas"
    flavor: "Círculo Druídico"
    description: "Vínculo com Faéria; truques feéricos e companheiro pixie."
    choose_level: 2
    levels:
      - level: 2
        features:
          - { name: "Linguagem Feérica", description: "Fala Silvestre; magias feéricas sempre preparadas." }
          - { name: "Personalidade Feérica", description: "Vantagem em testes de Carisma e em TS contra fadas/bestas/plantas." }
        grants:
          languages: { fixed: ["Silvestre"] }
          spells:
            always_prepared:
              2: ["animal-friendship","faerie-fire"]
              3: ["enthrall","invisibility"]
              5: ["speak-with-plants","major-image"]
              7: ["confusion","hallucinatory-terrain"]
              9: ["mislead","dream"]
      - level: 6
        features:
          - name: "Companheiro Feérico"
            description: "Um pixie o acompanha; age no seu turno e obedece seus comandos; se cair a 0 PV, volta à Faéria."
            rules:
              command: "ação para ordenar Ataque/Ajuda/Desengajar/Esquivar/Disparada; movimento com comando verbal"
              return_to_feywild: "ao cair a 0 PV; reaparece após descanso longo"
      - level: 10
        features:
          - { name: "Encontrar Encruzilhada", description: "Ritual de 10 min: detecta encruzilhadas para Faéria em 10 km e como acessá-las." }
      - level: 14
        features:
          - name: "Criatura de Faéria"
            description: "Forma feérica 1 h: vantagem vs magia; atravessa árvores; invisibilidade à vontade em florestas. 1/descanso longo."
            rules:
              uses: "1/descanso longo"
              benefits: ["vantagem em TS contra magias","mover-se entre árvores adjacentes","invisibilidade à vontade em florestas (como a magia)"]

  circulo-feras:
    name: "Círculo das Feras"
    flavor: "Círculo Druídico"
    description: "Mestre das bestas; convoca e fortalece criaturas selvagens."
    choose_level: 2
    levels:
      - level: 2
        features:
          - name: "Chamado Selvagem"
            description: "Convoca besta (ND ≤ nível/3) amigável para ajudar; do 8º em diante, também fada/elemental/planta."
            rules:
              action: "1 ação"
              duration: "até 1 hora (concentração)"
              cr_limit: "≤ nível/3 (arred. p/ baixo)"
              types_at_8: ["besta","fada","elemental","planta"]
          - { name: "Empatia com a Natureza", description: "Vantagem em Adestrar Animais para influenciar besta/elemental/fada/planta." }
      - level: 6
        features:
          - name: "Vínculo Selvagem"
            description: "Ação bônus dá vantagem no próximo ataque de uma criatura sob seu comando; magias em você ecoam em 1 invocado a 9 m."
            rules:
              bonus_action_mark: "1 criatura invocada sua a até 9 m ganha vantagem no próximo ataque até o fim do turno"
              spell_echo:
                range_m: 9
                targets: "uma criatura invocada que você controla"
                limits: "apenas magias com alvo 'você'"
      - level: 10
        features:
          - { name: "Fortalecer Invocações", description: "Criaturas invocadas têm resistência a físico não-mágico; ataques naturais contam como mágicos." }
      - level: 14
        features:
          - name: "Convocar Ancião"
            description: "Ritual de 1 h: convoca criatura ND ≤ metade do nível (ou grupo equivalente) por até 8 h sob seus comandos. 1/descanso longo."
            rules:
              duration: "até 8 horas (sem concentração)"
              control: "obedece comandos (ação para ordens complexas)"
              uses: "1/descanso longo"

  circulo-mundos:
    name: "Círculo dos Mundos"
    flavor: "Círculo Druídico"
    description: "Peregrino planar; atalhos, formas nativas e proteção multiversal."
    choose_level: 2
    levels:
      - level: 2
        features:
          - { name: "Eremita dos Planos", description: "Proficiência em Arcanismo; vantagem em testes sobre planos; magias planares sempre preparadas." }
        grants:
          proficiencies:
            skills: { fixed: ["Arcanismo"] }
          spells:
            always_prepared:
              2: ["comprehend-languages","protection-from-evil-and-good"]
              3: ["misty-step","moonbeam"]
              5: ["blink","protection-from-energy"]
              7: ["banishment","dimension-door"]
              9: ["plane-shift-anchor","contact-other-plane"]
      - level: 6
        features:
          - name: "Atalho Planar"
            description: "Ritual (1 h + espaço 3º): encontra o portal mais próximo para um plano conhecido (teste de Arcanismo). 1/descanso longo."
            rules:
              cost: "1 espaço de 3º nível"
              check: "Arcanismo (CD a critério da mesa)"
              uses: "1/descanso longo"
      - level: 10
        features:
          - name: "Forma Nativa"
            description: "Em outro plano, pode assumir forma nativa do local (ND ≤ metade do nível) por até 1 h."
            rules:
