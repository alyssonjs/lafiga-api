  # Novos arquétipos (Livro de Novos Arquétipos) — api_index alinhado a canonical_indexes / import
  atirador_inigualavel:
    name: "Atirador Inigualável"
    flavor: "Arquétipo Marcial"
    description: |
      O arquétipo Atirador Inigualável é escolhido por guerreiros que procuram a maestria com bestas, arcos e outras armas de disparo. Geralmente, elfos costumam trilhar o caminho desse arquétipo para dominar a arte do arco, mas ele é bastante comum entre todas as raças, já que é perceptível a vantagem de atacar seus inimigos e derrubá-los antes que eles tenham a chance de revidar.
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Tiro Rápido"
            description: |
              A partir do 3° nível, você aprende a disparar tiros com sua arma com uma velocidade surpreendente. Você pode, com uma ação bônus, realizar um ataque à distância com arma de munição. Você sofre desvantagem nessa jogada de ataque.
      - level: 7
        features:
          - name: "Melhor Posição de Tiro"
            description: |
              No 7° nível, você se torna especialista em localizar a melhor posição para atacar seus inimigos. Você ganha proficiência em Acrobacia, se já não tiver. Além disso, você pode realizar testes de Destreza (Acrobacia) para escalar e recebe vantagem nesses testes. Você recebe +2 de bônus nas jogadas de dano com armas de munição, se atingir uma criatura que esteja numa posição inferior à sua.
      - level: 10
        features:
          - name: "Tiro Certeiro"
            description: |
              No 10° nível, você pode mirar em uma criatura e realizar um tiro no ponto exato para exaurir a energia do seu alvo. Com sua ação, você realiza um único ataque à distância com uma arma de munição e você recebe vantagem nessa jogada de ataque. Se você atingir, o alvo sofre 5d10 de dano extra e deve realizar um teste de resistência de Constituição (CD 8 + seu bônus de proficiência + seu modificador de Destreza) ou ficará debilitado, sofrendo desvantagem nas jogadas de ataque e testes de Força e Destreza por 1 minuto. O alvo pode repetir o teste de resistência no final de cada turno dele, terminando o efeito de debilitação em si com um sucesso. Após usar essa característica, você precisa terminar um descanso curto ou longo para usá-la novamente. A partir do 16° nível, você pode usar essa característica duas vezes antes de precisar terminar um descanso.
      - level: 15
        features:
          - name: "Pontaria Aguçada"
            description: |
              Ao atingir o 15° nível, você aprimora sua velocidade e precisão ao atacar com sua arma escolhida. Você não sofre mais desvantagem na sua jogada de ataque quando usar uma ação bônus para realizar um ataque à distância com uma arma de munição. Além disso, você recebe vantagem na primeira jogada de ataque à distância com arco que fizer em cada turno seu.
      - level: 18
        features:
          - name: "Um Tiro, Uma Morte"
            description: |
              No 18° nível, você se torna especialista em atirar no ponto letal de criaturas mais frágeis. Sempre que você atingir um ataque à distância com uma arma de munição em uma criatura com 20 pontos de vida ou menos, o alvo deve realizar um teste de resistência de Constituição (CD 8 + seu bônus de proficiência + seu modificador de Destreza) ou cairá para 0 pontos de vida. Um alvo bem sucedido no teste ainda sofre o dano normal do seu ataque. Se você atingir um acerto crítico com um ataque à distância com uma arma de munição em uma criatura com 40 pontos de vida ou menos, ela deve realizar o mesmo teste de resistência para não cair a 0 pontos de vida.

  cavaleiro_implacavel:
    name: "Cavaleiro Implacável"
    flavor: "Arquétipo Marcial"
    description: |
      O arquétipo Cavaleiro Implacável reflete um guerreiro especializado em combater montado. Ele cria um forte elo com uma montaria que o serve lealmente enquanto ele a tratar com respeito. Enquanto está montado, um cavaleiro implacável é o oponente mais temível num campo de batalha, sendo capaz de dizimar toda uma linha de frente em uma única investida feroz sobre sua montaria.
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Montaria Fiel"
            description: |
              A partir do 3° nível, você adquire os serviços de uma leal montaria. Sua montaria normalmente será um cavalo de guerra, se você for Médio ou um pônei, se você for Pequeno ou um anão. Você pode adquirir uma besta diferente como montaria, com nível de desafio igual ou inferior a 1/2 e sem deslocamento de voo, com a permissão do Mestre. O máximo de pontos de vida dela será igual ao seu total normal ou a cinco vezes seu nível de guerreiro, o que for maior. Como qualquer criatura, sua montaria pode gastar Dados de Vida durante um descanso curto e recupera todos os seus pontos de vida ao terminar um descanso longo.
               Sua montaria realiza o turno dela na sua iniciativa e obedece seus direcionamentos enquanto você estiver montando-a. No seu turno, você pode coordenar sua montaria para guiar seu movimento (sem ação necessária). Você pode usar uma ação bônus para direcionar sua montaria a realizar as ações de Ataque, Disparada ou Desengajar. Ela age por contra própria se você estiver incapacitado ou ausente, focando-se em defender você.
               Se a montaria morrer, você pode obter outra montaria de formas tradicionais ou tentando adestrar uma nova besta selvagem apropriada que você encontrar, através de um teste de Carisma (Adestrar Animais) CD 15 que requer 8 horas para ser concluído.
      - level: 7
        features:
          - name: "Montaria Incansável"
            description: |
              A partir do 7° nível, sua montaria se torna extremamente eficiente em realizar longas jornadas. Sua montaria pode percorrer uma quantidade de quilômetros num dia de viagem igual ao dez vezes seu deslocamento de caminhada, sem precisar descansar. Uma montaria voadora pode percorrer uma quantidade de quilômetros por dia igual a quinze vezes seu deslocamento de voo. Para percorrer toda essa distância num dia de viagem, é necessário viajar por pelo menos 12 horas. Nem você nem sua montaria precisam realizar testes de resistência de Constituição para não sofrerem um nível de exaustão ao viajarem dessa forma, mas viajar além desse tempo num dia exigirá um teste de resistência de Constituição CD 15 + 1 para cada hora acima das 12 horas.
      - level: 10
        features:
          - name: "Investida Implacável"
            description: |
              No 10° nível, você ensina sua montaria a realizar um ataque de carga devastador. Com sua ação, enquanto estiver montado, você pode se mover 6 metros em linha reta e realizar um único ataque corpo-a-corpo com arma contra uma criatura logo após terminar seu movimento. Você recebe vantagem nesse ataque e, se atingir, você causa 4d8 de dano extra. Se você estiver usando uma arma de haste perfurante, como uma lança, o dano extra causado será de 6d8, ao invés. A partir do 20° nível, o dano extra será de 6d8, ou 8d8 com uma arma de haste perfurante.
      - level: 12
        features:
          - name: "Montaria dos Céus"
            description: |
              A partir do 12° nível, você pode escolher uma besta com nível de desafio 1 ou inferior capaz de voar, como sua montaria fiel.
      - level: 15
        features:
          - name: "Cavaleiro Protetor"
            description: |
              A partir do 15° nível, enquanto estiver montado, você pode adicionar seu bônus de proficiência na CA e nos testes de resistência da sua montaria. Além disso, quando sua montaria for atingida por um ataque ou fracassar em um teste de resistência para reduzir o dano de um efeito à metade, você pode usar sua reação para reduzir o dano sofrido por ela à metade.
      - level: 18
        features:
          - name: "Atropelar"
            description: |
              No 18° nível, você pode atravessar o campo de batalha com sua montaria, atropelando seus inimigos em uma investida devastadora. Com sua ação, enquanto estiver montado, você pode guiar sua montaria a se mover em linha reta todo o deslocamento dela. Todas as criaturas de tamanho igual ou inferior ao da sua montaria, que estiverem ocupando um quadrado por onde ela passou, devem ser bem sucedidos num teste de resistência de Destreza (CD 8 + seu bônus de proficiência + o modificador de Força da sua montaria) ou sofrerão dano de concussão igual a 2d6 + modificador de Força da sua montaria e serão derrubados no chão. Uma criatura bem sucedida reduz o dano à metade e não cairá no chão. Uma criatura de tamanho superior a sua montaria, ou qualquer outra barreira ocupando um espaço na linha de movimento, impede que esse ataque progrida. Sua montaria causa ataques de oportunidade ao se mover dessa forma, mas as criaturas sofrem desvantagem nessas jogadas de ataque.
              Você pode usar essa característica duas vezes. Após isso, você precisa terminar um descanso curto ou longo para poder usá-la novamente.
      - level: 20
        features:
          - name: "Investida Suprema"
            description: |
              No 20° nível, o dano extra da investida ajusta-se: 6d8 (8d8 com arma de haste perfurante).

  defensor_dedicado:
    name: "Defensor Dedicado"
    flavor: "Arquétipo Marcial"
    description: |
      O arquétipo Defensor Dedicado é a pura demonstração do potencial defensivo e resistente do guerreiro. Seus adeptos sempre estão bem armadurados e portando grandes escudos com os quais defendem a si próprios e aos seus aliados. Esses bravos guerreiros chamam a atenção dos mais poderosos oponentes para si, permitindo que seus aliados se foquem em derrotar outros adversários enquanto ele distrai a verdadeira ameaça.
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Postura Defensiva"
            description: |
              A partir do 3° nível, você pode assumir uma posição de combate focada totalmente na sua proteção.
              Enquanto estiver na postura defensiva, você recebe os seguintes benefícios caso esteja utilizando uma armadura e usando um escudo:
              • Você possui resistência contra dano de concussão, cortante e perfurante.
              • Quando você for atacado por um oponente que você possa ver e não estiver surpreso, você pode usar sua reação para erguer seu escudo e receber +3 de bônus na sua CA contra esse ataque. Você deve decidir usar essa habilidade antes de saber o resultado do ataque.
              • Você tem vantagem em testes de resistência de Força e Destreza.
              Você pode sustentar sua postura defensiva por até 1 minuto e, enquanto estiver nessa posição, seu deslocamento é reduzido à metade (arredondado para baixo, mínimo de 1,5 metro). Ela termina caso você use a ação de Disparada ou Desengajar. Você também pode terminá-la prematuramente com uma ação bônus no seu turno.
              Após usar essa característica, você precisa terminar um descanso curto ou longo para usá-la novamente.
      - level: 7
        features:
          - name: "Proteger Aliado"
            description: |
              A partir do 7° nível, você pode aprimorar a defesa de um aliado que esteja adjacente a você. Usando sua ação bônus, você pode aumentar a CA desse aliado num valor igual ao bônus fornecido pelo seu escudo. Você perde seu bônus de escudo na sua CA enquanto protege seu aliado dessa maneira. Esse efeito dura até o início do seu próximo turno. Você ainda pode usar sua reação para receber o benefício descrito na sua Postura Defensiva enquanto estiver protegendo um aliado. Seu aliado perde esse bônus na CA caso se afaste a mais de 1,5 metro de você.
      - level: 10
        features:
          - name: "Provocar"
            description: |
              No 10° nível, você pode incitar um inimigo a focar apenas você como seu adversário. Quando o fizer, escolha uma criatura que você possa ver a 9 metros. Se a criatura puder ver ou ouvir você, ela deve ser bem sucedida num teste de resistência de Sabedoria (CD igual a 8 + seu bônus de proficiência + seu modificador de Carisma) ou ficará provocada até o final do seu próximo turno. Enquanto estiver provocada, essa criatura deve usar todo seu deslocamento para se aproximar de você e não poderá atacar ou usar magias ou habilidades ofensivas contra nenhum dos seus aliados enquanto estiver sob esse efeito. Nos turnos seguintes, você pode usar sua ação para estender a duração desse efeito na criatura provocada até o início do seu próximo turno. Num turno em que provocar uma criatura, você pode usar uma ação bônus para realizar um ataque contra ela. Esse efeito termina se algum aliado seu atacar ou usar alguma magia ou habilidade nociva contra a criatura provocada. Se a criatura for bem sucedida no teste de resistência, você não poderá usar essa característica nessa criatura novamente por 24 horas.
      - level: 15
        features:
          - name: "Surto Defensivo"
            description: |
              A partir do 15° nível, você pode fortalecer seu corpo e mente contra um efeito nocivo que seja usado contra você. Quando for obrigado a realizar um teste de resistência contra um efeito nocivo, você pode usar sua reação para receber vantagem nesse teste de resistência.
              Você pode usar essa característica duas vezes. Após isso, você precisa terminar um descanso longo para usá-la novamente.
      - level: 18
        features:
          - name: "Baluarte Protetor"
            description: |
              No 18° nível, você se torna um baluarte de resistência no seu grupo, sendo praticamente impossível manter você sob um efeito nocivo por mais tempo que um breve momento. Quando você for alvo de algum efeito que exija um teste de resistência e você fracassar, mas o efeito persistir por mais tempo, você pode simplesmente ignorar esse efeito ao focar sua mente e corpo por um instante. Se o efeito nocivo persistente permitir um novo teste de resistência, no seu turno, para ser anulado, você pode usar sua ação para passar automaticamente no seu teste de resistência contra esse efeito.

  kensai:
    name: "Kensai"
    flavor: "Arquétipo Marcial"
    description: |
      O arquétipo Kensai representa um guerreiro que passou sua vida focando seu treinamento e meditação em uma lâmina de sua escolha dentre as possíveis de serem usadas com o iaijutsu. Conforme progride em seu caminho de meditação e autocontrole, o kensai desenvolve técnicas que prezam pela velocidade de raciocínio e amplitude dos sentidos de uma forma praticamente sobrenatural. É quase impossível pegar um kensai desprevenido, mas quando o inverso acontece, geralmente os oponentes não têm chance de revidar.
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Mestre do Iaijutsu"
            description: |
              A partir do 3° nível, você adquire a habilidade de surpreender seus inimigos com um ataque mortal com uma arma de sua escolha dentre adaga, cimitarra, espada curta, espada longa ou rapieira. Na primeira rodada de um combate, com sua arma ainda embainhada, você pode sacá-la e subitamente realizar a ação de Ataque com essa arma corpo-a-corpo contra um oponente que ainda não tenha agido. Você recebe vantagem na primeira jogada de ataque e, se atingir esse ataque, o alvo sofre dano extra igual à sua rolagem de iniciativa. Em um acerto crítico, adicione um d20 extra no dano desse ataque. Você não recebe os benefícios do Iaijutsu nos ataques realizados após o primeiro, independentemente de ter atingido ou não.
            choices:
              kensai_blade:
                choose: 1
                options:
                  - { id: "adaga", name: "Adaga" }
                  - { id: "cimitarra", name: "Cimitarra" }
                  - { id: "espada-curta", name: "Espada curta" }
                  - { id: "espada-longa", name: "Espada longa" }
                  - { id: "rapieira", name: "Rapieira" }
      - level: 7
        features:
          - name: "Busca da Autoperfeição"
            description: |
              No 7° nível, sua busca pelo constante aperfeiçoamento pessoal torna você um artesão capaz em todas as áreas possíveis. Você se torna proficiente em duas ferramentas de artesão, à sua escolha. Além disso, você adiciona metade do seu bônus de proficiência, arredondado para baixo, em qualquer teste de habilidade usando uma ferramenta de artesão, com a qual você não seja proficiente.
        grants:
          proficiencies:
            tools:
              choose: 2
              options: ["Ferramentas de artesão"]
      - level: 10
        features:
          - name: "Meditação da Lâmina"
            description: |
              No 10° nível, você pode realizar uma meditação logo após terminar um descanso curto, com sua espada em mãos, que fortalece seu elo com ela. Você pode escolher um dos benefícios a seguir que dura enquanto você empunhar sua arma ou até você realizar uma nova meditação:
              Força de Espírito. Você ganha vantagem em testes de resistência para não ser amedrontado.
              Intuição Extraordinária. Você ganha vantagem em jogadas de iniciativa.
              Mente Intocável. Você ganha vantagem em testes de resistência para não ser enfeitiçado.
              Percepção da Matéria. Você adquire percepção às cegas com 3 metros de alcance.
              Proteção Sobrenatural. Quando uma criatura atingir você com um ataque, você pode usar sua reação para adicionar +3 de bônus a sua CA contra esse ataque, possivelmente fazendo-o errar. Você não precisa ver a criatura atacante.
              Sexto Sentido. Quando sofrer um ataque corpo-a-corpo durante uma rodada surpresa, você pode usar sua reação para atacar a criatura que atacou você.
              Uno com a Espada. Você adiciona 1d8 de dano extra ao primeiro ataque corpo a corpo que você atingir a cada rodada.
              Após usar essa característica, você precisa terminar um descanso curto ou longo para usá-la novamente.
      - level: 15
        features:
          - name: "Movimento Antes do Pensamento"
            description: |
              A partir do 15° nível, você desenvolve uma técnica que aprimora seu raciocínio, antecipando sua ação momentos antes de um combate. Você pode aplicar seu bônus de proficiência em suas rolagens de iniciativa. Além disso, você pode rolar sua iniciativa mesmo em uma rodada que você estaria surpreso, mas você não age nesse turno. Se um inimigo com uma contagem de iniciativa inferior a sua se aproximar a 1,5 metro de você, você pode usar sua reação para sacar sua arma e realizar um ataque de Iaijutsu contra esse oponente.
      - level: 18
        features:
          - name: "Meditação Perfeita"
            description: |
              No 18° nível, você adquire a perfeição do foco da sua meditação, podendo manter dois efeitos de sua Meditação da Lâmina simultaneamente. Quando você realizar a meditação durante um descanso curto, você pode escolher dois benefícios descritos na sua Meditação da Lâmina que duram até você realizar uma nova meditação. Você deve escolher dois benefícios diferentes ao usar essa característica.

  mestre_correntes:
    name: "Mestre das Correntes"
    flavor: "Arquétipo Marcial"
    description: |
      O arquétipo Mestre das Correntes simula o estilo de combate exótico de um ser das profundezas: o diabo das correntes. Desarmar, enrolar e derrubar seus oponentes são manobras de combate eficientes, evitando que os adversários tenham sequer a chance de contra-atacar.
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Estilo de Combate Exótico"
            description: |
              A partir do 3° nível, você adquire perícia em combate usando armas maleáveis incomuns. Suas armas de mestre das correntes são a corda com gancho, a corrente, a corrente farpada, o chicote e o mangual. Quando você atingir uma criatura com um ataque corpo-a-corpo usando uma dessas armas, você pode abdicar de causar o dano normal e realizar uma tentativa de agarrar. Se você for bem sucedido em agarrar a criatura, ela permanecerá agarrada até você usar uma ação bônus para desencadear uma das manobras especiais a seguir.
              Enrolar. A criatura agarrada fica impedida e você não pode realizar ataques com sua arma, até o início do seu próximo turno.
              Puxão. Você pode realocar a criatura agarrada em qualquer espaço desocupado, no seu alcance, a até 3 metros do espaço que ela ocupava, liberando sua arma em seguida.
              Rasteira. A criatura agarrada fica caída, liberando sua arma em seguida.
              Desarme. Escolha um item que a criatura agarrada esteja empunhando. Você tira o item escolhido da criatura e pode colocá-lo em qualquer ponto dentro do seu alcance, liberando sua arma em seguida. Se você tiver uma mão livre, você pode segurar o item retirado da criatura.
              Como um mestre das correntes, você pode usar uma corda com gancho e uma corrente como arma e é proficiente com elas. A partir do 10° nível, você se torna proficiente com a corrente farpada. Corda com gancho: arma corpo-a-corpo marcial, 1d6 perfurante, propriedade alcance. Corrente: 1d10 concussão, pesada, alcance, duas mãos. Corrente farpada: 1d10 cortante, pesada, alcance, duas mãos.
      - level: 7
        features:
          - name: "Movimento da Corrente"
            description: |
              No 7° nível, você adquire um domínio tão extremo com correntes e cordas que pode usá-las para se balançar, escalar rapidamente ou até mesmo andar sobre ela, quando conveniente. Sua arma funciona como se fosse uma corda com arpéu de mesmo comprimento. Quando você fizer um teste de habilidade usando uma de suas armas de mestre das correntes para se movimentar, você ganha um bônus nesse teste igual ao dobro do seu bônus de proficiência. Além disso, escalar usando uma corda ou corrente não lhe custa movimento extra.
      - level: 10
        features:
          - name: "Maestria da Corrente"
            description: |
              No 10° nível, você aprimora suas técnicas e até suas armas de escolha. Você ganha proficiência em ferramentas de ferreiro, se ainda não tiver. Você pode forjar uma corrente farpada, com a qual você é proficiente, e pode usá-la para executar suas manobras de mestre das correntes. Além disso, você recebe vantagem nos testes de Força (Atletismo) feitos em testes resistidos de agarrar ao utilizar uma de suas armas de mestre das correntes para realizar as manobras especiais do seu estilo de combate exótico. Se você usar uma corrente farpada para usar as manobras especiais enrolar, puxão ou rasteira contra uma criatura que você está agarrando com ela, você causa 1d10 de dano perfurante à criatura agarrada.
      - level: 15
        features:
          - name: "Alcance Estendido"
            description: |
              A partir do 15° nível, você pode estender o alcance dos seus ataques com suas armas de escolha. Você pode realizar um ataque corpo-a-corpo contra uma criatura a até 4,5 metros de você com um chicote, corrente, corrente farpada ou corda com gancho.
      - level: 18
        features:
          - name: "Ataque Giratório"
            description: |
              No 18° nível, você é capaz de executar uma dança de aço contra todos os seus inimigos. Com sua ação, você pode realizar um ataque corpo-a-corpo com uma arma de mestre das correntes que você esteja empunhando, contra cada inimigo dentro do seu alcance. Após usar essa característica, você precisa terminar um descanso curto ou longo para usá-la novamente.

  mestre_arremesso:
    name: "Mestre do Arremesso"
    flavor: "Arquétipo Marcial"
    description: |
      O arquétipo Mestre do Arremesso simula um guerreiro focado em arremessar todo tipo de arma, enfraquecendo seus inimigos antes de se engajar em um combate corporal com eles. Esses guerreiros são devastadores com todo tipo de arma corpo-a-corpo, sendo capazes de arremessá-las com a mesma facilidade que arremessam uma adaga. Um guerreiro que adquira a maestria em arremessar todo tipo de arma torna-se um pesadelo numa batalha contra inimigos que tentem se engajar com eles para ter alguma chance de derrotá-los.
    choose_level: 3
    levels:
      - level: 3
        features:
          - name: "Arremesso Versátil"
            description: |
              A partir do 3° nível, você pode usar qualquer arma que você seja proficiente como uma arma de arremesso. Todas as armas corpo-a-corpo em que você tiver proficiência ganham a propriedade arremesso (distância 6/18). Se a arma possuir a propriedade versátil, ela pode ser arremessada com as duas mãos, causando o dano indicado quando for usada para realizar um ataque corpo-a-corpo com as duas mãos.
      - level: 7
        features:
          - name: "Ataque de Retorno"
            description: |
              Ao atingir o 7° nível, você pode fazer com que armas arremessadas por você retornem para sua mão logo após o ataque ser definido. Quando você realizar um ataque com uma arma de arremesso, você pode usar uma ação bônus para fazer a arma arremessada voltar magicamente para sua mão logo após o ataque ser resolvido. A partir do 11° nível, você pode fazer com que uma arma arremessada por você volte para a sua mão após um ataque, sem precisar usar uma ação para tal.
      - level: 10
        features:
          - name: "Arremesso Estremecedor"
            description: |
              No 10° nível, você pode criar tensões inacreditáveis quando se prepara para arremessar sua arma, que fica visível ao seu redor como ondas de calor. Quando você libera sua arma, esse poder segue com sua arma. Como uma ação bônus, você pode escolher tratar suas jogadas de ataque à distância com armas com a propriedade arremesso como ataques corpo-a-corpo, até o início do seu próximo turno. Isso permite que você realize ataques de oportunidade com essas armas como se você tivesse alcance de 6 metros e impede que você sofra desvantagem por ter um inimigo adjacente a você enquanto realiza ataques à distância. Após usar essa característica, você precisa terminar um descanso curto ou longo para usá-la novamente.
      - level: 11
        features:
          - name: "Retorno Instintivo"
            description: |
              No 11° nível, a arma de arremesso retorna à mão após o ataque sem ação bônus (conforme Ataque de Retorno).
      - level: 15
        features:
          - name: "Ricochete Relâmpago"
            description: |
              A partir do 15° nível, você pode fazer sua arma ricochetear em um inimigo, potencialmente atingindo outra criatura próxima. Se você atingir uma criatura a até 6 metros de você com um ataque à distância com uma arma de arremesso, você pode usar sua reação para realizar um ataque à distância com a mesma arma contra um alvo que esteja a até 3 metros do alvo atingido.
      - level: 18
        features:
          - name: "Lâmina Giratória"
            description: |
              No 18° nível, você pode atirar sua arma fazendo parecer que você está atacando uma dezena de inimigos ao mesmo tempo. Você se torna o centro de uma tempestade de aço e sua arma de arremesso voa para golpear um inimigo, retorna e ricocheteia inofensiva em você, para então voar e atacar outro inimigo. Com sua ação, você pode fazer um ataque à distância com uma arma cortante com a propriedade arremesso contra cada inimigo a até 6 metros de você. Você pode atacar cada alvo só uma vez com este ataque. Após usar essa característica, você precisa terminar um descanso curto ou longo para usá-la novamente.

monk:
  mao-aberta:
    name: "Caminho da Mão Aberta"
    flavor: "Tradição Monástica"
    description: "Mestres do combate desarmado que desequilibram, curam e, no ápice, desfere a Palma Vibrante."
    choose_level: 3
    rules:
      ki_save_dc: "8 + bônus de proficiência + modificador de Sabedoria"
    levels:
      - level: 3
        features:
          - name: "Técnica da Mão Aberta"
            description: "Quando um golpe da sua Rajada de Golpes acerta, escolha um efeito."
            rules:
              applies_to: "apenas acertos de Rajada de Golpes"
              effects:
                - name: "Derrubar"
                  save: { ability: "Destreza", dc: "ki_save_dc", on_fail: "alvo fica caído" }
                - name: "Empurrar"
                  save: { ability: "Força", dc: "ki_save_dc", on_fail: "empurrado 4,5 m para longe de você" }
                - name: "Desarmar Reações"
                  effect: "o alvo não pode realizar reações até o fim do seu próximo turno"
      - level: 6
        features:
          - name: "Integridade Corporal"
            description: "Com uma ação, cura PV = 3 × seu nível de monge."
            rules:
              action: "Ação"
            uses:
              per: "descanso longo"
              uses: 1
      - level: 11
        features:
          - name: "Tranquilidade"
            description: "Após um descanso longo, ganha o efeito de 'santuário' até o próximo descanso longo."
            rules:
              save_dc: "ki_save_dc"
              ends_early: ["como a magia santuário (se atacar, conjurar ou afetar outro)"]
      - level: 17
        features:
          - name: "Palma Vibrante"
            description: "Marca vibrações letais num alvo que você acerta; termine-as com uma ação."
            rules:
              on_hit:
                cost_ki: 3
                limit: "apenas 1 criatura afetada por vez"
                duration: "dias = seu nível de monge"
              finish_action:
                action: "Ação"
                save:
                  ability: "Constituição"
                  dc: "ki_save_dc"
                  on_fail: "PV do alvo vão a 0"
                  on_success: "10d10 de dano necrótico"
              requirement: "você e o alvo devem estar no mesmo plano de existência"

  sombra:
    name: "Caminho da Sombra"
    flavor: "Tradição Monástica"
    description: "Furtividade e subterfúgio; usa o ki para conjurar sombras e mover-se através delas."
    choose_level: 3
    rules:
      ki_save_dc: "8 + bônus de proficiência + modificador de Sabedoria"
    levels:
      - level: 3
        features:
          - name: "Artes Sombrias"
            description: "Gasta ki para imitar magias das sombras; aprende 'ilusão menor'."
            rules:
              spells_with_ki:
                cost_per_cast: 2
                list: ["escuridão","visão no escuro","passos sem pegadas","silêncio"]
                components: { material: "não requer" }
                save_dc: "ki_save_dc"
            grants:
              cantrips: ["ilusão menor"]
      - level: 6
        features:
          - name: "Passo das Sombras"
            description: "Teleporta entre sombras e ganha vantagem no primeiro ataque corpo a corpo."
            rules:
              bonus_action: true
              requirements: ["você em penumbra/escuridão","destino em penumbra/escuridão"]
              teleport: { distance_m: 18 }
              after_teleport: "vantagem no primeiro ataque corpo a corpo antes do fim do turno"
      - level: 11
        features:
          - name: "Manto de Sombras"
            description: "Fica invisível nas sombras até agir ou entrar em luz plena."
            rules:
              action: "Ação"
              requirements: ["estar em penumbra ou escuridão"]
              invisible_until: ["você atacar","conjurar magia","entrar em luz plena"]
      - level: 17
        features:
          - name: "Oportunista"
            description: "Aproveita aberturas criadas por outros para golpear."
            rules:
              reaction: true
              trigger: "uma criatura a 1,5 m é atingida por um ataque de outra criatura (não você)"
              effect: "faz 1 ataque corpo a corpo contra essa criatura"

  quatro-elementos:
    name: "Caminho dos Quatro Elementos"
    flavor: "Tradição Monástica"
    description: "Manipula ar, terra, fogo e água; disciplinas substituem espaços de magia por ki."
    choose_level: 3
    rules:
      ki_save_dc: "8 + bônus de proficiência + modificador de Sabedoria"
      disciplines_common:
        casting:
          no_material_components: true
          save_dc: "ki_save_dc"
          upcast:
            rule: "pode gastar ki adicional para aumentar o nível efetivo"
            max_ki_per_spell_by_level:
              "5-8": 3
              "9-12": 4
              "13-16": 5
              "17-20": 6
      known_disciplines:
        at_3: 1
        at_6: 1
        at_11: 1
        at_17: 1
        always_known: ["Sintonia Elemental"]
    levels:
      - level: 3
        features:
          - name: "Discípulo dos Elementos"
            description: "Aprende 'Sintonia Elemental' e 1 disciplina elemental; ganha mais nos níveis 6, 11 e 17."
            choices:
              disciplines:
                choose: 1
                options:
                  - id: "golpe_varredura_cauterizante"
                    name: "Golpe de Varredura Cauterizante"
                    effect: "Conjura 'mãos flamejantes'."
                    rules: { ki_cost: 2, scaling: "gaste ki extra para aumentar o nível" }
                  - id: "punho_quatro_trovoes"
                    name: "Punho dos Quatro Trovões"
                    effect: "Conjura 'onda trovejante'."
                    rules: { ki_cost: 2 }
                  - id: "investida_espiritos_ventania"
                    name: "Investida dos Espíritos da Ventania"
                    effect: "Conjura 'lufada de vento'."
                    rules: { ki_cost: 2 }
                  - id: "chicote_de_agua"
                    name: "Chicote de Água"
                    effect: "3d10 concussão (DES ST); puxa 7,5 m ou derruba; +1d10 por ki extra."
                    rules: { ki_cost: 2, extra_d10_per_ki: 1 }
                  - id: "punho_do_ar_continuo"
                    name: "Punho do Ar Contínuo"
                    effect: "3d10 concussão (FOR ST); empurra até 6 m e derruba; +1d10 por ki extra."
                    rules: { ki_cost: 2, extra_d10_per_ki: 1 }
                  - id: "moldar_rio_corrente"
                    name: "Moldar o Rio Corrente"
                    effect: "Modela água/gelo em área para usos utilitários."
                    rules: { ki_cost: 1 }
      - level: 6
        features:
          - name: "Disciplina Adicional"
            description: "Escolhe +1 disciplina."
            choices:
              disciplines:
                choose: 1
                options:
                  - id: "gongo_do_pico"
                    name: "Gongo do Pico"
                    effect: "Conjura 'despedaçar'."
                    rules: { ki_cost: 3 }
                  - id: "serragem_vento_norte"
                    name: "Serragem do Vento do Norte"
                    effect: "Conjura 'imobilizar pessoa'."
                    rules: { ki_cost: 3 }
      - level: 11
        features:
          - name: "Disciplina Adicional (11º)"
            description: "Escolhe +1 disciplina de 11º."
            choices:
              disciplines:
                choose: 1
                options:
                  - id: "cavalgar_o_vento"
                    name: "Cavalgar o Vento"
                    effect: "Conjura 'voo' (em si)."
                    rules: { ki_cost: 4, prereq_level: 11 }
                  - id: "chamas_da_fenix"
                    name: "Chamas da Fênix"
                    effect: "Conjura 'bola de fogo'."
                    rules: { ki_cost: 4, prereq_level: 11 }
                  - id: "postura_da_neblina"
                    name: "Postura da Neblina"
                    effect: "Conjura 'forma gasosa' (em si)."
                    rules: { ki_cost: 4, prereq_level: 11 }
      - level: 17
        features:
          - name: "Disciplina Adicional (17º)"
            description: "Escolhe +1 disciplina de 17º."
            choices:
              disciplines:
                choose: 1
                options:
                  - id: "defesa_eterna_da_montanha"
                    name: "Defesa Eterna da Montanha"
                    effect: "Conjura 'pele de pedra' (em si)."
                    rules: { ki_cost: 5, prereq_level: 17 }
                  - id: "rio_de_chamas_famintas"
                    name: "Rio de Chamas Famintas"
                    effect: "Conjura 'muralha de fogo'."
                    rules: { ki_cost: 5, prereq_level: 17 }
                  - id: "onda_de_pedras_rolantes"
                    name: "Onda de Pedras Rolantes"
                    effect: "Conjura 'muralha de pedra'."
                    rules: { ki_cost: 6, prereq_level: 17 }
      - level: 0
        features:
          - name: "Sintonia Elemental (sempre conhecida)"
            description: "Gestos/efeitos elementais simples: acender/apagar chamas, pequenas brisas, aquecer/esfriar e afins."

  # Tradições do Livro de Novos Arquétipos (chaves = ruleSlug do wizard / front)
  caminho_aco:
    name: "Caminho do Aço"
    flavor: "Tradição Monástica"
    description: |
      Diferente de qualquer outro monge, um artista marcial que trilhe o Caminho do Aço não usa a agilidade e velocidade no combate. Ao invés disso, ele aprende a se proteger como guerreiros tradicionais e usar a força bruta para derrubar seus oponentes. Você passa a ser conhecido como um monge de ferro e desenvolve técnicas e trilha um caminho totalmente diferente do que seguia no início da sua carreira.
    choose_level: 3
    rules:
      ki_save_dc: "8 + bônus de proficiência + modificador de Sabedoria"
    levels:
      - level: 3
        features:
          - name: "Proficiência Adicional (Aço)"
            description: |
              A partir do 3° nível, você segue um rumo totalmente diferente das outras tradições monásticas. Você adquire proficiência com armaduras leves e médias.
          - name: "Técnicas do Monge de Ferro"
            description: |
              A partir do 3° nível, você desenvolve técnicas diferentes das do monge tradicional ao usar seu chi em um combate. Enquanto estiver vestindo uma armadura, você pode adicionar seu modificador de Sabedoria ou de Destreza (o que for maior) à CA base fornecida pela armadura (máximo de +2 para armaduras médias). Além disso, você pode usar todas as suas características de classe mesmo usando armadura, exceto a Rajada de Golpes, Defesa Paciente e Passo do Vento. Você pode usar as características a seguir, no lugar dessas características.
              Punho de Ferro. Você pode gastar 1 ponto de chi, com uma ação bônus, para focar sua energia em um único poderoso golpe. Quando você usar a ação de Ataque, você abdica de quaisquer ataques extras para realizar um único golpe desarmado ou com uma arma de monge. Você rola três dados de dano de arma adicionais, se atingir esse ataque. No 5° nível, você rola quatro dados de dano de arma adicionais, se atingir esse ataque.
              Defesa Blindada. Você pode gastar 1 ponto de chi, com uma ação bônus, para ganhar resistência a dano de concussão, cortante e perfurante até o início do seu próximo turno.
              Posição da Montanha. Você pode gastar 1 ponto de chi, com uma ação bônus, para receber vantagem em testes de Força e testes de resistência de Força até o início do seu próximo turno. Além disso, quando realizar um Encontrão, você pode empurrar uma criatura até 3 metros, se você vencer o teste resistido.
      - level: 6
        features:
          - name: "Golpe de Brutalidade Absoluta"
            description: |
              No 6° nível, quando você usar seu Punho de Ferro, você pode gastar 2 pontos de chi adicionais para realizar um poderoso golpe que tem uma grande chance de ser letal. Você realiza esse ataque com vantagem e ele possui uma margem de acerto crítico de 18 a 20.
      - level: 11
        features:
          - name: "Desarme Feroz"
            description: |
              Ao chegar no 11° nível, você aprende uma técnica de combate que surpreende seus inimigos. Ao realizar a ação de Ataque, você pode gastar 2 pontos de chi para realizar um ataque desarmado que não causa dano. Se você atingir, seu alvo deve realizar um teste de resistência de Força ou Destreza, à escolha dele (CD 8 + seu bônus de proficiência + seu modificador de Sabedoria). Se ele fracassar, você toma a arma da mão dele. Se ele obtiver sucesso, sofrerá desvantagem nas jogadas de ataque com essa arma até o início do seu próximo turno.
      - level: 17
        features:
          - name: "Contra-ataque Devastador"
            description: |
              No 17° nível, você aprende a contra-atacar com um vigor absurdo, usando toda a sua força sem se importar com precisão. Quando uma criatura atingir você com um ataque corpo-a-corpo, você pode gastar 3 pontos de chi, com sua reação, para usar seu Punho de Ferro contra ela. Você sofre –5 de penalidade nessa jogada de ataque, mas se atingir, será um ataque crítico.

  caminho_mestre_bebado:
    name: "Caminho do Mestre Bêbado"
    flavor: "Tradição Monástica"
    description: |
      Alguns monges menos convencionais aprendem um estilo de luta que se foca em estar aparentemente constantemente embriagado. Os mestres bêbados, também conhecidos como pugilistas embriagados, são monges que aprendem um estilo de luta nada ortodoxo, usando o estado cambaleante provocado pela embriaguez para obter vantagem. Os movimentos de um mestre bêbado são imprevisíveis, tornando muito difícil saber como atingi-lo e ainda mais difícil saber como se defender dos golpes aparentemente aleatórios desferidos por esse monge ébrio.
    choose_level: 3
    rules:
      ki_save_dc: "8 + bônus de proficiência + modificador de Sabedoria"
    levels:
      - level: 3
        features:
          - name: "Mestre do Improviso"
            description: |
              No 3° nível, quando você escolhe essa tradição, você adquire proficiência com armas improvisadas. Essas armas são consideradas armas de monge para você.
          - name: "Estilo do Mestre Bêbado"
            description: |
              Também no 3° nível, você pode realizar novas ações usando seu chi quando estiver embriagado. Você deve usar sua ação para ingerir, pelo menos, um litro de bebida alcoólica forte, como rum, saquê ou vinho, permanecendo bêbado enquanto possuir pontos de chi restantes. Enquanto estiver bêbado, você recebe vantagem em testes de Destreza (Acrobacia), mas sofre desvantagem em testes de Sabedoria (Percepção). Além disso, você pode usar as seguintes características enquanto estiver bêbado:
              Contra-Rasteira. Se uma criatura tentar derrubar você e falhar, você pode gastar 1 ponto de chi com sua reação para realizar um ataque desarmado contra ela. Se você atingir, além de causar o dano, a criatura deve ser bem sucedida num teste de Força (Atletismo) ou Destreza (Acrobacia), à escolha dela, resistido por um teste de Destreza (Acrobacia) seu, ou cairá no chão.
              Escorrer feito Água. Se uma criatura estiver agarrando você, você pode usar uma ação bônus para gastar 1 ponto de chi e realizar um teste de Destreza (Acrobacia) para escapar do agarrão. Se for bem sucedido, você pode realizar um ataque desarmado contra o alvo como parte dessa ação.
              Arremesso Atordoante. Você pode, com uma ação bônus, gastar 1 ponto de chi para arremessar uma arma de monge que cause dano de concussão em uma criatura a até 6 metros de você. Se você atingir, ela será afetada pelo seu Ataque Atordoante.
      - level: 6
        features:
          - name: "Recuperação Ébria"
            description: |
              No 6° nível, você pode usar bebidas alcoólicas para reabastecer seu poço de chi. Com sua ação, você deve beber, pelo menos, meio litro de bebida alcoólica forte e realiza um teste de resistência de Constituição CD 15. Se você for bem sucedido, recuperará uma quantidade de pontos de chi igual ao seu modificador de Sabedoria (mínimo 1). Após usar essa característica, você precisa terminar um descanso curto ou longo para usá-la novamente.
      - level: 11
        features:
          - name: "Hálito Flamejante"
            description: |
              Ao chegar no 11° nível, você consegue liberar um arroto extremamente inflamável. Com sua ação, você pode gastar 5 pontos de chi para expelir gás num cone de 9 metros e incendiá-lo com uma fonte de fogo em sua mão, como uma tocha ou isqueiro. Todas as criaturas na área, devem ser bem sucedidas num teste de resistência de Destreza (CD 8 + seu bônus de proficiência + seu modificador de Constituição) ou sofrerão 12d6 de dano de fogo. Um sucesso na resistência reduz esse dano à metade.
      - level: 17
        features:
          - name: "Sempre Bêbado"
            description: |
              No 17° nível, você está constantemente bêbado, não precisando ingerir álcool. Você pode ativar seu Estilo do Mestre Bêbado com uma ação bônus, sem precisar beber. Além disso, enquanto estiver sob efeito do seu Estilo do Mestre Bêbado, você pode gastar 2 pontos de chi para ativar, com uma única ação bônus, duas de suas características de monge, dentre as seguintes: Rajada de Golpes, Defesa Paciente, Passo do Vento, Escorrer feito Água ou Arremesso Atordoante. Você não pode usar a mesma característica duas vezes com uma única ação bônus dessa maneira.

  caminho_monge_tatuado:
    name: "Caminho do Monge Tatuado"
    flavor: "Tradição Monástica"
    description: |
      Um monge que segue o Caminho do Monge Tatuado descobre como encantar tatuagens feitas por ele com poder místico. Essas tatuagens não são meras pinturas para os monges que as ostentam. Elas são carregadas de significado e misticismo. Um monge tatuado costuma venerar a natureza, além das exuberantes criaturas naturais e sobrenaturais que existem nela.
    choose_level: 3
    rules:
      ki_save_dc: "8 + bônus de proficiência + modificador de Sabedoria"
    levels:
      - level: 3
        features:
          - name: "Tatuador Experiente"
            description: |
              No 3° nível, quando você escolhe essa tradição, você consegue fazer tatuagens com grande perícia. Você adquire proficiência com ferramentas de pintor e suprimentos de caligrafia. Com essas ferramentas, você pode criar tatuagens apropriadas para armazenar poder místico. Cada tatuagem requer uma sessão de 8 horas para ser feita, além do gasto de 100 po em tintas e materiais místicos.
          - name: "Tatuagem Mística"
            description: |
              Também no 3° nível, você pode despertar o poder místico em tatuagens que você possuir. Despertar uma tatuagem requer 1 hora de meditação e você não pode despertar outra tatuagem até terminar um descanso longo. Você pode ter duas tatuagens despertas, inicialmente. Cada tatuagem permite que você use seu chi de uma nova forma (Carvalho, Dragão, Fênix, Garça, Macaco, Serpente, Tigre — efeitos detalhados no livro). Ativar essas características não requer uma ação, mas só pode ser feito no seu turno.
      - level: 6
        features:
          - name: "Tatuagem de Poder"
            description: |
              No 6° nível, suas tatuagens passam a conceder a você benefícios permanentes. Você adquire os benefícios relacionados a cada tatuagem mística que você possuir (por exemplo, Carvalho: vantagem em Força (Atletismo) para não ser empurrado ou derrubado; Dragão: vantagem em testes de resistência de Sabedoria para não ser amedrontado; demais no livro).
      - level: 11
        features:
          - name: "Despertar Adicional (3ª)"
            description: |
              Ao chegar no 11° nível, você pode despertar o poder latente de uma terceira tatuagem que você possua. Escolha uma das opções de tatuagem, diferente das que você já despertou, descritas na sua Tatuagem Mística.
      - level: 17
        features:
          - name: "Desencarnar Tatuagem"
            description: |
              No 17° nível, você pode usar sua energia interior para desencarnar o poder contido em uma tatuagem mística sua, numa explosão de energia. Com sua ação, você pode escolher uma de suas tatuagens e desencarná-la, gastando 5 pontos de chi. Todas as criaturas inimigas a até 9 metros de você, devem realizar um teste de resistência de Destreza. Se fracassar, uma criatura sofrerá 10d8 de dano de energia e será empurrada 3 metros para longe de você. Os poderes da tatuagem escolhida adormecem e você perde todos os benefícios dela, até despertar a mesma ou outra conforme a Tatuagem Mística. Após usar essa característica, você precisa terminar um descanso curto ou longo para poder usá-la novamente.
      - level: 18
        features:
          - name: "Despertar Adicional (4ª)"
            description: |
              No 18° nível, você pode despertar uma quarta tatuagem diferente, dentre as opções disponíveis na sua Tatuagem Mística.

  caminho_ninjuts:
    name: "Caminho do Ninjútsu"
    flavor: "Tradição Monástica"
    description: |
      Os monges que enveredam pelo Caminho do Ninjútsu aprendem as técnicas secretas dos ninjas. Para se tornar um ninja, primeiramente o monge deve ser aceito em um clã secreto de ninjas. Após ser aceito, ele aprende técnicas que aperfeiçoam sua furtividade, além de técnicas de assassinato. Isso faz do ninja um matador extremamente eficiente, capaz de entrar em qualquer local sem ser percebido e eliminar seu alvo de forma rápida e limpa, estando bem longe antes que alguém perceba o que aconteceu.
    choose_level: 3
    rules:
      ki_save_dc: "8 + bônus de proficiência + modificador de Sabedoria"
    levels:
      - level: 3
        features:
          - name: "Arte do Ninjútsu"
            description: |
              No 3° nível, quando você adentra um clã secreto de ninjas, você adiciona as seguintes armas à sua lista de armas de monge: katana (espada longa), kodachi (cimitarra), fukiya (zarabatana) e naginata (glaive). Você adquire proficiência com essas armas e com kit de venenos.
          - name: "Golpe Súbito"
            description: |
              A partir do 3° nível, você se torna capaz de desferir um golpe letal ao pegar seu oponente desprevenido. Quando você usar uma arma de monge para atacar um oponente que não possa ver você ou que esteja surpreso, você adiciona 1d8 de dano extra ao primeiro ataque que você atingir no seu turno. O dano extra do seu Golpe Súbito aumenta em 1d8 para cada três níveis de monge que você possuir (2d8 no 6°, 3d8 no 9°, 4d8 no 12°, 5d8 no 15° e 6d8 no 18° nível).
      - level: 6
        features:
          - name: "Técnicas de Ninjútsu"
            description: |
              No 6° nível, você aprende técnicas que facilitam sua infiltração e evasão, gastando pontos de chi. Escalada Veloz. Com sua ação, você pode gastar 1 ponto de chi para adquirir deslocamento de escalada igual ao seu deslocamento de caminhada até o final do seu turno. Bomba de Fumaça. Com uma ação bônus, você pode gastar 2 pontos de chi e arremessar uma bomba de fumaça aos seus pés, criando uma nuvem de fumaça no espaço ocupado por você e em todos os espaços adjacentes, até o final do seu turno. Durante esse período, você adquire os benefícios da magia invisibilidade. Percepção Sobrenatural. Com uma ação bônus, você pode gastar 3 pontos de chi para adquirir percepção às cegas com um alcance de 3 metros por 1 minuto.
      - level: 11
        features:
          - name: "Mestre do Ocultismo"
            description: |
              Ao chegar no 11° nível, você se torna um mestre nas artes do oculto. Você recebe vantagem em testes de Destreza (Furtividade) e não pode ser rastreado por meios não-mágicos. A partir de agora, quando usar sua Bomba de Fumaça, você pode gastar 2 pontos de chi adicionais para fazê-la durar até o final do seu próximo turno. Durante esse período, você recebe os benefícios da magia invisibilidade maior enquanto permanecer na área ocupada pela fumaça.
      - level: 17
        features:
          - name: "Passo Fantasma"
            description: |
              No 17° nível, você se torna capaz de usar sua energia interior para adentrar o Plano Etéreo por um curto período. Com sua ação, você pode gastar 5 pontos de chi para adquirir uma forma incorpórea por 1 minuto. Enquanto estiver nessa forma, é difícil enxergar você; você ganha resistência a dano de concussão, perfurante e cortante de ataques não-mágicos e dano de veneno; não pode ser agarrado, derrubado, impedido, paralisado ou petrificado; pode se mover através de criaturas e objetos como se fossem terreno difícil (sofre 1d10 de dano de energia se terminar o turno dentro de um objeto); só pode realizar ataques com armas mágicas em criaturas no Plano Material, atacando no Etéreo normalmente. Após usar essa característica, você precisa terminar um descanso longo para poder usá-la novamente.

  caminho_punho_sagrado:
    name: "Caminho do Punho Sagrado"
    flavor: "Tradição Monástica"
    description: |
      O Caminho do Punho Sagrado é composto por monges doutrinados em alguma seita religiosa. Eles cultuam algum deus em particular, ou até um grupo de deuses com orientação similar. Durante suas meditações e orações, eles adquirem a capacidade de canalizar energia divina através dos seus corpos, usando sua energia mística interior como ferramenta para acessar sua fé. Assim como um clérigo ou paladino, um punho sagrado pode perder sua capacidade de conjuração caso age de forma contrária aos dogmas dos deuses que seu monastério cultua, apesar de ser muito mais difícil isso acontecer, já que ele costuma ter um panorama muito mais amplo de culto que as duas classes citadas.
    choose_level: 3
    rules:
      ki_save_dc: "8 + bônus de proficiência + modificador de Sabedoria"
      spell_save_dc_cleric: "8 + bônus de proficiência + modificador de Sabedoria"
    levels:
      - level: 3
        features:
          - name: "Conjuração (Punho Sagrado)"
            description: |
              Quando você alcançar o 3° nível, você amplia sua versatilidade e autossuficiência com a capacidade de conjurar magias divinas. Truques: você aprende um truque, à sua escolha, da lista de magias de clérigo, além do truque chamas sagradas. Espaços de magia, magias conhecidas e progressão seguem a tabela “Conjuração de Punho Sagrado” do livro. Habilidade de conjuração: Sabedoria. CD = 8 + bônus de proficiência + modificador de Sabedoria; ataque de magia = bônus de proficiência + modificador de Sabedoria.
          - name: "Domínios Sagrados"
            description: |
              No 3° nível, você deve escolher dois dentre os Domínios Divinos disponíveis para o clérigo. Você deve escolher as magias da tabela de magias desses domínios como suas magias conhecidas, conforme as regras do capítulo do Punho Sagrado no livro.
          - name: "Energia Divina Interior"
            description: |
              Também no 3° nível, você adquire a capacidade de usar sua energia mística interior em conjunto com sua energia divina. Com uma ação bônus, você pode gastar pontos de chi para conjurar uma magia num espaço de magia superior. Para cada 2 pontos de chi gastos, o nível da magia é elevado em 1, até o máximo de 4° nível. Uma vez que tenha usado essa característica, você não poderá fazê-lo novamente até ter terminado um descanso curto ou longo.
      - level: 6
        features:
          - name: "Punho de Chamas Divinas"
            description: |
              A partir do 6° nível, você pode gastar 1 ponto de chi para canalizar sua energia divina através dos seus punhos. Quando você usar a ação de Ataque para realizar um ataque desarmado e atingir, você pode conjurar o truque chamas sagradas como parte do ataque no inimigo que você atingiu. O alvo tem desvantagem no seu teste de resistência contra o efeito dessa magia quando ela é conjurada dessa forma.
      - level: 11
        features:
          - name: "Rajada de Chamas Divinas"
            description: |
              No 11° nível, você aprimora a técnica dos punhos de chamas divinas. Quando você gastar pontos de chi para usar a característica Rajada de Golpes, você pode gastar 2 pontos de chi adicionais para conjurar o truque chamas sagradas em ambos os ataques desarmados realizados com sua ação bônus. Cada ataque que atingir o inimigo libera o efeito da magia nele e ele tem desvantagem nos seus testes de resistência contra os efeitos de ambas as magias quando elas são conjuradas dessa forma.
      - level: 17
        features:
          - name: "Armadura Interior"
            description: |
              A partir do 17° nível, você adquire a habilidade de usar seu chi em conjunto com sua energia divina para criar uma proteção intangível em volta de você. Se você não estiver vestindo nenhum tipo de armadura ou usando um escudo, você pode, com uma ação, gastar 3 pontos de chi e um espaço de magia, à sua escolha. Durante 1 minuto, você adquire um bônus na sua CA igual ao nível do espaço de magia gasto. Além disso, você adquire resistência a dano de concussão, cortante e perfurante de ataques não-mágicos pela duração. Uma vez que tenha usado essa característica, você não poderá fazê-lo novamente até ter terminado um descanso longo.

  caminho_sadhaka:
    name: "Caminho do Sadhaka"
    flavor: "Tradição Monástica"
    description: |
      Alguns monges conseguem atingir a evolução espiritual através de meditação e foco constante. Os monges que seguem o Caminho do Sadhaka trilham um caminho de paz interior e meditação constante. Eles conseguem realizar façanhas impressionantes ao concluir mantras espirituais ou se concentrar totalmente em seu espírito. Ao alcançar a evolução espiritual plena, um sadhaka consegue atingir o nirvana, adquirindo uma noção completa do mundo à sua volta e de todos os mundos que existem no multiverso. Apesar desses monges serem devotos religiosos, eles não seguem um deus em particular, mas sim uma doutrina espiritual.
    choose_level: 3
    rules:
      ki_save_dc: "8 + bônus de proficiência + modificador de Sabedoria"
    levels:
      - level: 3
        features:
          - name: "Mantra de Poder"
            description: |
              No 3° nível, quando você escolhe essa tradição, você aprende a realizar mantras. Durante um descanso, você pode se concentrar e realizar mantras que permitem que você acesse novos níveis espirituais. Ao terminar um descanso curto ou longo, você pode realocar uma porção de sua energia interior para ganhar um dos benefícios do livro: por exemplo, rolar 1d4 e adicionar a qualquer teste de habilidade (reduz teto de chi em 3); +1d4 de dano com armas de monge e desarmados (teto –4); +1d4 a testes de resistência (teto –5); +1d4 a jogadas de ataque (teto –5); resistência a B/P/S não mágico (teto –6); resistência a dano de magias (teto –6). Você mantém o benefício contanto que não esteja usando armadura ou escudo, até realizar um novo descanso.
      - level: 6
        features:
          - name: "Akasha Interior"
            description: |
              Ao chegar no 6° nível, você consegue ampliar sua força interior através da energia da quintessência universal. Assim que você terminar um descanso longo, role 1d6. Você adiciona o valor rolado ao máximo de pontos de chi que seu poço de chi pode comportar, até terminar um descanso longo. Ao atingir certos níveis, você pode rolar um dado superior: 1d8 no 10° nível, 1d10 no 14° nível e 1d12 no 18° nível.
      - level: 11
        features:
          - name: "Concentração Inabalável"
            description: |
              No 11° nível, você consegue focar seu espírito e corpo de uma forma excepcional. Quando você rolar um Dado de Vida para recuperar pontos de vida durante um descanso curto, você recupera uma quantidade de pontos de vida adicionais igual à metade do seu nível de monge. A partir de agora, você pode ativar e manter dois efeitos diferentes do seu mantra de poder simultaneamente.
      - level: 17
        features:
          - name: "Alcançar o Nirvana"
            description: |
              No 17° nível, você alcança o estado de libertação total na sua busca espiritual. Você pode gastar 8 pontos de chi para conjurar a magia sexto sentido, ou 6 pontos de chi para conjurar a magia limpar a mente, sem precisar de componentes materiais. Você só pode conjurar essas magias em si mesmo e cada uma dura 1 hora.

paladin:
  juramento-de-devocao:
    name: "Juramento de Devoção"
    flavor: "Juramento Sagrado"
    description: "Honestidade, coragem, compaixão, honra e dever. Um farol de virtude contra o profano."
    choose_level: 3
    levels:
      - level: 3
        features:
          - { name: "Canalizar Divindade: Arma Sagrada", description: "Ação; por 1 min, adiciona mod. Car às jogadas de ataque com 1 arma (mín. +1), arma emite luz (6 m/penumbra +6 m) e conta como mágica; você pode encerrar como parte de qualquer ação." }
          - { name: "Canalizar Divindade: Expulsar o Profano", description: "Ação; cada corruptor (diabo/demônio) e morto-vivo a até 9 m faz TS Sab (CD = sua CD de magia). Falha: fica 'expulso' por 1 min ou até sofrer dano." }
        grants:
          spells:
            always_prepared:
              3:  ["proteção contra o bem e mal","santuário"]
              5:  ["restauração menor","zona da verdade"]
              9:  ["sinal de esperança","dissipar magia"]
              13: ["movimentação livre","guardião da fé"]
              17: ["comunhão","coluna de chamas"]
        rules:
          channel_divinity:
            uses: 1
            recharge: "descanso curto ou longo"
            save_dc: "8 + bônus de proficiência + mod. Carisma"
      - level: 7
        features:
          - name: "Aura de Devoção"
            description: "Você e aliados a até 3 m não podem ser enfeitiçados enquanto você estiver consciente."
            rules: { aura_radius_m: 3, improves_at_level_18_to_m: 9 }
      - level: 15
        features:
          - { name: "Pureza de Espírito", description: "Você está permanentemente sob os efeitos de 'proteção contra o bem e mal'." }
      - level: 20
        features:
          - name: "Halo Sagrado"
            description: "Ação; por 1 min, luz plena 9 m (penumbra +9 m). Inimigo que inicia turno/entra na luz sofre 10 de dano radiante; você tem vantagem em TS contra magias de corruptores ou mortos-vivos. 1/descanso longo."
  juramento-dos-ancioes:
    name: "Juramento dos Anciões"
    flavor: "Juramento Sagrado"
    description: "A luz antiga do mundo: vida, bondade e beleza. Mistura proteção feérica e vínculos naturais."
    choose_level: 3
    levels:
      - level: 3
        features:
