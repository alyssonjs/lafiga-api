          - "Ação bônus: convoca para a mão uma arma vinculada no mesmo plano."
      war_magic:
        base: "Ao conjurar um truque com a ação, pode fazer 1 ataque com arma como ação bônus."
        improved: "No 18º, ao conjurar qualquer magia com a ação, pode fazer 1 ataque com arma como ação bônus."
    levels:
      - level: 3
