    rest by spending one or more Hit Dice, each of those creatures regains an extra
    1d6 hit points. \n\nThe extra hit points increase when you reach certain levels
    in this class: to 1d8 at 9th level, to 1d10 at 13th level, and to 1d12 at 17th
    level."
  song-of-rest-d8: "Beginning at 2nd level, you can use soothing music or oration
    to help revitalize your wounded allies during a short rest. If you or any friendly
    creatures who can hear your performance regain hit points at the end of the short
    rest by spending one or more Hit Dice, each of those creatures regains an extra
    1d6 hit points. \n\nThe extra hit points increase when you reach certain levels
    in this class: to 1d8 at 9th level, to 1d10 at 13th level, and to 1d12 at 17th
    level."
  sorcerer-ability-score-improvement-1: When you reach 4th level, and again at 8th,
    12th, 16th, and 19th level, you can increase one ability score of your choice
    by 2, or you can increase two ability scores of your choice by 1. As normal, you
    can't increase an ability score above 20 using this feature.
  sorcerer-ability-score-improvement-2: When you reach 4th level, and again at 8th,
    12th, 16th, and 19th level, you can increase one ability score of your choice
    by 2, or you can increase two ability scores of your choice by 1. As normal, you
    can't increase an ability score above 20 using this feature.
