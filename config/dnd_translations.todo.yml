  beast-spells: Beginning at 18th level, you can cast many of your druid spells in
    any shape you assume using Wild Shape. You can perform the somatic and verbal
    components of a druid spell while in a beast shape, but you aren't able to provide
    material components.
  blindsense: Starting at 14th level, if you are able to hear, you are aware of the
    location of any hidden or invisible creature within 10 feet of you.
  brutal-critical-1-die: Beginning at 9th level, you can roll one additional weapon
    damage die when determining the extra damage for a critical hit with a melee attack.
    This increases to two additional dice at 13th level and three additional dice
    at 17th level.
  brutal-critical-2-dice: Beginning at 9th level, you can roll one additional weapon
    damage die when determining the extra damage for a critical hit with a melee attack.
    This increases to two additional dice at 13th level and three additional dice
    at 17th level.
  brutal-critical-3-dice: Beginning at 9th level, you can roll one additional weapon
    damage die when determining the extra damage for a critical hit with a melee attack.
    This increases to two additional dice at 13th level and three additional dice
    at 17th level.
  channel-divinity: |-
    Your oath allows you to channel divine energy to fuel magical effects. Each Channel Divinity option provided by your oath explains how to use it.

    When you use your Channel Divinity, you choose which option to use. You must then finish a short or long rest to use your Channel Divinity again.

    Some Channel Divinity effects require saving throws. When you use such an effect from this class, the DC equals your paladin spell save DC.
  channel-divinity-1-rest: |-
    At 2nd level, you gain the ability to channel divine energy directly from your deity, using that energy to fuel magical effects. You start with two such effects: Turn Undead and an effect determined by your domain. Some domains grant you additional effects as you advance in levels, as noted in the domain description.

    When you use your Channel Divinity, you choose which effect to create. You must then finish a short or long rest to use your Channel Divinity again.

    Some Channel Divinity effects require saving throws. When you use such an effect from this class, the DC equals your cleric spell save DC.

    Beginning at 6th level, you can use your Channel Divinity twice between rests, and beginning at 18th level, you can use it three times between rests. When you finish a short or long rest, you regain your expended uses.
  channel-divinity-2-rest: Beginning at 6th level, you can use your Channel Divinity
    twice between rests, and beginning at 18th level, you can use it three times between
    rests. When you finish a short or long rest, you regain your expended uses.
  channel-divinity-3-rest: Beginning at 6th level, you can use your Channel Divinity
    twice between rests, and beginning at 18th level, you can use it three times between
    rests. When you finish a short or long rest, you regain your expended uses.
  channel-divinity-turn-undead: |-
    As an action, you present your holy symbol and speak a prayer censuring the undead. Each undead that can see or hear you within 30 feet of you must make a Wisdom saving throw. If the creature fails its saving throw, it is turned for 1 minute or until it takes any damage.

    A turned creature must spend its turns trying to move as far away from you as it can, and it can't willingly move to a space within 30 feet of you. It also can't take reactions. For its action, it can use only the Dash action or try to escape from an effect that prevents it from moving. If there's nowhere to move, the creature can use the Dodge action.
  cleansing-touch: |-
    Beginning at 14th level, you can use your action to end one spell on yourself or on one willing creature that you touch.

    You can use this feature a number of times equal to your Charisma modifier (a minimum of once). You regain expended uses when you finish a long rest.
  cleric-ability-score-improvement-1: When you reach 4th level, and again at 8th,
    12th, 16th, and 19th level, you can increase one ability score of your choice
    by 2, or you can increase two ability scores of your choice by 1. As normal, you
    can't increase an ability score above 20 using this feature.
  cleric-ability-score-improvement-2: When you reach 4th level, and again at 8th,
    12th, 16th, and 19th level, you can increase one ability score of your choice
    by 2, or you can increase two ability scores of your choice by 1. As normal, you
    can't increase an ability score above 20 using this feature.
  cleric-ability-score-improvement-3: When you reach 4th level, and again at 8th,
    12th, 16th, and 19th level, you can increase one ability score of your choice
    by 2, or you can increase two ability scores of your choice by 1. As normal, you
    can't increase an ability score above 20 using this feature.
  cleric-ability-score-improvement-4: When you reach 4th level, and again at 8th,
    12th, 16th, and 19th level, you can increase one ability score of your choice
    by 2, or you can increase two ability scores of your choice by 1. As normal, you
    can't increase an ability score above 20 using this feature.
  cleric-ability-score-improvement-5: When you reach 4th level, and again at 8th,
    12th, 16th, and 19th level, you can increase one ability score of your choice
    by 2, or you can increase two ability scores of your choice by 1. As normal, you
    can't increase an ability score above 20 using this feature.
  countercharm: At 6th level, you gain the ability to use musical notes or words of
    power to disrupt mind-influencing effects. As an action, you can start a performance
    that lasts until the end of your next turn. During that time, you and any friendly
    creatures within 30 feet of you have advantage on saving throws against being
    frightened or charmed. A creature must be able to hear you to gain this benefit.
    The performance ends early if you are incapacitated or silenced or if you voluntarily
    end it (no action required).
  cunning-action: Starting at 2nd level, your quick thinking and agility allow you
    to move and act quickly. You can take a bonus action on each of your turns in
    combat. This action can be used only to take the Dash, Disengage, or Hide action.
  danger-sense: At 2nd level, you gain an uncanny sense of when things nearby aren't
    as they should be, giving you an edge when you dodge away from danger. You have
    advantage on Dexterity saving throws against effects that you can see, such as
    traps and spells. To gain this benefit, you can't be blinded, deafened, or incapacitated.
  deflect-missiles: |-
    Starting at 3rd level, you can use your reaction to deflect or catch the missile when you are hit by a ranged weapon attack. When you do so, the damage you take from the attack is reduced by 1d10 + your Dexterity modifier + your monk level.

    If you reduce the damage to 0, you can catch the missile if it is small enough for you to hold in one hand and you have at least one hand free. If you catch a missile in this way, you can spend 1 ki point to make a ranged attack with the weapon or piece of ammunition you just caught, as part of the same reaction. You make this attack with proficiency, regardless of your weapon proficiencies, and the missile counts as a monk weapon for the attack, which has a normal range of 20 feet and a long range of 60 feet.
  destroy-undead-cr-1-2-or-below: Starting at 5th level, when an undead fails its
    saving throw against your Turn Undead feature, the creature is instantly destroyed
    if its challenge rating is at or below a certain threshold.
  destroy-undead-cr-1-or-below: Starting at 5th level, when an undead fails its saving
    throw against your Turn Undead feature, the creature is instantly destroyed if
    its challenge rating is at or below a certain threshold.
  destroy-undead-cr-2-or-below: Starting at 5th level, when an undead fails its saving
    throw against your Turn Undead feature, the creature is instantly destroyed if
    its challenge rating is at or below a certain threshold.
  destroy-undead-cr-3-or-below: Starting at 5th level, when an undead fails its saving
    throw against your Turn Undead feature, the creature is instantly destroyed if
    its challenge rating is at or below a certain threshold.
  destroy-undead-cr-4-or-below: Starting at 5th level, when an undead fails its saving
    throw against your Turn Undead feature, the creature is instantly destroyed if
    its challenge rating is at or below a certain threshold.
  diamond-soul: |-
    Beginning at 14th level, your mastery of ki grants you proficiency in all saving throws.

    Additionally, whenever you make a saving throw and fail, you can spend 1 ki point to reroll it and take the second result.
  divine-domain: |-
    Choose one domain related to your deity, such as Knowledge, Life, Light, Nature, Tempest, Trickery, or War. Only the Life domain is detailed in the Open Game Licensed SRD. Additional Domains are described in the official rulebooks or products from other publishers.

    Your domain grants you domain spells and other features when you choose it at 1st level. It also grants you additional ways to use Channel Divinity when you gain that feature at 2nd level, and additional benefits at 6th, 8th, and 17th levels.
  divine-domain-improvement-1: |-
    Choose one domain related to your deity, such as Knowledge, Life, Light, Nature, Tempest, Trickery, or War. Only the Life domain is detailed in the Open Game Licensed SRD. Additional Domains are described in the official rulebooks or products from other publishers.

    Your domain grants you domain spells and other features when you choose it at 1st level. It also grants you additional ways to use Channel Divinity when you gain that feature at 2nd level, and additional benefits at 6th, 8th, and 17th levels.
