  ranger-lands-stride: |-
    Starting at 8th level, moving through nonmagical difficult terrain costs you no extra movement. You can also pass through nonmagical plants without being slowed by them and without taking damage from them if they have thorns, spines, or a similar hazard.

    In addition, you have advantage on saving throws against plants that are magically created or manipulated to impede movement, such those created by the entangle spell.
  reckless-attack: Starting at 2nd level, you can throw aside all concern for defense
    to attack with fierce desperation. When you make your first attack on your turn,
    you can decide to attack recklessly. Doing so gives you advantage on melee weapon
    attack rolls using Strength during this turn, but attack rolls against you have
    advantage until your next turn.
  relentless-rage: |-
    Starting at 11th level, your rage can keep you fighting despite grievous wounds. If you drop to 0 hit points while you're raging and don't die outright, you can make a DC 10 Constitution saving throw. If you succeed, you drop to 1 hit point instead.

    Each time you use this feature after the first, the DC increases by 5. When you finish a short or long rest, the DC resets to 10.
  reliable-talent: By 11th level, you have refined your chosen skills until they approach
    perfection. Whenever you make an ability check that lets you add your proficiency
    bonus, you can treat a d20 roll of 9 or lower as a 10.
