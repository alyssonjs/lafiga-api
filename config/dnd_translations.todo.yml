  druid-ability-score-improvement-1: When you reach 4th level, and again at 8th, 12th,
    16th, and 19th level, you can increase one ability score of your choice by 2,
    or you can increase two ability scores of your choice by 1. As normal, you can't
    increase an ability score above 20 using this feature.
  druid-ability-score-improvement-2: When you reach 4th level, and again at 8th, 12th,
    16th, and 19th level, you can increase one ability score of your choice by 2,
    or you can increase two ability scores of your choice by 1. As normal, you can't
    increase an ability score above 20 using this feature.
  druid-ability-score-improvement-3: When you reach 4th level, and again at 8th, 12th,
    16th, and 19th level, you can increase one ability score of your choice by 2,
    or you can increase two ability scores of your choice by 1. As normal, you can't
    increase an ability score above 20 using this feature.
