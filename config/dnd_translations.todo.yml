  second-wind: You have a limited well of stamina that you can draw on to protect
    yourself from harm. On your turn, you can use a bonus action to regain hit points
    equal to 1d10 + your fighter level. Once you use this feature, you must finish
    a short or long rest before you can use it again.
  signature-spell: |-
    When you reach 20th level, you gain mastery over two powerful spells and can cast them with little effort. Choose two 3rd-level wizard spells in your spellbook as your signature spells. You always have these spells prepared, they don't count against the number of spells you have prepared, and you can cast each of them once at 3rd level without expending a spell slot. When you do so, you can't do so again until you finish a short or long rest.

    If you want to cast either spell at a higher level, you must expend a spell slot as normal.
  slippery-mind: By 15th level, you have acquired greater mental strength. You gain
    proficiency in Wisdom saving throws.
  slow-fall: Beginning at 4th level, you can use your reaction when you fall to reduce
    any falling damage you take by an amount equal to five times your monk level.
  sneak-attack: |-
    Beginning at 1st level, you know how to strike subtly and exploit a foe's distraction. Once per turn, you can deal an extra 1d6 damage to one creature you hit with an attack if you have advantage on the attack roll. The attack must use a finesse or a ranged weapon.

    You don't need advantage on the attack roll if another enemy of the target is within 5 feet of it, that enemy isn't incapacitated, and you don't have disadvantage on the attack roll.

    The amount of the extra damage increases as you gain levels in this class, as shown in the Sneak Attack column of the Rogue table.
  song-of-rest-d10: "Beginning at 2nd level, you can use soothing music or oration
    to help revitalize your wounded allies during a short rest. If you or any friendly
    creatures who can hear your performance regain hit points at the end of the short
    rest by spending one or more Hit Dice, each of those creatures regains an extra
    1d6 hit points. \n\nThe extra hit points increase when you reach certain levels
    in this class: to 1d8 at 9th level, to 1d10 at 13th level, and to 1d12 at 17th
    level."
