trait_descs:
  artificers-lore: Whenever you make an Intelligence (History) check related to magic
    items, alchemical objects, or technological devices, you can add twice your proficiency
    bonus, instead of any proficiency bonus you normally apply.
  brave: You have advantage on saving throw against being frightened.
  breath-weapon: |-
    You can use your action to exhale destructive energy. Your draconic ancestry determines the size, shape, and damage type of the exhalation.

    When you use your breath weapon, each creature in the area of the exhalation must make a saving throw, the type of which is determined by your draconic ancestry. The DC for this saving throw equals 8 + your Constitution modifier + your proficiency bonus. A creature takes 2d6 damage on a failed save, and half as much damage on a successful one. The damage increases to 3d6 at 6th level, 4d6 at 11th level, and 5d6 at 16th level.

    After you use your breath weapon, you cannot use it again until you complete a short or long rest.
  damage-resistance: You have resistance to the damage type associated with your draconic
    ancestry.
  darkvision: You have superior vision in dark and dim conditions. You can see in
    dim light within 60 feet of you as if it were bright light, and in darkness as
    if it were dim light. You cannot discern color in darkness, only shades of gray.
  draconic-ancestry: You have draconic ancestry. Choose one type of dragon from the
    Draconic Ancestry table. Your breath weapon and damage resistance are determined
    by the dragon type, as shown in the table.
  draconic-ancestry-black: You have draconic ancestry. Choose one type of dragon from
    the Draconic Ancestry table. Your breath weapon and damage resistance are determined
    by the dragon type, as shown in the table.
  draconic-ancestry-blue: You have draconic ancestry. Choose one type of dragon from
    the Draconic Ancestry table. Your breath weapon and damage resistance are determined
    by the dragon type, as shown in the table.
