  fighter-fighting-style: You adopt a particular style of fighting as your specialty.
    Choose one of the following options. You can't take a Fighting Style option more
    than once, even if you later get to choose again.
  flexible-casting-converting-spell-slot: As a bonus action on your turn, you can
    expend one spell slot and gain a number of sorcery points equal to the slot's
    level..
  flexible-casting-creating-spell-slots: "You can transform unexpended sorcery points
    into one spell slot as a bonus action on your turn. The Creating Spell Slots table
    shows the cost of creating a spell slot of a given level. You can create spell
    slots no higher in level than 5th. \n\nAny spell slot you create with this feature
    vanishes when you finish a long rest."
  flurry-of-blows: Immediately after you take the Attack action on your turn, you
    can spend 1 ki point to make two unarmed strikes as a bonus action.
  foe-slayer: At 20th level, you become an unparalleled hunter of your enemies. Once
    on each of your turns, you can add your Wisdom modifier to the attack roll or
    the damage roll of an attack you make against one of your favored enemies. You
    can choose to use this feature before or after the roll, but before any effects
    of the roll are applied.
  font-of-inspiration: Beginning when you reach 5th level, you regain all of your
    expended uses of Bardic Inspiration when you finish a short or long rest.
  font-of-magic: |-
    At 2nd level, you tap into a deep wellspring of magic within yourself. This wellspring is represented by sorcery points, which allow you to create a variety of magical effects.

    Sorcery Points

    You have 2 sorcery points, and you gain more as you reach higher levels, as shown in the Sorcery Points column of the Sorcerer table. You can never have more sorcery points than shown on the table for your level. You regain all spent sorcery points when you finish a long rest.
  hide-in-plain-sight: |-
    Starting at 10th level, you can spend 1 minute creating camouflage for yourself. You must have access to fresh mud, dirt, plants, soot, and other naturally occurring materials with which to create your camouflage.

    Once you are camouflaged in this way, you can try to hide by pressing yourself up against a solid surface, such as a tree or wall, that is at least as tall and wide as you are. You gain a +10 bonus to Dexterity (Stealth) checks as long as you remain there without moving or taking actions. Once you move or take an action or a reaction, you must camouflage yourself again to gain this benefit.
  improved-divine-smite: By 11th level, you are so suffused with righteous might that
    all your melee weapon strikes carry divine power with them. Whenever you hit a
    creature with a melee weapon, the creature takes an extra 1d8 radiant damage.
    If you also use your Divine Smite with an attack, you add this damage to the extra
    damage of your Divine Smite.
  indomitable-1-use: Beginning at 9th level, you can reroll a saving throw that you
    fail. If you do so, you must use the new roll, and you can't use this feature
    again until you finish a long rest. You can use this feature twice between long
    rests starting at 13th level and three times between long rests starting at 17th
    level.
  indomitable-2-uses: Beginning at 9th level, you can reroll a saving throw that you
    fail. If you do so, you must use the new roll, and you can't use this feature
    again until you finish a long rest. You can use this feature twice between long
    rests starting at 13th level and three times between long rests starting at 17th
    level.
  indomitable-3-uses: Beginning at 9th level, you can reroll a saving throw that you
    fail. If you do so, you must use the new roll, and you can't use this feature
    again until you finish a long rest. You can use this feature twice between long
    rests starting at 13th level and three times between long rests starting at 17th
    level.
  indomitable-might: Beginning at 18th level, if your total for a Strength check is
    less than your Strength score, you can use that score in place of the total.
  jack-of-all-trades: Starting at 2nd level, you can add half your proficiency bonus,
    rounded down, to any ability check you make that doesn't already include your
    proficiency bonus.
  ki: |-
    Starting at 2nd level, your training allows you to harness the mystic energy of ki. Your access to this energy is represented by a number of ki points. Your monk level determines the number of points you have, as shown in the Ki Points column of Table: The Monk.

    You can spend these points to fuel various ki features. You start knowing three such features: Flurry of Blows, Patient Defense, and Step of the Wind. You learn more ki features as you gain levels in this class.

    When you spend a ki point, it is unavailable until you finish a short or long rest, at the end of which you draw all of your expended ki back into yourself. You must spend at least 30 minutes of the rest meditating to regain your ki points.

    Some of your ki features require your target to make a saving throw to resist the feature's effects. The saving throw DC is calculated as follows:

    Ki save DC = 8 + your proficiency bonus + your Wisdom modifier
  ki-empowered-strikes: Starting at 6th level, your unarmed strikes count as magical
    for the purpose of overcoming resistance and immunity to nonmagical attacks and
    damage.
  lay-on-hands: |-
    Your blessed touch can heal wounds. You have a pool of healing power that replenishes when you take a long rest. With that pool, you can restore a total number of hit points equal to your paladin level x 5.

    As an action, you can touch a creature and draw power from the pool to restore a number of hit points to that creature, up to the maximum amount remaining in your pool.

    Alternatively, you can expend 5 hit points from your pool of healing to cure the target of one disease or neutralize one poison affecting it. You can cure multiple diseases and neutralize multiple poisons with a single use of Lay on Hands, expending hit points separately for each one.

    This feature has no effect on undead and constructs.
  magical-secrets-1: "By 10th level, you have plundered magical knowledge from a wide
    spectrum of disciplines. Choose two spells from any class, including this one.
    A spell you choose must be of a level you can cast, as shown on the Bard table,
    or a cantrip. \n\nThe chosen spells count as bard spells for you and are included
    in the number in the Spells Known column of the Bard table. \n\nYou learn two
    additional spells from any class at 14th level and again at 18th level."
  magical-secrets-2: "By 10th level, you have plundered magical knowledge from a wide
    spectrum of disciplines. Choose two spells from any class, including this one.
    A spell you choose must be of a level you can cast, as shown on the Bard table,
    or a cantrip. \n\nThe chosen spells count as bard spells for you and are included
    in the number in the Spells Known column of the Bard table. \n\nYou learn two
    additional spells from any class at 14th level and again at 18th level."
  magical-secrets-3: "By 10th level, you have plundered magical knowledge from a wide
    spectrum of disciplines. Choose two spells from any class, including this one.
    A spell you choose must be of a level you can cast, as shown on the Bard table,
    or a cantrip. \n\nThe chosen spells count as bard spells for you and are included
    in the number in the Spells Known column of the Bard table. \n\nYou learn two
    additional spells from any class at 14th level and again at 18th level."
  martial-archetype: At 3rd level, you choose an archetype that you strive to emulate
    in your combat styles and techniques, such as Champion. The archetype you choose
    grants you features at 3rd level and again at 7th, 10th, 15th, and 18th level.
  martial-archetype-improvement-1: At 3rd level, you choose an archetype that you
    strive to emulate in your combat styles and techniques, such as Champion. The
    archetype you choose grants you features at 3rd level and again at 7th, 10th,
    15th, and 18th level.
  martial-archetype-improvement-2: At 3rd level, you choose an archetype that you
    strive to emulate in your combat styles and techniques, such as Champion. The
    archetype you choose grants you features at 3rd level and again at 7th, 10th,
    15th, and 18th level.
  martial-archetype-improvement-3: At 3rd level, you choose an archetype that you
    strive to emulate in your combat styles and techniques, such as Champion. The
    archetype you choose grants you features at 3rd level and again at 7th, 10th,
    15th, and 18th level.
  martial-archetype-improvement-4: At 3rd level, you choose an archetype that you
    strive to emulate in your combat styles and techniques, such as Champion. The
    archetype you choose grants you features at 3rd level and again at 7th, 10th,
    15th, and 18th level.
  martial-arts: |-
    At 1st level, your practice of martial arts gives you mastery of combat styles that use unarmed strikes and monk weapons, which are shortswords and any simple melee weapons that don't have the two- handed or heavy property.

    You gain the following benefits while you are unarmed or wielding only monk weapons and you aren't wearing armor or wielding a shield:

    - You can use Dexterity instead of Strength for the attack and damage rolls of your unarmed strikes and monk weapons.

    - You can roll a d4 in place of the normal damage of your unarmed strike or monk weapon. This die changes as you gain monk levels, as shown in the Martial Arts column of Table: The Monk.

    - When you use the Attack action with an unarmed strike or a monk weapon on your turn, you can make one unarmed strike as a bonus action. For example, if you take the Attack action and attack with a quarterstaff, you can also make an unarmed strike as a bonus action, assuming you haven't already taken a bonus action this turn.

    Certain monasteries use specialized forms of the monk weapons. For example, you might use a club that is two lengths of wood connected by a short chain (called a nunchaku) or a sickle with a shorter, straighter blade (called a kama). Whatever name you use for a monk weapon, you can use the game statistics provided for the weapon.
  metamagic-1: |-
    At 3rd level, you gain the ability to twist your spells to suit your needs. You gain two of the following Metamagic options of your choice. You gain another one at 10th and 17th level.

    You can use only one Metamagic option on a spell when you cast it, unless otherwise noted.
  metamagic-2: |-
    At 3rd level, you gain the ability to twist your spells to suit your needs. You gain two of the following Metamagic options of your choice. You gain another one at 10th and 17th level.

    You can use only one Metamagic option on a spell when you cast it, unless otherwise noted.
  metamagic-3: |-
