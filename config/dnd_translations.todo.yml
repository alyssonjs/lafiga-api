  bard-college: At 3rd level, you delve into the advanced techniques of a bard college
    of your choice, such as the College of Lore. Your choice grants you features at
    3rd level and again at 6th and 14th level.
  bard-college-improvement-1: At 3rd level, you delve into the advanced techniques
    of a bard college of your choice, such as the College of Lore. Your choice grants
    you features at 3rd level and again at 6th and 14th level.
  bard-college-improvement-2: At 3rd level, you delve into the advanced techniques
    of a bard college of your choice, such as the College of Lore. Your choice grants
    you features at 3rd level and again at 6th and 14th level.
  bard-expertise-1: At 3rd level, choose two of your skill proficiencies. Your proficiency
    bonus is doubled for any ability check you make that uses either of the chosen
    proficiencies. At 10th level, you can choose another two skill proficiencies to
    gain this benefit.
  bard-expertise-2: At 3rd level, choose two of your skill proficiencies. Your proficiency
    bonus is doubled for any ability check you make that uses either of the chosen
    proficiencies. At 10th level, you can choose another two skill proficiencies to
    gain this benefit.
  bardic-inspiration-d10: "You can inspire others through stirring words or music.
    To do so, you use a bonus action on your turn to choose one creature other than
    yourself within 60 feet of you who can hear you. That creature gains one Bardic
    Inspiration die, a d6. Once within the next 10 minutes, the creature can roll
    the die and add the number rolled to one ability check, attack roll, or saving
    throw it makes. The creature can wait until after it rolls the d20 before deciding
    to use the Bardic Inspiration die, but must decide before the GM says whether
    the roll succeeds or fails. Once the Bardic Inspiration die is rolled, it is lost.
    A creature can have only one Bardic Inspiration die at a time.\n\nYou can use
    this feature a number of times equal to your Charisma modifier (a minimum of once).
    You regain any expended uses when you finish a long rest. \n\nYour Bardic Inspiration
    die changes when you reach certain levels in this class. The die becomes a d8
    at 5th level, a d10 at 10th level, and a d12 at 15th level."
