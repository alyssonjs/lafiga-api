  druid-circle: At 2nd level, you choose to identify with a circle of druids, such
    as the Circle of the Land. Your choice grants you features at 2nd level and again
    at 6th, 10th, and 14th level.
  druid-circle-improvement-1: At 2nd level, you choose to identify with a circle of
    druids, such as the Circle of the Land. Your choice grants you features at 2nd
    level and again at 6th, 10th, and 14th level.
  druid-circle-improvement-2: At 2nd level, you choose to identify with a circle of
    druids, such as the Circle of the Land. Your choice grants you features at 2nd
    level and again at 6th, 10th, and 14th level.
  druid-circle-improvement-3: At 2nd level, you choose to identify with a circle of
    druids, such as the Circle of the Land. Your choice grants you features at 2nd
    level and again at 6th, 10th, and 14th level.
  druid-timeless-body: Starting at 18th level, the primal magic that you wield causes
    you to age more slowly. For every 10 years that pass, your body ages only 1 year.
  druidic: You know Druidic, the secret language of druids. You can speak the language
    and use it to leave hidden messages. You and others who know this language automatically
    spot such a message. Others spot the message's presence with a successful DC 15
    Wisdom (Perception) check but can't decipher it without magic.
  eldritch-invocations: |-
    In your study of occult lore, you have unearthed eldritch invocations, fragments of forbidden knowledge that imbue you with an abiding magical ability.

    At 2nd level, you gain two eldritch invocations of your choice. Your invocation options are detailed at the end of the class description. When you gain certain warlock levels, you gain additional invocations of your choice, as shown in the Invocations Known column of the Warlock table.

    Additionally, when you gain a level in this class, you can choose one of the invocations you know and replace it with another invocation that you could learn at that level.
  eldritch-master: |-
    At 20th level, you can draw on your inner reserve of mystical power while entreating your patron to regain expended spell slots. You can spend 1 minute entreating your patron for aid to regain all your expended spell slots from your Pact Magic feature.

    Once you regain spell slots with this feature, you must finish a long rest before you can do so again.
  elusive: Beginning at 18th level, you are so evasive that attackers rarely gain
    the upper hand against you. No attack roll has advantage against you while you
    aren't incapacitated.
  empty-body: |-
    Beginning at 18th level, you can use your action to spend 4 ki points to become invisible for 1 minute. During that time, you also have resistance to all damage but force damage.

    Additionally, you can spend 8 ki points to cast the astral projection spell, without needing material components. When you do so, you can't take any other creatures with you.
  extra-attack-1: Beginning at 5th level, you can attack twice, instead of once, whenever
    you take the Attack action on your turn. The number of attacks increases to three
    when you reach 11th level in this class and to four when you reach 20th level
    in this class.
  extra-attack-2: Beginning at 5th level, you can attack twice, instead of once, whenever
    you take the Attack action on your turn. The number of attacks increases to three
    when you reach 11th level in this class and to four when you reach 20th level
    in this class.
  extra-attack-3: Beginning at 5th level, you can attack twice, instead of once, whenever
    you take the Attack action on your turn. The number of attacks increases to three
    when you reach 11th level in this class and to four when you reach 20th level
    in this class.
  fast-movement: Starting at 5th level, your speed increases by 10 feet while you
    aren't wearing heavy armor.
  favored-enemy-1-type: |-
    Beginning at 1st level, you have significant experience studying, tracking, hunting, and even talking to a certain type of enemy.

    Choose a type of favored enemy: aberrations, beasts, celestials, constructs, dragons, elementals, fey, fiends, giants, monstrosities, oozes, plants, or undead. Alternatively, you can select two races of humanoid (such as gnolls and orcs) as favored enemies.

    You have advantage on Wisdom (Survival) checks to track your favored enemies, as well as on Intelligence checks to recall information about them.

    When you gain this feature, you also learn one language of your choice that is spoken by your favored enemies, if they speak one at all.

    You choose one additional favored enemy, as well as an associated language, at 6th and 14th level. As you gain levels, your choices should reflect the types of monsters you have encountered on your adventures.
  favored-enemy-2-types: |-
    Beginning at 1st level, you have significant experience studying, tracking, hunting, and even talking to a certain type of enemy.

    Choose a type of favored enemy: aberrations, beasts, celestials, constructs, dragons, elementals, fey, fiends, giants, monstrosities, oozes, plants, or undead. Alternatively, you can select two races of humanoid (such as gnolls and orcs) as favored enemies.

    You have advantage on Wisdom (Survival) checks to track your favored enemies, as well as on Intelligence checks to recall information about them.

    When you gain this feature, you also learn one language of your choice that is spoken by your favored enemies, if they speak one at all.

    You choose one additional favored enemy, as well as an associated language, at 6th and 14th level. As you gain levels, your choices should reflect the types of monsters you have encountered on your adventures.
  favored-enemy-3-enemies: |-
    Beginning at 1st level, you have significant experience studying, tracking, hunting, and even talking to a certain type of enemy.

    Choose a type of favored enemy: aberrations, beasts, celestials, constructs, dragons, elementals, fey, fiends, giants, monstrosities, oozes, plants, or undead. Alternatively, you can select two races of humanoid (such as gnolls and orcs) as favored enemies.

    You have advantage on Wisdom (Survival) checks to track your favored enemies, as well as on Intelligence checks to recall information about them.

    When you gain this feature, you also learn one language of your choice that is spoken by your favored enemies, if they speak one at all.

    You choose one additional favored enemy, as well as an associated language, at 6th and 14th level. As you gain levels, your choices should reflect the types of monsters you have encountered on your adventures.
  feral-instinct: |-
    By 7th level, your instincts are so honed that you have advantage on initiative rolls.

    Additionally, if you are surprised at the beginning of combat and aren't incapacitated, you can act normally on your first turn, but only if you enter your rage before doing anything else on that turn.
  feral-senses: |-
    At 18th level, you gain preternatural senses that help you fight creatures you can't see. When you attack a creature you can't see, your inability to see it doesn't impose disadvantage on your attack rolls against it.

    You are also aware of the location of any invisible creature within 30 feet of you, provided that the creature isn't hidden from you and you aren't blinded or deafened.
  fighter-ability-score-improvement-1: When you reach 4th level, and again at 6th,
    8th, 12th, 14th, 16th, and 19th level, you can increase one ability score of your
    choice by 2, or you can increase two ability scores of your choice by 1. As normal,
    you can't increase an ability score above 20 using this feature.
