feature_descs:
  action-surge-1-use: |-
    Starting at 2nd level, you can push yourself beyond your normal limits for a moment. On your turn, you can take one additional action on top of your regular action and a possible bonus action.

    Once you use this feature, you must finish a short or long rest before you can use it again. Starting at 17th level, you can use it twice before a rest, but only once on the same turn.
  action-surge-2-uses: |-
    Starting at 2nd level, you can push yourself beyond your normal limits for a moment. On your turn, you can take one additional action on top of your regular action and a possible bonus action.

    Once you use this feature, you must finish a short or long rest before you can use it again. Starting at 17th level, you can use it twice before a rest, but only once on the same turn.
  arcane-recovery: |-
    You have learned to regain some of your magical energy by studying your spellbook. Once per day when you finish a short rest, you can choose expended spell slots to recover. The spell slots can have a combined level that is equal to or less than half your wizard level (rounded up), and none of the slots can be 6th level or higher.

    For example, if you're a 4th-level wizard, you can recover up to two levels worth of spell slots. You can recover either a 2nd-level spell slot or two 1st-level spell slots.
  arcane-tradition: |-
    When you reach 2nd level, you choose an arcane tradition, shaping your practice of magic through one of eight schools, such as Evocation.

    Your choice grants you features at 2nd level and again at 6th, 10th, and 14th level.
  arcane-tradition-improvement-1: |-
    When you reach 2nd level, you choose an arcane tradition, shaping your practice of magic through one of eight schools, such as Evocation.

    Your choice grants you features at 2nd level and again at 6th, 10th, and 14th level.
  arcane-tradition-improvement-2: |-
    When you reach 2nd level, you choose an arcane tradition, shaping your practice of magic through one of eight schools, such as Evocation.

    Your choice grants you features at 2nd level and again at 6th, 10th, and 14th level.
  arcane-tradition-improvement-3: |-
    When you reach 2nd level, you choose an arcane tradition, shaping your practice of magic through one of eight schools, such as Evocation.

    Your choice grants you features at 2nd level and again at 6th, 10th, and 14th level.
  archdruid: |-
    At 20th level, you can use your Wild Shape an unlimited number of times.

    Additionally, you can ignore the verbal and somatic components of your druid spells, as well as any material components that lack a cost and aren't consumed by a spell. You gain this benefit in both your normal shape and your beast shape from Wild Shape.
  aura-improvements: At 18th level, the range of your auras increase to 30 feet.
  aura-of-courage: |-
    Starting at 10th level, you and friendly creatures within 10 feet of you can't be frightened while you are conscious.

    At 18th level, the range of this aura increases to 30 feet.
  aura-of-protection: |-
    Starting at 6th level, whenever you or a friendly creature within 10 feet of you must make a saving throw, the creature gains a bonus to the saving throw equal to your Charisma modifier (with a minimum bonus of +1). You must be conscious to grant this bonus.

    At 18th level, the range of this aura increases to 30 feet.
  barbarian-ability-score-improvement-1: When you reach 4th level, and again at 8th,
    12th, 16th, and 19th level, you can increase one ability score of your choice
    by 2, or you can increase two ability scores of your choice by 1. As normal, you
    can't increase an ability score above 20 using this feature.
  barbarian-ability-score-improvement-2: When you reach 4th level, and again at 8th,
    12th, 16th, and 19th level, you can increase one ability score of your choice
    by 2, or you can increase two ability scores of your choice by 1. As normal, you
    can't increase an ability score above 20 using this feature.
  barbarian-ability-score-improvement-3: When you reach 4th level, and again at 8th,
    12th, 16th, and 19th level, you can increase one ability score of your choice
    by 2, or you can increase two ability scores of your choice by 1. As normal, you
    can't increase an ability score above 20 using this feature.
  barbarian-ability-score-improvement-4: When you reach 4th level, and again at 8th,
    12th, 16th, and 19th level, you can increase one ability score of your choice
    by 2, or you can increase two ability scores of your choice by 1. As normal, you
    can't increase an ability score above 20 using this feature.
  barbarian-ability-score-improvement-5: When you reach 4th level, and again at 8th,
    12th, 16th, and 19th level, you can increase one ability score of your choice
    by 2, or you can increase two ability scores of your choice by 1. As normal, you
    can't increase an ability score above 20 using this feature.
  barbarian-extra-attack: Beginning at 5th level, you can attack twice, instead of
    once, whenever you take the Attack action on your turn.
  barbarian-unarmored-defense: While you are not wearing any armor, your Armor Class
    equals 10 + your Dexterity modifier + your Constitution modifier. You can use
    a shield and still gain this benefit.
  bard-ability-score-improvement-1: When you reach 4th level, and again at 8th, 12th,
    16th, and 19th level, you can increase one ability score of your choice by 2,
    or you can increase two ability scores of your choice by 1. As normal, you can't
    increase an ability score above 20 using this feature.
  bard-ability-score-improvement-2: When you reach 4th level, and again at 8th, 12th,
    16th, and 19th level, you can increase one ability score of your choice by 2,
    or you can increase two ability scores of your choice by 1. As normal, you can't
