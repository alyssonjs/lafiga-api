    by the dragon type, as shown in the table.
  dwarven-combat-training: You have proficiency with the battleaxe, handaxe, light
    hammer, and warhammer.
  dwarven-resilience: You have advantage on saving throws against poison, and you
    have resistance against poison damage.
  dwarven-toughness: Your hit point maximum increases by 1, and it increases by 1
    every time you gain a level.
  elf-weapon-training: You have proficiency with the longsword, shortsword, shortbow,
    and longbow.
  extra-language: You can speak, read, and write one extra language of your choice.
  fey-ancestry: You have advantage on saving throws against being charmed, and magic
    cannot put you to sleep.
  gnome-cunning: You have advantage on all Intelligence, Wisdom, and Charisma saving
    throws against magic.
  halfling-nimbleness: You can move through the space of any creature that is of a
    size larger than yours.
  hellish-resistance: You have resistance to fire damage.
  high-elf-cantrip: You know one cantrip of your choice form the wizard spell list.
    Intelligence is your spellcasting ability for it.
  infernal-legacy: You know the thaumaturgy cantrip. When you reach 3rd level, you
    can cast the hellish rebuke spell as a 2nd-level spell once with this trait and
    regain the ability to do so when you finish a long rest. When you reach 5th level,
    you can cast the darkness spell once with this trait and regain the ability to
    do so when you finish a long rest. Charisma is your spellcasting ability for these
    spells.
  keen-senses: You have proficiency in the Perception skill.
  lucky: When you roll a 1 on the d20 for an attack roll, ability check, or saving
    throw, you can reroll the die and must use the new roll.
  menacing: You gain proficiency in the Intimidation skill.
  naturally-stealthy: You can attempt to hide even when you are obscured only by a
    creature that is at least one size larger than you.
  relentless-endurance: When you are reduced to 0 hit points but not killed outright,
    you can drop to 1 hit point instead. you cannot use this feature again until you
    finish a long rest.
  savage-attacks: When you score a critical hit with a melee weapon attack, you can
    roll one of the weapon's damage dice one additional time and add it to the extra
    damage of the critical hit.
  skill-versatility: You gain proficiency in two skills of your choice.
  stonecunning: Whenever you make an Intelligence (History) check related to the origin
    of stonework, you are considered proficient in the History skill and add double
    your proficiency bonus to the check, instead of your normal proficiency bonus.
  tinker: |-
    You have proficiency with artisan's tools (tinker's tools). Using those tools, you can spend 1 hour and 10 gp worth of materials to construct a Tiny clockwork device (AC 5, 1 hp). The device ceases to function after 24 hours (unless you spend 1 hour repairing it to keep the device functioning), or when you use your action to dismantle it; at that time, you can reclaim the materials used to create it. You can have up to three such devices active at a time.

    When you create a device, choose one of the following options:

    Clockwork Toy: This toy is a clockwork animal, monster, or person, such as a frog, mouse, bird, dragon, or soldier. When placed on the ground, the toy moves 5 feet across the ground on each of your turns in a random direction. It makes noises as appropriate to the creature it represents.

    Fire Starter: The device produces a miniature flame, which you can use to light a candle, torch, or campfire. Using the device requires your action.

    Music Box: When opened, this music box plays a single song at a moderate volume. The box stops playing when it reaches the song's end or when it is closed.
  tool-proficiency: 'You gain proficiency with the artisan''s tools of your choice:
    smith''s tools, brewer''s supplies, or mason''s tools.'
  trance: Elves do not need to sleep. Instead, they meditate deeply, remaining semiconscious,
    for 4 hours a day. (The Common word for such meditation is "trance.") While meditating,
    you can dream after a fashion; such dreams are actually mental exercises that
    have become reflexive through years of practice. After resting this way, you gain
    the same benefit that a human does from 8 hours of sleep.
