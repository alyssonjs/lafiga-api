  sorcerous-origin: |-
    Choose a sorcerous origin, which describes the source of your innate magical power, such as Draconic Bloodline.

    Your choice grants you features when you choose it at 1st level and again at 6th, 14th, and 18th level.
  sorcerous-origin-improvement-1: |-
    Choose a sorcerous origin, which describes the source of your innate magical power, such as Draconic Bloodline.

    Your choice grants you features when you choose it at 1st level and again at 6th, 14th, and 18th level.
  sorcerous-origin-improvement-2: |-
    Choose a sorcerous origin, which describes the source of your innate magical power, such as Draconic Bloodline.

    Your choice grants you features when you choose it at 1st level and again at 6th, 14th, and 18th level.
  sorcerous-origin-improvement-3: |-
    Choose a sorcerous origin, which describes the source of your innate magical power, such as Draconic Bloodline.

    Your choice grants you features when you choose it at 1st level and again at 6th, 14th, and 18th level.
  sorcerous-restoration: At 20th level, you regain 4 expended sorcery points whenever
    you finish a short rest.
  spell-mastery: |-
    At 18th level, you have achieved such mastery over certain spells that you can cast them at will. Choose a 1st-level wizard spell and a 2nd-level wizard spell that are in your spellbook. You can cast those spells at their lowest level without expending a spell slot when you have them prepared. If you want to cast either spell at a higher level, you must expend a spell slot as normal.

    By spending 8 hours in study, you can exchange one or both of the spells you chose for different spells of the same levels.
  spellcasting-bard: You have learned to untangle and reshape the fabric of reality
    in harmony with your wishes and music. Your spells are part of your vast repertoire,
    magic that you can tune to different situations.
  spellcasting-cleric: As a conduit for divine power, you can cast cleric spells.
  spellcasting-druid: Drawing on the divine essence of nature itself, you can cast
    spells to shape that essence to your will.
  spellcasting-paladin: By 2nd level, you have learned to draw on divine magic through
    meditation and prayer to cast spells as a cleric does.
  spellcasting-ranger: By the time you reach 2nd level, you have learned to use the
    magical essence of nature to cast spells, much as a druid does.
  spellcasting-sorcerer: An event in your past, or in the life of a parent or ancestor,
    left an indelible mark on you, infusing you with arcane magic. This font of magic,
    whatever its origin, fuels your spells.
  spellcasting-wizard: As a student of arcane magic, you have a spellbook containing
    spells that show the first glimmerings of your true power.
  step-of-the-wind: You can spend 1 ki point to take the Disengage or Dash action
    as a bonus action on your turn, and your jump distance is doubled for the turn.
  stillness-of-mind: Starting at 7th level, you can use your action to end one effect
    on yourself that is causing you to be charmed or frightened.
  stroke-of-luck: |-
    At 20th level, you have an uncanny knack for succeeding when you need to. If your attack misses a target within range, you can turn the miss into a hit. Alternatively, if you fail an ability check, you can treat the d20 roll as a 20.

    Once you use this feature, you can't use it again until you finish a short or long rest.
  stunning-strike: Starting at 5th level, you can interfere with the flow of ki in
    an opponent's body. When you hit another creature with a melee weapon attack,
    you can spend 1 ki point to attempt a stunning strike. The target must succeed
    on a Constitution saving throw or be stunned until the end of your next turn.
  superior-inspiration: At 20th level, when you roll initiative and have no uses of
    Bardic Inspiration left, you regain one use.
  thieves-cant: |-
    During your rogue training you learned thieves' cant, a secret mix of dialect, jargon, and code that allows you to hide messages in seemingly normal conversation. Only another creature that knows thieves' cant understands such messages. It takes four times longer to convey such a message than it does to speak the same idea plainly.

    In addition, you understand a set of secret signs and symbols used to convey short, simple messages, such as whether an area is dangerous or the territory of a thieves' guild, whether loot is nearby, or whether the people in an area are easy marks or will provide a safe house for thieves on the run.
  tongue-of-the-sun-and-moon: Starting at 13th level, you learn to touch the ki of
    other minds so that you understand all spoken languages. Moreover, any creature
    that can understand a language can understand what you say.
  unarmored-movement-1: |-
    Starting at 2nd level, your speed increases by 10 feet while you are not wearing armor or wielding a shield. This bonus increases when you reach certain monk levels, as shown in Table: The Monk.

    At 9th level, you gain the ability to move along vertical surfaces and across liquids on your turn without falling during the move.
  unarmored-movement-2: |-
    Starting at 2nd level, your speed increases by 10 feet while you are not wearing armor or wielding a shield. This bonus increases when you reach certain monk levels, as shown in Table: The Monk.

    At 9th level, you gain the ability to move along vertical surfaces and across liquids on your turn without falling during the move.
  uncanny-dodge: Starting at 5th level, when an attacker that you can see hits you
    with an attack, you can use your reaction to halve the attack's damage against
    you.
  vanish: Starting at 14th level, you can use the Hide action as a bonus action on
    your turn. Also, you can't be tracked by nonmagical means, unless you choose to
    leave a trail.
