  ranger-fighting-style: No 2º nível, você adota um estilo de combate particular como especialidade. Escolha uma das opções a seguir. Não pode escolher a mesma opção de Estilo de Combate mais de uma vez, mesmo que possa escolher de novo mais tarde.
  ranger-lands-stride: |-
    A partir do 8º nível, mover-se por terreno difícil não mágico não custa movimento extra. Também pode atravessar plantas não mágicas sem ser desacelerado por elas e sem sofrer dano de espinhos, farpas ou perigos semelhantes.

    Além disso, tem vantagem em testes de resistência contra plantas criadas ou manipuladas magicamente para atrapalhar o deslocamento, como as criadas pela magia enredar.
  reckless-attack: A partir do 2º nível, você pode desistir de toda preocupação com sua defesa para atacar com um desespero feroz. Quando você fizer o seu primeiro ataque no turno, você pode decidir atacar descuidadamente. Fazer isso lhe concede vantagem nas jogadas de ataque com armas corpo a corpo usando Força durante seu turno; porém, as jogadas de ataque feitas contra você possuem vantagem até o início do seu próximo turno.
  relentless-rage: |-
    A partir do 11º nível, sua fúria pode manter você lutando independentente da gravidade dos seus ferimentos. Se você cair para 0 pontos de vida enquanto estiver em fúria e não morrer, você pode realizar um teste de resistência de Constituição CD 10. Se você for bem sucedido, você volta para 1 ponto de vida ao invés disso.

    Cada vez que você utilizar essa característica após a primeira, a CD aumenta em 5. Assim que você terminar um descanso curto ou longo a CD volta para 10.
  reliable-talent: No 11º nível, você refinou as perícias escolhidas até quase a perfeição. Sempre que fizer um teste de atributo que permita somar seu bônus de proficiência, pode tratar um resultado de d20 de 9 ou menos como 10.
  rogue-ability-score-improvement-1: Quando você atinge o 4º nível e novamente no 8º, 12º, 16º e 19º nível, você pode aumentar um valor de habilidade, à sua escolha, em 2, ou você pode aumentar dois valores de habilidade, à sua escolha, em 1. Como padrão, você não pode elevar um valor de habilidade acima de 20 com essa característica.
  rogue-ability-score-improvement-2: Quando você atinge o 4º nível e novamente no 8º, 12º, 16º e 19º nível, você pode aumentar um valor de habilidade, à sua escolha, em 2, ou você pode aumentar dois valores de habilidade, à sua escolha, em 1. Como padrão, você não pode elevar um valor de habilidade acima de 20 com essa característica.
  rogue-ability-score-improvement-3: Quando você atinge o 4º nível e novamente no 8º, 12º, 16º e 19º nível, você pode aumentar um valor de habilidade, à sua escolha, em 2, ou você pode aumentar dois valores de habilidade, à sua escolha, em 1. Como padrão, você não pode elevar um valor de habilidade acima de 20 com essa característica.
  rogue-ability-score-improvement-4: Quando você atinge o 4º nível e novamente no 8º, 12º, 16º e 19º nível, você pode aumentar um valor de habilidade, à sua escolha, em 2, ou você pode aumentar dois valores de habilidade, à sua escolha, em 1. Como padrão, você não pode elevar um valor de habilidade acima de 20 com essa característica.
  rogue-ability-score-improvement-5: Quando você atinge o 4º nível e novamente no 8º, 12º, 16º e 19º nível, você pode aumentar um valor de habilidade, à sua escolha, em 2, ou você pode aumentar dois valores de habilidade, à sua escolha, em 1. Como padrão, você não pode elevar um valor de habilidade acima de 20 com essa característica.
  rogue-ability-score-improvement-6: Quando você atinge o 4º nível e novamente no 8º, 12º, 16º e 19º nível, você pode aumentar um valor de habilidade, à sua escolha, em 2, ou você pode aumentar dois valores de habilidade, à sua escolha, em 1. Como padrão, você não pode elevar um valor de habilidade acima de 20 com essa característica.
  rogue-evasion: A partir do 7º nível, você pode escapar com agilidade de certos efeitos de área, como o sopro flamejante de um dragão vermelho ou a magia tempestade de gelo. Quando sofrer um efeito que permita um teste de resistência de Destreza para sofrer apenas metade do dano, em vez disso não sofre dano algum se passar no teste, e sofre apenas metade se falhar.
  rogue-expertise-1: |-
    No 1º nível, escolha duas perícias nas quais é proficiente, ou uma perícia e proficiência com ferramentas de ladrão. Seu bônus de proficiência é dobrado em qualquer teste de atributo que use uma dessas proficiências.

    No 6º nível, pode escolher mais duas proficiências (em perícias ou com ferramentas de ladrão) para receber esse benefício.
  rogue-expertise-2: |-
    No 1º nível, escolha duas perícias nas quais é proficiente, ou uma perícia e proficiência com ferramentas de ladrão. Seu bônus de proficiência é dobrado em qualquer teste de atributo que use uma dessas proficiências.

    No 6º nível, pode escolher mais duas proficiências (em perícias ou com ferramentas de ladrão) para receber esse benefício.
  roguish-archetype: No 3º nível, você escolhe um arquétipo que emula no exercício de suas habilidades de ladino, como o Ladrão. Outros arquétipos aparecem no material-fonte original. Sua escolha concede recursos no 3º nível e de novo no 9º, 13º e 17º níveis.
  roguish-archetype-improvement-1: No 3º nível, você escolhe um arquétipo que emula no exercício de suas habilidades de ladino, como o Ladrão. Outros arquétipos aparecem no material-fonte original. Sua escolha concede recursos no 3º nível e de novo no 9º, 13º e 17º níveis.
  roguish-archetype-improvement-2: No 3º nível, você escolhe um arquétipo que emula no exercício de suas habilidades de ladino, como o Ladrão. Outros arquétipos aparecem no material-fonte original. Sua escolha concede recursos no 3º nível e de novo no 9º, 13º e 17º níveis.
  roguish-archetype-improvement-3: No 3º nível, você escolhe um arquétipo que emula no exercício de suas habilidades de ladino, como o Ladrão. Outros arquétipos aparecem no material-fonte original. Sua escolha concede recursos no 3º nível e de novo no 9º, 13º e 17º níveis.
  sacred-oath: |-
    Quando alcança o 3º nível, você presta o juramento que o vincula como paladino para sempre. Até então esteve em fase preparatória, comprometido com o caminho mas ainda sem jurar. Agora escolhe um juramento, como o Juramento de Devoção.

    Sua escolha concede recursos no 3º nível e novamente no 7º, 15º e 20º níveis. Esses recursos incluem magias de juramento e o recurso Canalizar Divindade.
  sacred-oath-improvement-1: |-
    Quando alcança o 3º nível, você presta o juramento que o vincula como paladino para sempre. Até então esteve em fase preparatória, comprometido com o caminho mas ainda sem jurar. Agora escolhe um juramento, como o Juramento de Devoção.

