  bard-ability-score-improvement-4: Quando você atinge o 4º nível e novamente no 8º, 12º, 16º e 19º nível, você pode aumentar um valor de habilidade, à sua escolha, em 2, ou você pode aumentar dois valores de habilidade, à sua escolha, em 1. Como padrão, você não pode elevar um valor de habilidade acima de 20 com essa característica.
  bard-ability-score-improvement-5: Quando você atinge o 4º nível e novamente no 8º, 12º, 16º e 19º nível, você pode aumentar um valor de habilidade, à sua escolha, em 2, ou você pode aumentar dois valores de habilidade, à sua escolha, em 1. Como padrão, você não pode elevar um valor de habilidade acima de 20 com essa característica.
  bard-college: No 3º nível, você aprofunda as técnicas avançadas de uma faculdade de bardo à sua escolha, como a Faculdade do Lore. Sua escolha concede recursos no 3º nível e novamente no 6º e 14º níveis.
  bard-college-improvement-1: No 3º nível, você aprofunda as técnicas avançadas de uma faculdade de bardo à sua escolha, como a Faculdade do Lore. Sua escolha concede recursos no 3º nível e novamente no 6º e 14º níveis.
  bard-college-improvement-2: No 3º nível, você aprofunda as técnicas avançadas de uma faculdade de bardo à sua escolha, como a Faculdade do Lore. Sua escolha concede recursos no 3º nível e novamente no 6º e 14º níveis.
  bard-expertise-1: No 3º nível, escolha duas perícias nas quais é proficiente. Seu bônus de proficiência é dobrado em qualquer teste de atributo que use uma dessas perícias. No 10º nível, pode escolher outras duas perícias para receber o mesmo benefício.
  bard-expertise-2: No 3º nível, escolha duas perícias nas quais é proficiente. Seu bônus de proficiência é dobrado em qualquer teste de atributo que use uma dessas perícias. No 10º nível, pode escolher outras duas perícias para receber o mesmo benefício.
  beast-spells: A partir do 18º nível, você pode conjurar muitas de suas magias de druida em qualquer forma que assuma com Forma Selvagem. Pode realizar componentes somáticos e verbais de uma magia de druida em forma de fera, mas não pode fornecer componentes materiais.
  blindsense: A partir do 14º nível, se você puder ouvir, fica ciente da posição de qualquer criatura escondida ou invisível a até 10 pés de você.
  brutal-critical-1-die: |-
    A partir do 9º nível, você pode rolar um dado de dano de arma adicional quando estiver determinando o dano extra de um acerto crítico com uma arma corpo a corpo.

    Isso aumenta para dois dados adicionais no 13º nível e três dados adicionais no 17º nível.
  brutal-critical-2-dice: |-
    A partir do 9º nível, você pode rolar um dado de dano de arma adicional quando estiver determinando o dano extra de um acerto crítico com uma arma corpo a corpo.

    Isso aumenta para dois dados adicionais no 13º nível e três dados adicionais no 17º nível.
  brutal-critical-3-dice: |-
    A partir do 9º nível, você pode rolar um dado de dano de arma adicional quando estiver determinando o dano extra de um acerto crítico com uma arma corpo a corpo.

    Isso aumenta para dois dados adicionais no 13º nível e três dados adicionais no 17º nível.
  channel-divinity: |-
    Seu juramento permite que você canalize energia divina para abastecer efeitos mágicos. Cada opção de Canalizar Divindade concedida por um juramento explica como usá-la.

    Quando você usa o seu Canalizar Divindade, você escolhe qual opção usar. Você deve terminar um descanso curto ou longo para poder usar seu Canalizar Divindade novamente.

    Alguns efeitos de Canalizar Divindade exigem testes de resistência. Quando você usar um efeito assim desta classe, a CD é igual à CD de resistência às suas magias de paladino.
  channel-divinity-1-rest: |-
    No 2º nível, você se torna capaz de canalizar energia diretamente de sua divindade, utilizando-a como combustível para efeitos mágicos. Você começa com dois efeitos: Expulsar Mortos-vivos e um efeito determinado pelo seu domínio. Alguns domínios conferem efeitos adicionais conforme você avança de nível, como consta na descrição de cada domínio.

    Quando você usar seu Canalizar Divindade, você escolhe qual efeito quer criar. Você precisa terminar um descanso curto ou longo para usar a característica de novo.

    Alguns efeitos requerem teste de resistência. Quando você usar um desses efeitos, a CD é igual a das suas magias de clérigo.

    A partir do 6º nível, você pode Canalizar Divindade duas vezes entre descansos e a partir do 18º nível, três vezes entre descansos. Você recupera os usos dessa característica quando termina um descanso curto ou longo.
  channel-divinity-2-rest: A partir do 6º nível, você pode Canalizar Divindade duas vezes entre descansos e a partir do 18º nível, três vezes entre descansos. Você recupera os usos dessa característica quando termina um descanso curto ou longo.
  channel-divinity-3-rest: A partir do 6º nível, você pode Canalizar Divindade duas vezes entre descansos e a partir do 18º nível, três vezes entre descansos. Você recupera os usos dessa característica quando termina um descanso curto ou longo.
  channel-divinity-turn-undead: |-
    Usando uma ação, você levanta seu símbolo sagrado e murmura uma prece repreendendo os mortos-vivos. Cada morto-vivo que puder ver ou ouvir você em um raio de 9 metros a partir de você deve fazer um teste de resistência de Sabedoria. Se falhar, a criatura está expulsa por 1 minuto ou até sofrer algum dano.

    Uma criatura expulsa deve usar seu turno para fugir da melhor forma possível e de forma alguma pode aproximar-se a mais de 9 metros de você por vontade própria. Ela também não pode usar reações. Como uma ação, a criatura pode apenas realizar uma Disparada ou tentar escapar de um efeito que a impeça de se mover. Se não há lugar para ir, a criatura pode usar a ação Esquivar.
  cleansing-touch: |-
    A partir do 14º nível, você pode usar sua ação para encerrar uma magia sobre você ou sobre uma criatura voluntária que tocar.

    Pode usar esse recurso um número de vezes igual ao seu modificador de Carisma (mínimo de uma vez). Recupera os usos gastos ao terminar um descanso longo.
  cleric-ability-score-improvement-1: Quando você atinge o 4º nível e novamente no 8º, 12º, 16º e 19º nível, você pode aumentar um valor de habilidade, à sua escolha, em 2, ou você pode aumentar dois valores de habilidade, à sua escolha, em 1. Como padrão, você não pode elevar um valor de habilidade acima de 20 com essa característica.
  cleric-ability-score-improvement-2: Quando você atinge o 4º nível e novamente no 8º, 12º, 16º e 19º nível, você pode aumentar um valor de habilidade, à sua escolha, em 2, ou você pode aumentar dois valores de habilidade, à sua escolha, em 1. Como padrão, você não pode elevar um valor de habilidade acima de 20 com essa característica.
  cleric-ability-score-improvement-3: Quando você atinge o 4º nível e novamente no 8º, 12º, 16º e 19º nível, você pode aumentar um valor de habilidade, à sua escolha, em 2, ou você pode aumentar dois valores de habilidade, à sua escolha, em 1. Como padrão, você não pode elevar um valor de habilidade acima de 20 com essa característica.
