  monastic-tradition: Quando alcança o 3º nível, você se dedica a uma tradição monástica, como o Caminho da Palma Aberta. Sua tradição concede recursos no 3º nível e novamente no 6º, 11º e 17º níveis.
  monastic-tradition-improvement-1: Quando alcança o 3º nível, você se dedica a uma tradição monástica, como o Caminho da Palma Aberta. Sua tradição concede recursos no 3º nível e novamente no 6º, 11º e 17º níveis.
