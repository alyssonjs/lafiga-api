  feral-instinct: |-
    No 7º nível, seu instinto está tão apurado que você recebe vantagem nas jogadas de iniciativa.

    Além disso, se você estiver surpreso no começo de um combate e não estiver incapacitado, você pode agir normalmente no seu primeiro turno, mas apenas se você entrar em fúria antes de realizar qualquer outra coisa neste turno.
  feral-senses: |-
    No 18º nível, você ganha sentidos preternaturais que ajudam a lutar contra criaturas que não vê. Ao atacar uma criatura que não vê, sua incapacidade de vê-la não impõe desvantagem nas rolagens de ataque contra ela.

    Também fica ciente da posição de qualquer criatura invisível a até 30 pés de você, desde que a criatura não esteja escondida de você e você não esteja cego nem surdo.
  fighter-ability-score-improvement-1: Quando você atinge o 4º nível e novamente no 8º, 12º, 16º e 19º nível, você pode aumentar um valor de habilidade, à sua escolha, em 2, ou você pode aumentar dois valores de habilidade, à sua escolha, em 1. Como padrão, você não pode elevar um valor de habilidade acima de 20 com essa característica.
