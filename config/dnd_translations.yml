  cleric-ability-score-improvement-5: Quando você atinge o 4º nível e novamente no 8º, 12º, 16º e 19º nível, você pode aumentar um valor de habilidade, à sua escolha, em 2, ou você pode aumentar dois valores de habilidade, à sua escolha, em 1. Como padrão, você não pode elevar um valor de habilidade acima de 20 com essa característica.
  cunning-action: A partir do 2º nível, seu raciocínio rápido e agilidade permitem agir com velocidade. Você pode usar uma ação bônus em cada um dos seus turnos em combate. Essa ação só pode ser usada para as ações Disparar, Desengajar ou Esconder-se.
  danger-sense: |-
    No 2º nível, você adquire um sentido sobrenatural de quando as coisas próximas não estão como deveriam, concedendo a você uma chance maior quando estiver evitando perigos.

    Você possui vantagem em testes de resistência de Destreza contra efeitos que você possa ver, como armadilhas e magias. Para receber esse benefício você não pode estar cego, surdo ou incapacitado.
  deflect-missiles: |-
    A partir do 3º nível, pode usar sua reação para desviar ou apanhar o projétil quando for atingido por um ataque à distância com arma. Ao fazê-lo, o dano que sofre do ataque é reduzido em 1d10 + seu modificador de Destreza + seu nível de monge.

    Se reduzir o dano a 0, pode pegar o projétil se for pequeno o bastante para segurar numa mão e tiver pelo menos uma mão livre. Se pegar assim, pode gastar 1 ponto de ki para fazer um ataque à distância com a arma ou munição que acabou de pegar, como parte da mesma reação. Faz esse ataque com proficiência, independentemente de proficiências com armas, e o projétil conta como arma de monge no ataque, com alcance normal de 20 pés e longo de 60 pés.
  destroy-undead-cr-1-2-or-below: |-
    A partir do 5º nível, quando um morto-vivo falhar no teste de resistência contra a sua característica Expulsar Mortos-vivos, ele é instantaneamente destruído se o Nível de Desafio dele for menor ou igual ao valor da tabela Destruir Mortos-vivos, de acordo com seu nível de clérigo.

    Nível de clérigo | Destrói mortos-vivos de ND
    5º | 1/2 ou menor
    8º | 1 ou menor
    11º | 2 ou menor
    14º | 3 ou menor
    17º | 4 ou menor
  destroy-undead-cr-1-or-below: |-
    A partir do 5º nível, quando um morto-vivo falhar no teste de resistência contra a sua característica Expulsar Mortos-vivos, ele é instantaneamente destruído se o Nível de Desafio dele for menor ou igual ao valor da tabela Destruir Mortos-vivos, de acordo com seu nível de clérigo.

