  paladin-extra-attack: A partir do 5º nível, você pode atacar duas vezes, em vez de uma, sempre que usar a ação Atacar no seu turno.
  paladin-fighting-style: No 2º nível, você adota um estilo de combate como especialidade. Escolha uma das opções a seguir. Não pode escolher a mesma opção de Estilo de Combate mais de uma vez, mesmo que possa escolher de novo mais tarde.
  patient-defense: Você pode gastar 1 ponto de ki para usar a ação Esquivar como ação bônus no seu turno.
  perfect-self: No 20º nível, quando você rola iniciativa e não tem pontos de ki restantes, recupera 4 pontos de ki.
  persistent-rage: A partir do 15º nível, sua fúria é tão brutal que ela só termina prematuramente se você cair inconsciente ou se você decidir terminá-la.
  primal-champion: No 20º nível, você incorpora os poderes da natureza. Seus valores de Força e Constituição aumentam em 4. Seu máximo para esses valores agora é 24.
  primal-path: No 3º nível, você escolhe um caminho que molda a natureza da sua fúria. Escolha o Caminho do Berserker ou o Caminho do Guerreiro Totêmico, ambos detalhados ao fim da descrição da classe. Sua escolha concede recursos no 3º nível e novamente nos níveis 6, 10 e 14.
  primal-path-improvement-1: No 3º nível, você escolhe um caminho que molda a natureza da sua fúria. Escolha o Caminho do Berserker ou o Caminho do Guerreiro Totêmico, ambos detalhados ao fim da descrição da classe. Sua escolha concede recursos no 3º nível e novamente nos níveis 6, 10 e 14.
