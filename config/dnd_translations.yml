  divine-domain-improvement-4: 'Escolha um domínio relacionado à sua divindade: Conhecimento, Enganação, Guerra, Luz, Natureza, Tempestade ou Vida. Cada domínio é detalhado ao final da descrição da classe e, cada um, fornece exemplos dos deuses associados a eles. Essa escolha, realizada no 1º nível, concede magias de domínio e outras características. Ela também concede a você outras formas de utilizar seu Canalizar Divindade quando você ganhá-lo no 2º nível, bem como outros benefícios no 6º, 8º e 17º níveis.'
  divine-health: No 3º nível, a magia divina que percorre você torna você imune a doenças.
  divine-intervention: |-
    A partir do 10º nível, você pode invocar sua divindade para intervir em seu favor quando a necessidade for grande.

    Implorar ajuda exige usar sua ação. Descreva a assistência desejada e role dados percentuais. Se o resultado for igual ou inferior ao seu nível de clérigo, a divindade intervém. O Mestre escolhe a natureza da intervenção; o efeito de uma magia de clérigo ou de domínio seria apropriado.

    Se a divindade intervir, não pode usar esse recurso de novo por 7 dias. Caso contrário, pode usá-lo de novo após terminar um descanso longo.

    No 20º nível, seu pedido de intervenção tem sucesso automaticamente, sem rolagem.
  divine-intervention-improvement: No 20º nível, seu pedido de intervenção tem sucesso automaticamente, sem necessidade de rolagem.
  divine-sense: |-
    A presença de um mal forte se manifesta aos seus sentidos como odor nocivo, e um bem poderoso soa como música celestial. Como ação, pode abrir a percepção para detectar tais forças. Até o fim do seu próximo turno, você sabe a localização de qualquer celestial, infernal ou morto-vivo a até 60 pés que não esteja atrás de cobertura total. Você sabe o tipo (celestial, infernal ou morto-vivo) de qualquer ser cuja presença sente, mas não sua identidade. No mesmo raio, também detecta a presença de qualquer lugar ou objeto consagrado ou profanado, como com a magia consagrar.

    Pode usar esse recurso um número de vezes igual a 1 + seu modificador de Carisma. Ao terminar um descanso longo, recupera todos os usos gastos.
  divine-smite: A partir do 2º nível, ao acertar uma criatura com um ataque corpo a corpo com arma, pode gastar um espaço de magia para causar dano radiante ao alvo, além do dano da arma. O dano extra é 2d8 para um espaço de 1º nível, mais 1d8 para cada nível acima do 1º, até no máximo 5d8. O dano aumenta em 1d8 se o alvo for um morto-vivo ou um infernal.
  domain-spells-1: |-
    Cada domínio tem uma lista de magias – as magias de domínio – que você adquire nos níveis especificados pelo seu domínio. Quando você ganha uma magia de domínio, você sempre a tem preparada, e essa magia não conta no número de magias que você pode preparar a cada dia.

    Se você tem uma magia de domínio que não aparece na lista de magias de clérigo, mesmo assim ela é uma magia de clérigo para você.
