trait_descs:
  artificers-lore: Sempre que fizer um teste de Inteligência (História) relacionado a itens mágicos, objetos alquímicos ou dispositivos tecnológicos, você pode somar o dobro do seu bônus de proficiência, em vez do bônus que aplicaria normalmente.
  brave: Você tem vantagem em testes de resistência contra ficar amedrontado.
  breath-weapon: |-
    Você pode usar sua ação para expelir energia destrutiva. Sua ancestralidade dracônica determina o tamanho, a forma e o tipo de dano do sopro.

    Ao usar a arma de sopro, cada criatura na área deve fazer um teste de resistência cujo tipo é definido pela ancestralidade. A CD é 8 + modificador de Constituição + bônus de proficiência. Falha 2d6 de dano; sucesso metade. O dano sobe para 3d6 no 6º nível, 4d6 no 11º e 5d6 no 16º.

    Depois de usar a arma de sopro, não pode usá-la de novo até terminar um descanso curto ou longo.
  damage-resistance: Você tem resistência ao tipo de dano associado à sua ancestralidade dracônica.
  darkvision: Você enxerga na penumbra em até 18 metros como luz plena, e na escuridão como penumbra. Na escuridão não distingue cores, apenas tons de cinza.
  draconic-ancestry: Você tem ancestralidade dracônica. Escolha um tipo de dragão na tabela de ancestralidade dracônica. Sua arma de sopro e resistência a dano seguem o tipo escolhido.
  draconic-ancestry-black: Você tem ancestralidade dracônica. Escolha um tipo de dragão na tabela. Sua arma de sopro e resistência a dano seguem o tipo escolhido.
  draconic-ancestry-blue: Você tem ancestralidade dracônica. Escolha um tipo de dragão na tabela. Sua arma de sopro e resistência a dano seguem o tipo escolhido.
  draconic-ancestry-brass: Você tem ancestralidade dracônica. Escolha um tipo de dragão na tabela. Sua arma de sopro e resistência a dano seguem o tipo escolhido.
  draconic-ancestry-bronze: Você tem ancestralidade dracônica. Escolha um tipo de dragão na tabela. Sua arma de sopro e resistência a dano seguem o tipo escolhido.
  draconic-ancestry-copper: Você tem ancestralidade dracônica. Escolha um tipo de dragão na tabela. Sua arma de sopro e resistência a dano seguem o tipo escolhido.
  draconic-ancestry-gold: Você tem ancestralidade dracônica. Escolha um tipo de dragão na tabela. Sua arma de sopro e resistência a dano seguem o tipo escolhido.
  draconic-ancestry-green: Você tem ancestralidade dracônica. Escolha um tipo de dragão na tabela. Sua arma de sopro e resistência a dano seguem o tipo escolhido.
  draconic-ancestry-red: Você tem ancestralidade dracônica. Escolha um tipo de dragão na tabela. Sua arma de sopro e resistência a dano seguem o tipo escolhido.
  draconic-ancestry-silver: Você tem ancestralidade dracônica. Escolha um tipo de dragão na tabela. Sua arma de sopro e resistência a dano seguem o tipo escolhido.
  draconic-ancestry-white: Você tem ancestralidade dracônica. Escolha um tipo de dragão na tabela. Sua arma de sopro e resistência a dano seguem o tipo escolhido.
  dwarven-combat-training: Você tem proficiência com machado de batalha, machado de mão, martelo leve e martelo de guerra.
  dwarven-resilience: Você tem vantagem em testes de resistência contra veneno e resistência a dano de veneno.
  dwarven-toughness: Seu máximo de pontos de vida aumenta em 1 e aumenta em 1 sempre que ganhar um nível.
  elf-weapon-training: Você tem proficiência com espada longa, espada curta, arco curto e arco longo.
  extra-language: Você pode falar, ler e escrever um idioma extra à sua escolha.
  fey-ancestry: Você tem vantagem em testes de resistência contra ser enfeitiçado, e magia não pode colocá-lo para dormir.
  gnome-cunning: Você tem vantagem em todos os testes de resistência de Inteligência, Sabedoria e Carisma contra magia.
  halfling-nimbleness: Você pode se mover pelo espaço de qualquer criatura de um tamanho maior que o seu.
  hellish-resistance: Você tem resistência a dano de fogo.
  high-elf-cantrip: Você conhece um truque à sua escolha da lista de mago. Inteligência é sua habilidade de conjuração para ele.
  infernal-legacy: Você conhece o truque taumaturgia. No 3º nível, pode conjurar repreensão infernal como magia de 2º nível uma vez com esse traço e recupera o uso ao terminar um descanso longo. No 5º nível, pode conjurar escuridão uma vez da mesma forma. Carisma é sua habilidade de conjuração para essas magias.
  keen-senses: Você tem proficiência na perícia Percepção.
  lucky: Quando rolar 1 no d20 em uma jogada de ataque, teste de habilidade ou teste de resistência, pode rerrolar o dado e deve usar o novo resultado.
  menacing: Você ganha proficiência na perícia Intimidação.
  naturally-stealthy: Você pode tentar se esconder mesmo quando estiver obscurecido apenas por uma criatura pelo menos um tamanho maior que você.
  relentless-endurance: Quando for reduzido a 0 pontos de vida mas não morrer instantaneamente, pode cair para 1 ponto de vida em vez disso. Não pode usar de novo até terminar um descanso longo.
  savage-attacks: Quando acertar um acerto crítico com ataque corpo a corpo com arma, pode rolar um dos dados de dano da arma uma vez a mais e somar ao dano extra do crítico.
  skill-versatility: Você ganha proficiência em duas perícias à sua escolha.
  stonecunning: Sempre que fizer um teste de Inteligência (História) relacionado à origem de trabalhos em pedra, é considerado proficiente em História e soma o dobro do bônus de proficiência ao teste, em vez do bônus normal.
  tinker: |-
    Você tem proficiência com ferramentas de artesão (ferramentas de funileiro). Com elas, pode gastar 1 hora e 10 po em materiais para construir um dispositivo minúsculo de corda e engrenagens (CA 5, 1 PV). O dispositivo para de funcionar após 24 horas (a menos que gaste 1 hora consertando) ou quando você usar sua ação para desmontá-lo; aí recupera os materiais. Pode ter até três dispositivos ativos.

    Ao criar, escolha: Brinquedo de Corda (animal/objeto que se move 1,5 m por turno em direção aleatória), Acendedor (chama minúscula para vela/tocha), ou Caixa de Música (toca uma música até o fim ou fechar).
  tool-proficiency: 'Você ganha proficiência com ferramentas de artesão à escolha: ferramentas de ferreiro, suprimentos de cervejeiro ou ferramentas de pedreiro.'
  trance: Elfos não precisam dormir. Em vez disso, meditam profundamente 4 horas por dia (transe). Depois desse descanso, ganham o mesmo benefício que um humano teria com 8 horas de sono.
