  countercharm: No 6º nível, você pode usar notas musicais ou palavras de poder para perturbar efeitos que influenciam a mente. Como ação, pode iniciar uma apresentação que dura até o fim do seu próximo turno. Nesse tempo, você e criaturas aliadas a até 30 pés de você têm vantagem em testes de resistência contra ficar amedrontadas ou enfeitiçadas. A criatura precisa poder ouvi-lo para receber o benefício. A apresentação termina antes se você ficar incapacitado, silenciado ou encerrá-la voluntariamente (sem gastar ação).
  font-of-inspiration: A partir do 5º nível, você recupera todos os usos gastos de Inspiração de Bardo quando termina um descanso curto ou longo.
  expertise: No 3º nível, escolha duas perícias nas quais você é proficiente. Seu bônus de proficiência é dobrado em qualquer teste de habilidade que use uma dessas perícias. No 10º nível, escolha mais duas perícias proficientes para ganhar esse benefício.
  fighting-style-defense: Enquanto usar armadura, você recebe +1 na sua Classe de Armadura.
  fighting-style-archery: Você recebe +2 em jogadas de ataque que fizer com armas à distância.
  fighting-style-dueling: Quando estiver empunhando uma arma corpo a corpo em uma mão e nenhuma outra arma, você recebe +2 de dano com essa arma.
  fighting-style-two-weapon-fighting: Quando estiver lutando com duas armas, você pode somar seu modificador de atributo de ataque ao dano do segundo ataque.
  second-wind: Você dispõe de uma reserva limitada de fôlego para se proteger de danos. No seu turno, pode usar uma ação bônus para recuperar pontos de vida iguais a 1d10 + seu nível de guerreiro. Depois de usar esse recurso, precisa terminar um descanso curto ou longo antes de usá-lo de novo.
  action-surge-1-use: |-
    A partir do 2º nível, pode se esforçar além dos limites normais por um instante. No seu turno, pode realizar uma ação adicional além da sua ação normal e de uma possível ação bônus.

    Depois de usar esse recurso, precisa terminar um descanso curto ou longo antes de usá-lo de novo. A partir do 17º nível, pode usá-lo duas vezes antes de descansar, mas apenas uma vez no mesmo turno.
  extra-attack: A partir do 5º nível, você pode atacar duas vezes, em vez de uma, sempre que realizar a ação Ataque no seu turno.
  action-surge-2-uses: |-
    A partir do 2º nível, pode se esforçar além dos limites normais por um instante. No seu turno, pode realizar uma ação adicional além da sua ação normal e de uma possível ação bônus.

    Depois de usar esse recurso, precisa terminar um descanso curto ou longo antes de usá-lo de novo. A partir do 17º nível, pode usá-lo duas vezes antes de descansar, mas apenas uma vez no mesmo turno.
  arcane-recovery: |-
    Você aprendeu a recuperar parte de sua energia mágica estudando o grimório. Uma vez por dia, ao terminar um descanso curto, pode escolher espaços de magia gastos para recuperar. Os espaços podem somar um nível total igual ou inferior à metade do seu nível de mago (arredondado para cima), e nenhum pode ser de 6º nível ou superior.

    Por exemplo, se for um mago de 4º nível, pode recuperar até dois níveis de espaços: um espaço de 2º nível ou dois de 1º nível.
  arcane-tradition: |-
    Quando alcança o 2º nível, você escolhe uma tradição arcana, moldando sua prática de magia por uma das oito escolas, como Evocação.

    Sua escolha concede recursos no 2º nível e novamente no 6º, 10º e 14º níveis.
  arcane-tradition-improvement-1: |-
    Quando alcança o 2º nível, você escolhe uma tradição arcana, moldando sua prática de magia por uma das oito escolas, como Evocação.

    Sua escolha concede recursos no 2º nível e novamente no 6º, 10º e 14º níveis.
  arcane-tradition-improvement-2: |-
    Quando alcança o 2º nível, você escolhe uma tradição arcana, moldando sua prática de magia por uma das oito escolas, como Evocação.

    Sua escolha concede recursos no 2º nível e novamente no 6º, 10º e 14º níveis.
  arcane-tradition-improvement-3: |-
    Quando alcança o 2º nível, você escolhe uma tradição arcana, moldando sua prática de magia por uma das oito escolas, como Evocação.

    Sua escolha concede recursos no 2º nível e novamente no 6º, 10º e 14º níveis.
  archdruid: |-
    No 20º nível, você pode usar Forma Selvagem um número ilimitado de vezes.

    Além disso, pode ignorar os componentes verbais e somáticos de suas magias de druida, bem como componentes materiais sem custo que não sejam consumidos pela magia. Recebe esse benefício tanto na forma normal quanto na forma de fera da Forma Selvagem.
  aura-improvements: No 18º nível, o alcance de suas auras aumenta para 30 pés.
  aura-of-courage: |-
    A partir do 10º nível, você e criaturas aliadas a até 10 pés de você não podem ficar amedrontadas enquanto você estiver consciente.

    No 18º nível, o alcance dessa aura aumenta para 30 pés.
  aura-of-protection: |-
    A partir do 6º nível, sempre que você ou uma criatura aliada a até 10 pés de você precisar fazer um teste de resistência, a criatura recebe um bônus no teste igual ao seu modificador de Carisma (mínimo +1). Você precisa estar consciente para conceder esse bônus.

    No 18º nível, o alcance dessa aura aumenta para 30 pés.
  barbarian-ability-score-improvement-1: Quando você atinge o 4º nível e novamente no 8º, 12º, 16º e 19º nível, você pode aumentar um valor de habilidade, à sua escolha, em 2, ou você pode aumentar dois valores de habilidade, à sua escolha, em 1. Como padrão, você não pode elevar um valor de habilidade acima de 20 com essa característica.
  barbarian-ability-score-improvement-2: Quando você atinge o 4º nível e novamente no 8º, 12º, 16º e 19º nível, você pode aumentar um valor de habilidade, à sua escolha, em 2, ou você pode aumentar dois valores de habilidade, à sua escolha, em 1. Como padrão, você não pode elevar um valor de habilidade acima de 20 com essa característica.
  barbarian-ability-score-improvement-3: Quando você atinge o 4º nível e novamente no 8º, 12º, 16º e 19º nível, você pode aumentar um valor de habilidade, à sua escolha, em 2, ou você pode aumentar dois valores de habilidade, à sua escolha, em 1. Como padrão, você não pode elevar um valor de habilidade acima de 20 com essa característica.
  barbarian-ability-score-improvement-4: Quando você atinge o 4º nível e novamente no 8º, 12º, 16º e 19º nível, você pode aumentar um valor de habilidade, à sua escolha, em 2, ou você pode aumentar dois valores de habilidade, à sua escolha, em 1. Como padrão, você não pode elevar um valor de habilidade acima de 20 com essa característica.
  barbarian-ability-score-improvement-5: Quando você atinge o 4º nível e novamente no 8º, 12º, 16º e 19º nível, você pode aumentar um valor de habilidade, à sua escolha, em 2, ou você pode aumentar dois valores de habilidade, à sua escolha, em 1. Como padrão, você não pode elevar um valor de habilidade acima de 20 com essa característica.
  barbarian-extra-attack: A partir do 5º nível, você pode atacar duas vezes, em vez de uma, sempre que usar a ação Atacar no seu turno.
  barbarian-unarmored-defense: Quando você não estiver vestindo qualquer armadura, sua Classe de Armadura será 10 + seu modificador de Destreza + seu modificador de Constituição. Você pode usar um escudo e continuar a receber esse benefício.
  bard-ability-score-improvement-1: Quando você atinge o 4º nível e novamente no 8º, 12º, 16º e 19º nível, você pode aumentar um valor de habilidade, à sua escolha, em 2, ou você pode aumentar dois valores de habilidade, à sua escolha, em 1. Como padrão, você não pode elevar um valor de habilidade acima de 20 com essa característica.
