  druid-ability-score-improvement-5: Quando você atinge o 4º nível e novamente no 8º, 12º, 16º e 19º nível, você pode aumentar um valor de habilidade, à sua escolha, em 2, ou você pode aumentar dois valores de habilidade, à sua escolha, em 1. Como padrão, você não pode elevar um valor de habilidade acima de 20 com essa característica.
  druid-circle: No 2º nível, você escolhe se identificar com um círculo de druidas, como o Círculo da Terra. Sua escolha concede recursos no 2º nível e novamente no 6º, 10º e 14º níveis.
  druid-circle-improvement-1: No 2º nível, você escolhe se identificar com um círculo de druidas, como o Círculo da Terra. Sua escolha concede recursos no 2º nível e novamente no 6º, 10º e 14º níveis.
  druid-circle-improvement-2: No 2º nível, você escolhe se identificar com um círculo de druidas, como o Círculo da Terra. Sua escolha concede recursos no 2º nível e novamente no 6º, 10º e 14º níveis.
  druid-circle-improvement-3: No 2º nível, você escolhe se identificar com um círculo de druidas, como o Círculo da Terra. Sua escolha concede recursos no 2º nível e novamente no 6º, 10º e 14º níveis.
  druid-timeless-body: A partir do 18º nível, a magia primordial que você empunha faz você envelhecer mais devagar. A cada 10 anos que passam, seu corpo envelhece apenas 1 ano.
  druidic: Você conhece o druídico, a língua secreta dos druidas. Pode falar a língua e usá-la para deixar mensagens ocultas. Você e outros que conhecem essa língua percebem automaticamente tal mensagem. Outros percebem a presença da mensagem com um teste bem-sucedido de Sabedoria (Percepção) contra CD 15, mas não a decifram sem magia.
  eldritch-invocations: |-
    No estudo de lore oculto, você desenterrou invocações místicas, fragmentos de conhecimento proibido que lhe conferem poder mágico duradouro.

    No 2º nível, você ganha duas invocações místicas à sua escolha. As opções estão detalhadas ao fim da descrição da classe. Ao alcançar certos níveis de bruxo, ganha invocações adicionais à escolha, conforme a coluna Invocações conhecidas da tabela do Bruxo.

    Além disso, ao ganhar um nível nesta classe, pode substituir uma invocação que conhece por outra que pudesse aprender nesse nível.
  eldritch-master: |-
    No 20º nível, você pode recorrer à reserva interior de poder místico enquanto implora seu patrono para recuperar espaços de magia gastos. Pode passar 1 minuto suplicando ajuda ao patrono para recuperar todos os espaços gastos do seu recurso Magia de Pacto.

    Depois de recuperar espaços com esse recurso, precisa terminar um descanso longo antes de fazê-lo de novo.
  elusive: A partir do 18º nível, você é tão evasivo que raramente os atacantes levam vantagem sobre você. Nenhuma rolagem de ataque tem vantagem contra você enquanto você não estiver incapacitado.
  empty-body: |-
    A partir do 18º nível, você pode usar sua ação para gastar 4 pontos de ki e ficar invisível por 1 minuto. Nesse período, também tem resistência a todo dano, exceto de força.

    Além disso, pode gastar 8 pontos de ki para conjurar a magia projeção astral sem precisar de componentes materiais. Ao fazê-lo, não pode levar outras criaturas com você.
  extra-attack-1: A partir do 5º nível, você pode atacar duas vezes, em vez de uma, sempre que usar a ação Atacar no seu turno. O número de ataques sobe para três ao alcançar o 11º nível nesta classe e para quatro ao alcançar o 20º nível nesta classe.
  extra-attack-2: A partir do 5º nível, você pode atacar duas vezes, em vez de uma, sempre que usar a ação Atacar no seu turno. O número de ataques sobe para três ao alcançar o 11º nível nesta classe e para quatro ao alcançar o 20º nível nesta classe.
  extra-attack-3: A partir do 5º nível, você pode atacar duas vezes, em vez de uma, sempre que usar a ação Atacar no seu turno. O número de ataques sobe para três ao alcançar o 11º nível nesta classe e para quatro ao alcançar o 20º nível nesta classe.
  fast-movement: A partir do 5º nível, seu deslocamento aumenta em 3 metros enquanto você não estiver vestindo uma armadura pesada.
  favored-enemy-1-type: |-
    A partir do 1º nível, você tem experiência significativa estudando, rastreando, caçando e até conversando com certo tipo de inimigo.

    Escolha um tipo de inimigo favorecido: aberrações, bestas, celestiais, constructos, dragões, elementais, fadas, infernais, gigantes, monstruosidades, lodo, plantas ou mortos-vivos. Em alternativa, pode escolher duas raças de humanoides (como gnolls e orcs) como inimigos favorecidos.

    Você tem vantagem em testes de Sabedoria (Sobrevivência) para rastrear esses inimigos, bem como em testes de Inteligência para recordar informações sobre eles.

    Ao ganhar esse recurso, também aprende uma língua à sua escolha falada pelos inimigos favorecidos, se falarem alguma.

    Você escolhe um inimigo favorecido adicional, bem como uma língua associada, no 6º e no 14º nível. À medida que sobe de nível, suas escolhas devem refletir os tipos de monstros que encontrou nas aventuras.
  favored-enemy-2-types: |-
    A partir do 1º nível, você tem experiência significativa estudando, rastreando, caçando e até conversando com certo tipo de inimigo.

    Escolha um tipo de inimigo favorecido: aberrações, bestas, celestiais, constructos, dragões, elementais, fadas, infernais, gigantes, monstruosidades, lodo, plantas ou mortos-vivos. Em alternativa, pode escolher duas raças de humanoides (como gnolls e orcs) como inimigos favorecidos.

    Você tem vantagem em testes de Sabedoria (Sobrevivência) para rastrear esses inimigos, bem como em testes de Inteligência para recordar informações sobre eles.

    Ao ganhar esse recurso, também aprende uma língua à sua escolha falada pelos inimigos favorecidos, se falarem alguma.

    Você escolhe um inimigo favorecido adicional, bem como uma língua associada, no 6º e no 14º nível. À medida que sobe de nível, suas escolhas devem refletir os tipos de monstros que encontrou nas aventuras.
