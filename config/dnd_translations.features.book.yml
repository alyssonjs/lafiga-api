  sorcerous-restoration: No 20º nível, você recupera 4 pontos de feitiçaria gastos sempre que terminar um descanso curto.
  spell-mastery: |-
    No 18º nível, você alcançou maestria tal sobre certas magias que pode conjurá-las à vontade. Escolha uma magia de mago de 1º nível e uma de 2º nível que estejam no seu grimório. Pode conjurá-las em seu nível mínimo sem gastar espaço de magia quando as tiver preparadas. Para conjurar em nível superior, precisa gastar espaço de magia normalmente.

    Ao passar 8 horas em estudo, pode trocar uma ou ambas as magias escolhidas por outras do mesmo nível.
  spellcasting-bard: Você aprendeu a desembaraçar e remodelar o tecido da realidade em harmonia com seus desejos e sua música. Suas magias fazem parte de seu vasto repertório, magia que você pode ajustar a situações diferentes.
  spellcasting-cleric: |-
    Como um canalizador de poder divino, você pode conjurar magias de clérigo. Veja o capítulo 10 para as regras gerais de conjuração e o capítulo 11 para a lista de magias de clérigo.

    Truques
    Você conhece três truques, à sua escolha, da lista de magias de clérigo. Você aprende truques de clérigo adicionais, à sua escolha, em níveis mais altos, como mostrado na coluna Truques Conhecidos da tabela O Clérigo.

    Preparando e conjurando magias
    A tabela O Clérigo mostra quantos espaços de magia você tem para conjurar suas magias de 1º nível e superiores. Para conjurar uma dessas magias, você precisa gastar um espaço do nível da magia ou superior. Você recupera todos os espaços gastos quando termina um descanso longo.

    Você prepara a lista de magias disponíveis selecionando-as da lista de magias de clérigo. Você seleciona um número de magias igual ao seu modificador de Sabedoria + seu nível de clérigo (mínimo de uma magia). Essas magias devem ser de níveis para os quais você possui espaços de magia.

    Você pode modificar a sua lista de magias preparadas quando termina um descanso longo. Preparar uma nova lista de magias de clérigo requer tempo gasto em preces e meditação: no mínimo 1 minuto por nível de magia para cada magia preparada.

    Habilidade de conjuração
    Sabedoria é a sua habilidade para você conjurar suas magias de clérigo. O poder de suas magias vem da devoção que você tem ao seu deus. Você usa sua Sabedoria sempre que alguma magia se referir à sua habilidade de conjurar magias. Além disso, você usa o seu modificador de Sabedoria para definir a CD dos testes de resistência para as magias de clérigo que você conjura e quando você realiza uma jogada de ataque com uma magia.

    CD para suas magias = 8 + bônus de proficiência + seu modificador de Sabedoria
    Modificador de ataque de magia = seu bônus de proficiência + seu modificador de Sabedoria

    Conjuração de ritual
    Você pode conjurar qualquer magia de clérigo que você conheça como um ritual se ela possuir o descritor ritual.

    Foco de conjuração
    Você pode usar um símbolo sagrado (encontrado no capítulo 5) como foco de conjuração das suas magias de clérigo.
  spellcasting-druid: Tirando da essência divina da própria natureza, você pode conjurar magias para moldar essa essência à sua vontade.
  spellcasting-paladin: No 2º nível, você aprendeu a canalizar magia divina por meio de meditação e oração para conjurar magias como um clérigo.
  spellcasting-ranger: Quando alcança o 2º nível, você aprendeu a usar a essência mágica da natureza para conjurar magias, de modo semelhante a um druida.
  spellcasting-sorcerer: Um acontecimento no seu passado, ou na vida de um parente ou ancestral, deixou uma marca duradoura em você, infundindo-o com magia arcana. Essa fonte de magia, seja qual for a origem, alimenta suas magias.
  spellcasting-wizard: Como estudante de magia arcana, você tem um grimório contendo magias que mostram os primeiros indícios do seu verdadeiro poder.
  step-of-the-wind: Você pode gastar 1 ponto de ki para usar as ações Desengajar ou Disparar como ação bônus no seu turno, e sua distância de salto é dobrada nesse turno.
  stillness-of-mind: A partir do 7º nível, você pode usar sua ação para encerrar um efeito sobre você que o esteja enfeitiçando ou amedrontado.
  stroke-of-luck: |-
    No 20º nível, você tem uma aptidão incomum para ter sucesso quando mais precisa. Se um ataque seu errar um alvo ao alcance, pode transformar o erro em acerto. Em alternativa, se falhar em um teste de atributo, pode tratar o resultado do d20 como 20.

    Depois de usar esse recurso, não pode usá-lo de novo até terminar um descanso curto ou longo.
  stunning-strike: A partir do 5º nível, você pode interferir no fluxo de ki no corpo de um oponente. Ao acertar outra criatura com um ataque corpo a corpo com arma, pode gastar 1 ponto de ki para tentar um golpe atordoante. O alvo deve obter sucesso em um teste de resistência de Constituição ou fica atordoado até o fim do seu próximo turno.
  superior-inspiration: No 20º nível, quando você rola iniciativa e não tem usos de Inspiração de Bardo restantes, recupera um uso.
  thieves-cant: |-
    Durante o treinamento de ladino você aprendeu a gíria dos ladrões, uma mistura secreta de dialeto, jargão e código que permite esconder mensagens em conversas aparentemente normais. Somente outra criatura que conheça a gíria entende tais mensagens. Leva quatro vezes mais tempo para transmitir a ideia do que falar a mesma coisa claramente.

    Além disso, você entende sinais e símbolos secretos usados para mensagens curtas e simples, como se uma área é perigosa ou território de guilda de ladrões, se há saque por perto, ou se as pessoas são presas fáceis ou oferecem esconderijo para ladrões fugitivos.
  tongue-of-the-sun-and-moon: A partir do 13º nível, você aprende a tocar o ki de outras mentes de modo a compreender todas as línguas faladas. Além disso, qualquer criatura que possa entender uma língua entende o que você diz.
  unarmored-movement-1: |-
    A partir do 2º nível, seu deslocamento aumenta em 10 pés enquanto não estiver usando armadura nem empunhando escudo. Esse bônus aumenta ao alcançar certos níveis de monge, conforme a tabela do Monge.

    No 9º nível, você pode se mover por superfícies verticais e sobre líquidos no seu turno sem cair durante o movimento.
  unarmored-movement-2: |-
    A partir do 2º nível, seu deslocamento aumenta em 10 pés enquanto não estiver usando armadura nem empunhando escudo. Esse bônus aumenta ao alcançar certos níveis de monge, conforme a tabela do Monge.

    No 9º nível, você pode se mover por superfícies verticais e sobre líquidos no seu turno sem cair durante o movimento.
  uncanny-dodge: A partir do 5º nível, quando um atacante que você possa ver acerta você com um ataque, você pode usar sua reação para reduzir à metade o dano desse ataque contra você.
  vanish: A partir do 14º nível, você pode usar a ação Esconder-se como ação bônus no seu turno. Além disso, não pode ser rastreado por meios não mágicos, a menos que escolha deixar rastros.
  warlock-ability-score-improvement-1: Quando você atinge o 4º nível e novamente no 8º, 12º, 16º e 19º nível, você pode aumentar um valor de habilidade, à sua escolha, em 2, ou você pode aumentar dois valores de habilidade, à sua escolha, em 1. Como padrão, você não pode elevar um valor de habilidade acima de 20 com essa característica.
  warlock-ability-score-improvement-2: Quando você atinge o 4º nível e novamente no 8º, 12º, 16º e 19º nível, você pode aumentar um valor de habilidade, à sua escolha, em 2, ou você pode aumentar dois valores de habilidade, à sua escolha, em 1. Como padrão, você não pode elevar um valor de habilidade acima de 20 com essa característica.
