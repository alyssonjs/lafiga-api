  monk-evasion: No 7º nível, sua agilidade instintiva permite escapar de certos efeitos de área, como o sopro elétrico de um dragão azul ou a magia bola de fogo. Quando sofrer um efeito que permita um teste de resistência de Destreza para sofrer apenas metade do dano, em vez disso não sofre dano algum se passar no teste, e sofre apenas metade se falhar.
  monk-extra-attack: A partir do 5º nível, você pode atacar duas vezes, em vez de uma, sempre que usar a ação Atacar no seu turno.
  monk-timeless-body: No 15º nível, seu ki o sustenta de modo que você não sofre a fragilidade da velhice e não pode envelhecer por magia. Ainda pode morrer de velhice, porém. Além disso, não precisa mais de comida nem água.
  monk-unarmored-defense: A partir do 1º nível, enquanto não estiver usando armadura nem empunhando um escudo, sua CA é 10 + seu modificador de Destreza + seu modificador de Sabedoria.
  mystic-arcanum-6th-level: |-
    No 11º nível, seu patrono lhe confere um segredo mágico chamado arcano místico. Escolha uma magia de 6º nível da lista do bruxo como esse arcano.

    Pode conjurar sua magia de arcano uma vez sem gastar espaço de magia. Precisa terminar um descanso longo antes de fazê-lo de novo.

    Em níveis mais altos, ganha mais magias de bruxo à escolha que podem ser conjuradas assim: uma de 7º nível no 13º, uma de 8º nível no 15º e uma de 9º nível no 17º. Recupera todos os usos do Arcano Místico ao terminar um descanso longo.
