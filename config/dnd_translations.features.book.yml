  oath-spells: |-
    Cada juramento tem uma lista de magias associadas. Você recebe acesso a essas magias nos níveis indicados na descrição do juramento. Depois de ganhar acesso a uma magia de juramento, você sempre a tem preparada. Magias de juramento não contam contra o número de magias que pode preparar por dia.

    Se ganhar uma magia de juramento que não consta na lista de magias de paladino, a magia ainda conta como magia de paladino para você.
  otherworldly-patron: No 1º nível, você firmou um pacto com um ser de outro mundo à sua escolha, como o Infernal. Sua escolha concede recursos no 1º nível e novamente no 6º, 10º e 14º níveis.
  otherworldly-patron-improvement-1: No 1º nível, você firmou um pacto com um ser de outro mundo à sua escolha, como o Infernal. Sua escolha concede recursos no 1º nível e novamente no 6º, 10º e 14º níveis.
  otherworldly-patron-improvement-2: No 1º nível, você firmou um pacto com um ser de outro mundo à sua escolha, como o Infernal. Sua escolha concede recursos no 1º nível e novamente no 6º, 10º e 14º níveis.
  otherworldly-patron-improvement-3: No 1º nível, você firmou um pacto com um ser de outro mundo à sua escolha, como o Infernal. Sua escolha concede recursos no 1º nível e novamente no 6º, 10º e 14º níveis.
  pact-boon: No 3º nível, seu patrono de outro mundo concede um presente pelo seu serviço leal. Você ganha um dos seguintes recursos, à sua escolha.
  pact-magic: Sua pesquisa arcana e a magia concedida por seu patrono lhe deram facilidade com magias.
  paladin-ability-score-improvement-1: Quando você atinge o 4º nível e novamente no 8º, 12º, 16º e 19º nível, você pode aumentar um valor de habilidade, à sua escolha, em 2, ou você pode aumentar dois valores de habilidade, à sua escolha, em 1. Como padrão, você não pode elevar um valor de habilidade acima de 20 com essa característica.
