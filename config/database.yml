default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  host: <%= ENV.fetch('DATABASE_HOST', 'lafiga_db') %>
  username: <%= ENV.fetch('DATABASE_USER', 'lafiga_api') %>
  password: <%= ENV.fetch('DATABASE_PASSWORD', 'password') %>
  database: <%= ENV.fetch('DATABASE_NAME', 'lafiga-api_db_1') %>

test:
  <<: *default
  host: <%= ENV.fetch('DATABASE_HOST', 'lafiga_db') %>
  username: <%= ENV.fetch('DATABASE_USER', 'lafiga_api') %>
  password: <%= ENV.fetch('DATABASE_PASSWORD', 'password') %>
  database: <%= ENV.fetch('TEST_DATABASE_NAME', 'lafiga-api_test') %>

# Production prefers DATABASE_URL (Railway/Render/Heroku/Fly all set it).
# Falls back to discrete env vars for self-hosted / Docker setups.
production:
  <<: *default
  url: <%= ENV['DATABASE_URL'] %>
  host: <%= ENV['DATABASE_HOST'] %>
  username: <%= ENV['DATABASE_USER'] %>
  password: <%= ENV['DATABASE_PASSWORD'] %>
  database: <%= ENV.fetch('DATABASE_NAME', 'lafiga-api_production') %>
  sslmode: <%= ENV.fetch('DATABASE_SSLMODE', 'prefer') %>
