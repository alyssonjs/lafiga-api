# Petiscos do Cozinheiro (Cook class) — D&D 5e (homebrew Lafiga).
# Schema: api/config/class_choices/SCHEMA.md
#
# Slugs: padrão `cook-snack-*` (1:1 com apiIndex do front).
# `prereqs.level`    → nível mínimo de Cozinheiro (0 = sempre).
# `prereqs.subclass` → subclasse api_index requerida (gating canônico).
# `school`/`range`/`duration` → metadata de gameplay/UI.
# `higher_level`     → escalonamento opcional.
# `mechanical_summary` é exibido como resumo curto (max 100 chars).

- slug: cook-snack-corte-fresco
