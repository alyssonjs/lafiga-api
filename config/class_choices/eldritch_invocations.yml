# === REQUER PACTO DA CORRENTE ===

- slug: ei-voice-of-chain-master
  name_pt: Voz do Mestre da Corrente
  name_en: Voice of the Chain Master
  description: |
    Você pode se comunicar telepaticamente com seu familiar e perceber através dos sentidos dele enquanto estiverem no mesmo plano. Além disso, pode falar através do familiar com sua própria voz.
  mechanical_summary: Comunicação telepática + sentidos do familiar
  classes:
    - warlock
  prereqs:
    pact: chain

- slug: ei-investment-of-chain
  name_pt: Investida do Familiar
  name_en: Investment of the Chain Master
  description: |
    Quando usar a ação Atacar, pode abrir mão de um dos seus ataques para permitir que seu familiar use sua reação para fazer um ataque.
  mechanical_summary: Familiar pode atacar como reação
  classes:
    - warlock
  prereqs:
    pact: chain

- slug: ei-chains-of-carceri
  name_pt: Correntes de Carceri
  name_en: Chains of Carceri
  description: |
    Você pode conjurar Imobilizar Monstro à vontade contra celestiais, corruptores e elementais, sem gastar slot. Deve terminar descanso longo antes de usar na mesma criatura.
  mechanical_summary: "Imobilizar Monstro à vontade (celestial/corruptor/elemental)"
  classes:
    - warlock
  prereqs:
    pact: chain
    level: 15

# === REQUER PACTO DA LÂMINA ===

- slug: ei-thirsting-blade
  name_pt: Sede da Lâmina
  name_en: Thirsting Blade
  description: |
    Você pode atacar com sua arma do pacto duas vezes, em vez de uma, quando usar a ação Atacar no seu turno.
  mechanical_summary: Ataque Extra com arma do pacto
