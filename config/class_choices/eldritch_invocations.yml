# Invocações Místicas do Bruxo (PHB).
# Schema: api/config/class_choices/SCHEMA.md
#
# Slugs seguem o padrão `ei-*` (eldritch invocation), 1:1 com o id do front
# (front-lafiga/src/app/data/eldritchInvocations.ts → EldritchInvocation.id).
# name_pt segue a tradução PHB BR usada pelo front.
# aliases preservam compat com:
#   - nomes EN do PHB (usados em prereqs hardcoded do guard antes do Kit 1)
#   - traduções alternativas que podem aparecer em chars legados
#
# Prereqs (chaves permitidas: level, pact, spell, blast, ability_min):
#   level: N            → exige Bruxo nível >= N
#   pact: chain|blade|tome → exige aquele Pacto escolhido
#   spell: 'Eldritch Blast' → exige conhecer aquele truque/magia
#   blast: true         → atalho para spell: 'Eldritch Blast' (legado, ainda aceito)

# === SEM PRÉ-REQUISITO (apenas spell para os Eldritch Blast) ===

- slug: ei-agonizing-blast
  name_pt: Explosão Agônica
  name_en: Agonizing Blast
  aliases:
    - Rajada Agonizante
  description: |
    Quando conjurar Rajada Mística, adicione seu modificador de Carisma ao dano que ela causa em um acerto.
  mechanical_summary: Rajada Mística + mod. CAR no dano
  classes:
    - warlock
  prereqs:
    spell: Eldritch Blast

- slug: ei-repelling-blast
  name_pt: Explosão Repulsora
  name_en: Repelling Blast
  description: |
    Quando acertar uma criatura com Rajada Mística, pode empurrá-la até 3 metros em linha reta para longe de você.
  mechanical_summary: Rajada Mística empurra 3m por acerto
  classes:
    - warlock
  prereqs:
    spell: Eldritch Blast

- slug: ei-eldritch-spear
  name_pt: Lança Eldritch
  name_en: Eldritch Spear
  description: |
    Quando conjurar Rajada Mística, o alcance da magia aumenta para 90 metros.
  mechanical_summary: Rajada Mística com alcance 90m
  classes:
    - warlock
  prereqs:
    spell: Eldritch Blast

- slug: ei-devils-sight
  name_pt: Visão do Demônio
  name_en: Devil's Sight
  aliases:
    - Visão do Diabo
  description: |
    Você pode ver normalmente em escuridão, tanto mágica quanto não-mágica, até uma distância de 36 metros.
  mechanical_summary: "Darkvision 36m (ignora escuridão mágica)"
  classes:
    - warlock

- slug: ei-eldritch-sight
  name_pt: Visão Eldritch
  name_en: Eldritch Sight
