    - warlock
  prereqs:
    pact: blade
    level: 5

- slug: ei-lifedrinker
  name_pt: Bebedor de Vida
  name_en: Lifedrinker
  description: |
    Quando acertar uma criatura com sua arma do pacto, a criatura sofre dano necrótico extra igual ao seu modificador de Carisma (mínimo 1).
  mechanical_summary: "+mod. CAR dano necrótico (arma do pacto)"
  classes:
    - warlock
  prereqs:
    pact: blade
    level: 12

# === REQUER PACTO DO TOMO ===

- slug: ei-book-of-ancient-secrets
