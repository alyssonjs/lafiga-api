    Você pode inscrever rituais mágicos em seu Livro das Sombras. Escolha duas magias de 1º nível com a tag ritual de qualquer lista de classe. Com o livro em mãos, pode conjurá-las como rituais. Pode copiar mais rituais encontrados.
  mechanical_summary: Rituais de qualquer lista no Livro das Sombras
  classes:
    - warlock
  prereqs:
    pact: tome

