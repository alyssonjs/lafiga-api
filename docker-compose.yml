version: "3.9"

services:
  redis:
    image: redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  # Nome do serviço = hostname na rede Docker (deve bater com config/database.yml: host lafiga_db)
  lafiga_db:
    image: postgres:14
    volumes:
      - ./tmp/db:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: lafiga_api
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lafiga-api_db_1
  web:
    build: .
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails db:migrate && bundle exec rails s -p 3000 -b '0.0.0.0'"
    volumes:
      - .:/lafiga-api
      - bundler_gems:/user/local/bundle/
    ports:
      - "3000:3000"
    depends_on:
      - lafiga_db
      - redis
    environment:
      RAILS_ENV: development
      REDIS_URL: redis://redis:6379/1
      # Action Cable origins for the local SPA dev servers.
      # Production uses ACTION_CABLE_ALLOWED_ORIGINS via .env (see .env.example).
      ACTION_CABLE_ALLOWED_REQUEST_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173
volumes: 
    postgres:
    bundler_gems:
